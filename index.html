<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZISWEB ERP - AI Agency OS</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Rubik', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' }
                    },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Rubik', sans-serif !important; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        /* Canvas drawing styles */
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // המפתח החדש שלך
        const GEMINI_API_KEY = "AQ.Ab8RN6KUs_h-e7vuWbqdoNKFQcS5h9c2fmqNucGwhUJDyBfMKg";

        const MOCK_PRICING = [
            { id: 1, name: 'אחסון ותחזוקה VIP (חודשי)', price: 150, type: 'mrr' },
            { id: 2, name: 'עיצוב לוגו מקצועי', price: 500, type: 'one_time' },
            { id: 3, name: 'חיבור מערכת סליקה', price: 800, type: 'one_time' }
        ];

        const MOCK_USERS = [
            { id: 'admin1', role: 'admin', name: 'אורי (מנהל סוכנות)', email: 'admin@orizis.com', password: '123' },
            { id: 'free1', role: 'freelancer', name: 'דניאל (מפתח)', email: 'dan@orizis.com', password: '123', isSigned: true, teamLeaderId: null },
            { id: 'free2', role: 'freelancer', name: 'יעל (מפתחת)', email: 'yael@orizis.com', password: '123', isSigned: false, teamLeaderId: 'free1' },
            { id: 'client1', role: 'client', name: 'רותם עורכי דין', email: 'rotem@law.com', password: '123' },
            { id: 'client2', role: 'client', name: 'חיים אינסטלציה', email: 'haim@fix.com', password: '123' }
        ];

        const MOCK_PROJECTS = [
            { id: 'proj1', clientId: 'client1', freelancerId: 'free1', status: 'waiting_for_brief', paymentAmount: 0, brief: '', timeSpent: 0, timeBudget: 12600, customerSignature: null, createdAt: Date.now(), chatHistory: [{ role: 'model', text: 'שלום! אני יונתן, מנהל הפרויקטים החכם של אוריזיס. אני כאן כדי שנאפיין יחד את החזון שלך לאתר המושלם. ספר לי בכמה מילים - מה העסק שלך עושה ומי קהל היעד?' }] },
            { id: 'proj2', clientId: 'client2', freelancerId: 'free1', status: 'in_progress', paymentAmount: 1500, brief: 'לקוח רוצה אתר תדמית כחול עם טופס לידים.', timeSpent: 7200, timeBudget: 12600, customerSignature: 'signed', createdAt: Date.now() - 86400000, chatHistory: [] }
        ];

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 p-6 ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const base = "px-4 py-2 font-bold rounded-xl transition-all duration-200 focus:outline-none flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-500 text-white hover:bg-brand-600 shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-500/30",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-lg shadow-amber-500/30",
                purple: "bg-purple-600 text-white hover:bg-purple-700 shadow-lg shadow-purple-600/30"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const AlertModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "אישור", type = "info" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
                        <div className={`text-5xl mb-4 text-center ${type === 'danger' ? 'text-rose-500' : type === 'warning' ? 'text-amber-500' : 'text-brand-500'}`}>
                            {type === 'danger' ? '⚠️' : type === 'warning' ? '🤔' : '✨'}
                        </div>
                        <h3 className="text-2xl font-black text-center text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-center mb-8 font-medium">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {onCancel && <Button variant="secondary" onClick={onCancel} className="w-full">ביטול</Button>}
                            <Button variant={type === 'danger' ? 'danger' : 'primary'} onClick={onConfirm} className="w-full">{confirmText}</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const SignatureCanvas = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a';
            }, []);

            const startDrawing = (e) => {
                setIsDrawing(true);
                draw(e);
            };

            const endDrawing = () => {
                setIsDrawing(false);
                canvasRef.current.getContext('2d').beginPath();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            };

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-4 bg-slate-50">
                    <canvas 
                        ref={canvasRef} width={400} height={200} 
                        className="w-full bg-white rounded-xl cursor-crosshair touch-none border border-slate-200"
                        onMouseDown={startDrawing} onMouseUp={endDrawing} onMouseMove={draw} onMouseLeave={endDrawing}
                        onTouchStart={startDrawing} onTouchEnd={endDrawing} onTouchMove={draw}
                    />
                    <div className="flex gap-3 mt-4">
                        <Button variant="secondary" onClick={clear} className="flex-1">נקה חתימה</Button>
                        <Button variant="success" onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-1">אשר ושמור חתימה</Button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [users, setUsers] = useState(MOCK_USERS);
            const [projects, setProjects] = useState(MOCK_PROJECTS);
            const [pricing, setPricing] = useState(MOCK_PRICING);
            
            const [currentUser, setCurrentUser] = useState(null);
            const [impersonatingAdmin, setImpersonatingAdmin] = useState(null); 

            const [alertData, setAlertData] = useState({ isOpen: false });

            const showAlert = (message, title = "הודעת מערכת", type = "info") => {
                setAlertData({ isOpen: true, title, message, type, onConfirm: () => setAlertData({ isOpen: false }) });
            };

            const showConfirm = (message, onConfirm, title = "אישור פעולה") => {
                setAlertData({ 
                    isOpen: true, title, message, type: 'warning', 
                    onConfirm: () => { onConfirm(); setAlertData({ isOpen: false }); },
                    onCancel: () => setAlertData({ isOpen: false })
                });
            };

            const login = (email, password) => {
                const user = users.find(u => u.email === email && u.password === password);
                if (user) setCurrentUser(user);
                else showAlert("פרטי התחברות שגויים", "שגיאה", "danger");
            };

            const logout = () => {
                if (impersonatingAdmin) {
                    setCurrentUser(impersonatingAdmin);
                    setImpersonatingAdmin(null);
                } else {
                    setCurrentUser(null);
                }
            };

            const impersonateUser = (userId) => {
                const userToView = users.find(u => u.id === userId);
                if(userToView) {
                    setImpersonatingAdmin(currentUser);
                    setCurrentUser(userToView);
                }
            };

            const updateUser = (id, data) => setUsers(prev => prev.map(u => u.id === id ? { ...u, ...data } : u));
            const updateProject = (id, data) => setProjects(prev => prev.map(p => p.id === id ? { ...p, ...data } : p));
            
            const addProjectAndClient = (clientData) => {
                const clientId = 'client_' + Date.now();
                const newClient = { id: clientId, role: 'client', name: clientData.name, email: clientData.email, password: clientData.password };
                // תקציב בסיס מתחיל ב-0, יונתן מאפיין, פרילנסר מתמחר.
                const newProject = { 
                    id: 'proj_' + Date.now(), 
                    clientId, 
                    freelancerId: clientData.freelancerId, 
                    status: 'waiting_for_brief', 
                    paymentAmount: 0, 
                    brief: '', 
                    timeSpent: 0, 
                    timeBudget: 12600, 
                    customerSignature: null, 
                    createdAt: Date.now(),
                    chatHistory: [{ role: 'model', text: 'שלום! אני יונתן, מנהל הפרויקטים החכם של אוריזיס. אני כאן כדי שנאפיין יחד את החזון שלך לאתר המושלם. ספר לי בכמה מילים - מה העסק שלך עושה ומי קהל היעד?' }]
                };
                setUsers(prev => [...prev, newClient]);
                setProjects(prev => [...prev, newProject]);
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-900 to-slate-900 p-4">
                        <Card className="w-full max-w-md p-8 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-500 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
                            <h1 className="text-4xl font-black text-center text-slate-800 mb-2 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <p className="text-center text-slate-500 mb-8 font-medium">Agency ERP System</p>
                            
                            <div className="space-y-4">
                                <Button onClick={() => login('admin@orizis.com', '123')} className="w-full py-4 text-lg">התחבר כמנהל סוכנות</Button>
                                <Button onClick={() => login('dan@orizis.com', '123')} variant="secondary" className="w-full py-4">התחבר כסוכן (פרילנסר)</Button>
                                <Button onClick={() => login('rotem@law.com', '123')} variant="secondary" className="w-full py-4">התחבר כלקוח</Button>
                            </div>
                        </Card>
                        <AlertModal {...alertData} />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-20 md:pb-0">
                    <AlertModal {...alertData} />
                    
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 glass-panel">
                        {impersonatingAdmin && (
                            <div className="bg-purple-600 text-white text-center py-2 px-4 font-bold text-sm flex justify-between items-center shadow-inner">
                                <span>👁️ מצב צפייה: אתה רואה את המסך כ-{currentUser.role === 'client' ? 'לקוח' : 'פרילנסר'} ({currentUser.name})</span>
                                <Button onClick={logout} variant="secondary" className="text-xs py-1 px-3">חזור למסך מנהל</Button>
                            </div>
                        )}
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span> <span className="text-sm font-medium text-slate-400 border-r border-slate-300 pr-2 mr-2">ERP</span></h1>
                            <div className="flex items-center gap-4">
                                <div className="text-left hidden sm:block">
                                    <div className="font-bold text-slate-700">{currentUser.name}</div>
                                    <div className="text-xs text-brand-600 font-medium uppercase">{currentUser.role}</div>
                                </div>
                                <Button onClick={logout} variant="secondary" className="!p-2 rounded-full"><span className="text-xl">🚪</span></Button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        {currentUser.role === 'admin' && <AdminDashboard users={users} setUsers={setUsers} projects={projects} setProjects={setProjects} pricing={pricing} addProjectAndClient={addProjectAndClient} showConfirm={showConfirm} showAlert={showAlert} impersonateUser={impersonateUser} updateUser={updateUser} />}
                        {currentUser.role === 'freelancer' && <FreelancerDashboard user={currentUser} projects={projects} updateProject={updateProject} updateUser={updateUser} showConfirm={showConfirm} showAlert={showAlert} users={users} impersonateUser={impersonateUser} />}
                        {currentUser.role === 'client' && <ClientPortal user={currentUser} projects={projects} updateProject={updateProject} showAlert={showAlert} showConfirm={showConfirm} pricing={pricing} />}
                    </main>
                </div>
            );
        };

        const AdminDashboard = ({ users, setUsers, projects, setProjects, pricing, addProjectAndClient, showConfirm, showAlert, impersonateUser, updateUser }) => {
            const [activeTab, setActiveTab] = useState('projects');
            const [newClientData, setNewClientData] = useState({ name: '', email: '', password: '', freelancerId: '' });

            const clients = users.filter(u => u.role === 'client');
            const freelancers = users.filter(u => u.role === 'freelancer');

            const totalRevenue = projects.reduce((sum, p) => sum + p.paymentAmount, 0);
            const totalFreelancerCost = projects.reduce((sum, p) => sum + (p.paymentAmount * 0.6), 0); 
            const grossProfit = totalRevenue - totalFreelancerCost;

            const handleCreateClient = () => {
                if(!newClientData.name || !newClientData.email || !newClientData.password) return showAlert("חובה למלא שם עסק, אימייל וסיסמה.");
                addProjectAndClient(newClientData);
                showAlert("הלקוח הוקם בהצלחה! שלח לו את פרטי ההתחברות כדי שיתחיל אפיון מול יונתן ה-AI.", "לקוח הוקם", "success");
                setNewClientData({ name: '', email: '', password: '', freelancerId: '' });
            };

            const promptEditUser = (user) => {
                const newName = prompt("הזן שם חדש:", user.name) || user.name;
                const newEmail = prompt("הזן אימייל חדש:", user.email) || user.email;
                const newPassword = prompt("הזן סיסמה חדשה:", user.password) || user.password;
                updateUser(user.id, {name: newName, email: newEmail, password: newPassword});
                showAlert("פרטי המשתמש עודכנו בהצלחה", "עודכן", "success");
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="bg-gradient-to-br from-brand-500 to-brand-700 text-white border-none relative overflow-hidden">
                            <h3 className="text-brand-100 font-medium mb-1">הכנסות ברוטו</h3>
                            <div className="text-4xl font-black mb-1">₪{totalRevenue.toLocaleString()}</div>
                            <div className="absolute opacity-10 text-8xl -right-4 -bottom-4">💰</div>
                        </Card>
                        <Card className="bg-gradient-to-br from-slate-800 to-slate-900 text-white border-none relative overflow-hidden">
                            <h3 className="text-slate-400 font-medium mb-1">תשלום לפרילנסרים (60%)</h3>
                            <div className="text-4xl font-black mb-1">₪{totalFreelancerCost.toLocaleString()}</div>
                            <div className="absolute opacity-10 text-8xl -right-4 -bottom-4">👨‍💻</div>
                        </Card>
                        <Card className="bg-gradient-to-br from-emerald-500 to-emerald-700 text-white border-none relative overflow-hidden">
                            <h3 className="text-emerald-100 font-medium mb-1">רווח גולמי משוער</h3>
                            <div className="text-4xl font-black mb-1">₪{grossProfit.toLocaleString()}</div>
                            <div className="absolute opacity-10 text-8xl -right-4 -bottom-4">📈</div>
                        </Card>
                    </div>

                    <div className="flex space-x-2 space-x-reverse bg-slate-200/50 p-1 rounded-2xl w-fit">
                        {['projects', 'team', 'settings'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-2.5 rounded-xl font-bold text-sm transition-all ${activeTab === tab ? 'bg-white text-brand-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200'}`}>
                                {tab === 'projects' ? '🚀 פרויקטים ולקוחות' : tab === 'team' ? '👥 צוות סוכנים' : '⚙️ הגדרות מערכת'}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'projects' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                            <div className="lg:col-span-2 space-y-6">
                                <Card>
                                    <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2"><span>📋</span> פרויקטים פעילים</h2>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-right">
                                            <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                                                <tr>
                                                    <th className="py-4 px-4 rounded-tr-xl">לקוח (פרויקט)</th>
                                                    <th className="py-4 px-4">סטטוס</th>
                                                    <th className="py-4 px-4">פרילנסר מבצע</th>
                                                    <th className="py-4 px-4 rounded-tl-xl text-center">מעקב לקוח</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {projects.map(p => {
                                                    const client = clients.find(c => c.id === p.clientId);
                                                    const freelancer = freelancers.find(f => f.id === p.freelancerId);
                                                    
                                                    let statusBadge = '';
                                                    if(p.status === 'waiting_for_brief') statusBadge = <span className="bg-brand-100 text-brand-700 px-2 py-1 rounded-md text-xs font-bold animate-pulse">🤖 אפיון AI</span>;
                                                    else if(p.status === 'waiting_for_quote') statusBadge = <span className="bg-amber-100 text-amber-700 px-2 py-1 rounded-md text-xs font-bold">⚠️ דורש תמחור</span>;
                                                    else if(p.status === 'waiting_for_payment') statusBadge = <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded-md text-xs font-bold">💳 ממתין לתשלום</span>;
                                                    else if(p.status === 'in_progress') statusBadge = <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded-md text-xs font-bold">👨‍💻 בפיתוח</span>;
                                                    else if(p.status === 'qa_review') statusBadge = <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md text-xs font-bold">👀 בקרת איכות</span>;
                                                    else statusBadge = <span className="bg-slate-100 text-slate-700 px-2 py-1 rounded-md text-xs font-bold">מוכן</span>;

                                                    return (
                                                        <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="py-4 px-4 font-bold text-slate-800 flex items-center gap-2">
                                                                {client?.name || 'לא ידוע'}
                                                                <button onClick={() => promptEditUser(client)} className="text-slate-400 hover:text-brand-500 text-xs" title="ערוך פרטי לקוח">✏️</button>
                                                            </td>
                                                            <td className="py-4 px-4">{statusBadge}</td>
                                                            <td className="py-4 px-4 text-slate-600">{freelancer?.name || 'לא שויך'}</td>
                                                            <td className="py-4 px-4 text-center">
                                                                <Button onClick={() => impersonateUser(client.id)} variant="secondary" className="!px-3 !py-1 text-xs w-full" title="הכנס לאזור הלקוח וראה את השיחה עם יונתן">
                                                                    🚪 צפה כלקוח
                                                                </Button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>

                            <div className="space-y-6">
                                <Card className="border-t-4 border-t-brand-500">
                                    <h2 className="text-xl font-black text-slate-800 mb-6">➕ הקמת לקוח חדש</h2>
                                    <p className="text-xs text-slate-500 mb-4">הלקוח יכנס ישירות לשיחת אפיון עם יונתן ה-AI, ולאחר מכן הפרילנסר יתמחר עבורו את הפרויקט במדויק.</p>
                                    <div className="space-y-4">
                                        <div><label className="text-sm font-bold text-slate-700 mb-1 block">שם העסק / הלקוח</label><input type="text" value={newClientData.name} onChange={e=>setNewClientData({...newClientData, name: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-brand-500 outline-none" /></div>

                                                <option value="">בחר סוכן/פרילנסר...</option>

                                            </select>

                                    </div>
                                </Card>
                            </div>
                        </div>
                    )}

                    {activeTab === 'team' && (
                        <Card className="fade-in">
                            <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 mb-6">
                                <p className="text-rose-800 font-bold text-sm">⛔ עצור: כאן מקימים אך ורק סוכנים ופרילנסרים מטעמך! לקוחות מקימים תחת לשונית "פרויקטים".</p>
                            </div>
                            <h2 className="text-xl font-black text-slate-800 mb-6">ניהול צוות ומבנה ארגוני (MLM)</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-right">
                                    <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                                        <tr>
                                            <th className="py-4 px-4 rounded-tr-xl">שם הפרילנסר</th>
                                            <th className="py-4 px-4">ראש צוות (אפיליאציה)</th>
                                            <th className="py-4 px-4">הסכם סודיות</th>
                                            <th className="py-4 px-4 rounded-tl-xl text-center">פעולות</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {freelancers.map(f => {
                                            const teamLeader = freelancers.find(tl => tl.id === f.teamLeaderId);
                                            return (
                                                <tr key={f.id}>
                                                    <td className="py-4 px-4 font-bold text-slate-800">{f.name}</td>
                                                    <td className="py-4 px-4 text-slate-600">{teamLeader ? `תחת ${teamLeader.name} (עמלת 150₪)` : 'עצמאי'}</td>
                                                    <td className="py-4 px-4">{f.isSigned ? <span className="text-emerald-500 font-bold">חתום ✓</span> : <span className="text-rose-500 font-bold">טרם חתם</span>}</td>
                                                    <td className="py-4 px-4 text-center space-x-2 space-x-reverse">
                                                        <Button onClick={() => impersonateUser(f.id)} variant="secondary" className="!px-3 !py-1 text-xs inline-flex">🚪 צפה כפרילנסר</Button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {activeTab === 'settings' && (
                        <Card className="fade-in">
                            <h2 className="text-xl font-black text-slate-800 mb-4">הגדרות מערכת וחוזים</h2>
                            <p className="text-slate-500 mb-4">כאן בעתיד תנהל את טקסט החוזים והמחירון הדינמי.</p>
                        </Card>
                    )}
                </div>
            );
        };

        const FreelancerDashboard = ({ user, projects, updateProject, updateUser, showConfirm, showAlert, users, impersonateUser }) => {
            const [activeTimer, setActiveTimer] = useState(null);
            
            const myProjects = projects.filter(p => p.freelancerId === user.id);
            const activeProjects = myProjects.filter(p => p.status === 'in_progress' || p.status === 'waiting_for_quote');
            const completedProjects = myProjects.filter(p => p.status === 'completed');
            
            const myIncome = completedProjects.reduce((sum, p) => sum + (p.paymentAmount * 0.6), 0);
            const targetIncome = 50000;
            const progressPercent = Math.min((myIncome / targetIncome) * 100, 100);

            useEffect(() => {
                let interval;
                if (activeTimer) {
                    interval = setInterval(() => {
                        updateProject(activeTimer, { timeSpent: projects.find(p => p.id === activeTimer).timeSpent + 1 });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeTimer, projects]);

            if (!user.isSigned) {
                return (
                    <Card className="max-w-2xl mx-auto border-t-4 border-t-rose-500 fade-in mt-10">
                        <h2 className="text-2xl font-black text-slate-800 mb-4">ברוך הבא לצוות ORIZISWEB</h2>
                        <p className="text-slate-600 mb-6 font-medium">כדי להתחיל לקבל פרויקטים, עליך לחתום על הסכם סודיות (NDA) ותנאי התקשרות.</p>
                        <SignatureCanvas onSave={() => { updateUser(user.id, { isSigned: true }); showAlert("ברוך הבא! חשבונך הופעל.", "הסכם נחתם", "success"); }} />
                    </Card>
                );
            }

            return (
                <div className="space-y-8 fade-in">
                    <Card className="bg-slate-800 text-white border-none shadow-xl">
                        <h3 className="text-slate-400 font-bold mb-4 uppercase tracking-widest text-sm">יעד הכנסות אישי</h3>
                        <div className="flex justify-between items-end mb-2">
                            <div className="text-4xl font-black text-brand-400">₪{myIncome.toLocaleString()}</div>
                            <div className="text-slate-300 font-bold">מתוך ₪{targetIncome.toLocaleString()}</div>
                        </div>
                        <div className="w-full bg-slate-700 rounded-full h-4 overflow-hidden shadow-inner">
                            <div className="bg-gradient-to-r from-brand-500 to-emerald-400 h-4 rounded-full transition-all duration-1000" style={{width: `${progressPercent}%`}}></div>
                        </div>
                    </Card>

                    <h2 className="text-2xl font-black text-slate-800 mb-4">תור העבודה שלי</h2>
                    
                    {activeProjects.map(p => {
                        const isOvertime = p.timeSpent > p.timeBudget;
                        const client = users.find(u=>u.id===p.clientId);
                        return (
                            <Card key={p.id} className="border-r-4 border-r-brand-500 shadow-md">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800">לקוח: {client?.name}</h3>
                                        <div className="text-slate-500 font-medium text-sm">פרויקט ID: {p.id.slice(-4)}</div>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <Button onClick={() => impersonateUser(client.id)} variant="secondary" className="!text-xs !py-1">🚪 צפה כלקוח</Button>
                                        <span className={`${p.status === 'waiting_for_quote' ? 'bg-amber-100 text-amber-700' : 'bg-purple-100 text-purple-700'} px-3 py-1 rounded-full text-xs font-black`}>
                                            {p.status === 'waiting_for_quote' ? 'ממתין לתמחור שלך' : 'בעבודה'}
                                        </span>
                                    </div>
                                </div>

                                {p.status === 'in_progress' && (
                                    <div className="flex flex-col md:flex-row gap-4 mb-6">
                                        <div className="flex-1 bg-slate-50 p-6 rounded-2xl border border-slate-200 flex items-center justify-between">
                                            <div>
                                                <div className="text-sm font-bold text-slate-500 mb-1">טיימר עבודה</div>
                                                <div className={`font-mono text-3xl font-black ${isOvertime ? 'text-rose-600' : 'text-slate-700'}`}>
                                                    {(p.timeSpent / 3600).toFixed(2)} / {(p.timeBudget / 3600).toFixed(2)}h
                                                </div>
                                            </div>
                                            {activeTimer === p.id ? (
                                                <Button onClick={() => setActiveTimer(null)} variant="danger" className="animate-pulse shadow-rose-500/50">⏸️ עצור</Button>
                                            ) : (
                                                <Button onClick={() => setActiveTimer(p.id)} variant="primary" className="shadow-brand-500/50">▶️ התחל</Button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {p.status === 'waiting_for_quote' && (
                                    <div className="bg-amber-100 p-5 rounded-2xl mb-6 border border-amber-300">
                                        <h4 className="font-black text-amber-900 mb-2 flex items-center gap-2"><span className="text-xl">⚠️</span> תמחר את הפרויקט</h4>
                                        <p className="text-sm text-amber-800 mb-4 font-bold">סוכן ה-AI סיים את האפיון מול הלקוח. קרא את האפיון למטה, הזן הצעת מחיר מדויקת ושלח ללקוח לאישור ותשלום.</p>
                                        <div className="flex flex-wrap gap-4 items-center bg-white p-3 rounded-xl border border-amber-200">
                                            <label className="text-sm font-bold text-slate-700">תמחור סופי (₪):</label>
                                            <input type="number" defaultValue={p.paymentAmount || ''} onBlur={(e) => updateProject(p.id, {paymentAmount: Number(e.target.value)})} className="p-2 rounded-lg border border-slate-300 w-32 outline-none font-bold" placeholder="למשל 2500" />
                                            <Button onClick={() => {
                                                if(p.paymentAmount <= 0) return showAlert("חובה להזין סכום גדול מ-0", "שגיאה", "danger");
                                                updateProject(p.id, {status: 'waiting_for_payment'})
                                            }} variant="success">שמור ושלח ללקוח לתשלום</Button>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-brand-50 p-5 rounded-2xl border border-brand-100 mb-6">
                                    <h4 className="font-black text-brand-900 mb-2 flex items-center gap-2"><span>📝</span> אפיון הלקוח (הועבר מה-AI)</h4>
                                    <textarea 
                                        className="w-full p-4 bg-white border border-brand-200 rounded-xl min-h-[150px] outline-none text-sm text-slate-700 focus:border-brand-500" 
                                        defaultValue={p.brief} 
                                        onBlur={(e) => updateProject(p.id, {brief: e.target.value})}
                                        placeholder="טקסט האפיון יופיע כאן..."
                                    />
                                </div>

                                {p.status === 'in_progress' && (
                                    <Button onClick={() => showConfirm('האם סיימת לבדוק הכל?', () => updateProject(p.id, {status: 'qa_review'}))} variant="success" className="w-full py-4 text-lg">
                                        ✅ הגש לבקרת איכות (QA)
                                    </Button>
                                )}
                            </Card>
                        );
                    })}
                    
                    {activeProjects.length === 0 && (
                        <div className="text-center p-12 bg-white rounded-3xl border border-dashed border-slate-300">
                            <div className="text-5xl mb-4 opacity-50">☕</div>
                            <h3 className="text-xl font-bold text-slate-600">אין פרויקטים פעילים. זמן לנוח!</h3>
                        </div>
                    )}
                </div>
            );
        };

        const ClientPortal = ({ user, projects, updateProject, showAlert, showConfirm, pricing }) => {
            const project = projects.find(p => p.clientId === user.id);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Using chatHistory from the project state so admins can monitor it
            const messages = project?.chatHistory || [];

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            if (!project) return <div className="text-center p-10 font-bold text-rose-500">שגיאה: לא נמצא פרויקט.</div>;

            const isAIPhase = project.status === 'waiting_for_brief';
            const isTriage = project.status === 'waiting_for_quote';
            const isPayPhase = project.status === 'waiting_for_payment';
            const isDevPhase = project.status === 'in_progress' || project.status === 'qa_review';
            const isDone = project.status === 'completed';

            const handleSendChat = async () => {
                if (!chatInput.trim()) return;
                const newMessages = [...messages, { role: 'user', text: chatInput }];
                
                // Update project state with new message immediately so admin can see
                updateProject(project.id, { chatHistory: newMessages });
                setChatInput('');
                setIsTyping(true);

                const catalogStr = pricing.map(p => `${p.name} (ב-${p.price} ₪)`).join(', ');
                const sysPrompt = `השם שלך הוא יונתן. אתה מנהל פרויקטים ומאפיין אתרים מקצועי בסוכנות ORIZISWEB.
מטרתך לאסוף מידע מקיף מהלקוח כדי שצוות הפיתוח יוכל לתמחר ולבנות את הפרויקט. עליך להבין: מהות העסק, מתחרים, צבעים/עיצוב, ופונקציונליות מיוחדת (חנות, תורים וכו').
חוקים חשובים:
1. היה סופר אדיב ומקצועי.
2. שאל רק שאלה אחת או שתיים קשורות בכל פעם. אל תציף.
3. אתה רק מאפיין - אל תזכיר מחירים ואל תבטיח הצעות מחיר ספציפיות על דעת עצמך.
4. UPSALE: אם הלקוח מציין צורך שקיים אצלנו בחנות (${catalogStr}), הצע לו בעדינות להוסיף את זה בהמשך.
סיום השיחה: ברגע שיש לך מספיק מידע כדי שהצוות יוכל לתמחר ולעבוד, הסבר ללקוח באדיבות שהעברת את האפיון לצוות המומחים שלנו לבחינה ותמחור מדויק, והוסף בסוף התשובה שלך בדיוק את המילה [סיכום_אפיון].`;

                try {
                    // Update endpoint to use the newer supported model format for Gemini
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            contents: newMessages.map(m => ({ role: m.role, parts: [{ text: m.text }] }))
                        })
                    });
                    
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    let aiText = data.candidates[0].content.parts[0].text;
                    const isFinished = aiText.includes('[סיכום_אפיון]');
                    aiText = aiText.replace('[סיכום_אפיון]', '').trim();
                    
                    const finalMessages = [...newMessages, { role: 'model', text: aiText }];
                    updateProject(project.id, { chatHistory: finalMessages }); // Save AI response
                    
                    if (isFinished) {
                        const briefTranscript = finalMessages.map(m => `${m.role === 'user' ? 'לקוח' : 'יונתן (AI)'}: ${m.text}`).join('\n\n');
                        // הפרויקט עובר לתמחור ידני של הפרילנסר
                        setTimeout(() => updateProject(project.id, { brief: briefTranscript, status: 'waiting_for_quote' }), 3000);
                    }
                } catch (err) {
                    console.error("API Error:", err);
                    updateProject(project.id, { chatHistory: [...newMessages, { role: 'model', text: 'שגיאת חיבור ל-AI. המערכת חסומה או שהמפתח לא תקין. נסה לרענן.' }] });
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in pb-20">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between text-center relative z-10">
                        <div className="absolute top-1/2 left-[10%] right-[10%] h-1 bg-slate-100 -z-10 -translate-y-1/2"></div>
                        <div className={`absolute top-1/2 right-[10%] h-1 bg-brand-500 transition-all duration-700 -z-10 -translate-y-1/2 ${!isAIPhase && !isTriage ? (isDone ? 'w-[80%]' : 'w-[40%]') : 'w-0'}`}></div>
                        
                        <div className="flex flex-col items-center gap-2 bg-white px-2">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl transition-all shadow-lg ${isAIPhase || isTriage ? 'bg-brand-500 text-white shadow-brand-500/40 scale-110' : 'bg-brand-500 text-white'}`}>1</div>
                            <span className="text-xs font-bold text-slate-700">אפיון מול יונתן ה-AI</span>
                        </div>
                        <div className="flex flex-col items-center gap-2 bg-white px-2">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl transition-all shadow-lg ${isPayPhase ? 'bg-brand-500 text-white shadow-brand-500/40 scale-110' : !isAIPhase && !isTriage ? 'bg-brand-500 text-white' : 'bg-slate-100 text-slate-400'}`}>2</div>
                            <span className="text-xs font-bold text-slate-700">אישור תמחור והסכם</span>
                        </div>
                        <div className="flex flex-col items-center gap-2 bg-white px-2">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl transition-all shadow-lg ${isDevPhase ? 'bg-brand-500 text-white shadow-brand-500/40 scale-110' : isDone ? 'bg-brand-500 text-white' : 'bg-slate-100 text-slate-400'}`}>3</div>
                            <span className="text-xs font-bold text-slate-700">פיתוח במעבדה</span>
                        </div>
                    </div>

                    {isAIPhase ? (
                        <Card className="shadow-2xl border-t-4 border-t-brand-500 p-0 overflow-hidden flex flex-col h-[600px]">
                            <div className="bg-brand-50 p-4 border-b border-brand-100 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-brand-500 text-white flex items-center justify-center text-xl shadow-inner">🤖</div>
                                    <div>
                                        <h3 className="font-black text-slate-800">יונתן - מנהל פרויקטים AI</h3>
                                        <p className="text-xs text-brand-600 font-bold">מחובר ועונה מיד</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                                        <div className={`max-w-[80%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-brand-500 text-white rounded-tr-sm' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-sm'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start fade-in"><div className="bg-white border border-slate-200 text-slate-400 p-4 rounded-2xl rounded-tl-sm shadow-sm text-sm flex gap-1"><span className="animate-bounce">.</span><span className="animate-bounce" style={{animationDelay:'0.2s'}}>.</span><span className="animate-bounce" style={{animationDelay:'0.4s'}}>.</span></div></div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="p-4 bg-white border-t border-slate-100 flex gap-2">
                                <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendChat()} placeholder="הקלד תשובה ליונתן..." className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" disabled={isTyping} />
                                <Button onClick={handleSendChat} disabled={isTyping || !chatInput.trim()} className="px-6">שלח</Button>
                            </div>
                        </Card>
                    ) : isTriage ? (
                        <Card className="text-center py-20 bg-brand-50 border-brand-200 border-t-4 border-t-brand-500 fade-in">
                            <div className="text-6xl mb-6">🎯</div>
                            <h3 className="text-2xl font-black text-slate-800 mb-2">תודה רבה! צוות המומחים שלנו בוחן את האפיון.</h3>
                            <p className="text-slate-600 font-medium max-w-md mx-auto">יונתן סיים לאסוף את המידע. ברגעים אלו הצוות שלנו עובר על הנתונים כדי לתפור עבורך הצעת מחיר מדויקת והוגנת. תקבל עדכון ברגע שההצעה וההסכם יהיו מוכנים כאן לחתימה וליציאה לדרך.</p>
                        </Card>
                    ) : isPayPhase ? (
                        <Card className="border-t-4 border-t-emerald-500 fade-in">
                            <h2 className="text-2xl font-black text-slate-800 mb-2">שלב 2: אישור תמחור ותשלום</h2>
                            <p className="text-slate-600 mb-6 font-medium">הצוות שלנו סיים לבחון את האפיון שהכנת עם יונתן. להלן התמחור הסופי לפיתוח הפרויקט שלך: <span className="font-black text-emerald-600 text-xl">₪{project.paymentAmount.toLocaleString()}</span></p>
                            
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 h-64 overflow-y-auto mb-6 text-sm text-slate-600 leading-relaxed font-medium">
                                <h3 className="font-black text-slate-800 mb-4 text-base">הסכם פיתוח, הקמה ושירותי אינטרנט</h3>
                                הסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ לבין הלקוח.<br/><br/>
                                1. החברה תספק ללקוח שירותי פיתוח ועיצוב בהתאם לאפיון שנאסף על ידי המערכת.<br/>
                                2. כל בקשה לחריגה תתומחר בנפרד ותדרוש תשלום נוסף.<br/>
                                3. זכויות קניין עוברות רק לאחר פירעון מלא של התשלום.<br/>
                                4. ביטול עסקה יגרור חיוב יחסי בגין עבודה שבוצעה.<br/>
                            </div>

                            <SignatureCanvas onSave={(sig) => { updateProject(project.id, {customerSignature: sig, status: 'in_progress'}); showAlert("ההסכם נחתם והתשלום נקלט. הפרויקט עובר לפיתוח!", "יצאנו לדרך 🚀", "success"); }} />
                        </Card>
                    ) : isDevPhase ? (
                        <Card className="text-center py-20 bg-brand-50 border-brand-200 border-t-4 border-t-brand-500 fade-in">
                            <div className="text-6xl mb-6">👨‍💻</div>
                            <h3 className="text-2xl font-black text-slate-800 mb-2">האתר שלך במעבדת הפיתוח!</h3>
                            <p className="text-slate-600 font-medium">הצוות שלנו עובד ברגעים אלו ממש על הקוד והעיצוב של האתר שלך בהתאם לאפיון. ברגע שנסיים בקרת איכות (QA), תקבל כאן קישור לצפייה.</p>
                        </Card>
                    ) : (
                        <Card className="border-t-4 border-t-emerald-500 fade-in">
                            <h2 className="text-2xl font-black text-slate-800 mb-2">מזל טוב! האתר באוויר 🚀</h2>
                            <p className="text-slate-600 mb-8 font-medium">הפרויקט הושלם בהצלחה.</p>
                            <h3 className="font-black text-slate-800 mb-4">🛒 חנות שדרוגים ותחזוקה (MRR)</h3>
                            <div className="space-y-4">
                                {pricing.map(item => (
                                    <div key={item.id} className="flex justify-between items-center p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-brand-300 transition-colors">
                                        <div>
                                            <div className="font-bold text-slate-800">{item.name}</div>
                                            <div className="text-xs text-brand-600 font-bold">{item.type === 'mrr' ? 'מנוי חודשי' : 'תשלום חד-פעמי'}</div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="font-black text-lg text-slate-700">₪{item.price}</div>
                                            <Button variant="primary" className="!px-3 !py-1 text-sm">הוסף לאתר</Button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
