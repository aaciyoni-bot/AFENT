<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZISWEB - Agency ERP</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        tailwind.config = {
            theme: {

                    sans: ['Rubik', 'Heebo', 'sans-serif']

                extend: {

            }

    </script>

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "afent-8d50d",
            databaseURL: "https://afent-8d50d.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.ReactContext = React.createContext();
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useContext, useRef } = React;
        const AppContext = window.ReactContext;
        import { collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const base = "px-5 py-2.5 rounded-xl font-bold transition-all duration-200 flex items-center justify-center gap-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md hover:shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-md shadow-rose-500/30",
                outline: "border-2 border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50",
                purple: "bg-purple-600 text-white hover:bg-purple-700 shadow-md shadow-purple-500/30"
            };
            return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Badge = ({ children, color = 'slate' }) => {
            const colors = {
                slate: 'bg-slate-100 text-slate-700 border-slate-200',
                brand: 'bg-brand-50 text-brand-700 border-brand-200',
                emerald: 'bg-emerald-50 text-emerald-700 border-emerald-200',
                amber: 'bg-amber-50 text-amber-700 border-amber-200',
                rose: 'bg-rose-50 text-rose-700 border-rose-200',
                purple: 'bg-purple-50 text-purple-700 border-purple-200'
            };
            return <span className={`px-3 py-1 rounded-full text-xs font-bold border ${colors[color]}`}>{children}</span>;
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-3xl p-6 shadow-sm border border-slate-100 ${className}`}>{children}</div>
        );

        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-8 text-center shadow-2xl border border-slate-100">
                        <div className="w-16 h-16 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl shadow-inner">🔔</div>
                        <h3 className="text-xl font-black text-slate-900 mb-3">הודעת מערכת</h3>
                        <p className="text-slate-600 mb-8 font-medium">{message}</p>
                        <Button onClick={onClose} className="w-full py-3.5 text-base">הבנתי, תודה</Button>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, message, onConfirm, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-8 text-center shadow-2xl border border-slate-100">
                        <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl shadow-inner">⚠️</div>
                        <h3 className="text-xl font-black text-slate-900 mb-3">אימות פעולה</h3>
                        <p className="text-slate-600 mb-8 font-medium">{message}</p>
                        <div className="flex gap-3">
                            <Button onClick={onClose} variant="secondary" className="flex-1 py-3">ביטול</Button>
                            <Button onClick={() => { onConfirm(); onClose(); }} variant="danger" className="flex-1 py-3">אשר ובצע</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailsModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                        <div className="sticky top-0 bg-white/80 backdrop-blur-md p-6 border-b border-slate-100 flex justify-between items-center z-10">
                            <h2 className="text-2xl font-black text-slate-800">{title}</h2>
                            <button onClick={onClose} className="w-10 h-10 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full flex items-center justify-center transition-colors text-xl font-bold">&times;</button>
                        </div>
                        <div className="p-8">{children}</div>
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#0f172a';
                
                const resize = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = 200;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                };
                window.addEventListener('resize', resize);
                resize();
                return () => window.removeEventListener('resize', resize);
            }, []);

            const startDrawing = (e) => {
                setIsDrawing(true);
                draw(e);
            };
            const stopDrawing = () => setIsDrawing(false);
            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
            };
            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
            };

            return (
                <div className="space-y-4">
                    <canvas 
                        ref={canvasRef} className="signature-pad w-full"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
                    />
                    <div className="flex gap-3">
                        <Button onClick={clear} variant="outline" className="flex-1">מחק חתימה</Button>
                        <Button onClick={() => onSave(canvasRef.current.toDataURL('image/png'))} variant="primary" className="flex-1">אשר ושמור חתימה</Button>
                    </div>
                </div>
            );
        };

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ לבין נותן השירותים.\n\n1. פועל כקבלן עצמאי, איש מכירות ומפתח.\n2. התחייבות לעבודה עם ציוד אישי (מחשב) ורישיון AI פעיל (כגון ChatGPT).\n3. כל הלקוחות והסוכנים שייכים למערכת ולחברה בלבד.\n4. החברה תספק עבודה. בונוס יזמות 5% יוענק לפרילנסר שהביא לקוח.\n5. התמורה בגין השירותים תשולם אך ורק בתמורה להפקדת חשבונית מס כחוק, ובניכוי מס במקור בהתאם לאישור פקיד שומה רשמי.\n6. קנס על הפרת סודיות: 50,000 ש"ח.`,
            clientAgreementText: `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ ח.פ 516977758 לבין הלקוח.\n1. החברה תספק פיתוח ועיצוב בהתאם לאפיון. חריגות יתומחרו בנפרד.\n2. תשלום מלא נדרש מראש. עיכוב במסירת חומרים יעכב את הפרויקט.\n3. הלקוח זכאי ל-2 סבבי תיקונים על בסיס האפיון.`,
            announcement: `ברוכים הבאים למערכת החדשה של אוריזיס! יעד החודש: 50,000 ש"ח.`,
            mlmBonus: 150,
            products: [
                { id: 'prod_1', name: 'הנגשת אתר (תוסף חוקי)', price: 0 },
                { id: 'prod_2', name: 'כפתור וואטסאפ צף', price: 0 },
                { id: 'prod_3', name: 'חיבור דומיין אישי', price: 0 },
                { id: 'prod_4', name: 'אחסון, תחזוקה וגיבוי חודשי', price: 150 }
            ]
        };

        const AppProvider = ({ children }) => {
            const [loggedInUser, setLoggedInUser] = useState(null);
            const [impersonatedUser, setImpersonatedUser] = useState(null);
            const currentUser = impersonatedUser || loggedInUser;
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [systemSettings, setSystemSettings] = useState(initialSettings);
            const [isLoading, setIsLoading] = useState(true);

            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            const [confirmState, setConfirmState] = useState({ isOpen: false, message: '', onConfirm: null });
            const showConfirm = (message, onConfirm) => setConfirmState({ isOpen: true, message, onConfirm });
            const closeConfirm = () => setConfirmState({ isOpen: false, message: '', onConfirm: null });

            useEffect(() => {
                const db = window.db;
                const unsubProjects = onSnapshot(collection(db, "projects"), (snap) => setProjects(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubUsers = onSnapshot(collection(db, "users"), (snap) => setUsersList(snap.docs.map(d => ({uid: d.id, ...d.data()}))));
                
                const fetchSettings = async () => {
                    const docRef = doc(db, "system", "settings");
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(!data.products) data.products = initialSettings.products;
                        setSystemSettings(data);
                    } else {
                        await setDoc(docRef, initialSettings);
                    }
                    setIsLoading(false);
                };
                fetchSettings();

                return () => { unsubProjects(); unsubUsers(); };
            }, []);

            const login = (email, password) => {
                if (email === 'aaci.yoni@gmail.com' && password === '123') {
                    setLoggedInUser({ uid: 'master_admin', role: 'manager', name: 'יוני (מנהל ראשי)', email });
                    return true;
                }
                const user = usersList.find(u => u.email === email && u.password === password);
                if (user) { setLoggedInUser(user); return true; }
                return false;
            };

            const logout = () => { setLoggedInUser(null); setImpersonatedUser(null); };

            const updateProject = async (id, data) => await updateDoc(doc(window.db, "projects", id), data);
            const deleteProject = async (id) => await deleteDoc(doc(window.db, "projects", id));
            
            // יצירת פרויקט + יצירת לקוח משויך!
            const addProjectAndClient = async (clientData, freelancerId) => {
                const newUserId = `user_${Date.now()}`;
                const newProjectId = `proj_${Date.now()}`;
                
                await setDoc(doc(window.db, "users", newUserId), {
                    role: 'client', name: clientData.name, email: clientData.email, password: clientData.password, projectId: newProjectId
                });
                
                await setDoc(doc(window.db, "projects", newProjectId), {
                    customerName: clientData.name, clientId: newUserId, status: 'paid_waiting_for_brief', paymentAmount: Number(clientData.paymentAmount), freelancerId: freelancerId || '',
                    brief: '', clientSignature: null, upgrades: [], dateCreated: new Date().toISOString(), timeSpent: 0, isAgentBroughtClient: false
                });
            };

            const updateUser = async (id, data) => await updateDoc(doc(window.db, "users", id), data);
            const addUser = async (userData) => await setDoc(doc(window.db, "users", `user_${Date.now()}`), userData);
            const deleteUser = async (id) => await deleteDoc(doc(window.db, "users", id));
            const updateSettings = async (data) => {
                await updateDoc(doc(window.db, "system", "settings"), data);
                setSystemSettings(data);
            };

            if (isLoading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-brand-400 font-bold text-xl">מתחבר לענן...</div>;

            return (
                <AppContext.Provider value={{ currentUser, loggedInUser, setImpersonatedUser, login, logout, projects, updateProject, addProjectAndClient, deleteProject, usersList, updateUser, addUser, deleteUser, systemSettings, updateSettings, showAlert, showConfirm }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                    <ConfirmModal isOpen={confirmState.isOpen} message={confirmState.message} onConfirm={confirmState.onConfirm} onClose={closeConfirm} />
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const { login, showAlert } = useContext(AppContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (!login(email, password)) showAlert('שם משתמש או סיסמה שגויים. בדוק את האותיות והמספרים.');
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-br from-brand-900 to-slate-900 opacity-90"></div>
                    <Card className="w-full max-w-md relative z-10 shadow-2xl border-none bg-white/95 backdrop-blur-xl p-10">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black text-slate-900 mb-2 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-slate-500 font-medium">הזנת פרטי זיהוי</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">דואר אלקטרוני</label>
                                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-left" dir="ltr" required />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">סיסמה</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-left" dir="ltr" required />
                            </div>
                            <Button type="submit" className="w-full py-4 text-lg mt-4">התחבר למערכת</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, deleteProject, addUser, updateUser, deleteUser, systemSettings, updateSettings, showAlert, showConfirm, addProjectAndClient, setImpersonatedUser } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects'); 
            
            const [newClientData, setNewClientData] = useState({ name: '', email: '', password: '', paymentAmount: '', freelancerId: '' });
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'freelancer', password: '', basePercentage: 60, upsellPercentage: 40, teamLeaderId: '' });
            
            const [localSettings, setLocalSettings] = useState(systemSettings);
            const [newProduct, setNewProduct] = useState({ name: '', price: 0 });
            
            const [viewProject, setViewProject] = useState(null);
            const [viewUser, setViewUser] = useState(null);
            const [editUser, setEditUser] = useState(null);

            const freelancers = usersList.filter(u => u.role === 'freelancer');
            
            const totalRevenue = projects.reduce((sum, p) => sum + p.paymentAmount + (p.upgrades || []).reduce((s, u) => s + u.price, 0), 0);
            const activeProjectsCount = projects.filter(p => p.status !== 'completed').length;
            const freelancersCount = freelancers.length;

            const handleCreateClient = () => {
                if(!newClientData.name || !newClientData.email || !newClientData.password) return showAlert("חובה למלא שם עסק, אימייל וסיסמה.");
                addProjectAndClient(newClientData, newClientData.freelancerId);
                showAlert("הלקוח והפרויקט הוקמו בהצלחה!");
                setNewClientData({ name: '', email: '', password: '', paymentAmount: '', freelancerId: '' });
            };

            const statusColors = { 'paid_waiting_for_brief': 'amber', 'brief_submitted': 'brand', 'in_progress': 'purple', 'qa_review': 'brand', 'completed': 'emerald', 'unknown': 'slate' };
            const statusText = { 'paid_waiting_for_brief': 'ממתין לחתימה ואפיון לקוח', 'brief_submitted': 'אופיין - ממתין לפיתוח', 'in_progress': 'בפיתוח פעיל', 'qa_review': 'בקרת איכות (QA)', 'completed': 'הושלם ונמסר', 'unknown': 'לקוח חדש' };

            const getEfficiencyColor = (timeSpent) => {
                if (!timeSpent) return 'bg-slate-100 text-slate-400';
                const hours = timeSpent / 3600;
                if (hours < 2.5) return 'bg-emerald-100 text-emerald-700 font-bold'; // ירוק
                if (hours < 3.5) return 'bg-amber-100 text-amber-700 font-bold';     // צהוב
                return 'bg-rose-100 text-rose-700 font-bold';                        // אדום (חריגה)
            };

            return (
                <div className="max-w-7xl mx-auto space-y-8 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="bg-gradient-to-br from-brand-500 to-brand-700 text-white border-none shadow-xl shadow-brand-500/20">
                            <h3 className="text-brand-100 font-medium mb-2">הכנסות כוללות (בסיס + מוצרים)</h3>
                            <p className="text-5xl font-black">₪{totalRevenue.toLocaleString()}</p>
                        </Card>
                        <Card>
                            <h3 className="text-slate-500 font-medium mb-2">פרויקטים בעבודה</h3>
                            <p className="text-5xl font-black text-slate-800">{activeProjectsCount}</p>
                        </Card>
                        <Card>
                            <h3 className="text-slate-500 font-medium mb-2">צוות סוכנים / פרילנסרים</h3>
                            <p className="text-5xl font-black text-slate-800">{freelancersCount}</p>
                        </Card>
                    </div>

                    <div className="flex justify-center bg-white rounded-2xl p-2 shadow-sm border border-slate-100 mb-8 inline-flex mx-auto overflow-x-auto max-w-full">
                        <button onClick={() => setActiveTab('projects')} className={`whitespace-nowrap px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'projects' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>🚀 הקמת לקוחות ופרויקטים</button>
                        <button onClick={() => setActiveTab('users')} className={`whitespace-nowrap px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'users' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>👥 ניהול צוות סוכנים</button>
                        <button onClick={() => setActiveTab('settings')} className={`whitespace-nowrap px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'settings' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>⚙️ הגדרות, מחירון וחוזים</button>
                    </div>

                    {activeTab === 'projects' && (
                        <div className="space-y-6">

                                    <div><h4 className="font-black text-slate-800 mb-2">חתימה דיגיטלית על הסכם עבודה</h4><img src={viewUser.signature} alt="Signature" className="border-2 border-slate-200 rounded-2xl bg-white h-40 object-contain p-2 shadow-sm" /></div>
                                )}
                            </div>
                        )}
                    </DetailsModal>

                    <DetailsModal isOpen={!!editUser} onClose={() => setEditUser(null)} title={`עריכת פרטי התחברות: ${editUser?.name}`}>
                        {editUser && (
                            <div className="space-y-4">
                                <div><label className="block text-xs font-bold mb-2 text-slate-700">שם מלא</label><input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" value={editUser.name} onChange={e=>setEditUser({...editUser, name: e.target.value})} /></div>
                                <div><label className="block text-xs font-bold mb-2 text-slate-700">אימייל (שם משתמש)</label><input type="email" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left outline-none focus:border-brand-500" dir="ltr" value={editUser.email} onChange={e=>setEditUser({...editUser, email: e.target.value})} /></div>
                                <div><label className="block text-xs font-bold mb-2 text-slate-700">סיסמה חדשה</label><input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left outline-none focus:border-brand-500" dir="ltr" value={editUser.password} onChange={e=>setEditUser({...editUser, password: e.target.value})} /></div>
                                <Button onClick={() => { updateUser(editUser.uid, {name: editUser.name, email: editUser.email, password: editUser.password}); showAlert("הפרטים עודכנו בהצלחה!"); setEditUser(null); }} className="w-full py-4 text-lg mt-4">💾 שמור פרטים וסיסמה</Button>
                            </div>
                        )}
                    </DetailsModal>
                </div>
            );
        };

        const FreelancerDashboard = () => {
            const { currentUser, projects, updateProject, updateUser, usersList, systemSettings, showAlert, showConfirm } = useContext(AppContext);
            const myProjects = projects.filter(p => p.freelancerId === currentUser.uid && p.status !== 'completed');
            
            const [editingBriefs, setEditingBriefs] = useState({});
            const [activeTimer, setActiveTimer] = useState(null);
            
            // Financial calculations for Freelancer
            const myCompletedProjects = projects.filter(p => p.freelancerId === currentUser.uid && p.status === 'completed');
            const activeIncome = myCompletedProjects.reduce((sum, p) => {
                const baseComm = p.paymentAmount * ((currentUser.basePercentage || 60) + (p.isAgentBroughtClient ? 5 : 0)) / 100;
                const upsellComm = (p.upgrades || []).reduce((s, u) => s + u.price, 0) * (currentUser.upsellPercentage || 40) / 100;
                return sum + baseComm + upsellComm;
            }, 0);
            
            // MLM Calculation
            const mySubAgents = projects.filter(p => p.status === 'completed' && p.freelancerId !== currentUser.uid && usersList?.find(u => u.uid === p.freelancerId)?.teamLeaderId === currentUser.uid);
            const passiveIncome = mySubAgents.length * (systemSettings.mlmBonus || 150);

            const totalIncome = activeIncome + passiveIncome;
            const goal = 50000;
            const progressPercent = Math.min((totalIncome / goal) * 100, 100);

            useEffect(() => {
                let interval;
                if (activeTimer) {
                    interval = setInterval(() => {
                        const proj = projects.find(p => p.id === activeTimer);
                        if(proj) updateProject(activeTimer, { timeSpent: (proj.timeSpent || 0) + 1 });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeTimer, projects]);

            const handleSignContract = (signatureData) => {
                updateUser(currentUser.uid, { signature: signatureData });
                showAlert("החוזה נחתם. המערכת פתוחה לעבודה, המון בהצלחה!");
            };

            if (!currentUser.signature) {
                return (
                    <div className="max-w-3xl mx-auto mt-10 p-4">
                        <Card className="border-t-4 border-t-amber-500 shadow-xl">
                            <h2 className="text-2xl font-black mb-4 text-slate-800 text-center">חתימה על הסכם פרילנסר - חובה</h2>
                            <p className="text-center text-slate-500 text-sm mb-6 font-bold">לא ניתן להתחיל לעבוד ולהרוויח כסף במערכת ללא קריאה וחתימה על הסכם זה.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm leading-relaxed text-slate-700 whitespace-pre-wrap font-medium border border-slate-200 mb-6 h-64 overflow-y-auto shadow-inner">
                                {systemSettings.freelancerAgreementText}
                            </div>
                            <SignaturePad onSave={handleSignContract} />
                        </Card>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto space-y-6 fade-in">
                    {systemSettings.announcement && (
                        <div className="bg-gradient-to-r from-amber-100 to-amber-50 border-r-4 border-amber-500 text-amber-900 p-5 rounded-2xl shadow-sm font-bold flex items-center gap-4">
                            <span className="text-2xl">📣</span> <span>{systemSettings.announcement}</span>
                        </div>
                    )}
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="bg-slate-900 text-white md:col-span-2 shadow-xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-500 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
                            <h3 className="font-black text-xl mb-4 text-slate-200">יעד הכנסות חודשי: 50,000 ש"ח</h3>
                            <div className="flex justify-between font-bold mb-2 text-lg">
                                <span className="text-emerald-400">₪{totalIncome.toLocaleString()} הושגו</span>
                                <span className="text-slate-400">₪{(goal - totalIncome).toLocaleString()} נותרו</span>
                            </div>
                            <div className="w-full bg-slate-800 rounded-full h-5 mb-2 overflow-hidden shadow-inner p-1">
                                <div className="bg-gradient-to-r from-emerald-400 to-emerald-600 h-full rounded-full transition-all duration-1000 relative" style={{width: `${progressPercent}%`}}>
                                    {progressPercent > 5 && <div className="absolute inset-0 bg-white/20 animate-pulse"></div>}
                                </div>
                            </div>
                            <div className="flex justify-between mt-4 text-sm font-bold text-slate-400 border-t border-slate-700 pt-4">
                                <span>פעילות אישית (אתרים/שדרוגים): ₪{activeIncome.toLocaleString()}</span>
                                {passiveIncome > 0 && <span className="text-purple-400">MLM (ראשי צוותים): ₪{passiveIncome.toLocaleString()}</span>}
                            </div>
                        </Card>
                        
                        <Card className="flex flex-col justify-center items-center text-center shadow-lg border-2 border-brand-100">
                            <h3 className="text-slate-500 font-bold mb-2">משימות פתוחות בתור</h3>
                            <div className="text-6xl font-black text-brand-600 mb-2">{myProjects.length}</div>
                            <p className="text-xs text-slate-400 font-bold">סגור אותן כדי לשחרר כסף!</p>
                        </Card>
                    </div>
                    
                    <h2 className="text-2xl font-black text-slate-800 mb-6 mt-8 flex items-center gap-2"><span>🚀</span> הפרויקטים הפעילים שלי</h2>
                    
                    {myProjects.map(p => (
                        <Card key={p.id} className="border-t-4 border-t-brand-500 mb-6 shadow-md hover:shadow-lg transition-shadow">
                            <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-4">
                                <div><h3 className="text-xl font-black text-slate-900">{p.customerName}</h3><span className="text-xs text-slate-400 font-mono font-bold">ID: {p.id}</span></div>
                                <Badge color={p.status === 'in_progress' ? 'purple' : 'amber'}>{p.status}</Badge>
                            </div>
                            
                            <div className="flex flex-col md:flex-row items-center gap-4 mb-6 bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                <div className="font-mono text-2xl font-black text-slate-700 flex-1 text-center md:text-right">⏱️ {(p.timeSpent / 3600).toFixed(2)} שעות פיתוח</div>
                                {activeTimer === p.id ? (
                                    <Button onClick={() => setActiveTimer(null)} variant="danger" className="animate-pulse w-full md:w-auto px-8 py-3 text-lg">⏸️ השהה טיימר</Button>
                                ) : (
                                    <Button onClick={() => { updateProject(p.id, {status: 'in_progress'}); setActiveTimer(p.id); }} variant="primary" className="w-full md:w-auto px-8 py-3 text-lg shadow-brand-500/40">▶️ התחל טיימר עבודה</Button>
                                )}
                            </div>
                            
                            <div className="bg-brand-50 p-5 rounded-2xl mb-6 border border-brand-200">
                                <h4 className="font-black text-brand-900 mb-2">📝 אפיון והערות פרויקט (ניתן לערוך במהלך שיחה עם לקוח)</h4>
                                <p className="text-xs text-brand-700 mb-3 font-bold">מה שהלקוח מילא בדשבורד שלו יופיע כאן אוטומטית. תוכל לערוך ולשמור.</p>
                                <textarea 
                                    className="w-full p-4 bg-white border border-brand-200 rounded-xl min-h-[150px] outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500 text-sm font-medium leading-relaxed shadow-inner"
                                    value={editingBriefs[p.id] !== undefined ? editingBriefs[p.id] : (p.brief || '')}
                                    onChange={(e) => setEditingBriefs({...editingBriefs, [p.id]: e.target.value})}
                                    placeholder="הזן סיכום שיחה עם הלקוח או ערוך את האפיון..."
                                />
                                <Button onClick={() => { updateProject(p.id, { brief: editingBriefs[p.id] }); showAlert("האפיון נשמר בהצלחה במסד הנתונים."); }} variant="secondary" className="mt-3 text-sm py-2 px-6 font-black bg-brand-600 text-white hover:bg-brand-700 border-none shadow-md">💾 שמור עדכון אפיון</Button>
                            </div>

                            <div className="flex gap-4 pt-4 border-t border-slate-100">
                                <Button onClick={()=>showConfirm('האם סיימת את כל הצ\'ק ליסט (מובייל, מהירות, נגישות)? האם הכל תקין?', () => { setActiveTimer(null); updateProject(p.id, {status: 'qa_review'}); })} variant="success" className="flex-1 py-4 text-lg shadow-emerald-500/30">✔️ הגש לבקרת איכות (QA)</Button>
                                <Button onClick={()=>{ setActiveTimer(null); showConfirm('לדווח על בעיה למנהל הסטודיו? זה יעצור את הטיימר.', ()=>showAlert('הדיווח נשלח למנהל בהצלחה.')); }} variant="danger" className="py-4 px-6 text-lg shadow-rose-500/30">🔴 נתקעתי</Button>
                            </div>
                        </Card>
                    ))}
                    {myProjects.length === 0 && <div className="text-center p-16 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400 font-black text-2xl">אין לך פרויקטים פתוחים לעבודה. צא למכור! 💸</div>}
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, updateProject, systemSettings, showAlert } = useContext(AppContext);
            const project = projects.find(p => p.id === currentUser.projectId);
            
            const [briefData, setBriefData] = useState({ q1: '', q2: '', q3: '', q4: '' });
            const [paymentModalData, setPaymentModalData] = useState({ isOpen: false, amount: 0, reason: '', product: null, isInitial: false });

            const handleSignClient = (signatureData) => {
                // מפעיל את מודל התשלום לפני שמירת החתימה סופית - הלקוח צריך קודם לשלם כדי להמשיך
                setPaymentModalData({ isOpen: true, amount: project.paymentAmount, reason: 'תשלום על פיתוח והקמת האתר', product: null, isInitial: true, pendingSignature: signatureData });
            };
            
            const handleSubmitBrief = () => {
                // אורז את השאלות המנחות לבלוק טקסט נקי לפרילנסר
                const formattedBrief = `1. על העסק וקהל היעד:\n${briefData.q1}\n\n2. מתחרים והשראה:\n${briefData.q2}\n\n3. סגנון עיצובי וצבעים:\n${briefData.q3}\n\n4. הערות נוספות:\n${briefData.q4}`;
                updateProject(project.id, { brief: formattedBrief, status: 'in_progress' });
                showAlert("האפיון נשלח בהצלחה לצוות הפיתוח! אנחנו מתחילים לעבוד.");
            };

            const processPayment = () => {
                if (paymentModalData.isInitial) {
                    updateProject(project.id, { clientSignature: paymentModalData.pendingSignature });
                    showAlert("התשלום התקבל וההסכם נחתם בהצלחה! בוא נאפיין את האתר.");
                } else if(paymentModalData.product) {
                    const currentUpgrades = project.upgrades || [];
                    updateProject(project.id, { upgrades: [...currentUpgrades, paymentModalData.product] });
                    showAlert(`המוצר ${paymentModalData.product.name} נוסף בהצלחה לאתר שלך!`);
                }
                setPaymentModalData({ isOpen: false, amount: 0, reason: '', product: null, isInitial: false, pendingSignature: null });
            };

            if (!project) return <div className="text-center p-10 font-bold text-rose-500">שגיאה: לא נמצא פרויקט מקושר למשתמש זה. פנה למנהל.</div>;

            const isCompleted = project.status === 'completed';
            const isBriefSubmitted = project.status !== 'paid_waiting_for_brief'; // אם הוא לא בסטטוס ראשוני, סימן שהאפיון כבר הוגש או בפיתוח

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    
                    {paymentModalData.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[300] p-4 fade-in">
                            <div className="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl text-center">
                                <div className="w-20 h-20 bg-brand-50 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">🔒</div>
                                <h3 className="text-2xl font-black text-slate-900 mb-2">קופה מאובטחת</h3>
                                <p className="text-slate-500 mb-6 font-medium text-sm">{paymentModalData.reason}</p>
                                <div className="text-5xl font-black text-brand-600 mb-8 tracking-tight">₪{paymentModalData.amount}</div>
                                
                                <div className="space-y-3 mb-6">
                                    <Button onClick={processPayment} className="w-full py-4 text-lg justify-between px-6 bg-slate-900 hover:bg-slate-800 shadow-xl">
                                        <span className="font-black tracking-wide">אשראי / Apple Pay</span><span className="text-2xl">💳</span>
                                    </Button>
                                    <Button onClick={processPayment} variant="secondary" className="w-full py-4 justify-between px-6 text-sm border-2 border-slate-200 hover:border-slate-300 font-black">
                                        <span>העברה בנקאית / ביט</span><span className="text-xl">🏦</span>
                                    </Button>
                                    <Button onClick={processPayment} variant="secondary" className="w-full py-3 justify-between px-6 text-sm bg-emerald-50 text-emerald-700 hover:bg-emerald-100 font-bold">
                                        <span>תשלום במזומן לסוכן</span><span className="text-xl">💵</span>
                                    </Button>
                                </div>
                                <button onClick={() => setPaymentModalData({ isOpen: false, amount: 0, reason: '', product: null, isInitial: false })} className="text-slate-400 hover:text-slate-600 font-bold text-sm underline">ביטול וחזרה</button>
                            </div>
                        </div>
                    )}

                    <Card className="text-center py-10 shadow-lg border-b-4 border-brand-500 bg-white">
                        <h2 className="text-3xl font-black mb-2 text-slate-800">שלום, {currentUser.name}!</h2>
                        <p className="text-slate-500 font-medium">ברוך הבא לפורטל הלקוחות הדיגיטלי שלך.</p>
                        
                        <div className="flex justify-center items-center mt-8 max-w-md mx-auto">
                            <div className="flex flex-col items-center w-24">
                                <div className="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center font-black shadow-md">1</div>
                                <span className="text-xs mt-2 font-bold text-slate-600 text-center leading-tight">הסכם<br/>ותשלום</span>
                            </div>
                            <div className="flex-1 h-1 bg-emerald-500 mx-2 rounded-full"></div>
                            <div className="flex flex-col items-center w-24">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black shadow-md ${project.clientSignature ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}`}>2</div>
                                <span className={`text-xs mt-2 font-bold text-center leading-tight ${project.clientSignature ? 'text-slate-600' : 'text-slate-400'}`}>אפיון<br/>טכני</span>
                            </div>
                            <div className={`flex-1 h-1 mx-2 rounded-full ${isBriefSubmitted ? 'bg-emerald-500' : 'bg-slate-100'}`}></div>
                            <div className="flex flex-col items-center w-24">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black shadow-md ${isCompleted ? 'bg-emerald-500 text-white' : isBriefSubmitted ? 'bg-brand-500 text-white animate-pulse' : 'bg-slate-100 text-slate-400'}`}>3</div>
                                <span className={`text-xs mt-2 font-bold text-center leading-tight ${isCompleted ? 'text-emerald-600' : isBriefSubmitted ? 'text-brand-600' : 'text-slate-400'}`}>{isCompleted ? 'הושלם' : 'בפיתוח'}</span>
                            </div>
                        </div>
                    </Card>

                    {!project.clientSignature ? (
                        <Card className="shadow-xl border-t-4 border-t-brand-500">
                            <h3 className="text-2xl font-black mb-2 text-slate-800">שלב 1: אישור הסכם פיתוח ותשלום</h3>
                            <p className="text-slate-500 mb-6 font-medium text-sm">אנא קרא וחתום על ההסכם מטה. לאחר החתימה תועבר לקופה המאובטחת.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm leading-relaxed text-slate-700 whitespace-pre-wrap font-medium border border-slate-200 mb-6 h-64 overflow-y-auto shadow-inner">
                                {systemSettings.clientAgreementText}
                            </div>
                            <div className="bg-brand-50 border border-brand-200 p-4 rounded-xl mb-6 flex justify-between items-center">
                                <span className="font-bold text-brand-900">סך לתשלום (מקדמה/מלא):</span>
                                <span className="text-2xl font-black text-brand-700">₪{project.paymentAmount}</span>
                            </div>
                            <SignaturePad onSave={handleSignClient} />
                        </Card>
                    ) : !isBriefSubmitted ? (
                        <Card className="shadow-xl border-t-4 border-t-brand-500">
                            <h3 className="text-2xl font-black mb-2 text-slate-800">שלב 2: שאלון אפיון האתר שלך</h3>
                            <p className="text-slate-500 text-sm mb-6 font-medium">התשובות שלך כאן יועברו ישירות לצוות הפיתוח כדי שנוכל לדייק את האתר בדיוק לצרכים שלך.</p>
                            
                            <div className="space-y-6">
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                    <label className="block text-sm font-black text-slate-800 mb-2">1. תאר בקצרה את העסק שלך ומי קהל היעד העיקרי?</label>
                                    <textarea className="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium" rows="3" onChange={e=>setBriefData({...briefData, q1: e.target.value})} placeholder="לדוגמה: אנחנו מסעדה איטלקית שפונה למשפחות..."></textarea>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                    <label className="block text-sm font-black text-slate-800 mb-2">2. צרף קישורים לאתרים של מתחרים או אתרים שאהבת את העיצוב שלהם:</label>
                                    <textarea className="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium text-left" dir="ltr" rows="2" onChange={e=>setBriefData({...briefData, q2: e.target.value})} placeholder="www.example.com"></textarea>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                    <label className="block text-sm font-black text-slate-800 mb-2">3. האם יש לך לוגו, צבעי מותג או סגנון עיצובי מועדף? (שחור נקי, צבעוני ושמח...)</label>
                                    <textarea className="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium" rows="2" onChange={e=>setBriefData({...briefData, q3: e.target.value})}></textarea>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                    <label className="block text-sm font-black text-slate-800 mb-2">4. הערות נוספות שחשוב שצוות הפיתוח ידע:</label>
                                    <textarea className="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium" rows="2" onChange={e=>setBriefData({...briefData, q4: e.target.value})}></textarea>
                                </div>
                            </div>

                            <Button onClick={handleSubmitBrief} className="w-full py-4 text-xl mt-8 shadow-brand-500/40">שלח אפיון והתחל פיתוח 🚀</Button>
                        </Card>
                    ) : !isCompleted ? (
                        <Card className="text-center py-20 shadow-xl border-t-4 border-t-brand-500 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-brand-100 rounded-full blur-3xl opacity-50 -mr-20 -mt-20"></div>
                            <div className="text-7xl mb-8 animate-bounce relative z-10">⚙️</div>
                            <h3 className="text-4xl font-black text-slate-800 mb-4 relative z-10">האתר שלך בפיתוח פעיל!</h3>
                            <p className="text-slate-500 font-bold text-lg max-w-lg mx-auto relative z-10">צוות הפיתוח שלנו קיבל את האפיון ועובד על האתר שלך במלוא המרץ. נודיע לך ברגע שיהיה מוכן לבקרת איכות.</p>
                        </Card>
                    ) : (
                        <div className="space-y-8">
                            <Card className="border-t-4 border-t-emerald-500 text-center shadow-xl py-12 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-64 h-64 bg-emerald-100 rounded-full blur-3xl opacity-50 -ml-20 -mt-20"></div>
                                <div className="text-8xl mb-6 relative z-10">🎉</div>
                                <h3 className="text-4xl font-black text-emerald-800 mb-2 tracking-tight relative z-10">האתר שלך באוויר!</h3>
                                <p className="text-slate-600 font-bold text-xl relative z-10">מזל טוב! פיתוח הפרויקט הושלם בהצלחה.</p>
                            </Card>

                            <Card className="bg-gradient-to-br from-brand-50 to-white border-brand-200 shadow-lg">
                                <h4 className="font-black text-2xl mb-2 text-brand-900 flex items-center gap-2"><span>🎁</span> תוכנית "הבא חבר" - מגיע לך בונוס!</h4>
                                <p className="text-brand-700 text-sm mb-6 font-bold">שתף את הקישור שלך עם חברים ועסקים. על כל לקוח שיגיע ויסגור דרכך, תקבל קרדיט או החזר כספי!</p>
                                <div className="bg-white p-4 rounded-xl border border-brand-200 font-mono text-center font-black text-brand-600 text-lg select-all shadow-inner">
                                    https://orizisweb.com/ref/{currentUser.uid.substring(5, 12)}
                                </div>
                            </Card>
                            
                            <div className="pt-6">
                                <h4 className="font-black text-3xl text-slate-800 text-center mb-2">שדרג את האתר שלך</h4>
                                <p className="text-center text-slate-500 font-bold mb-8">הוסף יכולות, שירותים ומוצרי פרימיום בלחיצת כפתור</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {(systemSettings.products || []).map(prod => {
                                        const alreadyPurchased = (project.upgrades || []).find(u => u.id === prod.id);
                                        return (
                                            <div key={prod.id} className={`bg-white border-2 p-6 rounded-3xl text-center shadow-md flex flex-col justify-between ${alreadyPurchased ? 'border-slate-200 opacity-60 bg-slate-50' : prod.price === 0 ? 'border-emerald-200 hover:border-emerald-400 hover:shadow-lg' : 'border-brand-100 hover:border-brand-300 hover:shadow-lg'} transition-all`}>
                                                <div>
                                                    <h4 className="font-black text-xl mb-3 text-slate-800">{prod.name}</h4>
                                                    <div className={`text-4xl font-black mb-6 tracking-tight ${prod.price === 0 ? 'text-emerald-500' : 'text-brand-600'}`}>
                                                        {prod.price === 0 ? 'חינם' : `₪${prod.price}`}
                                                    </div>
                                                </div>
                                                {alreadyPurchased ? (
                                                    <div className="bg-slate-200 text-slate-600 py-3.5 rounded-xl font-black text-sm">נרכש ופעיל באתר ✔️</div>
                                                ) : (
                                                    <Button onClick={() => setPaymentModalData({ isOpen: true, amount: prod.price, reason: `רכישת שדרוג: ${prod.name}`, product: prod, isInitial: false })} variant={prod.price === 0 ? 'success' : 'primary'} className="w-full py-3.5 text-base shadow-md">
                                                        {prod.price === 0 ? '➕ הוסף בחינם' : 'רכוש שדרוג'}
                                                    </Button>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, loggedInUser, logout, setImpersonatedUser } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;
            const isImpersonating = loggedInUser && currentUser.uid !== loggedInUser.uid;

            return (
                <div className="min-h-screen flex flex-col">
                    {isImpersonating && (
                        <div className="bg-purple-600 text-white text-center py-3 px-4 text-sm font-bold flex flex-col sm:flex-row justify-center items-center gap-4 z-[60] shadow-md border-b-4 border-purple-800">
                            <span>👀 מצב צפייה (Impersonation): אתה רואה כעת את המערכת בדיוק כפי שרואה אותה {currentUser.name} ({currentUser.role})</span>
                            <button onClick={() => setImpersonatedUser(null)} className="bg-white text-purple-700 px-5 py-2 rounded-full text-xs hover:bg-purple-50 transition shadow-sm font-black">חזור למסך הניהול שלך</button>
                        </div>
                    )}
                    <header className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4"><h1 className="text-3xl font-black text-slate-900 tracking-tighter">ORIZIS<span className="text-brand-600">WEB</span></h1><Badge color="brand">ERP</Badge></div>
                            <div className="flex items-center gap-6">
                                <div className="text-left hidden sm:block"><div className="text-sm font-black text-slate-800">{currentUser.name}</div><div className="text-xs text-slate-500 font-bold uppercase">{currentUser.role}</div></div>
                                <Button onClick={logout} variant="outline" className="text-sm py-2 bg-white">התנתק</Button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 p-6 sm:p-10">
                        {currentUser.role === 'manager' && <AdminDashboard />}
                        {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                        {currentUser.role === 'client' && <ClientPortal />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><DashboardLayout /></AppProvider>);
    </script>
</body>
</html>
