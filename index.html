<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZISWEB ERP - AI Agency OS</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Rubik', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' }
                    },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Rubik', sans-serif !important; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ה-API KEY של Gemini
        const GEMINI_API_KEY = "AQ.Ab8RN6KUs_h-e7vuWbqdoNKFQcS5h9c2fmqNucGwhUJDyBfMKg";

        // 🔥 הגדרות FIREBASE (האמיתיות שלך) 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_FIREBASE_API_KEY";
        
        let db = null;
        if (isFirebaseConfigured) {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        }

        const MOCK_PRICING = [
            { id: 1, name: 'אחסון ותחזוקה VIP (חודשי)', price: 150, type: 'mrr' },
            { id: 2, name: 'עיצוב לוגו מקצועי', price: 500, type: 'one_time' },
            { id: 3, name: 'חיבור מערכת סליקה', price: 800, type: 'one_time' }
        ];

        const STARTING_USERS = [
            { id: 'admin1', role: 'admin', name: 'יוני (מנהל סוכנות)', email: 'aaci.yoni@gmail.com', password: '6962697' },
            { id: 'free1', role: 'freelancer', name: 'פרילנסר טסט', email: 'free@test.com', password: '123', isSigned: true, teamLeaderId: null }
        ];

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 p-6 ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = "button" }) => {
            const base = "px-4 py-2 font-bold rounded-xl transition-all duration-200 focus:outline-none flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-500 text-white hover:bg-brand-600 shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-500/30",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-lg shadow-amber-500/30",
                purple: "bg-purple-600 text-white hover:bg-purple-700 shadow-lg shadow-purple-600/30"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const AlertModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "אישור", type = "info" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
                        <div className={`text-5xl mb-4 text-center ${type === 'danger' ? 'text-rose-500' : type === 'warning' ? 'text-amber-500' : 'text-brand-500'}`}>
                            {type === 'danger' ? '⚠️' : type === 'warning' ? '🤔' : '✨'}
                        </div>
                        <h3 className="text-2xl font-black text-center text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-center mb-8 font-medium">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {onCancel && <Button variant="secondary" onClick={onCancel} className="w-full">ביטול</Button>}
                            <Button variant={type === 'danger' ? 'danger' : 'primary'} onClick={onConfirm} className="w-full">{confirmText}</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const SignatureCanvas = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a';
            }, []);

            const startDrawing = (e) => {
                setIsDrawing(true);
                draw(e);
            };

            const endDrawing = () => {
                setIsDrawing(false);
                canvasRef.current.getContext('2d').beginPath();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            };

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-4 bg-slate-50">
                    <canvas 
                        ref={canvasRef} width={400} height={200} 
                        className="w-full bg-white rounded-xl cursor-crosshair touch-none border border-slate-200"
                        onMouseDown={startDrawing} onMouseUp={endDrawing} onMouseMove={draw} onMouseLeave={endDrawing}
                        onTouchStart={startDrawing} onTouchEnd={endDrawing} onTouchMove={draw}
                    />
                    <div className="flex gap-3 mt-4">
                        <Button variant="secondary" onClick={clear} className="flex-1">נקה חתימה</Button>
                        <Button variant="success" onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-1">אשר ושמור חתימה</Button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [users, setUsers] = useState(STARTING_USERS);
            const [projects, setProjects] = useState([]);
            const [pricing, setPricing] = useState(MOCK_PRICING);
            
            const [currentUser, setCurrentUser] = useState(null);
            const [impersonatingAdmin, setImpersonatingAdmin] = useState(null); 
            
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [alertData, setAlertData] = useState({ isOpen: false });

            // 🔥 סינכרון חי מול Firebase
            useEffect(() => {
                if(!db) return;
                
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    if(!snap.empty) {
                        const fetchedUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        if(!fetchedUsers.find(u => u.email === 'aaci.yoni@gmail.com')) {
                            fetchedUsers.push(STARTING_USERS[0]);
                        }
                        setUsers(fetchedUsers);
                    }
                });

                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    if(!snap.empty) setProjects(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubUsers(); unsubProjects(); };
            }, []);

            const showAlert = (message, title = "הודעת מערכת", type = "info") => {
                setAlertData({ isOpen: true, title, message, type, onConfirm: () => setAlertData({ isOpen: false }) });
            };

            const showConfirm = (message, onConfirm, title = "אישור פעולה") => {
                setAlertData({ 
                    isOpen: true, title, message, type: 'warning', 
                    onConfirm: () => { onConfirm(); setAlertData({ isOpen: false }); },
                    onCancel: () => setAlertData({ isOpen: false })
                });
            };

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                const user = users.find(u => u.email.toLowerCase() === loginEmail.toLowerCase() && u.password === loginPassword);
                if (user) {
                    setCurrentUser(user);
                    setLoginEmail('');
                    setLoginPassword('');
                } else {
                    showAlert("אימייל או סיסמה שגויים. נסה שוב.", "שגיאת התחברות", "danger");
                }
            };

            const logout = () => {
                if (impersonatingAdmin) {
                    setCurrentUser(impersonatingAdmin);
                    setImpersonatingAdmin(null);
                } else {
                    setCurrentUser(null);
                }
            };

            const impersonateUser = (userId) => {
                const userToView = users.find(u => u.id === userId);
                if(userToView) {
                    setImpersonatingAdmin(currentUser);
                    setCurrentUser(userToView);
                }
            };

            const updateUser = async (id, data) => {
                setUsers(prev => prev.map(u => u.id === id ? { ...u, ...data } : u));
                if(db) await db.collection('users').doc(id).set(data, {merge: true});
            };

            const updateProject = async (id, data) => {
                setProjects(prev => prev.map(p => p.id === id ? { ...p, ...data } : p));
                if(db) await db.collection('projects').doc(id).set(data, {merge: true});
            };
            
            // הקמת פרויקט ולקוח בFirebase + Local (בלי תקציב מראש!)
            const addProjectAndClient = async (clientData) => {
                const clientId = 'client_' + Date.now();
                const newClient = { id: clientId, role: 'client', ...clientData };
                
                const newProject = { 
                    id: 'proj_' + Date.now(), 
                    clientId, 
                    freelancerId: clientData.freelancerId, 
                    status: 'waiting_for_brief', 
                    paymentAmount: 0, 
                    brief: '', 
                    timeSpent: 0, 
                    timeBudget: 12600, 
                    createdAt: Date.now(),
                    chatHistory: [{ role: 'model', text: 'שלום! אני יונתן, מנהל הפרויקטים החכם של אוריזיס. אני כאן כדי שנאפיין יחד את החזון שלך לאתר המושלם. ספר לי בכמה מילים - מה העסק שלך עושה ומי קהל היעד?' }]
                };

                setUsers(prev => [...prev, newClient]);
                setProjects(prev => [...prev, newProject]);

                if(db) {
                    await db.collection('users').doc(clientId).set(newClient);
                    await db.collection('projects').doc(newProject.id).set(newProject);
                }
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-900 to-slate-900 p-4">
                        <Card className="w-full max-w-md p-8 shadow-2xl relative overflow-hidden fade-in">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-500 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
                            <h1 className="text-4xl font-black text-center text-slate-800 mb-2 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <p className="text-center text-slate-500 mb-8 font-medium">התחברות למערכת ה-ERP</p>
                            
                            <form onSubmit={handleLoginSubmit} className="space-y-4">
                                <div>
                                    <label className="text-sm font-bold text-slate-700 block mb-1">כתובת אימייל</label>
                                    <input 
                                        type="email" required value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} 
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 transition-colors"
                                        placeholder="aaci.yoni@gmail.com"
                                    />
                                </div>
                                <div>
                                    <label className="text-sm font-bold text-slate-700 block mb-1">סיסמה</label>
                                    <input 
                                        type="password" required value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} 
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 transition-colors"
                                        placeholder="••••••••"
                                    />
                                </div>
                                <Button type="submit" className="w-full py-4 text-lg mt-2">היכנס עכשיו</Button>
                            </form>
                            {!isFirebaseConfigured && (
                                <p className="text-xs text-center text-rose-500 mt-4 font-bold">⚠️ המערכת פועלת כרגע ללא חיבור ענן (לוקאלית)</p>
                            )}
                        </Card>
                        <AlertModal {...alertData} />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-20 md:pb-0">
                    <AlertModal {...alertData} />
                    
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 glass-panel">
                        {impersonatingAdmin && (
                            <div className="bg-purple-600 text-white text-center py-2 px-4 font-bold text-sm flex justify-between items-center shadow-inner">
                                <span>👁️ מצב צפייה: אתה רואה את המסך כ-{currentUser.role === 'client' ? 'לקוח' : 'פרילנסר'} ({currentUser.name})</span>
                                <Button onClick={logout} variant="secondary" className="text-xs py-1 px-3 hover:bg-white">חזור למסך מנהל</Button>
                            </div>
                        )}
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="flex items-center gap-4">
                                <div className="text-left hidden sm:block">
                                    <div className="font-bold text-slate-700">{currentUser.name}</div>
                                    <div className="text-xs text-brand-600 font-medium uppercase">{currentUser.role}</div>
                                </div>
                                <Button onClick={logout} variant="secondary" className="!p-2 rounded-full"><span className="text-xl">🚪</span></Button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        {currentUser.role === 'admin' && <AdminDashboard users={users} setUsers={setUsers} projects={projects} setProjects={setProjects} addProjectAndClient={addProjectAndClient} showConfirm={showConfirm} showAlert={showAlert} impersonateUser={impersonateUser} updateUser={updateUser} />}
                        {currentUser.role === 'freelancer' && <FreelancerDashboard user={currentUser} projects={projects} updateProject={updateProject} updateUser={updateUser} showConfirm={showConfirm} showAlert={showAlert} users={users} impersonateUser={impersonateUser} addProjectAndClient={addProjectAndClient} />}
                        {currentUser.role === 'client' && <ClientPortal user={currentUser} projects={projects} updateProject={updateProject} showAlert={showAlert} showConfirm={showConfirm} pricing={pricing} />}
                    </main>
                </div>
            );
        };

        const AdminDashboard = ({ users, setUsers, projects, setProjects, addProjectAndClient, showConfirm, showAlert, impersonateUser, updateUser }) => {
            const [activeTab, setActiveTab] = useState('projects');
            const [newClientData, setNewClientData] = useState({ name: '', email: '', password: '', freelancerId: '' });

            const clients = users.filter(u => u.role === 'client');
            const freelancers = users.filter(u => u.role === 'freelancer');

            const totalRevenue = projects.reduce((sum, p) => sum + (p.paymentAmount || 0), 0);
            const totalFreelancerCost = projects.reduce((sum, p) => sum + ((p.paymentAmount || 0) * 0.6), 0); 
            const grossProfit = totalRevenue - totalFreelancerCost;

            const handleCreateClient = () => {
                if(!newClientData.name || !newClientData.email || !newClientData.password) return showAlert("חובה למלא שם עסק, אימייל וסיסמה.");
                addProjectAndClient(newClientData);
                showAlert("הלקוח הוקם בהצלחה! שלח לו את פרטי ההתחברות כדי שיתחיל אפיון מול יונתן ה-AI.", "לקוח הוקם", "success");
                setNewClientData({ name: '', email: '', password: '', freelancerId: '' });
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="bg-gradient-to-br from-brand-500 to-brand-700 text-white border-none relative overflow-hidden">
                            <h3 className="text-brand-100 font-medium mb-1">הכנסות ברוטו</h3>
                            <div className="text-4xl font-black mb-1">₪{totalRevenue.toLocaleString()}</div>
                        </Card>
                        <Card className="bg-gradient-to-br from-slate-800 to-slate-900 text-white border-none relative overflow-hidden">
                            <h3 className="text-slate-400 font-medium mb-1">תשלום לפרילנסרים (60%)</h3>
                            <div className="text-4xl font-black mb-1">₪{totalFreelancerCost.toLocaleString()}</div>
                        </Card>
                        <Card className="bg-gradient-to-br from-emerald-500 to-emerald-700 text-white border-none relative overflow-hidden">
                            <h3 className="text-emerald-100 font-medium mb-1">רווח גולמי משוער</h3>
                            <div className="text-4xl font-black mb-1">₪{grossProfit.toLocaleString()}</div>
                        </Card>
                    </div>

                    <div className="flex space-x-2 space-x-reverse bg-slate-200/50 p-1 rounded-2xl w-fit">
                        <button onClick={() => setActiveTab('projects')} className={`px-6 py-2.5 rounded-xl font-bold text-sm transition-all ${activeTab === 'projects' ? 'bg-white text-brand-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200'}`}>🚀 פרויקטים ולקוחות</button>
                        <button onClick={() => setActiveTab('team')} className={`px-6 py-2.5 rounded-xl font-bold text-sm transition-all ${activeTab === 'team' ? 'bg-white text-brand-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200'}`}>👥 צוות סוכנים</button>
                    </div>

                    {activeTab === 'projects' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                            <div className="lg:col-span-2 space-y-6">
                                <Card>
                                    <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2"><span>📋</span> פרויקטים פעילים</h2>
                                    {projects.length === 0 ? (
                                        <div className="text-center p-8 text-slate-500 font-medium bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                            אין כרגע לקוחות במערכת. הקם את הלקוח הראשון שלך!
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-right">
                                                <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                                                    <tr>
                                                        <th className="py-4 px-4 rounded-tr-xl">לקוח (פרויקט)</th>
                                                        <th className="py-4 px-4">סטטוס</th>
                                                        <th className="py-4 px-4">פרילנסר מבצע</th>
                                                        <th className="py-4 px-4 rounded-tl-xl text-center">מעקב לקוח</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {projects.map(p => {
                                                        const client = clients.find(c => c.id === p.clientId);
                                                        const freelancer = freelancers.find(f => f.id === p.freelancerId);
                                                        
                                                        let statusBadge = '';
                                                        if(p.status === 'waiting_for_brief') statusBadge = <span className="bg-brand-100 text-brand-700 px-2 py-1 rounded-md text-xs font-bold animate-pulse">🤖 אפיון AI</span>;
                                                        else if(p.status === 'waiting_for_quote') statusBadge = <span className="bg-amber-100 text-amber-700 px-2 py-1 rounded-md text-xs font-bold">⚠️ ממתין לתמחור</span>;
                                                        else if(p.status === 'waiting_for_payment') statusBadge = <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded-md text-xs font-bold">💳 ממתין לתשלום</span>;
                                                        else if(p.status === 'in_progress') statusBadge = <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded-md text-xs font-bold">👨‍💻 בפיתוח</span>;
                                                        else statusBadge = <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md text-xs font-bold">מוכן</span>;

                                                        return (
                                                            <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="py-4 px-4 font-bold text-slate-800">{client?.name || 'לא ידוע'}</td>
                                                                <td className="py-4 px-4">{statusBadge}</td>
                                                                <td className="py-4 px-4 text-slate-600">{freelancer?.name || 'לא שויך'}</td>
                                                                <td className="py-4 px-4 text-center">
                                                                    {client && (
                                                                        <Button onClick={() => impersonateUser(client.id)} variant="secondary" className="!px-3 !py-1 text-xs w-full">🚪 צפה כלקוח</Button>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </Card>
                            </div>

                            <div className="space-y-6">
                                <Card className="border-t-4 border-t-brand-500">
                                    <h2 className="text-xl font-black text-slate-800 mb-6">➕ הקמת לקוח חדש</h2>
                                    <div className="space-y-4">
                                        <div><label className="text-sm font-bold text-slate-700 mb-1 block">שם העסק / הלקוח</label><input type="text" value={newClientData.name} onChange={e=>setNewClientData({...newClientData, name: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-brand-500 outline-none" /></div>
                                        <div><label className="text-sm font-bold text-slate-700 mb-1 block">אימייל (כניסה ללקוח)</label><input type="email" value={newClientData.email} onChange={e=>setNewClientData({...newClientData, email: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-brand-500 outline-none" /></div>
                                        <div><label className="text-sm font-bold text-slate-700 mb-1 block">סיסמה זמנית ללקוח</label><input type="text" value={newClientData.password} onChange={e=>setNewClientData({...newClientData, password: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-brand-500 outline-none" /></div>
                                        <div>
                                            <label className="text-sm font-bold text-slate-700 mb-1 block">שייך לפרילנסר מבצע</label>
                                            <select value={newClientData.freelancerId} onChange={e=>setNewClientData({...newClientData, freelancerId: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-brand-500 outline-none">
                                                <option value="">בחר פרילנסר...</option>
                                                {freelancers.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                            </select>
                                        </div>
                                        <Button onClick={handleCreateClient} className="w-full py-3 mt-4">הקם ושלח אפיון AI</Button>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const FreelancerDashboard = ({ user, projects, updateProject, updateUser, showConfirm, showAlert, users, impersonateUser, addProjectAndClient }) => {
            const [newClientData, setNewClientData] = useState({ name: '', email: '', password: '' });
            
            const myProjects = projects.filter(p => p.freelancerId === user.id);
            const activeProjects = myProjects.filter(p => p.status === 'waiting_for_brief' || p.status === 'waiting_for_quote' || p.status === 'in_progress');

            const handleCreateClient = () => {
                if(!newClientData.name || !newClientData.email || !newClientData.password) return showAlert("חובה למלא הכל.");
                addProjectAndClient({...newClientData, freelancerId: user.id});
                showAlert("הלקוח הוקם וצורף אליך בהצלחה!", "לקוח הוקם", "success");
                setNewClientData({ name: '', email: '', password: '' });
            };

            return (
                <div className="space-y-8 fade-in">
                    <Card className="border-t-4 border-t-emerald-500 shadow-md mb-8">
                        <h2 className="text-xl font-black text-slate-800 mb-2">➕ גיוס לקוח חדש למערכת (שיוך אוטומטי אליך)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label className="text-sm font-bold text-slate-700 mb-1 block">שם העסק</label><input type="text" value={newClientData.name} onChange={e=>setNewClientData({...newClientData, name: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" /></div>
                            <div><label className="text-sm font-bold text-slate-700 mb-1 block">אימייל</label><input type="email" value={newClientData.email} onChange={e=>setNewClientData({...newClientData, email: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" /></div>
                            <div><label className="text-sm font-bold text-slate-700 mb-1 block">סיסמה זמנית</label><input type="text" value={newClientData.password} onChange={e=>setNewClientData({...newClientData, password: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" /></div>
                        </div>
                        <Button onClick={handleCreateClient} variant="success" className="w-full mt-4">הקם לקוח ושלח אותו לאפיון AI</Button>
                    </Card>

                    <h2 className="text-2xl font-black text-slate-800 mb-4">תור העבודה שלי</h2>
                    {activeProjects.map(p => {
                        const client = users.find(u=>u.id===p.clientId);
                        return (
                            <Card key={p.id} className="border-r-4 border-r-brand-500 shadow-md mb-6">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800">לקוח: {client?.name}</h3>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <Button onClick={() => impersonateUser(client.id)} variant="secondary" className="!text-xs !py-1">🚪 צפה כלקוח (הצץ לאפיון)</Button>
                                    </div>
                                </div>

                                {p.status === 'waiting_for_quote' && (
                                    <div className="bg-amber-100 p-5 rounded-2xl mb-6 border border-amber-300">
                                        <h4 className="font-black text-amber-900 mb-2">⚠️ תמחר את הפרויקט</h4>
                                        <p className="text-sm text-amber-800 mb-4 font-bold">ה-AI סיים את האפיון מול הלקוח. קרא למטה והזן הצעת מחיר.</p>
                                        <div className="flex gap-4 items-center bg-white p-3 rounded-xl border border-amber-200">
                                            <input type="number" defaultValue={p.paymentAmount || ''} onBlur={(e) => updateProject(p.id, {paymentAmount: Number(e.target.value)})} className="p-2 border border-slate-300 w-32 outline-none font-bold" placeholder="סכום (₪)" />
                                            <Button onClick={() => updateProject(p.id, {status: 'waiting_for_payment'})} variant="success">שלח ללקוח לתשלום</Button>
                                        </div>
                                    </div>
                                )}
                                
                                {p.brief && (
                                    <div className="bg-brand-50 p-5 rounded-2xl border border-brand-100">
                                        <h4 className="font-black text-brand-900 mb-2">📝 אפיון הלקוח</h4>
                                        <textarea className="w-full p-4 bg-white border border-brand-200 rounded-xl min-h-[150px]" defaultValue={p.brief} onBlur={(e) => updateProject(p.id, {brief: e.target.value})} />
                                    </div>
                                )}
                            </Card>
                        );
                    })}
                </div>
            );
        };

        const ClientPortal = ({ user, projects, updateProject, pricing }) => {
            const project = projects.find(p => p.clientId === user.id);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const messages = project?.chatHistory || [];

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            if (!project) return <div>שגיאה: לא נמצא פרויקט משויך אליך.</div>;

            const handleSendChat = async () => {
                if (!chatInput.trim()) return;
                const newMessages = [...messages, { role: 'user', text: chatInput }];
                updateProject(project.id, { chatHistory: newMessages });
                setChatInput('');
                setIsTyping(true);

                const sysPrompt = `השם שלך הוא יונתן. אתה מנהל פרויקטים ומאפיין אתרים מקצועי בסוכנות ORIZISWEB.
מטרתך לאסוף מידע מקיף מהלקוח. תשאל שאלה אחת כל פעם על מהות העסק, מתחרים, וצבעים.
חוק חשוב: אתה רק מאפיין - אל תנקוב במחירים. 
סיום השיחה: כשיש לך מספיק מידע, הסבר ללקוח שהעברת לצוות לבחינה ותמחור מדויק, והוסף בסוף התשובה שלך בדיוק את המילה [סיכום_אפיון].`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            contents: newMessages.map(m => ({ role: m.role, parts: [{ text: m.text }] }))
                        })
                    });
                    
                    const data = await response.json();
                    let aiText = data.candidates[0].content.parts[0].text;
                    const isFinished = aiText.includes('[סיכום_אפיון]');
                    aiText = aiText.replace('[סיכום_אפיון]', '').trim();
                    
                    const finalMessages = [...newMessages, { role: 'model', text: aiText }];
                    updateProject(project.id, { chatHistory: finalMessages });
                    
                    if (isFinished) {
                        const briefTranscript = finalMessages.map(m => `${m.role === 'user' ? 'לקוח' : 'יונתן'}: ${m.text}`).join('\n\n');
                        setTimeout(() => updateProject(project.id, { brief: briefTranscript, status: 'waiting_for_quote' }), 3000);
                    }
                } catch (err) {
                    updateProject(project.id, { chatHistory: [...newMessages, { role: 'model', text: 'שגיאת התחברות ליונתן ה-AI.' }] });
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in pb-20">
                    {project.status === 'waiting_for_brief' && (
                        <Card className="shadow-2xl border-t-4 border-t-brand-500 p-0 overflow-hidden flex flex-col h-[600px]">
                            <div className="bg-brand-50 p-4 border-b border-brand-100 flex items-center justify-between">
                                <h3 className="font-black text-slate-800">🤖 יונתן - מנהל פרויקטים AI</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                                        <div className={`max-w-[80%] p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-brand-500 text-white rounded-tr-sm' : 'bg-white border border-slate-200 rounded-tl-sm'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="text-slate-400 p-4">מקליד...</div>}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="p-4 bg-white flex gap-2">
                                <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendChat()} placeholder="הקלד כאן..." className="flex-1 p-3 bg-slate-50 rounded-xl" />
                                <Button onClick={handleSendChat}>שלח</Button>
                            </div>
                        </Card>
                    )}

                    {project.status === 'waiting_for_quote' && (
                        <Card className="text-center py-20 bg-amber-50">
                            <h2 className="text-2xl font-black text-amber-900 mb-2">⏳ יונתן העביר את האפיון לצוות המומחים!</h2>
                            <p className="text-amber-800">הצוות שלנו בוחן כרגע את האפיון כדי להכין לך הצעת מחיר מדויקת.</p>
                        </Card>
                    )}

                    {project.status === 'waiting_for_payment' && (
                        <Card className="p-8 border-t-4 border-t-brand-500 shadow-xl fade-in">
                            <h2 className="text-2xl font-black text-slate-800 mb-4">הצעת מחיר והסכם עבודה</h2>
                            <div className="text-4xl font-black text-slate-800 mb-8">סך לתשלום: ₪{project.paymentAmount?.toLocaleString()}</div>
                            <SignatureCanvas onSave={() => updateProject(project.id, {status: 'in_progress'})} />
                        </Card>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
