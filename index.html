        const Card = ({ children, className = '' }) => (

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = "button", title="" }) => {
            const base = "px-4 py-2 font-bold rounded-xl transition-all duration-200 focus:outline-none flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-500 text-white hover:bg-brand-600 shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-500/30",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-lg shadow-amber-500/30"
            };
            return <button type={type} onClick={onClick} disabled={disabled} title={title} className={`${base} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>{children}</button>;
        };

        const AlertModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "אישור", type = "info" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">

                        </div>
                        <h3 className="text-2xl font-black text-center text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-center mb-8 font-medium">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {onCancel && <Button variant="secondary" onClick={onCancel} className="w-full">ביטול</Button>}
                            <Button variant={type === 'danger' ? 'danger' : 'primary'} onClick={onConfirm} className="w-full">{confirmText}</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const SignatureCanvas = ({ onSave, disabled = false }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if(disabled) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a';
            }, [disabled]);

            const startDrawing = (e) => { if(disabled) return; setIsDrawing(true); draw(e); };
            const endDrawing = () => { if(disabled) return; setIsDrawing(false); canvasRef.current?.getContext('2d').beginPath(); };
            
            const draw = (e) => {
                if (!isDrawing || disabled) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            
            const clear = () => { if(disabled) return; canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); };

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-4 bg-slate-50">
                    <canvas 
                        ref={canvasRef} width={600} height={250} 
                        className={`w-full bg-white rounded-xl touch-none border border-slate-200 ${disabled ? 'cursor-not-allowed opacity-60' : 'cursor-crosshair'}`}
                        onMouseDown={startDrawing} onMouseUp={endDrawing} onMouseMove={draw} onMouseLeave={endDrawing}
                        onTouchStart={startDrawing} onTouchEnd={endDrawing} onTouchMove={draw}
                    />
                    <div className="flex gap-3 mt-4">
                        <Button variant="secondary" onClick={clear} disabled={disabled} className="flex-1">נקה</Button>
                        <Button variant="success" onClick={() => onSave(canvasRef.current.toDataURL())} disabled={disabled} className="flex-1">אשר חתימה</Button>
                    </div>
                </div>
            );
        };

        const AppCore = () => {
            const [users, setUsers] = useState([]);
            const [projects, setProjects] = useState([]);
            const [storeItems, setStoreItems] = useState([]);
            const [settings, setSettings] = useState({ 
                freelancerAgreement: 'הסכם ברירת מחדל לפרילנסרים. נא לעדכן בהגדרות.', 
                clientAgreement: 'הסכם ברירת מחדל ללקוחות. נא לעדכן בהגדרות.' 
            });
            
            const [currentUser, setCurrentUser] = useState(null);
            const [impersonatingAdmin, setImpersonatingAdmin] = useState(null); 
            
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [alertData, setAlertData] = useState({ isOpen: false });

            useEffect(() => {
                if(!db) return;
                
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    setUsers(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, err => console.error("Users error:", err));

                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    setProjects(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, err => console.error("Projects error:", err));

                const unsubStore = db.collection('store').onSnapshot(snap => {
                    setStoreItems(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, err => console.error("Store error:", err));

                const unsubSettings = db.collection('settings').doc('global').onSnapshot(doc => {
                    if (doc.exists) setSettings(doc.data());
                }, err => console.error("Settings error:", err));

                return () => { unsubUsers(); unsubProjects(); unsubStore(); unsubSettings(); };
            }, []);

            const activeUser = currentUser ? (users.find(u => u.id === currentUser.id) || currentUser) : null;

            const showAlert = (message, title = "הודעה", type = "info", onConfirmAction = null) => {
                setAlertData({ 
                    isOpen: true, title, message, type, 
                    onConfirm: () => {
                        if (onConfirmAction) onConfirmAction();
                        setAlertData({ isOpen: false });
                    },
                    onCancel: onConfirmAction ? () => setAlertData({ isOpen: false }) : null,
                    confirmText: onConfirmAction ? "אישור וביצוע" : "הבנתי"
                });
            };

            const handleLoginSubmit = async (e) => {
                e.preventDefault();
                let user = users.find(u => u?.email?.toLowerCase() === loginEmail.trim().toLowerCase() && u?.password === loginPassword);
                
                if (loginEmail.trim().toLowerCase() === 'aaci.yoni@gmail.com' && loginPassword === '6962697') {
                    const existingAdmin = users.find(u => u?.email?.toLowerCase() === loginEmail.trim().toLowerCase());
                    if (existingAdmin) {
                        if(existingAdmin.role !== 'admin') {

                        }
                        user = { ...existingAdmin, role: 'admin' };
                    } else {
                        const newAdmin = { id: 'admin_1', role: 'admin', name: 'יוני (מנהל ראשי)', email: loginEmail, password: loginPassword };
                        await db.collection('users').doc('admin_1').set(newAdmin);
                        user = newAdmin;
                    }
                }

                if (user) {
                    if (user.email === 'aaci.yoni@gmail.com') user.role = 'admin'; 
                    setCurrentUser(user);
                    setLoginEmail(''); setLoginPassword('');
                } else {
                    showAlert("אימייל או סיסמה שגויים. נסה שוב.", "שגיאת התחברות", "danger");
                }

            const logout = () => {
                if (impersonatingAdmin) {
                    setCurrentUser(impersonatingAdmin);
                    setImpersonatingAdmin(null);
                } else {
                    setCurrentUser(null);
                }

            const impersonateUser = (userId) => {
                const userToView = users.find(u => u?.id === userId);
                if(userToView) {
                    setImpersonatingAdmin(currentUser);
                    setCurrentUser(userToView);

            const updateUser = async (id, data) => { if(db && !impersonatingAdmin) await db.collection('users').doc(id).set(data, {merge: true}); };
            const updateProject = async (id, data) => { if(db && !impersonatingAdmin) await db.collection('projects').doc(id).set(data, {merge: true}); };
            const saveSettings = async (data) => { if(db && !impersonatingAdmin) await db.collection('settings').doc('global').set(data, {merge: true}); };
            
            const createProjectAndClient = async (clientData, assignedFreelancerId) => {

                }
            };

            const deleteItem = async (collection, id) => {
                if(db && !impersonatingAdmin) await db.collection(collection).doc(id).delete();
            };

            const createFreelancer = async (data) => {

                const fId = 'free_' + Date.now();

            if (!activeUser) {

                        {activeUser?.role === 'freelancer' && <FreelancerDashboard user={activeUser} users={users} projects={projects} settings={settings} updateUser={updateUser} updateProject={updateProject} createProjectAndClient={createProjectAndClient} showAlert={showAlert} impersonateUser={impersonateUser} isReadOnly={isReadOnly} />}

        const AdminDashboard = ({ users, projects, storeItems, settings, saveSettings, updateUser, createProjectAndClient, createFreelancer, createStoreItem, updateProject, deleteItem, showAlert, impersonateUser }) => {

            const [editingUser, setEditingUser] = useState(null);

            const clients = users.filter(u => u?.role === 'client');
            const freelancers = users.filter(u => u?.role === 'freelancer');
            const totalRevenue = projects.reduce((sum, p) => sum + (Number(p?.paymentAmount) || 0), 0);

            const [tempSettings, setTempSettings] = useState(settings);
            useEffect(() => { setTempSettings(settings); }, [settings]);

            const handleCreateClient = () => {
                if(!newClient.name || !newClient.email || !newClient.password || !newClient.freelancerId) return showAlert("מלא את כל שדות הלקוח ושייך פרילנסר.", "שגיאה", "danger");
                createProjectAndClient(newClient, newClient.freelancerId);
                setNewClient({ name: '', email: '', password: '', freelancerId: '' });

            const handleCreateFreelancer = () => {
                if(!newFreelancer.name || !newFreelancer.email || !newFreelancer.password) return showAlert("מלא שם, אימייל וסיסמה.", "שגיאה", "danger");

                setNewFreelancer({ name: '', email: '', password: '', phone: '' });
                showAlert("פרילנסר נוסף לצוות.", "הצלחה", "success");
            };

            const handleSaveUserEdit = () => {
                if(!editingUser.name || !editingUser.email) return showAlert("שם ואימייל הם שדות חובה.", "שגיאה", "danger");

                setEditingUser(null);
                showAlert("פרטי המשתמש עודכנו בהצלחה.", "הצלחה", "success");
            };

            const getStatusHealth = (status) => {
                const map = {
                    'waiting_for_brief': { color: 'text-brand-500', icon: '🤖', text: 'ממתין ללקוח (AI)' },
                    'manual_brief': { color: 'text-amber-500', icon: '📝', text: 'ממתין ללקוח (טופס ידני)' },
                    'contact_requested': { color: 'text-rose-500', icon: '📞', text: 'לקוח מבקש שיחה!' },
                    'waiting_for_quote': { color: 'text-amber-500', icon: '🟡', text: 'ממתין לתמחור' },
                    'waiting_for_payment': { color: 'text-amber-500', icon: '🟡', text: 'ממתין לתשלום' },
                    'in_progress': { color: 'text-emerald-500', icon: '🟢', text: 'בעבודה תקינה' },
                    'qa_review': { color: 'text-emerald-500', icon: '🟢', text: 'ממתין לאישור מנהל' },
                    'completed': { color: 'text-blue-500', icon: '🔵', text: 'הושלם' },
                    'stuck': { color: 'text-rose-500', icon: '🔴', text: 'חריגה / עיכוב' }
                };
                return map[status] || { color: 'text-slate-500', icon: '⚪', text: 'סטטוס לא ידוע' };
            };

            return (
                <div className="space-y-8 fade-in">
                    {editingUser && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl border-t-4 border-t-brand-500">
                                <h3 className="text-2xl font-black text-slate-800 mb-6">עריכת משתמש: {editingUser.role === 'client' ? 'לקוח' : 'פרילנסר'}</h3>

                            <div><label className="text-xs font-bold text-slate-500 block mb-1">אימייל התחברות</label><input type="email" value={newClient.email} onChange={e=>setNewClient({...newClient, email: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left outline-none focus:border-emerald-500" dir="ltr"/></div>
                            <div><label className="text-xs font-bold text-slate-500 block mb-1">סיסמה ראשונית</label><input type="text" value={newClient.password} onChange={e=>setNewClient({...newClient, password: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left outline-none focus:border-emerald-500" dir="ltr"/></div>
                            <Button variant="success" onClick={() => { if(newClient.name && newClient.email){ createProjectAndClient(newClient, user.id); setNewClient({name:'',email:'',password:''}); showAlert("הלקוח הוקם!","מעולה","success");} else { showAlert("חסרים פרטים", "שגיאה", "danger")} }} className="w-full py-3 shadow-emerald-500/30">➕ צור ושייך אליי</Button>
                        </div>
                    </Card>

                    <div className="flex items-center gap-3">
                        <h2 className="text-2xl font-black text-slate-800">תור העבודה שלי</h2>
                        <span className="bg-brand-100 text-brand-700 font-black px-3 py-1 rounded-full">{myProjects.length}</span>
                    </div>

                    {myProjects.length === 0 ? (
                        <div className="p-12 text-center bg-white rounded-2xl shadow-sm border border-slate-200">
                            <div className="text-5xl mb-4">📭</div>
                            <h3 className="text-xl font-bold text-slate-700 mb-2">אין פרויקטים פעילים</h3>
                        </div>
                    ) : (
                        myProjects.map(p => {
                            const client = users.find(u=>u?.id===p?.clientId);
                            return (
                                <Card key={p.id} className={`border-r-8 border-r-brand-500 mb-8 shadow-md ${isReadOnly ? 'pointer-events-none' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 pb-6 border-b border-slate-100">
                                        <div>
                                            <h3 className="text-2xl font-black text-slate-800">{client?.name || 'לקוח ללא שם'}</h3>
                                            <div className="text-sm font-bold mt-2 bg-slate-100 inline-block px-3 py-1 rounded-lg text-slate-600 border border-slate-200">סטטוס: <span className="text-brand-600">{p.status}</span></div>
                                        </div>
                                    </div>

                                    {p.status === 'contact_requested' && (
                                        <div className="bg-rose-50 border-2 border-rose-500 p-6 rounded-2xl text-center mb-6 shadow-lg relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-rose-500 animate-pulse"></div>
                                            <div className="text-5xl mb-3">🚨 📞</div>
                                            <h4 className="font-black text-rose-900 mb-2 text-2xl">הלקוח דילג על האפיון ומבקש שיחה טלפונית!</h4>
                                            <p className="text-rose-800 font-bold mb-6 text-lg">עליך ליצור קשר עם הלקוח כעת, לאפיין את האתר יחד איתו, ולאחר מכן להעביר לשלב תמחור.</p>
                                            <Button onClick={() => updateProject(p.id, {status: 'waiting_for_quote', brief: 'האפיון בוצע טלפונית על ידי הפרילנסר. הלקוח ממתין להצעת מחיר בהתאם לשיחה.'})} variant="danger" className="mx-auto !py-3 px-8 shadow-rose-500/30 text-lg">סיימתי את השיחה - העבר לשלב תמחור</Button>
                                        </div>
                                    )}

                                    {p.status === 'waiting_for_brief' && (
                                        <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100 text-center">
                                            <div className="text-4xl mb-3">🤖</div>
                                            <h4 className="font-black text-blue-900 mb-2 text-lg">ממתין שהלקוח יסיים את הצ'אט עם ה-AI</h4>
                                        </div>
                                    )}

                                    {p.status === 'manual_brief' && (
                                        <div className="bg-amber-50 p-6 rounded-2xl border border-amber-200 text-center">
                                            <div className="text-4xl mb-3">📝</div>
                                            <h4 className="font-black text-amber-900 mb-2 text-lg">הלקוח ממלא כעת אפיון בטופס ידני</h4>
                                        </div>
                                    )}

                                    {p.status === 'waiting_for_quote' && (
                                        <div className="bg-amber-50 p-6 rounded-2xl border border-amber-200 mt-4">
                                            <h4 className="font-black text-amber-900 mb-2 text-xl">תמחר את העבודה</h4>
                                            <p className="text-amber-800 text-sm font-medium mb-4">קרא את האפיון למטה, והזן הצעת מחיר ללקוח.</p>
                                            <div className="flex items-center gap-3">
                                                <input type="number" onBlur={(e) => updateProject(p.id, {paymentAmount: Number(e.target.value)})} className="p-3 border-2 border-amber-300 rounded-xl outline-none font-black text-xl w-40 text-left" dir="ltr" placeholder="סכום ב-₪" defaultValue={p.paymentAmount || ''} />
                                                <Button onClick={() => p.paymentAmount > 0 ? updateProject(p.id, {status: 'waiting_for_payment'}) : showAlert("הזן סכום.", "שגיאה", "danger")} variant="warning">שגר הצעת מחיר</Button>
                                            </div>
                                        </div>
                                    )}

                                    {p.status === 'in_progress' && (
                                        <div className="bg-purple-50 p-6 rounded-2xl border border-purple-200 mt-4">
                                            <ProjectTimer project={p} updateProject={updateProject} isReadOnly={isReadOnly} />
                                            <h4 className="font-black text-purple-900 mb-4 text-lg">✅ רשימת חובה (QA) לפני הגשה</h4>
                                            <Button onClick={()=>updateProject(p.id, {status: 'qa_review'})} className="w-full bg-purple-600 hover:bg-purple-700 py-3 mt-4">סיימתי! שלח לבדיקת מנהל</Button>
                                        </div>
                                    )}

                                    {p.status === 'stuck' && (
                                        <div className="bg-rose-50 border border-rose-200 p-6 rounded-2xl text-center mt-4 shadow-sm">
                                            <div className="text-4xl mb-3">🛑</div>
                                            <h4 className="font-black text-rose-900 mb-2 text-xl">הפרויקט בהשהייה / תחת חסימה</h4>
                                            <p className="text-rose-800 font-medium mb-6">הטיימר נעצר עקב חוסר בנתונים או בעיה. הודעה נשלחה למנהל הפרויקט.</p>
                                            <Button onClick={() => updateProject(p.id, {status: 'in_progress'})} variant="primary" className="mx-auto !py-3 px-8 text-lg shadow-brand-500/30">שחרר חסימה והמשך פיתוח (הפעל טיימר)</Button>
                                        </div>
                                    )}

                                    {p.brief && (
                                        <div className="mt-6 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                            <h4 className="font-black text-slate-800 mb-4">סיכום האפיון / בקשות הלקוח</h4>
                                            <textarea className="w-full p-4 bg-white border border-slate-200 rounded-xl min-h-[150px] outline-none" defaultValue={p.brief} onBlur={(e) => updateProject(p.id, {brief: e.target.value})} />
                                        </div>
                                    )}
                                </Card>
                            );
                        })
                    )}
                </div>
            );
        };

        const ClientPortal = ({ user, projects, storeItems, settings, updateProject, isReadOnly }) => {
            const project = projects.find(p => p?.clientId === user?.id);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);
            
            const [manualBriefData, setManualBriefData] = useState({ company: '', audience: '', goal: '', colors: '' });
            const [features, setFeatures] = useState({ accessibility: false, whatsapp: false, english: false });

            const messages = project?.chatHistory || [];
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            if (!project) return <div className="text-center p-12 text-slate-500 font-medium bg-white rounded-2xl shadow-sm border border-slate-200 max-w-lg mx-auto mt-10">המערכת מכינה את סביבת העבודה המותאמת שלך... אנא המתן.</div>;

            const knownStatuses = ['waiting_for_brief', 'manual_brief', 'contact_requested', 'waiting_for_quote', 'waiting_for_payment', 'in_progress', 'qa_review', 'completed', 'stuck'];

            if (!knownStatuses.includes(project.status)) {
                return (
                    <Card className="text-center p-12 shadow-2xl border-t-4 border-t-rose-500 mt-10 max-w-2xl mx-auto fade-in">
                        <div className="text-6xl mb-4">🕵️‍♂️</div>
                        <h2 className="text-2xl font-black text-slate-800 mb-2">סטטוס פרויקט לא מזוהה במערכת</h2>
                        <p className="text-slate-600 mb-6 font-medium">המערכת לא יודעת איזה מסך להציג (הסטטוס השמור ריק או שגוי).</p>
                        <div className="bg-rose-50 p-4 rounded-lg border border-rose-200 text-rose-800 text-sm font-bold mt-4">
                            פתרון למנהל: הלקוח הזה הוקם ללא סטטוס תקין. חזור לדשבורד, לחץ על הפח למחיקת הלקוח, והקם אותו מחדש כדי שהמערכת תתאפס.
                        </div>
                    </Card>
                );
            }

            const handleSendChat = async () => {
                if (isReadOnly || !chatInput.trim() || isTyping) return;
                
                const userMessage = { role: 'user', text: chatInput };
                const newMessages = [...messages, userMessage];
                updateProject(project.id, { chatHistory: newMessages });
                setChatInput(''); setIsTyping(true);

                const sysPrompt = `אתה יונתן, מנהל פרויקטים סופר-מקצועי בחברת ORIZISWEB. מטרתך לאסוף מידע מלקוח לאפיון אתר. שאל שאלות קצרות. אסור לך לתת מחירים בשום אופן. כשיש לך מספיק מידע של קהל יעד ומטרת האתר, כתוב רק את המילה המדויקת בסוף: [סיכום_אפיון].`;

                try {
                    let apiHistory = [];
                    newMessages.forEach((msg) => {
                        const apiRole = msg.role === 'user' ? 'user' : 'model';
                        if (apiHistory.length > 0 && apiHistory[apiHistory.length - 1].role === apiRole) {
                            apiHistory[apiHistory.length - 1].parts[0].text += "\n" + msg.text;
                        } else {
                            apiHistory.push({ role: apiRole, parts: [{ text: msg.text }] });
                        }
                    });

                    if (apiHistory.length > 0 && apiHistory[0].role === 'model') {
                        apiHistory.shift(); 
                    }
                    if (apiHistory.length === 0) {
                        apiHistory.push({ role: 'user', parts: [{ text: 'שלום' }]});
                    }

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            contents: apiHistory
                        })
                    });
                        
                    if(!response.ok) {
                        if (response.status === 401 || response.status === 403) {
                            throw new Error("מצטער, הייתה שגיאה בתקשורת. המערכת מזהה שמפתח ה-API שהוזן הוא כנראה מסוג AQ והדפדפן חוסם אותו. אנא פנה למנהל.");
                        } else {
                            throw new Error(`שגיאת שרת: ${response.status}`);
                        }
                    }

                    const data = await response.json();
                    let aiText = data.candidates[0].content.parts[0].text;
                    const isFinished = aiText.includes('[סיכום_אפיון]');
                    aiText = aiText.replace('[סיכום_אפיון]', '').trim();
                    
                    const finalMessages = [...newMessages, { role: 'model', text: aiText }];
                    updateProject(project.id, { chatHistory: finalMessages });
                    
                    if (isFinished) {
                        const briefTranscript = finalMessages.map(m => `${m.role === 'user' ? 'לקוח' : 'יונתן'}: ${m.text}`).join('\n\n');
                        setTimeout(() => updateProject(project.id, { brief: briefTranscript, status: 'waiting_for_quote' }), 3000);
                    }
                } catch (err) {
                    console.error("Chat error:", err);
                    updateProject(project.id, { chatHistory: [...newMessages, { role: 'model', text: err.message || 'מצטער, הייתה שגיאה בתקשורת. אנא נסה שוב.' }] });
                } finally { setIsTyping(false); }
            };

            const submitManualBrief = () => {
                if(!manualBriefData.company || !manualBriefData.goal) {
                    alert("אנא מלא לפחות שם עסק ומטרה."); return;
                }
                const featuresText = `תוספים שנבחרו:\n- נגישות: ${features.accessibility ? 'כן' : 'לא'}\n- וואטסאפ: ${features.whatsapp ? 'כן' : 'לא'}\n- שפות: ${features.english ? 'כן' : 'לא'}`;
                const fullBrief = `שם: ${manualBriefData.company}\nקהל יעד: ${manualBriefData.audience}\nמטרה: ${manualBriefData.goal}\nעיצוב: ${manualBriefData.colors}\n\n${featuresText}`;
                
                updateProject(project.id, { brief: fullBrief, status: 'waiting_for_quote' });
            };

            return (
                <div className={`max-w-4xl mx-auto space-y-8 fade-in pb-20 ${isReadOnly ? 'opacity-80 pointer-events-none' : ''}`}>
                    
                    {project.status === 'waiting_for_brief' && (
                        <Card className="shadow-2xl border-t-4 border-t-brand-500 p-0 overflow-hidden flex flex-col h-[650px] max-h-[85vh] rounded-3xl mt-10">
                            <div className="bg-gradient-to-r from-brand-50 to-white p-5 border-b border-brand-100 flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white text-2xl shadow-lg">🤖</div>
                                    <div>
                                        <h3 className="font-black text-slate-800 text-xl">יונתן - אוריזיס</h3>
                                        <p className="text-sm text-brand-600 font-bold flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> מנהל פרויקטים חכם (AI)</p>
                                    </div>
                                </div>
                                <Button onClick={() => updateProject(project.id, {status: 'manual_brief'})} variant="secondary" className="!text-xs border border-slate-300 bg-white hover:bg-slate-50 shadow-sm text-slate-700 rounded-full px-4" title="מילוי שאלון ידני במקום צ'אט">📝 דלג לאפיון בטופס</Button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 bg-slate-50">
                                {messages.length === 0 && (
                                    <div className="flex justify-start fade-in">
                                        <div className="max-w-[90%] md:max-w-[75%] p-5 rounded-2xl text-[15px] font-medium shadow-sm bg-white border border-slate-200 text-slate-700 leading-relaxed rounded-bl-none">
                                            שלום! אני יונתן, מנהל הפרויקטים החכם של אוריזיס. אני כאן כדי שנאפיין יחד את החזון שלך לאתר המושלם. ספר לי בכמה מילים - מה העסק שלך עושה ומי קהל היעד?
                                        </div>
                                    </div>
                                )}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                                        <div className={`max-w-[90%] md:max-w-[75%] p-5 rounded-2xl text-[15px] font-medium shadow-sm ${m.role === 'user' ? 'bg-brand-500 text-white rounded-br-none' : 'bg-white border border-slate-200 text-slate-700 whitespace-pre-wrap leading-relaxed rounded-bl-none'}`}>{m.text}</div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start fade-in">
                                        <div className="bg-white border border-slate-200 p-4 rounded-2xl rounded-bl-none shadow-sm flex items-center gap-2">
                                            <span className="w-2 h-2 bg-slate-300 rounded-full animate-bounce"></span>
                                            <span className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></span>
                                            <span className="w-2 h-2 bg-slate-300 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="p-4 bg-white border-t border-slate-200 flex gap-3">
                                <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendChat()} placeholder="הקלד תשובה ליונתן..." className="flex-1 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-brand-500 transition-colors" />
                                <Button onClick={handleSendChat} className="px-8 shadow-md text-lg">שלח</Button>
                            </div>
                        </Card>
                    )}

                    {project.status === 'manual_brief' && (
                        <Card className="shadow-2xl border-t-4 border-t-brand-500 max-w-2xl mx-auto mt-10 p-8 md:p-12">
                            <h2 className="text-3xl font-black text-slate-800 mb-2">אפיון אתר מהיר 📝</h2>
                            <p className="text-slate-500 font-medium mb-8">ענה על כמה שאלות קצרות, בחר תוספים, ואנחנו ניגש לעבודה.</p>
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="text-sm font-bold text-slate-700 block mb-2">שם העסק / המותג</label>
                                    <input type="text" value={manualBriefData.company} onChange={e=>setManualBriefData({...manualBriefData, company: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" placeholder="לדוגמה: משרד עו''ד כהן" />
                                </div>
                                <div>
                                    <label className="text-sm font-bold text-slate-700 block mb-2">מי קהל היעד המרכזי?</label>
                                    <input type="text" value={manualBriefData.audience} onChange={e=>setManualBriefData({...manualBriefData, audience: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500" placeholder="לדוגמה: לקוחות פרטיים, עסקים קטנים" />
                                </div>
                                <div>
                                    <label className="text-sm font-bold text-slate-700 block mb-2">מה המטרה העיקרית של האתר?</label>
                                    <textarea value={manualBriefData.goal} onChange={e=>setManualBriefData({...manualBriefData, goal: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 min-h-[100px]" placeholder="להביא לידים, למכור מוצרים, להציג עבודות..." />
                                </div>
                                
                                <div className="bg-brand-50 p-6 rounded-xl border border-brand-100">
                                    <h4 className="font-black text-brand-900 mb-4">תוספים ופיצ'רים שיוטמעו בהסכם:</h4>
                                    <div className="space-y-3">
                                        <label className="flex items-center gap-3 cursor-pointer p-2 hover:bg-white rounded-lg transition">
                                            <input type="checkbox" checked={features.accessibility} onChange={e=>setFeatures({...features, accessibility: e.target.checked})} className="w-5 h-5 accent-brand-600 rounded" />
                                            <span className="font-medium text-slate-700">תוסף נגישות לאתר (ללא עלות)</span>
                                        </label>
                                        <label className="flex items-center gap-3 cursor-pointer p-2 hover:bg-white rounded-lg transition">
                                            <input type="checkbox" checked={features.whatsapp} onChange={e=>setFeatures({...features, whatsapp: e.target.checked})} className="w-5 h-5 accent-brand-600 rounded" />
                                            <span className="font-medium text-slate-700">כפתור חיוג / וואטסאפ מרחף</span>
                                        </label>
                                        <label className="flex items-center gap-3 cursor-pointer p-2 hover:bg-white rounded-lg transition">
                                            <input type="checkbox" checked={features.english} onChange={e=>setFeatures({...features, english: e.target.checked})} className="w-5 h-5 accent-brand-600 rounded" />
                                            <span className="font-medium text-slate-700">תמיכה באתר דו-לשוני (עברית/אנגלית)</span>
                                        </label>
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4 pt-4">
                                    <Button onClick={submitManualBrief} className="flex-1 py-4 text-lg">סיימתי, שלח לתמחור</Button>
                                    <Button onClick={() => updateProject(project.id, {status: 'contact_requested'})} variant="secondary" className="sm:w-auto py-4">עזבו, אני מעדיף שנדבר בטלפון 📞</Button>
                                </div>
                            </div>
                        </Card>
                    )}

                    {project.status === 'contact_requested' && (
                        <Card className="text-center py-24 bg-gradient-to-b from-rose-50 to-white border border-rose-100 shadow-2xl rounded-3xl mt-10 max-w-2xl mx-auto">
                            <div className="text-7xl mb-6">📞</div>
                            <h2 className="text-4xl font-black text-rose-900 mb-4 tracking-tight">הבקשה התקבלה!</h2>
                            <p className="text-rose-800 font-medium text-xl max-w-lg mx-auto">הודעה דחופה נשלחה למנהל הפרויקט שלך. ניצור איתך קשר בהקדם האפשרי להשלמת האפיון טלפונית.</p>
                        </Card>
                    )}

                    {project.status === 'waiting_for_quote' && (
                        <Card className="text-center py-24 bg-gradient-to-b from-amber-50 to-white border border-amber-100 shadow-2xl rounded-3xl mt-10">
                            <div className="text-8xl mb-8 animate-pulse-slow">⏳</div>
                            <h2 className="text-4xl font-black text-amber-900 mb-4 tracking-tight">האפיון בבדיקת הצוות שלנו</h2>
                            <p className="text-amber-800 font-medium text-lg max-w-lg mx-auto">יונתן העביר את הסיכום למנהל הפרויקט האנושי. אנו בונים לך כעת הצעת מחיר מדויקת ומיד כשתהיה מוכנה המסך כאן יתעדכן.</p>
                        </Card>
                    )}

                    {project.status === 'waiting_for_payment' && (
                        <Card className="p-8 md:p-12 border-t-8 border-t-brand-500 shadow-2xl rounded-3xl mt-10">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">📄</div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">אישור הצעת מחיר והסכם</h2>
                            </div>
                            
                            <div className="bg-gradient-to-r from-slate-50 to-white border border-slate-200 p-8 rounded-2xl mb-10 flex flex-col md:flex-row justify-between items-center shadow-inner">
                                <h3 className="font-black text-slate-800 text-xl mb-4 md:mb-0">סך הכל לפיתוח והקמה:</h3>
                                <div className="text-4xl md:text-5xl font-black text-brand-600 bg-brand-50 px-8 py-5 rounded-2xl border border-brand-100 shadow-sm">₪{Number(project.paymentAmount).toLocaleString()}</div>
                            </div>
                            
                            <div className="mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                <h4 className="font-black text-slate-800 mb-4 text-xl">הסכם התקשרות ופיתוח</h4>
                                <div className="h-48 overflow-y-auto bg-white border border-slate-200 rounded-xl p-6 text-[13px] text-slate-600 mb-6 whitespace-pre-wrap leading-relaxed shadow-inner">
                                    {settings.clientAgreement}
                                </div>
                                <h5 className="font-bold text-slate-700 mb-3 text-sm">חתימתך מאשרת את התנאים ויציאה לפיתוח:</h5>
                                <SignatureCanvas onSave={(sig) => updateProject(project.id, {status: 'in_progress', clientSignature: sig})} />
                            </div>
                        </Card>
                    )}

                    {(['in_progress', 'qa_review', 'completed', 'stuck'].includes(project.status)) && (
                        <div className="space-y-8 mt-10">
                            <Card className={`text-center py-16 bg-gradient-to-b border shadow-2xl rounded-3xl ${project.status === 'completed' ? 'from-blue-50 border-blue-100' : 'from-emerald-50 border-emerald-100'}`}>
                                <div className="text-7xl mb-6">{project.status === 'completed' ? '🎉' : project.status === 'qa_review' ? '🔎' : '🚀'}</div>
                                <h2 className="text-4xl font-black mb-3 text-slate-900 tracking-tight">
                                    {project.status === 'completed' ? 'האתר שלך באוויר!' : 
                                     project.status === 'qa_review' ? 'האתר בבדיקות איכות אחרונות!' :
                                     'האתר שלך בפיתוח ברגעים אלו!'}
                                </h2>
                                <p className="font-medium text-slate-600 text-lg max-w-lg mx-auto">הצוות עובד על הפרויקט בהתאם ללוחות הזמנים.</p>
                            </Card>

                            <Card className="shadow-lg border-t-4 border-t-gold-500">
                                <div className="flex items-center gap-3 mb-6">
                                    <span className="text-3xl">🛍️</span>
                                    <h2 className="text-2xl font-black text-slate-800">חנות שדרוגים ותחזוקה</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {storeItems.length === 0 ? <p className="text-slate-500 font-medium col-span-2 text-center p-8 bg-slate-50 rounded-xl">החנות תעודכן בקרוב.</p> : storeItems.map(item => (
                                        <div key={item.id} className="border border-slate-200 p-6 rounded-2xl flex flex-col justify-between bg-white hover:shadow-xl hover:-translate-y-1 transition-all">
                                            <div className="mb-6">
                                                <h4 className="font-black text-slate-800 text-xl mb-2">{item.name}</h4>
                                                {item.isMRR && <span className="text-xs bg-gold-100 text-gold-700 font-bold px-3 py-1 rounded-full border border-gold-200">מנוי חודשי</span>}
                                            </div>
                                            <div className="flex justify-between items-end border-t border-slate-100 pt-4">
                                                <span className="text-3xl font-black text-brand-600">₪{item.price}</span>
                                                <Button variant="primary" className="shadow-brand-500/30">בקש שדרוג</Button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AppCore /></ErrorBoundary>);
    </script>
</body>
</html>
