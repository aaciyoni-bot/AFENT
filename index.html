<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZIS WEB - Agency ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        // --- COMPONENTS ---
        const Card = ({ children, className = '' }) => <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
        const Badge = ({ children, color = 'gray' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700', blue: 'bg-blue-50 text-blue-700 border-blue-200', 
                green: 'bg-emerald-50 text-emerald-700 border-emerald-200', yellow: 'bg-amber-50 text-amber-700 border-amber-200',
                purple: 'bg-purple-50 text-purple-700 border-purple-200', red: 'bg-red-50 text-red-700 border-red-200'
            };
            return <span className={`px-3 py-1 rounded-full text-xs font-bold border ${colors[color] || colors.gray}`}>{children}</span>;
        };
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const base = "px-5 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-500/20",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-md shadow-emerald-500/20",
                danger: "bg-red-50 text-red-700 hover:bg-red-100",
                outline: "bg-transparent border-2 border-gray-200 text-gray-700 hover:border-gray-300"
            };
            return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                    <div className="bg-white rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl border border-gray-100">
                        <div className="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🔔</div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">הודעת מערכת</h3>
                        <p className="text-gray-600 mb-6">{message}</p>
                        <Button onClick={onClose} className="w-full">הבנתי, תודה</Button>
                    </div>
                </div>
            );
        };

        // --- SIGNATURE PAD COMPONENT ---
        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
            }, []);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.beginPath();
                ctx.moveTo(clientX - rect.left, clientY - rect.top);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
                onSave(canvasRef.current.toDataURL());
            };

            const clear = (e) => {
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                onSave(null);
            };

            return (
                <div className="border-2 border-dashed border-gray-300 rounded-xl overflow-hidden bg-gray-50 p-2 relative">
                    <div className="absolute top-2 right-2 text-xs font-bold text-gray-400 pointer-events-none">חתום כאן בתוך המסגרת (אצבע/עכבר)</div>
                    <canvas 
                        ref={canvasRef} width={400} height={150} 
                        className="w-full bg-white rounded-lg shadow-inner cursor-crosshair touch-none"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
                    />
                    <button onClick={clear} className="text-xs text-red-500 mt-2 font-medium hover:underline">מחק חתימה ונסה שוב</button>
                </div>
            );
        };

        // --- CONTEXT & DATA ---
        const AppContext = createContext();

        tailwind.config = {
            theme: { extend: { colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' } } } }
        };

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ (להלן "החברה") לבין נותן השירותים הנרשם למערכת (להלן "הפרילנסר").\n\n1. מהות ההתקשרות והיעדר יחסי עובד מעביד\nמוסכם במפורש כי הפרילנסר פועל כקבלן עצמאי ומספק שירותים כנגד חשבונית מס/קבלה כדין. לא מתקיימים ולא יתקיימו יחסי עובד ומעביד בין הצדדים, ואין בהסכם זה כדי להקנות לפרילנסר זכויות סוציאליות כלשהן. הפרילנסר יישא לבדו בכל חבות מס הנובעת מהתקשרות זו.\n\n2. כלים טכנולוגיים והוצאות (מנוי AI)\nהפרילנסר מתחייב להחזיק ולתחזק על חשבונו הבלעדי מנוי חודשי פעיל במערכת/ות בינה מלאכותית (AI) מסחרית מתקדמת (כגון ChatGPT Plus וכדומה), כפי שיוגדר ויידרש מעת לעת על ידי החברה, כתנאי יסוד לביצוע העבודה וקבלת פרויקטים.\n\n3. סודיות, אי-תחרות ואי-הכפשה\n3.1. הפרילנסר מתחייב לשמור בסודיות מוחלטת כל מידע מסחרי, טכנולוגי ולקוחות של החברה.\n3.2. הפרילנסר מתחייב שלא לפנות, לשדל או להציע שירותים ישירות ללקוחות החברה, עמם בא במגע במסגרת עבודתו, במהלך ההתקשרות ולמשך 24 חודשים ממועד סיומה.\n3.3. הפרילנסר מתחייב להימנע מכל אמירה, פרסום או פעולה שיש בהם כדי להכפיש, לפגוע במוניטין או לגרום נזק תדמיתי לחברה.\n\n4. בעלות על לקוחות, קניין רוחני ושותפים (אפיליאציה)\nכל הלקוחות המועברים לפרילנסר דרך המערכת, לרבות פרילנסרים אחרים (אפיליאטורים) שיגויסו על ידו תחת רשת החברה, שייכים לחברה בלבד. קוד המקור, העיצובים והתוצרים שייכים לחברה וללקוח. ברגע סיום ההתקשרות מכל סיבה שהיא, רשת הסוכנים נשארת בבעלות החברה.\n\n5. אחריות על טיב העבודה\nהפרילנסר מתחייב לספק עבודה מקצועית ונטולת תקלות. במקרה של תקלות (באגים) הנובעות מעבודתו, הפרילנסר יתקנם על חשבון זמנו תוך 48 שעות מדרישת החברה.\n\n6. קנס מוסכם\nהפרילנסר מסכים כי הפרה יסודית של סעיף 3 או 4 לעיל, תזכה את החברה בפיצוי מוסכם מראש וללא הוכחת נזק בסך 50,000 ש"ח, וזאת מבלי לפגוע בזכות החברה לתבוע כל סעד אחר על פי דין.`,
            storeProducts: [
                { id: 'prod_1', name: 'עיצוב פרימיום מותאם אישית', price: 800, timeMinutes: 120, isRecurring: false, desc: 'שדרוג עיצוב בסיסי לעיצוב ייחודי עם אנימציות.' },
                { id: 'prod_2', name: 'חבילת SEO מתקדמת', price: 1200, timeMinutes: 180, isRecurring: false, desc: 'מחקר מילות מפתח, אופטימיזציה לתוכן והגדרות סכמה.' },
                { id: 'prod_3', name: 'חבילת ריטיינר VIP (תחזוקה ואחסון)', price: 350, timeMinutes: 0, isRecurring: true, desc: 'אחסון מהיר, גיבוי יומי, ושעת מתכנת בחודש.' }
            ],
            announcements: []
        };

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            // Simulated login persistence
            useEffect(() => {
                const saved = localStorage.getItem('orizis_user');
                if(saved) setCurrentUser(JSON.parse(saved));
            }, []);

            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            const [projects, setProjects] = useState([
                { id: 'P-1001', customerName: 'קפה שרה בע"מ', customerEmail: 'sarah@cafe.com', status: 'paid_waiting_for_brief', paymentAmount: 2500, freelancerId: null, createdAt: Date.now(), brief: null, addons: [], hasSignedAgreement: false },
                { id: 'P-1002', customerName: 'יוסי נדל"ן', customerEmail: 'yossi@realestate.com', status: 'brief_submitted', paymentAmount: 3200, freelancerId: null, createdAt: Date.now(), brief: { businessName: 'יוסי נכסים', audience: 'משקיעים', callToAction: 'השאר פרטים' }, addons: [], hasSignedAgreement: true },
                { id: 'P-1003', customerName: 'טק סטארט', customerEmail: 'info@techstart.co.il', status: 'in_progress', paymentAmount: 4500, freelancerId: 'user_freelancer_1', createdAt: Date.now(), brief: { businessName: 'Tech Start', audience: 'B2B', callToAction: 'Demo' }, addons: [], hasSignedAgreement: true, timerStartedAt: null, timeSpent: 3600, isTimerRunning: false },
                { id: 'P-1004', customerName: 'מסעדת הדגים', customerEmail: 'fish@food.com', status: 'qa_review', paymentAmount: 1800, freelancerId: 'user_freelancer_1', createdAt: Date.now(), brief: { businessName: 'הדג', audience: 'משפחות', callToAction: 'הזמן שולחן' }, addons: [{ id: 'prod_1', name: 'עיצוב פרימיום', price: 800 }], hasSignedAgreement: true, timerStartedAt: null, timeSpent: 14000, isTimerRunning: false }
            ]);

            const [usersList, setUsersList] = useState([
                { uid: 'admin_1', role: 'manager', name: 'מנהל מערכת', email: 'admin@orizis.com', password: '123' },
                { uid: 'user_freelancer_1', role: 'freelancer', name: 'דני (פרילנסר בכיר)', email: 'dani@free.com', password: '123', basePercentage: 60, upsellPercentage: 10, hasSignedAgreement: true, signedAgreementAt: '12/07/2026 09:30:00', signatureData: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=' }, // Dummy base64 for demo
                { uid: 'user_freelancer_2', role: 'freelancer', name: 'רון (ג\'וניור)', email: 'ron@free.com', password: '123', basePercentage: 50, upsellPercentage: 5, teamLeaderId: 'user_freelancer_1', hasSignedAgreement: false },
                { uid: 'user_client_1', role: 'client', name: 'שרה לוי', email: 'sarah@cafe.com', password: '123', projectId: 'P-1001' }
            ]);

            const [systemSettings, setSystemSettings] = useState(initialSettings);

            const login = (email, password) => {
                const user = usersList.find(u => u.email === email && u.password === password);
                if (user) { 
                    setCurrentUser(user); 
                    localStorage.setItem('orizis_user', JSON.stringify(user)); 
                }
                else showAlert('שם משתמש או סיסמה שגויים');
            };
            const logout = () => { 
                setCurrentUser(null); 
                localStorage.removeItem('orizis_user'); 
            };

            const updateProject = (id, updates) => setProjects(projects.map(p => p.id === id ? { ...p, ...updates } : p));
            const updateUser = (uid, updates) => setUsersList(usersList.map(u => u.uid === uid ? { ...u, ...updates } : u));
            const addProject = (project) => setProjects([...projects, { id: `P-${Date.now().toString().slice(-4)}`, ...project }]);
            const addUser = (user) => setUsersList([...usersList, { uid: `user_${Date.now()}`, ...user }]);

            return (
                <AppContext.Provider value={{ currentUser, login, logout, projects, updateProject, addProject, usersList, updateUser, addUser, systemSettings, setSystemSettings, showAlert }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                </AppContext.Provider>
            );
        };

        const formatDuration = (seconds, withSign = false) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${withSign && seconds > 0 ? '+' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        const LoginScreen = () => {
            const { login } = useContext(AppContext);
            const [email, setEmail] = useState('admin@orizis.com');
            const [password, setPassword] = useState('123');

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20">
                        <div className="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500 blur-[120px]"></div>
                        <div className="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-purple-600 blur-[150px]"></div>
                    </div>
                    
                    <Card className="w-full max-w-md p-8 glass-panel border-white/20 shadow-2xl relative z-10 fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black text-gray-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-gray-500 text-sm mt-1 font-medium">Agency Operating System</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); login(email, password); }} className="space-y-5">
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">אימייל</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none" required /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none" required /></div>
                            <Button type="submit" className="w-full py-4 text-lg mt-2">התחבר למערכת</Button>
                        </form>
                        
                        <div className="mt-8 pt-6 border-t border-gray-100">
                            <p className="text-xs text-center text-gray-400 mb-3 font-bold uppercase tracking-wider">גישה מהירה לדמו</p>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={() => {setEmail('admin@orizis.com'); setPassword('123');}} className="text-xs py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium">מנהל</button>
                                <button onClick={() => {setEmail('dani@free.com'); setPassword('123');}} className="text-xs py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium">פרילנסר</button>
                                <button onClick={() => {setEmail('sarah@cafe.com'); setPassword('123');}} className="text-xs py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium">לקוח</button>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, systemSettings, setSystemSettings, addUser, updateUser, showAlert } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
            const [newAnnouncement, setNewAnnouncement] = useState('');
            const [showArchive, setShowArchive] = useState(false);
            const [pendingFreelancerId, setPendingFreelancerId] = useState(null);
            
            // מודל הצגת חתימה
            const [viewingSignature, setViewingSignature] = useState(null);

            const revenue = projects.reduce((sum, p) => sum + p.paymentAmount + p.addons.reduce((a,b)=>a+(b.price||0),0), 0);
            
            let freelancerCosts = 0;
            projects.forEach(p => {
                if(p.freelancerId) {
                    const fl = usersList.find(u => u.uid === p.freelancerId);
                    if(fl) {
                        const baseCost = p.paymentAmount * ((fl.basePercentage || 60) / 100);
                        const upsellCost = p.addons.reduce((a,b)=>a+(b.price||0),0) * ((fl.upsellPercentage || 0) / 100);
                        freelancerCosts += (baseCost + upsellCost);
                        if(fl.teamLeaderId) freelancerCosts += 150;
                    }
                }
            });

            const handleAddUser = (e) => {
                e.preventDefault();
                addUser({ 
                    ...newUser, 
                    basePercentage: newUser.role === 'freelancer' ? Number(newUser.basePercentage || 60) : 0,
                    upsellPercentage: newUser.role === 'freelancer' ? Number(newUser.upsellPercentage || 0) : 0 
                });
                setNewUser({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
                showAlert("המשתמש נוסף בהצלחה!");
            };

            const addAnnouncement = () => {
                if(!newAnnouncement) return;
                setSystemSettings({...systemSettings, announcements: [{id: Date.now(), text: newAnnouncement, date: new Date().toLocaleDateString('he-IL')}, ...systemSettings.announcements]});
                setNewAnnouncement('');
                showAlert("המודעה פורסמה לכל הצוות.");
            };

            const resetPassword = (email) => showAlert(`קישור לאיפוס סיסמה נשלח בהצלחה לכתובת: ${email}`);

            const filteredProjects = projects.filter(p => showArchive ? p.status === 'completed' : p.status !== 'completed');

            return (
                <div className="space-y-8 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <Card className="p-6 bg-gradient-to-br from-brand-600 to-brand-800 text-white border-none"><div className="text-brand-100 font-medium mb-1">הכנסות כוללות</div><div className="text-3xl font-black">₪{revenue.toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">עלויות צוות וסוכנים</div><div className="text-3xl font-black text-red-500">₪{freelancerCosts.toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">רווח גולמי הערכה</div><div className="text-3xl font-black text-emerald-500">₪{(revenue - freelancerCosts).toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">לקוחות פעילים</div><div className="text-3xl font-black text-gray-900">{projects.filter(p=>p.status!=='completed').length}</div></Card>
                    </div>

                    <div className="flex border-b border-gray-200">
                        {['projects', 'users', 'settings'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-3 font-bold text-sm ${activeTab === tab ? 'text-brand-600 border-b-2 border-brand-600' : 'text-gray-500 hover:text-gray-700'}`}>
                                {tab === 'projects' ? 'ניהול פרויקטים' : tab === 'users' ? 'צוות ולקוחות' : 'הגדרות, חוזים וחנות'}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'projects' && (
                        <Card className="overflow-hidden">
                            <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                                <h3 className="font-bold text-gray-800">פרויקטים</h3>
                                <div className="flex items-center gap-2">

        const FreelancerDashboard = () => {
            const { projects, currentUser, updateProject, updateUser, systemSettings, showAlert, usersList } = useContext(AppContext);
            const [now, setNow] = useState(Date.now());
            const [qaState, setQaState] = useState({ mobile: false, form: false, a11y: false, speed: false });
            const [blockerInput, setBlockerInput] = useState({ show: false, project: null, reason: '' });
            
            const [termsAccepted, setTermsAccepted] = useState(false);
            const [signatureData, setSignatureData] = useState(null);
            const [showAgreementModal, setShowAgreementModal] = useState(false);

            useEffect(() => { const interval = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(interval); }, []);

            const handleFreelancerOnboardingSubmit = async (e) => {
                e.preventDefault();
                if(!termsAccepted) return showAlert("חובה לאשר את ההסכם תחילה.");
                if(!signatureData) return showAlert("חובה לחתום בלוח הציור בטרם ההתקדמות.");
                await updateUser(currentUser.uid, { hasSignedAgreement: true, signedAgreementAt: new Date().toLocaleString('he-IL'), signatureData: signatureData });
                showAlert("ברוך הבא לצוות! ההסכם נחתם בהצלחה.");
            };

            if (!currentUser.hasSignedAgreement) {
                return (
                    <div className="max-w-2xl mx-auto mt-10 fade-in">
                        <Card className="p-8 shadow-2xl border-t-4 border-t-brand-600">
                            <div className="text-center mb-8">

                                <p className="text-gray-600 font-medium">כדי להתחיל לקבל פרויקטים, עליך לאשר את הסכם ההתקשרות של הסוכנות.</p>
                            </div>
                            
                            <div className="bg-brand-50 rounded-xl p-5 mb-8 border border-brand-100 flex items-center justify-between">
                                <div><div className="text-brand-900 font-black text-lg">תנאי התגמול שלך:</div><div className="text-brand-700 font-medium text-sm mt-1">אחוז רווח מפרויקט: <span className="font-bold">{currentUser.basePercentage || 60}%</span> | עמלת אפסייל: <span className="font-bold">{currentUser.upsellPercentage || 0}%</span></div></div>
                                <button onClick={()=>setShowAgreementModal(true)} className="px-4 py-2 bg-white text-brand-700 text-sm font-bold rounded-lg shadow-sm hover:shadow">📄 קרא את ההסכם המלא</button>
                            </div>

                            <form onSubmit={handleFreelancerOnboardingSubmit} className="space-y-6">
                                <SignaturePad onSave={(data) => setSignatureData(data)} />
                                <label className="flex items-start gap-3 p-4 bg-gray-50 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-100 transition-colors">
                                    <input type="checkbox" required onChange={e => setTermsAccepted(e.target.checked)} className="mt-1 w-5 h-5 text-brand-600 rounded border-gray-300 focus:ring-brand-500" />
                                    <span className="text-sm font-medium text-gray-700">קראתי את ההסכם המלא, אני מצהיר כי אני פרילנסר עצמאי ואיני דורש יחסי עובד-מעביד. חתימתי מהווה אישור משפטי מחייב לכל סעיפי הסודיות, אי-התחרות, ותנאי השימוש ב-AI.</span>
                                </label>
                                <Button type="submit" className="w-full py-5 text-lg shadow-lg shadow-brand-500/30">חתום והתחל לקבל עבודות</Button>
                            </form>
                        </Card>

                        {showAgreementModal && (
                            <div className="fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                                <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border-t-4 border-gray-800">
                                    <div className="p-5 bg-gray-50 border-b flex justify-between items-center"><h3 className="font-black text-xl text-gray-900 flex items-center gap-2"><span>📄</span> הסכם פרילנסר</h3><button onClick={()=>setShowAgreementModal(false)} className="text-gray-400 font-bold">✕ סגור</button></div>
                                    <div className="p-6 overflow-y-auto flex-1 whitespace-pre-wrap text-sm text-gray-700 leading-relaxed font-medium bg-white custom-scrollbar">
                                        {systemSettings.freelancerAgreementText}
                                    </div>
                                    <div className="p-4 border-t bg-gray-50 flex justify-end"><Button onClick={()=>setShowAgreementModal(false)} className="px-8 shadow-sm">קראתי, סגור חלון</Button></div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const allMyProjects = projects.filter(p => p.freelancerId === currentUser.uid);
            const myProjects = allMyProjects.filter(p => !['completed', 'qa_review'].includes(p.status));
            const completedProjects = allMyProjects.filter(p => p.status === 'completed');

            const myJuniors = usersList.filter(u => u.role === 'freelancer' && u.teamLeaderId === currentUser.uid);
            const completedJuniorProjects = projects.filter(p => p.status === 'completed' && myJuniors.some(j => j.uid === p.freelancerId));
            const affiliateCommissionPerSite = 150; 
            const affiliateEarnings = completedJuniorProjects.length * affiliateCommissionPerSite;

            let totalEarnings = 0;
            let totalBudgetSec = 0;
            let totalSpentSec = 0;

            completedProjects.forEach(p => {
                const base = p.paymentAmount * ((currentUser.basePercentage || 60) / 100);
                const upsells = (p.addons || []).reduce((sum, a) => sum + (a.price || 0), 0);
                const commission = upsells * ((currentUser.upsellPercentage || 0) / 100);
                totalEarnings += (base + commission);

                const baseTime = 12600; 
                const addonsTime = (p.addons || []).reduce((sum, a) => sum + ((a.timeMinutes || 0) * 60), 0);
                totalBudgetSec += (baseTime + addonsTime);
                totalSpentSec += (p.timeSpent || 0);
            });

            const timeDiff = totalBudgetSec - totalSpentSec;
            const isEfficient = timeDiff >= 0;
            
            const toggleTimer = (project) => {
                if(project.isBlocked) return showAlert("הפרויקט חסום! פנה למנהל לשחרור חסימה.");
                if (project.isTimerRunning) {
                    const elapsed = Math.floor((now - project.timerStartedAt) / 1000);
                    updateProject(project.id, { isTimerRunning: false, timeSpent: (project.timeSpent || 0) + elapsed, timerStartedAt: null });
                } else updateProject(project.id, { isTimerRunning: true, timerStartedAt: Date.now() });
            };

            const submitIssueReport = () => {
                if(!blockerInput.reason) return;
                let finalTime = blockerInput.project.timeSpent || 0;
                if(blockerInput.project.isTimerRunning) finalTime += Math.floor((Date.now() - blockerInput.project.timerStartedAt) / 1000);
                
                updateProject(blockerInput.project.id, { 
                    isBlocked: true, blockReason: blockerInput.reason, isTimerRunning: false, timeSpent: finalTime, timerStartedAt: null 
                });
                setBlockerInput({show: false, project: null, reason: ''});
                showAlert("התקלה דווחה למנהל והטיימר נעצר.");
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 mb-2">

                                <div className="text-xs text-gray-400 mt-2 font-medium">על {completedProjects.length} לקוחות שהושלמו.</div>
                            </div>
                            <div className="absolute -right-4 -bottom-4 text-8xl opacity-10">💰</div>
                        </Card>
                        
                        <Card className="bg-gradient-to-br from-purple-900 to-indigo-950 text-white border-none shadow-xl relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="text-purple-300 font-bold mb-1 text-sm flex items-center gap-2"><span>👑</span> פסיבי מרשת סוכנים</div>
                                <div className="text-4xl font-black text-purple-400">₪{affiliateEarnings.toLocaleString()}</div>
                                <div className="text-xs text-purple-300 mt-2 font-medium">מתוך {myJuniors.length} סוכנים תחתייך שסיימו {completedJuniorProjects.length} פרויקטים</div>
                            </div>
                            <div className="absolute -left-4 -bottom-4 text-8xl opacity-10">🕸️</div>
                        </Card>
                        
                        <Card className="bg-white shadow-md flex flex-col justify-center">
                            <div className="text-gray-500 font-bold mb-1 text-sm">סטטוס פרויקטים שלי</div>
                            <div className="flex gap-4 items-end mt-2">
                                <div><span className="text-3xl font-black text-brand-600">{myProjects.length}</span><span className="text-xs text-gray-500 block font-bold">בתור לעבודה</span></div>
                                <div className="w-px h-10 bg-gray-200"></div>
                                <div><span className="text-3xl font-black text-emerald-600">{completedProjects.length}</span><span className="text-xs text-gray-500 block font-bold">הושלמו (QA)</span></div>
                            </div>
                        </Card>

                        <Card className={`shadow-md flex flex-col justify-center ${isEfficient || completedProjects.length===0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
                            <div className={`font-bold mb-1 text-sm ${isEfficient || completedProjects.length===0 ? 'text-emerald-800' : 'text-red-800'}`}>יעילות (Time = Money)</div>
                            <div className={`text-3xl font-black tracking-wider ${isEfficient || completedProjects.length===0 ? 'text-emerald-600' : 'text-red-600'}`} dir="ltr">
                                {completedProjects.length===0 ? '00:00:00' : (isEfficient ? '+' : '-') + formatDuration(Math.abs(timeDiff), true)}
                            </div>
                            <div className={`text-xs mt-1 font-bold ${isEfficient || completedProjects.length===0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                {completedProjects.length===0 ? 'טרם נאספו נתונים.' : isEfficient ? 'מעולה! אתה חוסך זמן ומרוויח.' : 'חריגת זמנים! אתה מפסיד כסף.'}
                            </div>
                        </Card>
                    </div>

                    {systemSettings.announcements && systemSettings.announcements.length > 0 && (
                        <div className="bg-gradient-to-r from-brand-50 to-purple-50 border border-brand-100 rounded-2xl p-5 mb-8 shadow-sm">
                            <h3 className="font-black text-brand-900 mb-3 flex items-center gap-2"><span>📣</span> עדכוני חברה והטבות</h3>
                            <div className="space-y-3">
                                {systemSettings.announcements.map(a => (
                                    <div key={a.id} className="bg-white/80 p-3 rounded-lg border border-white text-sm text-gray-800 font-medium">
                                        <span className="text-brand-500 font-bold ml-2">{a.date} |</span> {a.text}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        {myProjects.map(project => {
                            let currentSpent = project.timeSpent || 0;
                            if (project.isTimerRunning) currentSpent += Math.floor((now - project.timerStartedAt) / 1000);
                            
                            let totalAllowed = 12600; 
                            (project.addons || []).forEach(a => totalAllowed += (a.timeMinutes * 60));
                            
                            const isOvertime = currentSpent > totalAllowed;

                            return (
                                <Card key={project.id} className={`border-t-4 flex flex-col relative overflow-hidden ${project.isBlocked ? 'border-t-red-500' : project.isTimerRunning ? 'border-t-brand-500 shadow-xl scale-[1.01] transition-transform' : 'border-t-gray-300'}`}>
                                    {project.isBlocked && <div className="absolute top-0 left-0 w-full h-full bg-red-50/80 z-10 flex flex-col items-center justify-center backdrop-blur-sm"><div className="text-4xl mb-2">🛑</div><h3 className="text-xl font-black text-red-700">הפרויקט חסום</h3><p className="font-bold text-red-900 mt-1">{project.blockReason}</p><p className="text-sm mt-4 font-medium">ממתין לשחרור ע"י המנהל</p></div>}
                                    
                                    <div className="p-6 flex-1 flex flex-col">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-xl font-black text-gray-900">{project.customerName}</h3>
                                                <div className="text-sm text-gray-500 font-medium mt-1">ID: {project.id}</div>
                                            </div>
                                            <div className={`px-4 py-2 rounded-xl text-center border-2 ${project.isTimerRunning ? 'bg-brand-50 border-brand-200 text-brand-700' : isOvertime ? 'bg-red-50 border-red-200 text-red-700' : 'bg-gray-50 border-gray-200 text-gray-700'}`}>
                                                <div className="text-xs font-bold mb-1">{isOvertime ? 'חריגת זמנים!' : 'זמן עבודה'}</div>
                                                <div className="font-mono text-2xl font-black tracking-wider" dir="ltr">{formatDuration(currentSpent)}</div>
                                                <div className="text-xs mt-1 font-medium opacity-80">מתוך {formatDuration(totalAllowed)}</div>
                                            </div>
                                        </div>

                                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 flex-1 mb-6">
                                            <div className="font-bold text-gray-800 mb-3 flex items-center gap-2"><span>📋</span> פרטי אפיון והוראות</div>
                                            <div className="grid grid-cols-2 gap-4 text-sm mb-4">
                                                <div><span className="text-gray-500 block text-xs">שם העסק:</span><span className="font-medium">{project.brief?.businessName || '-'}</span></div>
                                                <div><span className="text-gray-500 block text-xs">קהל יעד:</span><span className="font-medium">{project.brief?.audience || '-'}</span></div>
                                            </div>
                                            {project.addons && project.addons.length > 0 && (
                                                <div className="border-t border-gray-200 pt-3 mt-3">
                                                    <span className="text-xs font-bold text-brand-600 uppercase tracking-wider block mb-2">⭐ תוספות לפיתוח (אפסייל):</span>
                                                    <div className="flex flex-wrap gap-2">{project.addons.map(a => <span key={a.id} className="bg-brand-100 text-brand-800 text-xs px-2 py-1 rounded-md font-medium">{a.name}</span>)}</div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex gap-3">
                                            <Button onClick={() => toggleTimer(project)} variant={project.isTimerRunning ? "outline" : "primary"} className="flex-1 text-lg">
                                                {project.isTimerRunning ? '⏸️ השהה פיתוח' : '▶️ התחל / המשך עבודה'}
                                            </Button>
                                            <Button onClick={() => setBlockerInput({show: true, project, reason: ''})} variant="danger" title="דווח על תקלה / חסר חומר" className="px-4">🚨</Button>
                                        </div>
                                    </div>

                                    {/* QA Checklist */}
                                    <div className="bg-gray-900 text-white p-5 border-t border-gray-800">
                                        <div className="text-sm font-bold text-brand-400 mb-3 flex items-center justify-between"><span>צ'ק-ליסט חובה לפני הגשה:</span><span className="text-xs text-gray-400 font-normal">סמן הכל כדי להגיש</span></div>
                                        <div className="grid grid-cols-2 gap-3 mb-4">
                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.mobile} onChange={e=>setQaState({...qaState, mobile: e.target.checked})} /> מותאם 100% למובייל</label>
                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.form} onChange={e=>setQaState({...qaState, form: e.target.checked})} /> טפסים נשלחים תקין</label>
                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.a11y} onChange={e=>setQaState({...qaState, a11y: e.target.checked})} /> הוספת תוסף נגישות</label>
                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.speed} onChange={e=>setQaState({...qaState, speed: e.target.checked})} /> אופטימיזציה לתמונות</label>
                                        </div>
                                        <Button 
                                            onClick={() => {
                                                let finalTime = currentSpent;
                                                updateProject(project.id, { status: 'qa_review', isTimerRunning: false, timeSpent: finalTime, timerStartedAt: null });
                                                setQaState({ mobile: false, form: false, a11y: false, speed: false });
                                                showAlert("האתר הוגש למנהל לבדיקת QA!");
                                            }}
                                            disabled={!(qaState.mobile && qaState.form && qaState.a11y && qaState.speed) || project.isTimerRunning}
                                            className="w-full bg-emerald-600 hover:bg-emerald-500 text-white disabled:bg-gray-700 disabled:text-gray-500 border-none"
                                        >
                                            🚀 הגש לבקרת איכות (QA)
                                        </Button>
                                    </div>
                                </Card>
                            );
                        })}
                    </div>

                    {blockerInput.show && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-red-600 mb-2">דיווח על חסימה/עיכוב</h3>
                                <p className="text-sm text-gray-600 mb-4">הטיימר ייעצר מיד והפרויקט יעבור לטיפול מנהל.</p>
                                <textarea className="w-full p-3 border rounded-xl mb-4" rows="3" placeholder="מה תוקע אותך? (למשל: חסר לוגו, אין גישה לשרת...)" value={blockerInput.reason} onChange={e=>setBlockerInput({...blockerInput, reason: e.target.value})}></textarea>
                                <div className="flex gap-2">
                                    <Button onClick={submitIssueReport} variant="danger" className="flex-1">עצור טיימר ודווח</Button>
                                    <Button onClick={()=>setBlockerInput({show: false, project: null, reason: ''})} variant="secondary">ביטול</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, updateProject, systemSettings, showAlert } = useContext(AppContext);
            const project = projects.find(p => p.id === currentUser.projectId);
            const [briefData, setBriefData] = useState({ businessName: '', audience: '', callToAction: '' });

            if (!project) return <div className="text-center p-10 text-gray-500 font-bold">לא נמצא פרויקט. פנה לתמיכה.</div>;

            const isPostLaunch = project.status === 'completed';

            if (isPostLaunch) {
                return (
                    <div className="space-y-8 fade-in">
                        <Card className="bg-gradient-to-r from-gray-900 to-brand-900 text-white p-8 text-center border-none shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                            <h2 className="text-3xl font-black mb-2 relative z-10">האתר שלך באוויר! 🚀</h2>
                            <p className="text-brand-100 font-medium relative z-10">ברוך הבא לאזור הניהול והצמיחה של העסק שלך.</p>
                        </Card>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <Card className="p-6 text-center"><div className="text-gray-500 font-bold mb-2">כניסות החודש (הערכה)</div><div className="text-4xl font-black text-brand-600">1,248</div></Card>
                            <Card className="p-6 text-center"><div className="text-gray-500 font-bold mb-2">לידים שנאספו</div><div className="text-4xl font-black text-emerald-600">42</div></Card>
                            <Card className="p-6 bg-brand-50 border-brand-200">
                                <h3 className="font-black text-brand-900 mb-2">תוכנית שותפים (Referral)</h3>
                                <p className="text-xs text-brand-700 mb-3">שלח את הלינק לחבר. אם הוא סוגר אתר - אתה מקבל חודשיים אחסון חינם!</p>
                                <div className="bg-white p-2 rounded border border-brand-200 text-center font-mono text-xs text-gray-500 select-all">orizis.com/ref/{currentUser.uid}</div>
                            </Card>
                        </div>

                        <Card className="p-6">
                            <h3 className="font-bold text-gray-900 mb-4 text-xl">ניהול ריטיינר ותחזוקה (MRR)</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="border border-gray-200 rounded-xl p-5 hover:border-brand-500 transition-colors">
                                    <div className="font-black text-lg mb-1">חבילת Basic</div>
                                    <div className="text-gray-500 text-sm mb-4">אחסון מאובטח, תעודת SSL וגיבוי שבועי.</div>
                                    <div className="text-2xl font-black text-brand-600 mb-4">₪150 <span className="text-sm text-gray-500 font-medium">/ חודש</span></div>
                                    <Button className="w-full text-sm">הזן אשראי לתשלום חודשי</Button>
                                </div>
                                <div className="border-2 border-brand-500 bg-brand-50 rounded-xl p-5 relative overflow-hidden">
                                    <div className="absolute top-3 left-3 bg-brand-500 text-white text-[10px] font-bold px-2 py-1 rounded">מומלץ</div>
                                    <div className="font-black text-lg mb-1">חבילת VIP</div>
                                    <div className="text-gray-500 text-sm mb-4">הכל כולל עדכוני תוכן (עד שעה בחודש).</div>
                                    <div className="text-2xl font-black text-brand-600 mb-4">₪350 <span className="text-sm text-gray-500 font-medium">/ חודש</span></div>
                                    <Button className="w-full text-sm">בחר בחבילת VIP</Button>
                                </div>
                            </div>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto space-y-8 fade-in">
                    <Card className="text-center p-8">
                        <h2 className="text-2xl font-black text-gray-900 mb-2">שלום, {currentUser.name}!</h2>
                        <p className="text-gray-600 font-medium">אנחנו מתרגשים להתחיל. בוא נצא לדרך.</p>
                        
                        <div className="flex justify-center items-center mt-8 px-4">
                            <div className="flex flex-col items-center relative z-10"><div className="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold shadow-lg shadow-emerald-500/30">✓</div><span className="text-xs mt-2 font-bold text-gray-700">תשלום</span></div>
                            <div className="flex-1 h-1 bg-emerald-500 -mx-2"></div>
                            <div className="flex flex-col items-center relative z-10"><div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg ${project.status !== 'paid_waiting_for_brief' ? 'bg-emerald-500 text-white shadow-emerald-500/30' : 'bg-brand-600 text-white shadow-brand-500/30'}`}>{project.status !== 'paid_waiting_for_brief' ? '✓' : '2'}</div><span className="text-xs mt-2 font-bold text-gray-700">אפיון</span></div>
                            <div className={`flex-1 h-1 -mx-2 ${project.status !== 'paid_waiting_for_brief' ? 'bg-emerald-500' : 'bg-gray-200'}`}></div>
                            <div className="flex flex-col items-center relative z-10"><div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${['in_progress', 'qa_review'].includes(project.status) ? 'bg-brand-600 text-white shadow-lg shadow-brand-500/30' : 'bg-gray-200 text-gray-500'}`}>3</div><span className="text-xs mt-2 font-bold text-gray-700">פיתוח</span></div>
                        </div>
                    </Card>

                    {project.status === 'paid_waiting_for_brief' && (
                        <Card className="p-6">
                            <h3 className="text-xl font-bold text-gray-900 mb-6">שלב 2: שאלון אפיון מהיר</h3>
                            <form onSubmit={(e) => { e.preventDefault(); updateProject(project.id, { status: 'brief_submitted', brief: briefData }); showAlert("האפיון נשלח בהצלחה לצוות הפיתוח!"); }} className="space-y-5">
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">שם העסק / המותג</label><input type="text" required className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.businessName} onChange={e=>setBriefData({...briefData, businessName: e.target.value})} /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">מי קהל היעד שלך?</label><input type="text" required className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.audience} onChange={e=>setBriefData({...briefData, audience: e.target.value})} /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">מה הפעולה המרכזית שתרצה שגולש יעשה?</label><input type="text" required placeholder="למשל: השארת פרטים, רכישה..." className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.callToAction} onChange={e=>setBriefData({...briefData, callToAction: e.target.value})} /></div>
                                <div className="mt-6 pt-4 border-t border-gray-200">
                                    <label className="flex items-start gap-3 p-4 bg-emerald-50 border border-emerald-200 rounded-xl cursor-pointer">
                                        <input type="checkbox" required className="mt-1 w-5 h-5 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500" />
                                        <span className="text-sm font-bold text-emerald-900">אני מאשר את תקנון האתר ותנאי ההתקשרות כפי שהוגדרו (חתימה דיגיטלית).</span>
                                    </label>
                                </div>
                                <Button type="submit" className="w-full py-4 text-lg mt-4">שלח אפיון והתחל פיתוח</Button>
                            </form>
                        </Card>
                    )}

                    {['brief_submitted', 'in_progress', 'qa_review'].includes(project.status) && (
                        <Card className="bg-brand-50 border-brand-200 p-8 text-center">
                            <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">👨‍💻</div>
                            <h3 className="text-xl font-black text-brand-900 mb-2">הצוות שלנו עובד על האתר שלך!</h3>
                            <p className="text-brand-700 font-medium">קיבלנו את החומרים והפיתוח יצא לדרך. נעדכן אותך ברגע שיהיה מוכן לבדיקה.</p>
                        </Card>
                    )}
                </div>
            );
        };

        const App = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden">
                    <aside className="w-64 bg-slate-900 text-white flex flex-col hidden md:flex border-l border-slate-800 z-20">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-2xl font-black tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="text-xs text-slate-400 mt-1 font-medium tracking-widest uppercase">Agency ERP</div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <a href="#" className="flex items-center gap-3 px-4 py-3 bg-brand-600/10 text-brand-400 rounded-xl font-bold transition-colors"><span className="text-xl">📊</span> דשבורד ראשי</a>
                        </nav>
                        <div className="p-4 border-t border-slate-800 bg-slate-950/50">
                            <div className="flex items-center gap-3 mb-4 px-2">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center font-black text-lg shadow-lg">{currentUser.name.charAt(0)}</div>
                                <div>
                                    <div className="text-sm font-bold text-white">{currentUser.name}</div>
                                    <div className="text-xs text-slate-400 font-medium">{currentUser.role === 'manager' ? 'מנהל מערכת' : currentUser.role === 'freelancer' ? 'צוות פיתוח' : 'לקוח VIP'}</div>
                                </div>
                            </div>
                            <Button onClick={logout} variant="outline" className="w-full border-slate-700 text-slate-300 hover:bg-slate-800 hover:text-white text-xs py-2">התנתק מהמערכת</Button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white/80 backdrop-blur-md border-b border-gray-200 p-4 lg:p-6 flex justify-between items-center z-10 sticky top-0">
                            <div>
                                <h1 className="text-2xl font-black text-gray-900">
                                    {currentUser.role === 'manager' ? 'ניהול סוכנות (Admin)' : currentUser.role === 'freelancer' ? 'סביבת עבודה' : 'פורטל לקוח'}
                                </h1>
                                <p className="text-sm text-gray-500 font-medium mt-1">
                                    {new Date().toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </p>
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar relative">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
