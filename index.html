<body class="text-gray-900 selection:bg-brand-100 selection:text-brand-600">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Card = ({ children, className = '', noPadding = false }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-gray-200 transition-shadow hover:shadow-md ${noPadding ? '' : 'p-6 md:p-8'} ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 active:scale-[0.98]";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-600/20 focus:ring-brand-500/30",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200/50",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/20 focus:ring-emerald-500/30",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-100/50",
                outline: "bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-100",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-md shadow-amber-500/20"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'gray', className='' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700 border-gray-200',
                blue: 'bg-blue-50 text-brand-600 border-blue-200',
                green: 'bg-emerald-50 text-emerald-600 border-emerald-200',
                yellow: 'bg-amber-50 text-amber-600 border-amber-200',
                red: 'bg-red-50 text-red-600 border-red-200',
                purple: 'bg-purple-50 text-purple-600 border-purple-200'
            };
            return (
                <span className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border ${colors[color]} ${className}`}>
                    {children}
                </span>
            );
        };

        const formatDuration = (totalSeconds, forcePositive = false) => {
            if (!totalSeconds) return "00:00:00";
            const absSeconds = Math.abs(totalSeconds);
            const h = Math.floor(absSeconds / 3600);
            const m = Math.floor((absSeconds % 3600) / 60);
            const s = Math.floor(absSeconds % 60);
            const formatted = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (!forcePositive && totalSeconds < 0) return "-" + formatted;
            return formatted;
        };

        const defaultAgreementText = `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ ח.פ 516977758 הפועלת באמצעות מותג ORIZISWEB שתיקרא להלן החברה לבין הלקוח המזמין את השירותים דרך פורטל הלקוחות הדיגיטלי שייקרא להלן הלקוח.\n\n1. מהות ההתקשרות ותכולת העבודה\nהחברה תספק ללקוח שירותי פיתוח ועיצוב בהתאם למידע שסופק.\n\n2. לוחות זמנים ומסירת הפרויקט\nזמן האספקה המשוער הוא עד 14 ימי עסקים אלא אם נרכש שירות אקספרס (מוחרג שבתות וחגים).\n\n3. סבבי תיקונים\nהלקוח זכאי ל-5 סבבי תיקונים במסגרת האפיון המקורי. חריגה מעבר לכך תתומחר בנפרד.\n\n4. תשלומים ותוספות\nהתשלום בגין הפיתוח מתבצע מראש. שדרוגים מתוך החנות יחויבו בנפרד.\n\n5. אחריות\nניתנת תקופת אחריות של 30 ימים לתיקון באגים לאחר המסירה.`;

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: '' });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            // Dialog state variables to avoid native alerts
            const [globalAlert, setGlobalAlert] = useState(null);
            const [globalConfirm, setGlobalConfirm] = useState(null);

            const showAlert = (message) => setGlobalAlert(message);
            const askConfirm = (message, onConfirm) => setGlobalConfirm({ message, onConfirm });

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            else auth.signOut();
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                        setIsLoadingDb(false);
                    }
                });

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (!data.agreementText) data.agreementText = defaultAgreementText;
                        
                        if (!data.upsells || data.upsells.length === 0) {
                            const initialUpsells = [
                                { id: '1', title: 'כפתור וואטסאפ צף', price: 100, icon: '💬', isPremium: false, isRecurring: false, desc: 'חיבור מהיר לוואטסאפ של העסק.', timeMinutes: 10 },
                                { id: '2', title: 'הטמעת מפת הגעה', price: 100, icon: '🗺️', isPremium: false, isRecurring: false, desc: 'הטמעת מפת גוגל באתר.', timeMinutes: 10 },
                                { id: '3', title: 'תוסף נגישות לאתר', price: 150, icon: '♿', isPremium: false, isRecurring: false, desc: 'הנגשת האתר כחוק לפי התקן.', timeMinutes: 5 },
                                { id: '4', title: 'חיבור גוגל אנליטיקס', price: 150, icon: '📊', isPremium: false, isRecurring: false, desc: 'סטטיסטיקות ונתוני גלישה.', timeMinutes: 15 },
                                { id: '5', title: 'תקנון ותנאי שימוש', price: 150, icon: '⚖️', isPremium: false, isRecurring: false, desc: 'הטמעת עמוד משפטי בסיסי.', timeMinutes: 15 },
                                { id: '6', title: 'חיבור דומיין אישי', price: 0, icon: '🌐', isPremium: false, isRecurring: false, desc: 'חיבור לכתובת שרכשת.', timeMinutes: 15 },
                                { id: '10', title: 'פופ-אפ כרטיס גירוד', price: 1000, icon: '🎟️', isPremium: true, isRecurring: false, desc: 'משחק אינטראקטיבי להשארת לידים.', timeMinutes: 45 },
                                { id: '11', title: 'גלגל המזל (רולטה)', price: 1200, icon: '🎡', isPremium: true, isRecurring: false, desc: 'פופ-אפ שקופץ לגולש ומעודד אותו להשאיר פרטים.', timeMinutes: 60 },
                                { id: '16', title: 'תחזוקה ואחסון חודשי', price: 150, icon: '🛡️', isPremium: true, isRecurring: true, desc: 'אחסון מהיר, אבטחה וגיבויים יומיים.', timeMinutes: 0 }
                            ];
                            db.collection('settings').doc('general').update({ upsells: initialUpsells });
                            data.upsells = initialUpsells;
                        }
                        setSystemSettings(data);
                    } else {
                        db.collection('settings').doc('general').set({
                            upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: defaultAgreementText
                        });
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => await db.collection('projects').doc(projectId).update(updates);
            
            const deleteProject = async (projectId) => {
                await db.collection('projects').doc(projectId).delete();
            };

            const updateSettings = async (updates) => await db.collection('settings').doc('general').update(updates);
            const updateUser = async (userId, updates) => await db.collection('users').doc(userId).update(updates);

            const deleteUser = async (userId) => {
                const userProjects = projects.filter(p => p.clientId === userId);
                for (const p of userProjects) { await db.collection('projects').doc(p.id).delete(); }
                await db.collection('users').doc(userId).delete();
            };

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, isLoadingDb, showAlert, askConfirm }}>
                    {children}
                    
                    {}
                    {globalAlert && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border-t-4 border-brand-500">
                                <div className="text-4xl mb-4">🔔</div>
                                <h3 className="text-xl font-black text-gray-900 mb-2">הודעת מערכת</h3>
                                <p className="text-gray-600 mb-6 font-medium">{globalAlert}</p>
                                <Button className="w-full" onClick={() => setGlobalAlert(null)}>הבנתי, סגור</Button>
                            </div>
                        </div>
                    )}

                    {globalConfirm && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border-t-4 border-brand-500">
                                <h3 className="text-xl font-black text-gray-900 mb-2 flex items-center justify-center gap-2"><span>⚠️</span> אישור פעולה</h3>
                                <p className="text-gray-600 mb-6 font-medium">{globalConfirm.message}</p>
                                <div className="flex gap-3 justify-center">
                                    <Button variant="outline" onClick={() => setGlobalConfirm(null)}>ביטול</Button>
                                    <Button variant="primary" onClick={() => { globalConfirm.onConfirm(); setGlobalConfirm(null); }}>אישור</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); setLoading(true);
                try { 
                    // Persistent login (Remember me)
                    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                    await auth.signInWithEmailAndPassword(email, password); 
                } 
                catch (err) { setError("פרטי ההתחברות שגויים. פנה למנהל."); } 
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-200">
                    <Card className="w-full max-w-md p-10 relative shadow-2xl bg-white border-white/50 glass-panel fade-in">
                        <div className="text-center mb-10 logo-reveal">
                            <h1 className="text-4xl font-black tracking-tighter text-gray-900">ORIZIS<span className="text-brand-600 text-glow">WEB</span></h1>
                            <p className="text-gray-500 font-medium mt-2 tracking-widest text-xs uppercase">Enterprise Access</p>
                        </div>
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl font-bold text-center border border-red-100">{error}</div>}
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div className="slide-up-stagger delay-1"><label className="block text-sm font-bold mb-1">אימייל</label><input type="email" onChange={e => setEmail(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 focus:ring-brand-500 focus:border-brand-500 transition-colors" dir="ltr" required /></div>
                            <div className="slide-up-stagger delay-2"><label className="block text-sm font-bold mb-1">סיסמה</label><input type="password" onChange={e => setPassword(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 focus:ring-brand-500 focus:border-brand-500 transition-colors" dir="ltr" required /></div>
                            <div className="slide-up-stagger delay-3"><Button type="submit" disabled={loading} className="w-full py-4 text-base mt-4 shadow-xl shadow-brand-500/20">{loading ? 'מאמת נתונים...' : 'כניסה למערכת'}</Button></div>
                        </form>
                    </Card>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const initCanvas = () => {
                    const parent = canvas.parentElement;
                    canvas.width = parent.clientWidth;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                };
                initCanvas();
                window.addEventListener('resize', initCanvas);
                return () => window.removeEventListener('resize', initCanvas);
            }, []);

            const getCoordinates = (event) => {
                const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect(); const evt = event.nativeEvent || event;
                if (evt.touches && evt.touches.length > 0) return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            };

            const startDrawing = (event) => { const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true); };
            const draw = (event) => { if (!isDrawing) return; const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
            const stopDrawing = () => { if (isDrawing) { setIsDrawing(false); onSave(canvasRef.current.toDataURL('image/png')); } };
            const clearPad = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); onSave(null); };

            return (
                <div className="border-2 border-gray-300 rounded-xl overflow-hidden bg-white shadow-inner mb-6">
                    <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 text-sm font-bold text-gray-700 flex justify-between items-center">
                        <span>✍️ צייר את חתימתך (עכבר/אצבע):</span>
                        <button type="button" onClick={clearPad} className="text-red-500 hover:text-red-700 text-xs font-bold bg-white px-3 py-1 rounded-lg border transition-colors">נקה</button>
                    </div>
                    <canvas ref={canvasRef} className="w-full touch-none cursor-crosshair bg-white" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject, showAlert } = useContext(AppContext);
            
            const [onboardingData, setOnboardingData] = useState({ officialName: '', idNumber: '', address: '', termsAccepted: false, signatureData: null });
            const [showContractModal, setShowContractModal] = useState(false);
            const [briefData, setBriefData] = useState({ businessName: '', phone: '', businessType: '', audience: '', services: '', callToAction: '' });
            const [checkoutModal, setCheckoutModal] = useState(false);
            
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return <div className="text-center p-12 bg-white rounded-3xl mt-10 shadow-sm border border-gray-200"><h2 className="text-2xl font-black mb-2 text-gray-400">אין פרויקט פעיל במערכת</h2><p className="font-medium text-gray-500">פנה למנהל הסטודיו לפתיחת התיק שלך.</p></div>;

            const handleOnboardingSubmit = (e) => {
                e.preventDefault();
                if(!onboardingData.termsAccepted) return showAlert("חובה לאשר את החוזה תחילה.");
                if(!onboardingData.signatureData) return showAlert("חובה לחתום בלוח הציור בטרם ההתקדמות.");
                updateProject(project.id, { status: 'paid_waiting_for_brief', clientOfficialDetails: { ...onboardingData, signedAt: new Date().toLocaleString('he-IL') } });
            };

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { status: 'brief_submitted', briefInfo: briefData });
                showAlert("האפיון נשלח בהצלחה! צוות הפיתוח יכול להתחיל לעבוד.");
            };

            const purchaseUpsell = (upsell) => {
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, { addons: [...currentAddons, upsell], paymentAmount: (project.paymentAmount || 0) + upsell.price });
                showAlert(`"${upsell.title}" התווסף בהצלחה לסל שלך.`);
            };

            if (project.status === 'completed') {
                return (
                    <div className="space-y-8 fade-in">
                        <div className="bg-brand-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                            <h2 className="text-3xl font-black mb-2">שלום, {currentUser.name}! 🚀</h2>

            const [activeTab, setActiveTab] = useState('projects');

                    const userData = { role: newUser.role, name: newUser.name, email: newUser.email, basePay: newUser.role==='freelancer'?1000:0, upsellPercentage: 0 };
                    await db.collection('users').doc(cred.user.uid).set(userData);
                    if (newUser.role === 'client') await db.collection('projects').add({ customerName: newUser.name, status: 'onboarding', paymentAmount: 1500, timeSpent: 0, budgetSeconds: 12600, isTimerRunning: false, isBlocked: false, addons: [], clientId: cred.user.uid, revisionCount: 0 });
                    await secondaryApp.auth().signOut(); 
                    showAlert('המשתמש נוצר בהצלחה!'); 
                    setNewUser({ email: '', password: '', name: '', role: 'client' });

                                    <div><label className="text-xs font-bold text-gray-500">שם מלא</label><input type="text" required onChange={e=>setNewUser({...newUser, name: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-blue-500 transition-colors" /></div>
                                    <div><label className="text-xs font-bold text-gray-500">אימייל</label><input type="email" required dir="ltr" onChange={e=>setNewUser({...newUser, email: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-blue-500 transition-colors" /></div>
                                    <div><label className="text-xs font-bold text-gray-500">סיסמה זמנית (6 תווים לפחות)</label><input type="text" required dir="ltr" onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-blue-500 transition-colors" /></div>
                                    <div><label className="text-xs font-bold text-gray-500">הרשאה (תפקיד)</label>
                                        <select onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl font-bold bg-white focus:ring-blue-500 transition-colors">
                                            <option value="client">לקוח הסטודיו (יפתח לו פרויקט אוטומטית)</option>
                                            <option value="freelancer">פרילנסר בצוות הפיתוח</option>
                                            <option value="manager">מנהל מערכת ראשי</option>
                                        </select>
                                    </div>
                                    <Button type="submit" className="w-full py-4 shadow-lg">צור משתמש חדש</Button>
                                </form>
                            </Card>
                            <Card noPadding className="border-t-4 border-t-gray-800 flex flex-col h-full shadow-md">
                                <div className="p-6 border-b bg-gray-50"><h3 className="text-xl font-black text-gray-900">רשימת משתמשים וצוות</h3></div>
                                <div className="max-h-[500px] overflow-y-auto custom-scrollbar">
                                    <table className="w-full text-right text-sm">
                                        <tbody className="divide-y divide-gray-100">
                                            {usersList.map(u => (
                                                <tr key={u.uid} className="hover:bg-gray-50 transition-colors">
                                                    <td className="p-4 align-top">
                                                        <div className="font-bold text-gray-900">{u.name}</div>
                                                        <div className="text-xs text-gray-500 font-sans mt-1">{u.email}</div>
                                                    </td>
                                                    <td className="p-4 align-top"><Badge color={u.role==='manager'?'purple':u.role==='freelancer'?'blue':'gray'}>{u.role}</Badge></td>
                                                    <td className="p-4 flex flex-col gap-2">
                                                        <button onClick={async () => {
                                                            try { await auth.sendPasswordResetEmail(u.email); showAlert('נשלח מייל איפוס סיסמה למשתמש בהצלחה!'); }
                                                            catch(e) { showAlert('שגיאה בשליחת המייל לאיפוס סיסמה.'); }
                                                        }} className="text-blue-600 bg-blue-50 px-3 py-2 rounded-lg text-xs font-bold border border-blue-200 hover:bg-blue-100 w-full transition-colors shadow-sm">📧 שלח איפוס סיסמה</button>
                                                        
                                                        {u.role !== 'manager' && (
                                                            <button onClick={() => askConfirm(`האם למחוק לחלוטין את ${u.name}? (פרויקטים המשויכים אליו יימחקו גם כן!)`, () => deleteUser(u.uid))} className="text-red-600 bg-red-50 px-3 py-2 rounded-lg text-xs font-bold border border-red-200 hover:bg-red-100 w-full transition-colors shadow-sm">🗑️ מחק משתמש ונתונים</button>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="space-y-8">
                            <Card className="border-t-4 border-t-purple-500 shadow-md">
                                <h3 className="text-xl font-black mb-2 text-purple-900 flex items-center gap-2"><span className="text-2xl">⚖️</span> עריכת חוזה התקשרות (יופיע ללקוח)</h3>
                                <p className="text-sm text-gray-500 mb-4 font-medium">טקסט זה יוצג ללקוח בפורטל שלו. חתימתו על מסך הציור תהווה הסכמה חוקית לכל סעיף הכתוב מטה.</p>
                                <textarea rows="10" value={agreementInput} onChange={(e) => setAgreementInput(e.target.value)} className="w-full p-5 border border-gray-300 rounded-xl bg-gray-50 text-sm focus:ring-purple-500 focus:border-purple-500 transition-colors custom-scrollbar"></textarea>
                                <Button onClick={() => { updateSettings({ agreementText: agreementInput }); showAlert('נוסח החוזה עודכן בהצלחה.'); }} className="mt-4 bg-purple-600 hover:bg-purple-700 py-3 px-8 shadow-md">שמור חוזה ללקוחות הבאים</Button>
                            </Card>

                            <Card noPadding className="border-t-4 border-t-brand-500 shadow-md">
                                <div className="p-6 bg-gray-50 border-b"><h3 className="text-xl font-black text-gray-900 flex items-center gap-2"><span className="text-2xl">🛒</span> ניהול מוצרי חנות (Upsells) ותקציבי זמן</h3></div>
                                <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-4 h-max sticky top-6">
                                        <h4 className="font-bold border-b pb-2 text-brand-900">{editingUpsell ? '✏️ עריכת מוצר קיים' : '➕ הוספת מוצר חדש'}</h4>
                                        <div><label className="text-xs font-bold text-gray-600 mb-1 block">שם המוצר</label><input type="text" value={editingUpsell ? editingUpsell.title : newUpsell.title} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, title: e.target.value}) : setNewUpsell({...newUpsell, title: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 transition-colors focus:ring-brand-500" /></div>
                                        <div className="flex gap-3">
                                            <div className="flex-1"><label className="text-xs font-bold text-gray-600 mb-1 block">מחיר (₪)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.price : newUpsell.price} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, price: e.target.value}) : setNewUpsell({...newUpsell, price: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 transition-colors focus:ring-brand-500" /></div>
                                            <div className="flex-1"><label className="text-xs font-bold text-gray-600 mb-1 block">זמן (דקות לטיימר)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.timeMinutes : newUpsell.timeMinutes} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, timeMinutes: e.target.value}) : setNewUpsell({...newUpsell, timeMinutes: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 transition-colors focus:ring-brand-500" /></div>
                                            <div className="w-16"><label className="text-xs font-bold text-gray-600 mb-1 block">אייקון</label><input type="text" value={editingUpsell ? editingUpsell.icon : newUpsell.icon} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, icon: e.target.value}) : setNewUpsell({...newUpsell, icon: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 text-center text-xl transition-colors focus:ring-brand-500" /></div>
                                        </div>
                                        <div><label className="text-xs font-bold text-gray-600 mb-1 block">תיאור שיווקי (יופיע ללקוח)</label><textarea rows="3" value={editingUpsell ? editingUpsell.desc : newUpsell.desc} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, desc: e.target.value}) : setNewUpsell({...newUpsell, desc: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 transition-colors focus:ring-brand-500"></textarea></div>
                                        <div className="flex flex-col gap-3 mt-2 bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-inner">
                                            <label className="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" checked={editingUpsell ? editingUpsell.isPremium : newUpsell.isPremium} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isPremium: e.target.checked}) : setNewUpsell({...newUpsell, isPremium: e.target.checked})} className="w-5 h-5 text-brand-600 rounded focus:ring-brand-500" /> מוצר פרימיום (זהב)</label>
                                            <label className="flex items-center gap-3 text-sm font-bold cursor-pointer"><input type="checkbox" checked={editingUpsell ? editingUpsell.isRecurring : newUpsell.isRecurring} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isRecurring: e.target.checked}) : setNewUpsell({...newUpsell, isRecurring: e.target.checked})} className="w-5 h-5 text-brand-600 rounded focus:ring-brand-500" /> תשלום חודשי קבוע (MRR)</label>
                                        </div>
                                        <Button onClick={() => handleSaveUpsell(!editingUpsell)} className="w-full py-3 shadow-md">{editingUpsell ? 'שמור שינויים' : 'הוסף לחנות'}</Button>
                                        {editingUpsell && <Button onClick={() => setEditingUpsell(null)} variant="outline" className="w-full border-gray-300">ביטול עריכה</Button>}
                                    </div>
                                    <div className="lg:col-span-2 space-y-3 max-h-[700px] overflow-y-auto pr-2 custom-scrollbar">
                                        {systemSettings.upsells.map(u => (
                                            <div key={u.id} className={`flex flex-col sm:flex-row justify-between p-5 rounded-2xl border transition-colors ${u.isRecurring?'bg-purple-50 border-purple-200':u.isPremium?'bg-amber-50 border-amber-200':'bg-white hover:bg-gray-50 border-gray-200'} shadow-sm gap-4`}>
                                                <div>
                                                    <div className="font-black text-lg flex items-center flex-wrap gap-2">
                                                        <span className="text-2xl">{u.icon}</span> {u.title} 
                                                        <span className={`px-2 py-1 rounded text-sm ${u.price === 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-brand-100 text-brand-800'}`}>{u.price===0?'חינם':`₪${u.price}`}{u.isRecurring?' / חודש':''}</span>
                                                        <span className="text-purple-700 bg-purple-100 px-2 py-1 rounded text-xs font-bold">+ {u.timeMinutes} דק' טיימר</span>
                                                    </div>
                                                    <div className="text-sm text-gray-600 mt-2 font-medium">{u.desc}</div>
                                                </div>
                                                <button onClick={() => setEditingUpsell(u)} className="text-sm font-bold bg-white border border-gray-300 hover:bg-gray-100 px-4 py-2 rounded-xl self-start sm:self-center shrink-0 transition-colors shadow-sm">✏ ערוך מוצר</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}

                    {}
                    {viewBriefModal && (
                        <div className="fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden border-t-8 border-gray-800">
                                <div className="flex justify-between items-center p-6 bg-gray-50 border-b"><h3 className="font-black text-2xl text-gray-900">📋 תיק לקוח ומעקב התקדמות</h3><button onClick={() => setViewBriefModal(null)} className="px-5 py-2.5 bg-white border border-gray-300 rounded-xl font-bold hover:bg-gray-100 transition-colors shadow-sm">✕ סגור תיק</button></div>
                                <div className="p-6 overflow-y-auto space-y-6 custom-scrollbar">
                                    
                                    <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200 flex flex-col sm:flex-row justify-between text-xs font-bold text-gray-400 gap-3 relative shadow-inner">
                                        <div className={`flex items-center gap-2 z-10 bg-gray-50 pr-2 ${viewBriefModal.status !== 'onboarding' ? 'text-emerald-600' : 'text-brand-600 animate-pulse'}`}><span className={`w-6 h-6 flex items-center justify-center rounded-full text-white ${viewBriefModal.status !== 'onboarding' ? 'bg-emerald-500' : 'bg-brand-500'}`}>{viewBriefModal.status !== 'onboarding' ? '✓' : '1'}</span> חוזה פרטים</div>
                                        <div className={`flex items-center gap-2 z-10 bg-gray-50 px-2 ${['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='paid_waiting_for_brief'?'text-brand-600 animate-pulse':''}`}><span className={`w-6 h-6 flex items-center justify-center rounded-full text-white ${['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? 'bg-emerald-500' : viewBriefModal.status==='paid_waiting_for_brief'?'bg-brand-500':'bg-gray-300'}`}>{['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? '✓' : '2'}</span> אפיון</div>
                                        <div className={`flex items-center gap-2 z-10 bg-gray-50 pl-2 ${['qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='in_progress'?'text-brand-600 animate-pulse':''}`}><span className={`w-6 h-6 flex items-center justify-center rounded-full text-white ${['qa_review','completed'].includes(viewBriefModal.status) ? 'bg-emerald-500' : viewBriefModal.status==='in_progress'?'bg-brand-500':'bg-gray-300'}`}>{['qa_review','completed'].includes(viewBriefModal.status) ? '✓' : '3'}</span> פיתוח</div>
                                        <div className="absolute top-1/2 left-4 right-4 h-0.5 bg-gray-200 -translate-y-1/2 hidden sm:block"></div>
                                    </div>
                                    
                                    <div className="text-center font-bold text-sm bg-blue-50 text-blue-800 p-4 rounded-xl border border-blue-100 shadow-sm">
                                        {viewBriefModal.status === 'onboarding' && '⏳ ממתין שהלקוח יחתום על החוזה ויאשר פרטים...'}
                                        {viewBriefModal.status === 'paid_waiting_for_brief' && '📝 הלקוח חתם, ממתין למילוי טופס אפיון (ניתן ליזום שיחה ולשייך לפרילנסר שיימכור).'}
                                        {viewBriefModal.status === 'in_progress' && '💻 פרויקט נמצא כרגע בפיתוח אצל הצוות.'}
                                        {viewBriefModal.status === 'qa_review' && '🚀 פיתוח הסתיים, ממתין לבדיקתך ואישורך!'}
                                    </div>

                                    {viewBriefModal.clientOfficialDetails ? (
                                        <div className="bg-emerald-50 border border-emerald-200 p-6 rounded-2xl shadow-inner">
                                            <div className="font-black text-emerald-900 text-lg border-b border-emerald-200 pb-2 mb-4">מסמך חתום ומאושר <span dir="ltr" className="text-sm font-normal bg-emerald-100 px-2 py-1 rounded ml-2">{viewBriefModal.clientOfficialDetails.signedAt}</span></div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-emerald-900 text-sm">
                                                <div className="bg-white/70 p-3 rounded-lg border border-emerald-100"><strong className="block text-emerald-700 mb-1">שם לחשבונית:</strong> {viewBriefModal.clientOfficialDetails.officialName}</div>
                                                <div className="bg-white/70 p-3 rounded-lg border border-emerald-100"><strong className="block text-emerald-700 mb-1">ח.פ / עוסק מורשה:</strong> {viewBriefModal.clientOfficialDetails.idNumber}</div>
                                            </div>
                                            {viewBriefModal.clientOfficialDetails.signatureData && (
                                                <div className="mt-6 pt-4 border-t border-emerald-200">
                                                    <strong className="block text-emerald-900 mb-2">חתימה גרפית (אלקטרונית):</strong>
                                                    <div className="bg-white rounded-xl border border-gray-200 p-2 inline-block shadow-sm">
                                                        <img src={viewBriefModal.clientOfficialDetails.signatureData} alt="חתימה" className="h-28 object-contain" />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ) : <div className="p-12 bg-gray-50 rounded-2xl text-center font-bold text-gray-400 border-2 border-dashed border-gray-200">הלקוח טרם חתם על מסמכי התקשרות.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);
            if (isLoadingDb) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin w-12 h-12 border-4 border-brand-600 border-t-transparent rounded-full shadow-lg"></div></div>;
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-gray-100/50">
                    <header className="md:hidden bg-brand-950 text-white px-6 py-4 flex justify-between items-center sticky top-0 z-30 shadow-md">
                        <h1 className="text-xl font-black logo-reveal">ORIZIS<span className="text-brand-500 text-glow">WEB</span></h1>
                        <button onClick={logout} className="text-xs font-bold text-white/70 bg-white/10 hover:bg-white/20 transition-colors px-3 py-2 rounded-lg">התנתק</button>
                    </header>
                    <aside className="w-72 bg-brand-950 text-white hidden md:flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-8 border-b border-white/10 logo-reveal"><h1 className="text-3xl font-black">ORIZIS<span className="text-brand-500 text-glow">WEB</span></h1><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Enterprise Agency OS</p></div>
                        <div className="flex-1 p-6"></div>
                        <div className="p-6 border-t border-white/10 bg-black/20 slide-up-stagger delay-2">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center font-black text-xl uppercase shadow-lg ring-2 ring-white/20">{currentUser.name ? currentUser.name.charAt(0) : 'U'}</div>
                                <div><div className="text-sm font-black">{currentUser.name || currentUser.email}</div><div className="text-[11px] text-brand-300 font-bold mt-1 bg-brand-900/50 px-2 py-0.5 rounded inline-block">{currentUser.role === 'manager' ? 'הנהלת סוכנות' : currentUser.role === 'client' ? 'לקוח הסטודיו' : 'צוות פיתוח'}</div></div>
                            </div>
                            <button onClick={logout} className="w-full bg-white/5 text-gray-300 font-bold text-sm py-3 rounded-xl hover:bg-red-500/20 hover:text-red-300 transition-colors border border-white/5">יציאה מהמערכת</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-4 sm:p-6 md:p-10 overflow-y-auto h-[calc(100vh-70px)] md:h-screen custom-scrollbar slide-up-stagger delay-1">
                        <div className="max-w-6xl mx-auto pb-20">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
