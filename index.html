        const Card = ({ children, className = '' }) => <div className={`bg-white rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-100 ${className}`}>{children}</div>;
        
        const Badge = ({ children, color = 'gray' }) => {
            const colors = {
                gray: 'bg-slate-100 text-slate-700 border-slate-200', blue: 'bg-brand-50 text-brand-700 border-brand-200', 
                green: 'bg-emerald-50 text-emerald-700 border-emerald-200', yellow: 'bg-amber-50 text-amber-700 border-amber-200',
                purple: 'bg-indigo-50 text-indigo-700 border-indigo-200', red: 'bg-rose-50 text-rose-700 border-rose-200'

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button', title }) => {
            const base = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2";

        const AlertModal = ({ isOpen, message, onClose }) => {

                    </div>

        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x, y); ctx.stroke();
            };

            const stopDrawing = () => { if(isDrawing) { setIsDrawing(false); onSave(canvasRef.current.toDataURL()); } };
            const clear = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); onSave(null); };

            useEffect(() => {
                const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            }, []);

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl overflow-hidden bg-white hover:border-brand-400 transition-colors shadow-sm">
                    <div className="bg-slate-50 p-3.5 text-xs font-bold text-slate-500 border-b border-slate-200 flex justify-between items-center">
                        <span className="flex items-center gap-2 text-slate-700">✍️ צייר חתימה כאן (עכבר או אצבע)</span>
                        <button type="button" onClick={clear} className="text-rose-500 hover:text-rose-700 bg-rose-50 px-3 py-1.5 rounded-lg border border-rose-100 transition-colors">נקה חתימה</button>
                    </div>
                    <canvas ref={canvasRef} width={600} height={200} className="w-full touch-none cursor-crosshair bg-white"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                </div>
            );
        };

        const AppContext = createContext();

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ (להלן "החברה") לבין נותן השירותים הנרשם למערכת (להלן "הפרילנסר").\n\n1. מהות ההתקשרות והיעדר יחסי עובד מעביד\nמוסכם במפורש כי הפרילנסר פועל כקבלן עצמאי ומספק שירותים כנגד חשבונית מס/קבלה כדין. לא מתקיימים ולא יתקיימו יחסי עובד ומעביד בין הצדדים.\n\n2. הכשרה, אספקת לקוחות וציוד עבודה\n2.1. החברה תספק לפרילנסר הכשרה מקצועית ואספקת פרויקטים באופן שוטף.\n2.2. הפרילנסר מתחייב לעבוד עם ציוד אישי שלו (מחשב נייד/נייח) על חשבונו הבלעדי. עם זאת, ישנה אפשרות לעבוד מתוך משרדי החברה ולקבל עמדת עבודה מסודרת בעלות מסובסדת, וזאת בתיאום מראש בלבד.\n\n3. תגמול ובונוס הבאת לקוחות\n3.1. התגמול עבור פרויקט שיסופק על ידי החברה יעמוד על אחוזים מהפרויקט כפי שיוגדרו אישית במערכת.\n3.2. לקוחות שהפרילנסר מביא בעצמו (בונוס ייזום אישי), יזכו אותו ב-5% עמלה נוספים.\n\n4. כלים טכנולוגיים (מנוי AI)\nהפרילנסר מתחייב להחזיק מנוי פעיל למערכת בינה מלאכותית, כתנאי הכרחי לביצוע עבודה מול החברה.\n\n5. בעלות על לקוחות, קוד מקור ורשת שותפים (אפיליאציה)\nכל הלקוחות (לרבות לקוחות שהפרילנסר הביא בעצמו), קוד המקור, והתוצרים - שייכים לחברה בלבד. כל הפרילנסרים וסוכני-המשנה שגייס תחתיו, שייכים לחברה. בעת עזיבה מכל סיבה שהיא, רשת הסוכנים נשארת בבעלות מלאה של החברה והפרילנסר מוותר על כל טענה בעניין זה.\n\n6. סודיות ואי-תחרות\nהפרה יסודית של סעיפי הסודיות או התחרות תזכה את החברה בפיצוי מוסכם מראש בסך 50,000 ש"ח.`,
            clientAgreementText: `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ לבין הלקוח המזמין.\nחתימה דיגיטלית בטופס (לרבות ציור חתימה וסימון התיבה) כמוה כהסכם מחייב לכל דבר ועניין.\n\n1. החברה תספק שירותי פיתוח ועיצוב בהתאם לאפיון שיוזן.\n2. הלקוח מתחייב להעביר את כל החומרים (לוגו, טקסטים, תמונות) בזמן.\n3. זכויות קניין רוחני יעברו ללקוח רק לאחר פירעון מלוא התשלום.\n4. החברה מספקת 30 ימי אחריות על העבודה לאחר מסירתה הסופית.\n5. ביטול עסקה: כיוון שמדובר בפיתוח מותאם אישית, ביטול העסקה יגרור חיוב יחסי בגין העבודה שבוצעה עד רגע הביטול.`,
            announcements: []
        };

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('orizis_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [systemSettings, setSystemSettings] = useState(initialSettings);
            const [isLoading, setIsLoading] = useState(true);

            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            useEffect(() => {
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    const users = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(users);
                    if (currentUser && currentUser.uid !== 'admin_master') {
                        const updatedMe = users.find(u => u.uid === currentUser.uid);
                        if (updatedMe) { setCurrentUser(updatedMe); localStorage.setItem('orizis_user', JSON.stringify(updatedMe)); }
                    }
                }, err => console.error("Users sync error:", err));

                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, err => console.error("Projects sync error:", err));

                const unsubSettings = db.collection('system').doc('settings').onSnapshot(doc => {
                    if (doc.exists) setSystemSettings(doc.data());
                    setIsLoading(false);
                }, err => { console.error("Settings error:", err); setIsLoading(false); });

                return () => { unsubUsers(); unsubProjects(); unsubSettings(); };
            }, []);

            const login = (email, password) => {
                const inputEmail = String(email).toLowerCase().trim();
                const inputPassword = String(password).trim();
                
                // --- MASTER KEY (You will never be locked out) ---
                if (inputEmail === 'aaci.yoni@gmail.com' && inputPassword === '123') {
                    const masterAdmin = { uid: 'admin_master', role: 'manager', name: 'יוני (מנהל ראשי)', email: 'aaci.yoni@gmail.com' };
                    setCurrentUser(masterAdmin); localStorage.setItem('orizis_user', JSON.stringify(masterAdmin)); return; 
                }

                const user = usersList.find(u => String(u.email).toLowerCase().trim() === inputEmail && String(u.password).trim() === inputPassword);
                if (user) { setCurrentUser(user); localStorage.setItem('orizis_user', JSON.stringify(user)); } 
                else { showAlert('שם משתמש או סיסמה שגויים. (אם אתה מנהל, השתמש במייל שלך ובסיסמה 123)'); }
            };

            const logout = () => { setCurrentUser(null); localStorage.removeItem('orizis_user'); };

            const updateProject = (id, updates) => db.collection('projects').doc(id).update(updates);
            const updateUser = (uid, updates) => db.collection('users').doc(uid).update(updates);
            
            const addProject = (project) => {
                const id = `P-${Date.now().toString().slice(-4)}`;
                db.collection('projects').doc(id).set({ id, isSelfSourced: false, status: 'paid_waiting_for_brief', ...project });
                return id;
            };
            const addUser = (user) => {
                const uid = `user_${Date.now()}`;
                db.collection('users').doc(uid).set({ uid, ...user });
            };

            const deleteProject = (id) => { db.collection('projects').doc(id).delete(); showAlert("הפרויקט נמחק בהצלחה ממסד הנתונים."); };
            const deleteUser = (uid) => { db.collection('users').doc(uid).delete(); showAlert("המשתמש נמחק בהצלחה."); };
            const saveSystemSettings = (newSettings) => db.collection('system').doc('settings').set(newSettings, { merge: true });

            if (isLoading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-brand-400 font-bold text-xl">טוען נתונים מהענן...</div>;

            return (
                <AppContext.Provider value={{ currentUser, login, logout, projects, updateProject, addProject, deleteProject, usersList, updateUser, addUser, deleteUser, systemSettings, setSystemSettings: saveSystemSettings, showAlert }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                </AppContext.Provider>
            );
        };

        const formatDuration = (seconds, withSign = false) => {
            const h = Math.floor(seconds / 3600); const m = Math.floor((seconds % 3600) / 60);
            return `${withSign && seconds > 0 ? '+' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        const LoginScreen = () => {
            const { login } = useContext(AppContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20">
                        <div className="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500 blur-[120px]"></div>
                        <div className="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-indigo-600 blur-[150px]"></div>
                    </div>
                    
                    <Card className="w-full max-w-md p-10 glass-panel border-white/20 shadow-2xl relative z-10 fade-in rounded-3xl">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black text-slate-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-slate-500 text-sm mt-2 font-bold tracking-widest uppercase">Agency ERP</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); login(email, password); }} className="space-y-6">
                            <div>
                                <label className="block text-sm font-black text-slate-700 mb-2">אימייל התחברות</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@domain.com" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition-all font-medium text-slate-800" required />
                            </div>
                            <div>
                                <label className="block text-sm font-black text-slate-700 mb-2">סיסמה</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition-all font-medium text-slate-800" required />
                            </div>
                            <Button type="submit" className="w-full py-4 text-lg mt-4 shadow-xl font-black tracking-wide">היכנס למערכת</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, deleteProject, systemSettings, setSystemSettings, addUser, updateUser, deleteUser, showAlert, addProject } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
            const [newAnnouncement, setNewAnnouncement] = useState('');
            const [showArchive, setShowArchive] = useState(false);
            const [pendingFreelancerId, setPendingFreelancerId] = useState({}); 
            const [viewingSignature, setViewingSignature] = useState(null); 
            const [viewingClientSignature, setViewingClientSignature] = useState(null); 
            const [showAddProjectModal, setShowAddProjectModal] = useState(false);
            const [newProjectData, setNewProjectData] = useState({ customerName: '', customerEmail: '', paymentAmount: '' });

            const revenue = projects.reduce((sum, p) => sum + (Number(p.paymentAmount) || 0) + (p.addons || []).reduce((a,b)=>a+(b.price||0),0), 0);
            let freelancerCosts = 0;
            projects.forEach(p => {
                if(p.freelancerId) {
                    const fl = usersList.find(u => u.uid === p.freelancerId);
                    if(fl) {
                        const bonusPct = p.isSelfSourced ? 5 : 0;
                        const baseCost = (Number(p.paymentAmount) || 0) * (((fl.basePercentage || 60) + bonusPct) / 100);
                        const upsellCost = (p.addons || []).reduce((a,b)=>a+(b.price||0),0) * ((fl.upsellPercentage || 0) / 100);
                        freelancerCosts += (baseCost + upsellCost);
                        if(fl.teamLeaderId) freelancerCosts += 150; 
                    }
                }
            });

            const handleAddUser = (e) => {
                e.preventDefault();
                addUser({ ...newUser, basePercentage: newUser.role === 'freelancer' ? Number(newUser.basePercentage || 60) : 0, upsellPercentage: newUser.role === 'freelancer' ? Number(newUser.upsellPercentage || 0) : 0 });
                setNewUser({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
                showAlert("המשתמש נוצר בהצלחה!");
            };

            const handleAddProject = (e) => {
                e.preventDefault();
                const newProjectId = addProject({ customerName: newProjectData.customerName, customerEmail: newProjectData.customerEmail, paymentAmount: Number(newProjectData.paymentAmount), freelancerId: null, createdAt: Date.now(), addons: [], hasSignedAgreement: false });
                addUser({ name: newProjectData.customerName, email: newProjectData.customerEmail, password: '123', role: 'client', projectId: newProjectId });
                setShowAddProjectModal(false); setNewProjectData({ customerName: '', customerEmail: '', paymentAmount: '' });
                showAlert("הלקוח נוצר בהצלחה! נשלחו אליו פרטי התחברות.");
            };

            const addAnnouncement = () => {
                if(!newAnnouncement) return;
                setSystemSettings({...systemSettings, announcements: [{id: Date.now().toString(), text: newAnnouncement, date: new Date().toLocaleDateString('he-IL')}, ...(systemSettings.announcements || [])]});
                setNewAnnouncement(''); showAlert("המודעה פורסמה לצוות.");
            };

            const filteredProjects = projects.filter(p => showArchive ? p.status === 'completed' : p.status !== 'completed');

            return (
                <div className="space-y-8 fade-in max-w-7xl mx-auto w-full">
                    {/* Top Stats Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <Card className="p-6 bg-gradient-to-br from-brand-600 to-brand-800 text-white border-none shadow-xl shadow-brand-500/20">

                                <div className="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-2xl text-slate-900 flex items-center gap-3"><span className="text-emerald-500">✅</span> הסכם חתום</h3>
                                    <button onClick={() => { setViewingSignature(null); setViewingClientSignature(null); }} className="text-slate-400 font-bold hover:text-slate-700 p-2 bg-slate-200/50 rounded-lg transition-colors">✕ סגור</button>
                                </div>
                                <div className="p-8 overflow-y-auto flex-1 bg-white custom-scrollbar">
                                    <div className="mb-6 p-4 bg-emerald-50 text-emerald-800 rounded-xl border border-emerald-200 flex justify-between items-center shadow-sm">
                                        <div className="font-black">נחתם דיגיטלית במערכת</div>
                                        <div className="text-sm font-bold bg-white px-3 py-1.5 rounded-lg border border-emerald-100 shadow-sm">{viewingSignature ? viewingSignature.signedAgreementAt : viewingClientSignature.clientSignedAt}</div>
                                    </div>
                                    <div className="whitespace-pre-wrap text-sm text-slate-700 leading-relaxed bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 font-medium shadow-inner">
                                        {viewingSignature ? systemSettings.freelancerAgreementText : systemSettings.clientAgreementText}
                                    </div>
                                    <div className="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center bg-slate-50">
                                        <div className="text-sm font-black text-slate-500 mb-6 uppercase tracking-wider">אישור וחתימת המשתמש</div>
                                        {(viewingSignature ? viewingSignature.signatureData : viewingClientSignature.clientSignatureData) ? (
                                            <img src={viewingSignature ? viewingSignature.signatureData : viewingClientSignature.clientSignatureData} alt="חתימה" className="max-h-32 mx-auto mix-blend-multiply drop-shadow-md" />
                                        ) : <div className="text-rose-500 font-bold bg-rose-50 p-3 rounded-lg border border-rose-100 inline-block">לא נמצאה תמונת חתימה</div>}
                                    </div>
                                </div>
                                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end">
                                    <Button onClick={() => { setViewingSignature(null); setViewingClientSignature(null); }} className="px-8 py-3 shadow-sm">סגור מסמך משפטי</Button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="space-y-6 max-w-4xl mx-auto w-full">
                            <Card className="p-8 shadow-md">
                                <h3 className="font-black text-slate-900 mb-6 flex items-center gap-3 text-xl"><span>📢</span> לוח מודעות (לצוות הפרילנסרים)</h3>
                                <div className="flex gap-4">
                                    <input type="text" placeholder="עדכונים שוטפים..." className="flex-1 p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-brand-500 font-medium" value={newAnnouncement} onChange={e=>setNewAnnouncement(e.target.value)} />
                                    <Button onClick={addAnnouncement} className="px-8 shadow-md">פרסם לצוות</Button>
                                </div>
                                {systemSettings.announcements && systemSettings.announcements.length > 0 && (
                                    <div className="mt-8 space-y-3">
                                        {systemSettings.announcements.map(a => <div key={a.id} className="text-sm text-slate-700 bg-slate-50 p-4 rounded-xl border border-slate-200 font-medium"><span className="font-black text-brand-600 ml-3 bg-brand-50 px-2.5 py-1 rounded-md border border-brand-100">{a.date}</span> {a.text}</div>)}
                                    </div>
                                )}
                            </Card>
                            <Card className="p-8 shadow-md">
                                <h3 className="font-black text-slate-900 mb-2 text-xl">🤝 הסכם פרילנסר / קבלן</h3>
                                <p className="text-sm text-slate-500 mb-6 font-medium">טקסט זה יוצג וידרוש חתימה מכל סוכן/פרילנסר חדש שנכנס למערכת.</p>
                                <textarea className="w-full p-6 border border-slate-200 rounded-2xl h-80 text-sm font-medium bg-slate-50 outline-none focus:bg-white focus:border-brand-500 transition-colors custom-scrollbar leading-relaxed" value={systemSettings.freelancerAgreementText} onChange={(e) => setSystemSettings({...systemSettings, freelancerAgreementText: e.target.value})} />
                            </Card>
                            <Card className="p-8 shadow-md">
                                <h3 className="font-black text-slate-900 mb-2 text-xl">🤝 הסכם לקוח (שירותי פיתוח)</h3>
                                <p className="text-sm text-slate-500 mb-6 font-medium">טקסט זה יוצג וידרוש חתימה מהלקוח טרם תחילת העבודה.</p>
                                <textarea className="w-full p-6 border border-slate-200 rounded-2xl h-80 text-sm font-medium bg-slate-50 outline-none focus:bg-white focus:border-brand-500 transition-colors custom-scrollbar leading-relaxed" value={systemSettings.clientAgreementText} onChange={(e) => setSystemSettings({...systemSettings, clientAgreementText: e.target.value})} />
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden text-right" dir="rtl">
                    {/* Sidebar */}
                    <aside className="w-72 bg-slate-900 text-white flex flex-col hidden lg:flex shadow-2xl z-20">
                        <div className="p-8 border-b border-slate-800 bg-slate-900">
                            <h1 className="text-3xl font-black tracking-tight flex items-center gap-2">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="text-xs text-slate-400 mt-2 font-bold tracking-[0.2em] uppercase">Agency ERP</div>
                        </div>
                        <nav className="flex-1 p-6 space-y-3">
                            <div className="flex items-center gap-4 px-5 py-4 bg-brand-600/20 text-brand-300 rounded-2xl font-black border border-brand-500/30 shadow-inner"><span className="text-2xl">📊</span> דשבורד ראשי</div>
                        </nav>
                        <div className="p-6 border-t border-slate-800 bg-slate-950/50">
                            <div className="flex items-center gap-4 mb-6 px-2">
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center font-black text-xl shadow-lg border-2 border-brand-300/30">{currentUser.name.charAt(0)}</div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-base font-black text-white truncate">{currentUser.name}</div>
                                    <div className="text-xs text-brand-300 font-bold tracking-widest mt-0.5">{currentUser.role === 'manager' ? '(מנהל ראשי)' : currentUser.role === 'freelancer' ? 'צוות פיתוח' : 'לקוח VIP'}</div>
                                </div>
                            </div>
                            <Button onClick={logout} variant="outline" className="w-full border-slate-700 text-slate-300 hover:bg-slate-800 hover:text-white hover:border-slate-600 text-sm py-3 font-bold transition-all bg-transparent shadow-none">התנתק מהמערכת</Button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
                        <header className="bg-white/90 backdrop-blur-md border-b border-slate-200 p-5 lg:px-10 lg:py-6 flex justify-between items-center z-10 shadow-sm sticky top-0">
                            <div className="w-full flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-black text-slate-900 tracking-tight">{currentUser.role === 'manager' ? 'ניהול סוכנות (Admin)' : currentUser.role === 'freelancer' ? 'סביבת עבודה ופיתוח' : 'פורטל לקוחות'}</h1>
                                    <p className="text-sm text-slate-500 font-bold mt-2 flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse shadow-lg shadow-emerald-500/50"></span>{new Date().toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                                <div className="lg:hidden flex items-center gap-4">
                                    <Button onClick={logout} variant="secondary" className="text-xs py-2 px-4 font-bold">התנתק</Button>
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 lg:p-10 custom-scrollbar"><div className="pb-20">{currentUser.role === 'manager' && <AdminDashboard />}</div></div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
