<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "afent-8d50d",
            databaseURL: "https://afent-8d50d.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.ReactContext = React.createContext();

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useContext, useRef } = React;
        const AppContext = window.ReactContext;
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const db = getFirestore();

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const base = "px-5 py-2.5 rounded-xl font-bold transition-all duration-200 flex items-center justify-center gap-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md hover:shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-md shadow-rose-500/30",
                outline: "border-2 border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50"
            };
            return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Badge = ({ children, color = 'slate' }) => {
            const colors = {
                slate: 'bg-slate-100 text-slate-700 border-slate-200',
                brand: 'bg-brand-50 text-brand-700 border-brand-200',
                emerald: 'bg-emerald-50 text-emerald-700 border-emerald-200',
                amber: 'bg-amber-50 text-amber-700 border-amber-200',
                rose: 'bg-rose-50 text-rose-700 border-rose-200',
                purple: 'bg-purple-50 text-purple-700 border-purple-200'
            };
            return <span className={`px-3 py-1 rounded-full text-xs font-bold border ${colors[color]}`}>{children}</span>;
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-3xl p-6 shadow-sm border border-slate-100 ${className}`}>{children}</div>
        );

        // Custom Modals to replace standard alert/confirm
        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-8 text-center shadow-2xl border border-slate-100">
                        <div className="w-16 h-16 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl shadow-inner">🔔</div>
                        <h3 className="text-xl font-black text-slate-900 mb-3">הודעת מערכת</h3>
                        <p className="text-slate-600 mb-8 font-medium">{message}</p>
                        <Button onClick={onClose} className="w-full py-3.5 text-base">הבנתי, תודה</Button>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, message, onConfirm, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-8 text-center shadow-2xl border border-slate-100">
                        <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl shadow-inner">⚠️</div>
                        <h3 className="text-xl font-black text-slate-900 mb-3">אימות פעולה</h3>
                        <p className="text-slate-600 mb-8 font-medium">{message}</p>
                        <div className="flex gap-3">
                            <Button onClick={onClose} variant="secondary" className="flex-1 py-3">ביטול</Button>
                            <Button onClick={() => { onConfirm(); onClose(); }} variant="danger" className="flex-1 py-3">אשר ובצע</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailsModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                        <div className="sticky top-0 bg-white/80 backdrop-blur-md p-6 border-b border-slate-100 flex justify-between items-center z-10">
                            <h2 className="text-2xl font-black text-slate-800">{title}</h2>
                            <button onClick={onClose} className="w-10 h-10 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full flex items-center justify-center transition-colors text-xl font-bold">&times;</button>
                        </div>
                        <div className="p-8">{children}</div>
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#0f172a';
                
                const resize = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = 200;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                };
                window.addEventListener('resize', resize);
                resize();
                return () => window.removeEventListener('resize', resize);
            }, []);

            const startDrawing = (e) => {
                setIsDrawing(true);
                draw(e);
            };
            const stopDrawing = () => setIsDrawing(false);
            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
            };
            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
            };

            return (
                <div className="space-y-4">
                    <canvas 
                        ref={canvasRef} className="signature-pad w-full"
                        onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing}
                        onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
                    />
                    <div className="flex gap-3">
                        <Button onClick={clear} variant="outline" className="flex-1">מחק חתימה</Button>
                        <Button onClick={() => onSave(canvasRef.current.toDataURL('image/png'))} variant="primary" className="flex-1">אשר ושמור חתימה</Button>
                    </div>
                </div>
            );
        };

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ לבין נותן השירותים.\n\n1. פועל כקבלן עצמאי, איש מכירות ומפתח.\n2. התחייבות לעבודה עם ציוד אישי (מחשב) ורישיון AI פעיל (כגון ChatGPT).\n3. כל הלקוחות והסוכנים שייכים למערכת ולחברה בלבד.\n4. החברה תספק עבודה. בונוס יזמות 5% יוענק לפרילנסר שהביא לקוח.\n5. קנס על הפרת סודיות: 50,000 ש"ח.`,
            clientAgreementText: `הסכם פיתוח ושירותי אינטרנט - אוריזיס\n\n1. החברה תספק את השירותים כפי שהוגדרו באפיון.\n2. פיתוח יתחיל לאחר תשלום מלא.\n3. זכויות היוצרים עוברות ללקוח בגמר חשבון.`,
            announcement: `ברוכים הבאים למערכת החדשה של אוריזיס!`,
            products: [
                { id: 'prod_1', name: 'הנגשת אתר (תוסף חוקי)', price: 0 },
                { id: 'prod_2', name: 'כפתור וואטסאפ צף', price: 0 },
                { id: 'prod_3', name: 'חיבור דומיין אישי', price: 0 },
                { id: 'prod_4', name: 'אחסון, תחזוקה וגיבוי חודשי', price: 150 }
            ]
        };

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [systemSettings, setSystemSettings] = useState(initialSettings);
            const [isLoading, setIsLoading] = useState(true);

            // Modal States
            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            const [confirmState, setConfirmState] = useState({ isOpen: false, message: '', onConfirm: null });
            const showConfirm = (message, onConfirm) => setConfirmState({ isOpen: true, message, onConfirm });
            const closeConfirm = () => setConfirmState({ isOpen: false, message: '', onConfirm: null });

            useEffect(() => {
                const unsubProjects = onSnapshot(collection(db, "projects"), (snap) => setProjects(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubUsers = onSnapshot(collection(db, "users"), (snap) => setUsersList(snap.docs.map(d => ({uid: d.id, ...d.data()}))));
                
                const fetchSettings = async () => {
                    const docRef = doc(db, "system", "settings");
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) setSystemSettings(docSnap.data());
                    else await setDoc(docRef, initialSettings);
                    setIsLoading(false);
                };
                fetchSettings();

                return () => { unsubProjects(); unsubUsers(); };
            }, []);

            const login = (email, password) => {
                if (email === 'aaci.yoni@gmail.com' && password === '123') {
                    setCurrentUser({ uid: 'master_admin', role: 'manager', name: 'יוני (מנהל ראשי)', email });
                    return true;
                }
                const user = usersList.find(u => u.email === email && u.password === password);
                if (user) { setCurrentUser(user); return true; }
                return false;
            };

            const logout = () => setCurrentUser(null);

            const updateProject = async (id, data) => await updateDoc(doc(db, "projects", id), data);
            const deleteProject = async (id) => await deleteDoc(doc(db, "projects", id));
            
            const addProjectAndClient = async (clientData, initialPayment, freelancerId) => {
                const newUserId = `user_${Date.now()}`;
                const newProjectId = `proj_${Date.now()}`;
                
                await setDoc(doc(db, "users", newUserId), {
                    role: 'client', name: clientData.name, email: clientData.email, password: clientData.password, projectId: newProjectId
                });
                
                await setDoc(doc(db, "projects", newProjectId), {
                    customerName: clientData.name, clientId: newUserId, status: 'paid_waiting_for_brief', paymentAmount: Number(initialPayment), freelancerId: freelancerId || '',
                    brief: '', clientSignature: null, upgrades: [], dateCreated: new Date().toISOString()
                });
            };

            const updateUser = async (id, data) => await updateDoc(doc(db, "users", id), data);
            const addUser = async (userData) => await setDoc(doc(db, "users", `user_${Date.now()}`), userData);
            const deleteUser = async (id) => await deleteDoc(doc(db, "users", id));
            const updateSettings = async (data) => {
                await updateDoc(doc(db, "system", "settings"), data);
                setSystemSettings(data);
            };

            if (isLoading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-brand-400 font-bold text-xl">מתחבר למסד הנתונים...</div>;

            return (
                <AppContext.Provider value={{ currentUser, login, logout, projects, updateProject, addProjectAndClient, deleteProject, usersList, updateUser, addUser, deleteUser, systemSettings, updateSettings, showAlert, showConfirm }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                    <ConfirmModal isOpen={confirmState.isOpen} message={confirmState.message} onConfirm={confirmState.onConfirm} onClose={closeConfirm} />
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const { login, showAlert } = useContext(AppContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (!login(email, password)) showAlert('שם משתמש או סיסמה שגויים. בדוק את האותיות והמספרים.');
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-br from-brand-900 to-slate-900 opacity-90"></div>
                    <Card className="w-full max-w-md relative z-10 shadow-2xl border-none bg-white/95 backdrop-blur-xl p-10">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black text-slate-900 mb-2 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-slate-500 font-medium">הזנת פרטי זיהוי</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">דואר אלקטרוני</label>
                                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-left" dir="ltr" required />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">סיסמה</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-left" dir="ltr" required />
                            </div>
                            <Button type="submit" className="w-full py-4 text-lg mt-4">התחבר למערכת</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, deleteProject, addUser, updateUser, deleteUser, systemSettings, updateSettings, showAlert, showConfirm, addProjectAndClient } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects'); 
            
            // New Client / Project State
            const [newClientData, setNewClientData] = useState({ name: '', email: '', password: '', paymentAmount: '', freelancerId: '' });
            
            // New User State
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'freelancer', password: '', basePercentage: 60, upsellPercentage: 40 });
            
            // Settings State
            const [localSettings, setLocalSettings] = useState(systemSettings);
            const [newProduct, setNewProduct] = useState({ name: '', price: 0 });
            
            const [viewProject, setViewProject] = useState(null);
            const [viewUser, setViewUser] = useState(null);

            const freelancers = usersList.filter(u => u.role === 'freelancer');
            
            // Financial calculations
            const totalRevenue = projects.reduce((sum, p) => sum + p.paymentAmount + (p.upgrades || []).reduce((s, u) => s + u.price, 0), 0);
            const activeProjectsCount = projects.filter(p => p.status !== 'completed').length;
            const freelancersCount = freelancers.length;

            const handleCreateClient = () => {
                if(!newClientData.name || !newClientData.email || !newClientData.password) return showAlert("יש למלא שם לקוח, אימייל וסיסמה");
                addProjectAndClient(newClientData, newClientData.paymentAmount || 0, newClientData.freelancerId);
                showAlert("לקוח ופרויקט הוקמו בהצלחה!");
                setNewClientData({ name: '', email: '', password: '', paymentAmount: '', freelancerId: '' });
            };

            const statusColors = {
                'paid_waiting_for_brief': 'amber', 'brief_submitted': 'brand', 'in_progress': 'purple', 'qa_review': 'brand', 'completed': 'emerald', 'unknown': 'slate'
            };
            const statusText = {
                'paid_waiting_for_brief': 'ממתין לאפיון לקוח', 'brief_submitted': 'אופיין - ממתין לפיתוח', 'in_progress': 'בפיתוח פעיל', 'qa_review': 'בקרת איכות (QA)', 'completed': 'הושלם ונמסר', 'unknown': 'לקוח חדש (טרם הוגדר)'
            };

            return (
                <div className="max-w-7xl mx-auto space-y-8 fade-in">
                    
                    {/* Top Metrics Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="bg-gradient-to-br from-brand-500 to-brand-700 text-white border-none shadow-xl shadow-brand-500/20">
                            <h3 className="text-brand-100 font-medium mb-2">הכנסות כוללות (בסיס + מוצרים)</h3>
                            <p className="text-5xl font-black">₪{totalRevenue.toLocaleString()}</p>
                        </Card>
                        <Card>
                            <h3 className="text-slate-500 font-medium mb-2">פרויקטים בעבודה</h3>
                            <p className="text-5xl font-black text-slate-800">{activeProjectsCount}</p>
                        </Card>
                        <Card>
                            <h3 className="text-slate-500 font-medium mb-2">צוות סוכנים / פרילנסרים</h3>
                            <p className="text-5xl font-black text-slate-800">{freelancersCount}</p>
                        </Card>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex justify-center bg-white rounded-2xl p-2 shadow-sm border border-slate-100 mb-8 inline-flex mx-auto">
                        <button onClick={() => setActiveTab('projects')} className={`px-8 py-3 rounded-xl font-bold transition-all ${activeTab === 'projects' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>🚀 הקמת לקוחות ופרויקטים</button>
                        <button onClick={() => setActiveTab('users')} className={`px-8 py-3 rounded-xl font-bold transition-all ${activeTab === 'users' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>👥 צוות סוכנים</button>
                        <button onClick={() => setActiveTab('settings')} className={`px-8 py-3 rounded-xl font-bold transition-all ${activeTab === 'settings' ? 'bg-brand-50 text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>⚙️ הגדרות, מחירון וחוזים</button>
                    </div>

                    {/* TAB 1: PROJECTS & CLIENTS */}
                    {activeTab === 'projects' && (
                        <div className="space-y-6">
                            <Card className="border-t-4 border-t-brand-500">
                                <h2 className="text-xl font-black mb-6 text-slate-800">הקמת לקוח חדש (פתיחת פרויקט)</h2>
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                                    <div><label className="block text-xs font-bold mb-2 text-slate-600">שם הלקוח / עסק</label><input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" value={newClientData.name} onChange={e=>setNewClientData({...newClientData, name: e.target.value})} placeholder="למשל: חיים כספות" /></div>
                                    <div>
                                        <label className="block text-xs font-bold mb-2 text-slate-600">אימייל (להתחברות הלקוח)</label>
                                        <input type="email" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left" dir="ltr" value={newClientData.email} onChange={e=>setNewClientData({...newClientData, email: e.target.value})} placeholder="client@email.com" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-2 text-slate-600">סיסמה ללקוח</label>
                                        <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-left" dir="ltr" value={newClientData.password} onChange={e=>setNewClientData({...newClientData, password: e.target.value})} placeholder="123456" />
                                    </div>

            const [localBrief, setLocalBrief] = useState(project?.brief || '');
            
            // Payment Modal State for MRR
            const [paymentModalData, setPaymentModalData] = useState({ isOpen: false, amount: 0, reason: '', product: null });

            const handleSignClient = (signatureData) => updateProject(project.id, { clientSignature: signatureData });
            const handleSubmitBrief = () => {
                updateProject(project.id, { brief: localBrief, status: 'brief_submitted' });
                showAlert("האפיון נשלח בהצלחה לצוות הפיתוח!");
            };

            const simulatePayment = () => {
                if(paymentModalData.product) {
                    const currentUpgrades = project.upgrades || [];
                    updateProject(project.id, { upgrades: [...currentUpgrades, paymentModalData.product] });
                    showAlert(`השדרוג ${paymentModalData.product.name} נוסף בהצלחה לאתר שלך!`);
                }
                setPaymentModalData({ isOpen: false, amount: 0, reason: '', product: null });
            };

            if (!project) return <div className="text-center p-10 font-bold">לא נמצא פרויקט מקושר.</div>;

            const isCompleted = project.status === 'completed';

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    
                    {/* Payment Checkout Modal */}
                    {paymentModalData.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[300] p-4 fade-in">
                            <div className="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl border border-slate-100 text-center">
                                <h3 className="text-2xl font-black text-slate-900 mb-2">קופה ותשלום מאובטח</h3>
                                <p className="text-slate-500 mb-6 font-medium">עבור: {paymentModalData.reason}</p>
                                <div className="text-4xl font-black text-brand-600 mb-8">₪{paymentModalData.amount}</div>
                                
                                <div className="space-y-3 mb-6">
                                    <Button onClick={simulatePayment} className="w-full py-4 text-lg justify-between px-6 bg-slate-900 hover:bg-slate-800">
                                        <span>תשלום באשראי</span><span>💳</span>
                                    </Button>
                                    <Button onClick={simulatePayment} className="w-full py-4 text-lg justify-between px-6 bg-white text-slate-900 border-2 border-slate-200 hover:bg-slate-50">
                                        <span>Google Pay</span><span>📱</span>
                                    </Button>
                                    <Button onClick={simulatePayment} variant="secondary" className="w-full py-3 justify-between px-6 text-sm">
                                        <span>העברה בנקאית / מזומן</span><span>🏦</span>
                                    </Button>
                                </div>
                                <button onClick={() => setPaymentModalData({ isOpen: false, amount: 0, reason: '', product: null })} className="text-slate-400 hover:text-slate-600 font-bold text-sm underline">ביטול תשלום</button>
                            </div>
                        </div>
                    )}

                    <Card className="text-center py-10 shadow-lg border-b-4 border-brand-500">
                        <h2 className="text-3xl font-black mb-2 text-slate-800">שלום, {currentUser.name}!</h2>
                        <p className="text-slate-500 font-medium">פורטל הלקוחות הדיגיטלי שלך.</p>
                    </Card>

                    {!project.clientSignature ? (
                        <Card className="shadow-xl">
                            <h3 className="text-xl font-black mb-4 text-slate-800">שלב 1: אישור הסכם פיתוח</h3>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm leading-relaxed text-slate-700 whitespace-pre-wrap font-medium border border-slate-200 mb-6">
                                {systemSettings.clientAgreementText}
                            </div>
                            <SignaturePad onSave={handleSignClient} />
                        </Card>
                    ) : !isCompleted ? (
                        <Card className="shadow-xl">
                            <h3 className="text-xl font-black mb-4 text-slate-800">שלב 2: אפיון האתר שלך</h3>
                            <p className="text-slate-500 text-sm mb-6 font-medium">ספר לנו על העסק שלך. נציג הפיתוח שלך רואה את הנתונים האלו בזמן אמת ויכול לעזור לך למלא אותם בטלפון.</p>
                            <textarea 
                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl h-48 outline-none focus:ring-2 focus:ring-brand-500 text-base font-medium mb-4"
                                value={localBrief} onChange={e=>setLocalBrief(e.target.value)}
                                placeholder="תאר את העסק, צבעים מועדפים, קישורים לרשתות חברתיות..."
                            />
                            <Button onClick={handleSubmitBrief} className="w-full py-4 text-lg">שלח אפיון לצוות הפיתוח</Button>
                        </Card>
                    ) : (
                        <Card className="border-t-4 border-t-emerald-500 text-center shadow-xl py-12">
                            <div className="text-8xl mb-6">🎉</div>
                            <h3 className="text-4xl font-black text-emerald-800 mb-4 tracking-tight">האתר שלך באוויר!</h3>
                            <p className="text-slate-600 font-medium text-xl mb-12">מזל טוב! פיתוח הפרויקט הושלם ונמסר.</p>
                            
                            <div className="border-t border-slate-100 pt-10">
                                <h4 className="font-black text-2xl mb-8 text-slate-800 text-center">חנות תוספים ושירותים לאתר שלך</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {(systemSettings.products || []).map(prod => {
                                        const alreadyPurchased = (project.upgrades || []).find(u => u.id === prod.id);
                                        return (
                                            <div key={prod.id} className={`bg-white border-2 p-6 rounded-3xl text-center shadow-md flex flex-col justify-between ${alreadyPurchased ? 'border-slate-200 opacity-60' : prod.price === 0 ? 'border-emerald-200 hover:border-emerald-400' : 'border-brand-100 hover:border-brand-300'} transition-all`}>
                                                <div>
                                                    <h4 className="font-black text-lg mb-2 text-slate-800">{prod.name}</h4>
                                                    <div className={`text-3xl font-black mb-6 ${prod.price === 0 ? 'text-emerald-500' : 'text-brand-600'}`}>
                                                        {prod.price === 0 ? 'חינם' : `₪${prod.price}`}
                                                    </div>
                                                </div>
                                                {alreadyPurchased ? (
                                                    <div className="bg-slate-100 text-slate-500 py-3 rounded-xl font-bold text-sm">נרכש ופעיל ✔️</div>
                                                ) : (
                                                    <Button onClick={() => setPaymentModalData({ isOpen: true, amount: prod.price, reason: prod.name, product: prod })} variant={prod.price === 0 ? 'success' : 'primary'} className="w-full py-3">
                                                        {prod.price === 0 ? '➕ הוסף בחינם' : 'רכוש שדרוג'}
                                                    </Button>
                                                )}
                                            </div>
                                        );
                                    })}
                                    {(systemSettings.products || []).length === 0 && <div className="col-span-full text-slate-400">אין מוצרים זמינים כרגע.</div>}
                                </div>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h1 className="text-2xl font-black text-slate-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                                <Badge color="brand">ERP</Badge>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-left hidden sm:block">
                                    <div className="text-sm font-black text-slate-800">{currentUser.name}</div>
                                    <div className="text-xs text-slate-500 font-bold">{currentUser.email}</div>
                                </div>
                                <Button onClick={logout} variant="outline" className="text-sm py-2">התנתק מהמערכת</Button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 p-6 sm:p-10">
                        {currentUser.role === 'manager' && <AdminDashboard />}
                        {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                        {currentUser.role === 'client' && <ClientPortal />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><DashboardLayout /></AppProvider>);
    </script>
</body>
</html>
