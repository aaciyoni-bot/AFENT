<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZISWEB - Enterprise ERP</title>
    
    <!-- Google Fonts: Heebo for premium Hebrew typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration for custom brand colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#0f172a',
                            950: '#0a0f1c'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (v10 compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        body { background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="text-gray-900 selection:bg-brand-100 selection:text-brand-600">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- רכיבי UI גנריים ---
        const Card = ({ children, className = '', noPadding = false }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-gray-200 transition-shadow hover:shadow-md ${noPadding ? '' : 'p-6 md:p-8'} ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 active:scale-[0.98]";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-600/20 focus:ring-brand-500/30",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200/50",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/20 focus:ring-emerald-500/30",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-100/50",
                outline: "bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-100"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'gray', className='' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700 border-gray-200',
                blue: 'bg-blue-50 text-brand-600 border-blue-200',
                green: 'bg-emerald-50 text-emerald-600 border-emerald-200',
                yellow: 'bg-amber-50 text-amber-600 border-amber-200',
                red: 'bg-red-50 text-red-600 border-red-200',
                purple: 'bg-purple-50 text-purple-600 border-purple-200'
            };
            return (
                <span className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border ${colors[color]} ${className}`}>
                    {children}
                </span>
            );
        };

        const formatDuration = (totalSeconds) => {
            if (!totalSeconds) return "00:00:00";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        // --- Context ---
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 } });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            else auth.signOut();
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                        setIsLoadingDb(false);
                    }
                });

                const defaultUpsells = [
                    { id: 'whatsapp', title: 'כפתור וואטסאפ צף מותאם לנייד', price: 100, icon: '💬' },
                    { id: 'gmb', title: 'הטמעת מפת גוגל (Google Maps)', price: 100, icon: '🗺️' },
                    { id: 'accessibility', title: 'תוסף נגישות תקני לאתר (חובה)', price: 150, icon: '♿' },
                    { id: 'analytics', title: 'חיבור גוגל אנליטיקס (סטטיסטיקות)', price: 150, icon: '📊' },
                    { id: 'domain', title: 'חיבור דומיין אישי (כתובת פרטית)', price: 150, icon: '🌐' },
                    { id: 'pixel', title: 'חיבור פיקסל (פייסבוק/אינסטגרם)', price: 150, icon: '🎯' },
                    { id: 'terms', title: 'עמוד תקנון ותנאי שימוש (תבנית)', price: 150, icon: '⚖️' },
                    { id: 'images', title: '5 תמונות אווירה ממאגר פרימיום', price: 100, icon: '📸' },
                    { id: 'logo', title: 'עיצוב לוגו בסיסי בטכנולוגיית AI', price: 200, icon: '🎨' },
                    { id: 'express', title: 'מסירת אקספרס (קדימות בלו"ז)', price: 200, icon: '⚡' }
                ];

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (!data.upsells || data.upsells.length < 10) {
                            db.collection('settings').doc('general').update({ upsells: defaultUpsells });
                        } else {
                            setSystemSettings(data);
                        }
                    } else {
                        db.collection('settings').doc('general').set({
                            upsells: defaultUpsells,
                            expenses: { marketing: 0, office: 0, software: 0 }
                        });
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => await db.collection('projects').doc(projectId).update(updates);
            
            const deleteProject = async (projectId) => {
                if(window.confirm("אזהרה: האם אתה בטוח שברצונך למחוק פרויקט זה לחלוטין? פעולה זו בלתי הפיכה!")) {
                    await db.collection('projects').doc(projectId).delete();
                }
            };

            const updateSettings = async (updates) => await db.collection('settings').doc('general').update(updates);
            
            const updateUser = async (userId, updates) => await db.collection('users').doc(userId).update(updates);

            const deleteUser = async (userId) => {
                if(window.confirm("אזהרה: האם למחוק משתמש זה? זה יחסום את גישתו למערכת לחלוטין.")) {
                    await db.collection('users').doc(userId).delete();
                }
            };

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // --- מסך התחברות (נעול ומאובטח) ---
        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); 
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { 
                    setError("פרטי ההתחברות שגויים. נא לוודא אימייל וסיסמה."); 
                } finally { 
                    setLoading(false); 
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-200">
                    <Card className="w-full max-w-md p-10 relative shadow-2xl bg-white border-white/50 glass-panel fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter text-gray-900">
                                ORIZIS<span className="text-brand-600">WEB</span>
                            </h1>
                            <p className="text-gray-500 font-medium mt-2 tracking-widest text-xs uppercase">Enterprise Portal</p>
                        </div>
                        
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 font-bold text-center">{error}</div>}

                        <form onSubmit={handleAuth} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">אימייל גישה</label>
                                <input type="email" placeholder="name@domain.com" onChange={e => setEmail(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label>
                                <input type="password" placeholder="••••••••" onChange={e => setPassword(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required />
                            </div>
                            
                            <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-4 shadow-xl shadow-brand-500/20">
                                {loading ? 'מאמת נתונים...' : 'כניסה מאובטחת למערכת'}
                            </Button>
                        </form>
                    </Card>
                </div>
            );
        };

        // --- פורטל לקוחות ---
        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            
            const [onboardingData, setOnboardingData] = useState({ officialName: '', idNumber: '', address: '', termsAccepted: false });
            const [briefData, setBriefData] = useState({ 
                businessName: '', phone: '', businessType: '', colors: '', competitor: '', 
                audience: '', services: '', uniqueSellingPoint: '', callToAction: ''
            });
            
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return (
                <div className="text-center p-12 bg-white rounded-3xl shadow-sm border border-gray-200 mt-10">
                    <div className="text-4xl mb-4">👋</div>
                    <h2 className="text-2xl font-black text-gray-900 mb-2">ברוך הבא לאזור האישי</h2>
                    <p className="text-gray-500">טרם הוקצה עבורך פרויקט במערכת. אנא פנה לתמיכה במידה ושילמת.</p>
                </div>
            );

            // Step 1: Onboarding Submit
            const handleOnboardingSubmit = (e) => {
                e.preventDefault();
                if(!onboardingData.termsAccepted) {
                    alert("חובה לאשר את תנאי ההתקשרות כדי להתקדם.");
                    return;
                }
                updateProject(project.id, { 
                    status: 'paid_waiting_for_brief', 
                    clientOfficialDetails: { ...onboardingData, signedAt: new Date().toLocaleString('he-IL') } 
                });
            };

            // Step 2: Brief Submit
            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { 
                    status: 'brief_submitted', 
                    briefInfo: briefData 
                });
            };

            const purchaseUpsell = (upsell) => {
                if (!window.confirm(`האם לאשר הוספת "${upsell.title}" בעלות של ₪${upsell.price}? الفריט יתווסף לחשבונית הגמר.`)) return;
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, {
                    addons: [...currentAddons, upsell],
                    paymentAmount: (project.paymentAmount || 0) + upsell.price
                });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    
                    {/* Welcome Header & Progress */}
                    <div className="bg-brand-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brand-600 rounded-full blur-3xl opacity-20 -mr-20 -mt-20 pointer-events-none"></div>
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-black">שלום, {currentUser.name}!</h2>
                                <Badge color="blue">פורטל הלקוחות של ORIZISWEB</Badge>
                            </div>
                            <p className="text-gray-300 font-medium max-w-xl">
                                ברוך הבא למערכת הניהול שלך. כאן תוכל לאפיין את האתר שלך, לעקוב אחרי קצב הפיתוח, ולהוסיף שדרוגים תוך כדי תנועה.
                            </p>
                            
                            {/* 4-Step Progress Indicator */}
                            <div className="mt-10 bg-white/5 p-4 md:p-6 rounded-2xl border border-white/10 flex flex-col md:flex-row justify-between items-center gap-2 md:gap-4 overflow-x-auto text-sm">
                                <div className={`font-bold flex items-center gap-2 whitespace-nowrap ${project.status === 'onboarding' ? 'text-white' : 'text-emerald-400'}`}>
                                    <span className={`w-7 h-7 flex items-center justify-center rounded-full text-xs ${project.status === 'onboarding' ? 'bg-brand-500 text-white' : 'bg-emerald-500 text-white'}`}>1</span> פרטים וחוזה
                                </div>
                                <div className="hidden md:block h-px bg-white/20 flex-1 min-w-[20px]"></div>
                                
                                <div className={`font-bold flex items-center gap-2 whitespace-nowrap ${project.status === 'paid_waiting_for_brief' ? 'text-white' : (project.status === 'onboarding' ? 'text-white/30' : 'text-emerald-400')}`}>
                                    <span className={`w-7 h-7 flex items-center justify-center rounded-full text-xs ${project.status === 'paid_waiting_for_brief' ? 'bg-brand-500 text-white' : (project.status === 'onboarding' ? 'bg-white/10' : 'bg-emerald-500 text-white')}`}>2</span> אפיון לאתר
                                </div>
                                <div className="hidden md:block h-px bg-white/20 flex-1 min-w-[20px]"></div>
                                
                                <div className={`font-bold flex items-center gap-2 whitespace-nowrap ${['brief_submitted', 'in_progress'].includes(project.status) ? 'text-white' : (['onboarding', 'paid_waiting_for_brief'].includes(project.status) ? 'text-white/30' : 'text-emerald-400')}`}>
                                    <span className={`w-7 h-7 flex items-center justify-center rounded-full text-xs ${['brief_submitted', 'in_progress'].includes(project.status) ? 'bg-brand-500 text-white' : (['onboarding', 'paid_waiting_for_brief'].includes(project.status) ? 'bg-white/10' : 'bg-emerald-500 text-white')}`}>3</span> בנייה ופיתוח
                                </div>
                                <div className="hidden md:block h-px bg-white/20 flex-1 min-w-[20px]"></div>
                                
                                <div className={`font-bold flex items-center gap-2 whitespace-nowrap ${project.status === 'qa_review' ? 'text-white' : project.status === 'completed' ? 'text-emerald-400' : 'text-white/30'}`}>
                                    <span className={`w-7 h-7 flex items-center justify-center rounded-full text-xs ${project.status === 'qa_review' ? 'bg-brand-500 text-white' : project.status === 'completed' ? 'bg-emerald-500 text-white' : 'bg-white/10'}`}>4</span> מסירה ללקוח
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Step 1: Onboarding & Contract */}
                    {project.status === 'onboarding' && (
                        <Card className="border-t-4 border-t-brand-500 shadow-lg relative overflow-hidden fade-in">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-50 rounded-bl-full -z-10"></div>
                            <div className="mb-8">
                                <div className="inline-block bg-brand-100 text-brand-700 font-bold px-3 py-1 rounded-lg text-sm mb-3">שלב 1 מתוך 2</div>
                                <h3 className="text-2xl font-black text-gray-900 mb-2">קליטת לקוח ופרטים רשמיים</h3>
                                <p className="text-gray-500 font-medium">
                                    רגע לפני שנתחיל לאפיין את האתר שלך, נצטרך להשלים את פרטי ההתקשרות הרשמיים שלך לטובת חשבוניות והסכם העבודה מולנו.
                                </p>
                            </div>
                            
                            <form onSubmit={handleOnboardingSubmit} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">שם מלא / שם חברה רשמי (לחשבונית)</label>
                                        <input type="text" required onChange={e=>setOnboardingData({...onboardingData, officialName: e.target.value})} className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">מספר ח.פ / ע.מ / ת.ז</label>
                                        <input type="text" required onChange={e=>setOnboardingData({...onboardingData, idNumber: e.target.value})} className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold text-gray-700 mb-2">כתובת מלאה (עיר, רחוב, מספר)</label>
                                        <input type="text" required onChange={e=>setOnboardingData({...onboardingData, address: e.target.value})} className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all" />
                                    </div>
                                </div>

                                {/* Digital Signature / Terms */}
                                <div className="mt-8 pt-6 border-t border-gray-200 bg-brand-50 p-6 rounded-xl border border-brand-200">
                                    <h4 className="font-bold text-gray-900 mb-3">אישור חוזה התקשרות</h4>
                                    <label className="flex items-start gap-3 cursor-pointer">
                                        <input type="checkbox" required onChange={e => setOnboardingData({...onboardingData, termsAccepted: e.target.checked})} className="mt-1 w-5 h-5 rounded text-brand-600 focus:ring-brand-500" />
                                        <span className="text-sm text-gray-700 leading-relaxed">
                                            אני מאשר/ת שהפרטים שמסרתי נכונים. כמו כן, אני מאשר/ת כי קראתי ואני מסכים לכל תנאי העסקה המפורטים ב<a href="#" onClick={(e)=>{e.preventDefault(); alert('כאן יפתח חלון עם ההסכם המלא');}} className="font-bold text-brand-600 underline hover:text-brand-800">הסכם פיתוח והקמת אתר אינטרנט</a> של אוריזיס טכנולוגיות בע"מ. סימון תיבה זו מהווה חתימה אלקטרונית המחייבת אותי לכל סעיפי ההסכם.
                                        </span>
                                    </label>
                                </div>

                                <Button type="submit" className="w-full py-5 text-lg mt-4 shadow-xl shadow-brand-500/20">שמור פרטים והמשך לאפיון ➔</Button>
                            </form>
                        </Card>
                    )}

                    {/* Step 2: Guided Brief Form */}
                    {project.status === 'paid_waiting_for_brief' && (
                        <Card className="border-t-4 border-t-purple-500 shadow-lg relative overflow-hidden fade-in">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-bl-full -z-10"></div>

            const activeProjects = projects.filter(p => p.status !== 'completed');
            
            const totalRevenue = projects.reduce((sum, p) => sum + (p.paymentAmount || 1500), 0);
            const totalCosts = projects.reduce((sum, p) => {
                if(!p.freelancerId) return sum;
                const fl = freelancers.find(f => f.uid === p.freelancerId) || {};
                const basePay = fl.basePay || 1000;
                const upsellCutPct = (fl.upsellPercentage || 30) / 100;
                let cost = basePay;
                if(p.addons) p.addons.forEach(a => cost += (a.price * upsellCutPct));
                if(p.timeSpent > 0 && p.timeSpent < 12600) cost += 50; 
                return sum + cost;
            }, 0);
            const fixedCosts = Object.values(systemSettings.expenses || {}).reduce((a,b)=>a+Number(b), 0);

            const autoAssign = (projectId) => {
                if(freelancers.length === 0) { alert("אין פרילנסרים במערכת"); return; }
                const workload = freelancers.map(fl => ({ ...fl, activeCount: projects.filter(p => p.freelancerId === fl.uid && ['in_progress', 'brief_submitted'].includes(p.status)).length }));
                workload.sort((a, b) => a.activeCount - b.activeCount);
                updateProject(projectId, { freelancerId: workload[0].uid, freelancerName: workload[0].name, status: 'in_progress' });
            };

            const handleCreateUser = async (e) => {
                e.preventDefault();
                setUserStatus('יוצר משתמש מאובטח בשרת...');
                try {
                    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(newUser.email, newUser.password);
                    const userData = { role: newUser.role, name: newUser.name, email: newUser.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (newUser.role === 'freelancer') { userData.basePay = 1000; userData.upsellPercentage = 30; }
                    await db.collection('users').doc(cred.user.uid).set(userData);
                    
                    if (newUser.role === 'client') {
                        // מתחילים בסטטוס קליטה (Onboarding)
                        await db.collection('projects').add({
                            customerName: newUser.name, status: 'onboarding', paymentAmount: 1500, timeSpent: 0, isTimerRunning: false, addons: [], clientId: cred.user.uid
                        });
                    }
                    await secondaryApp.auth().signOut();
                    setUserStatus('✅ המשתמש הוקם בהצלחה!');
                    setNewUser({ email: '', password: '', name: '', role: 'client' });
                    setTimeout(() => setUserStatus(''), 4000);

            return (
                <div className="space-y-8 fade-in">

                        {isManager && <button onClick={()=>setActiveTab('users')} className={`px-6 py-3 font-bold text-sm rounded-xl transition-all whitespace-nowrap ${activeTab==='users'?'bg-brand-600 text-white shadow-md shadow-brand-600/20':'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>משתמשים וצוות</button>}
                        {isManager && <button onClick={()=>setActiveTab('finance')} className={`px-6 py-3 font-bold text-sm rounded-xl transition-all whitespace-nowrap ${activeTab==='finance'?'bg-brand-600 text-white shadow-md shadow-brand-600/20':'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>דוח פיננסי</button>}

                    {activeTab === 'users' && isManager && (

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">סוג הרשאה (Role)</label>

                                    {userStatus && <div className="text-sm font-bold text-center mt-4 bg-brand-50 text-brand-600 p-3 rounded-xl border border-brand-100">{userStatus}</div>}

                            </div>
                            
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-gray-50 text-gray-500 border-b border-gray-200">

                                            <th className="px-6 py-4 font-bold tracking-wider">תיק וסטטוס</th>
                                            <th className="px-6 py-4 font-bold tracking-wider">בריף ופרטי הזמנה</th>
                                            <th className="px-6 py-4 font-bold tracking-wider">זמן פיתוח ותוצרים</th>
                                            <th className="px-6 py-4 font-bold tracking-wider">צוות וניהול</th>

                                    </thead>
                                    <tbody className="divide-y divide-gray-100 bg-white">
                                        {activeProjects.map(p => {
                                            let currentTotal = p.timeSpent || 0;

                                            return (

                                                <td className="px-6 py-6 align-top">
                                                    <div className="font-black text-lg text-gray-900 mb-2">{p.clientOfficialDetails?.officialName || p.briefInfo?.businessName || p.customerName}</div>
                                                    <Badge color={p.status === 'onboarding' ? 'gray' : p.status === 'paid_waiting_for_brief' ? 'yellow' : p.status === 'qa_review' ? 'green' : 'blue'}>
                                                        {p.status.replace(/_/g, ' ')}
                                                    </Badge>
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    {(p.briefInfo || p.clientOfficialDetails) ? (
                                                        <button onClick={() => setViewBriefModal(p)} className="text-brand-700 bg-brand-50 hover:bg-brand-100 border border-brand-200 px-4 py-2 rounded-xl font-bold text-xs transition-colors flex items-center gap-2 shadow-sm">
                                                            📋 צפה בתיק אפיון וחוזה
                                                        </button>

                                                        <span className="text-gray-400 text-xs font-bold border border-gray-200 bg-gray-50 px-3 py-1.5 rounded-lg inline-block">ממתין לקליטה ואפיון</span>

                                                </td>

                                                    {p.links?.liveUrl && (

                                            </div>

                                            <div>
                                                <h4 className="text-lg font-black text-gray-900 mb-4 border-b border-gray-100 pb-2">אסטרטגיה שיווקית מהלקוח:</h4>
                                                <div className="space-y-4">
                                                    <div className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">קהל היעד המרכזי</div>
                                                        <div className="text-gray-800 font-medium whitespace-pre-wrap leading-relaxed">{viewBriefModal.briefInfo?.audience}</div>
                                                    </div>
                                                    <div className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">שירותים להבליט</div>
                                                        <div className="text-gray-800 font-medium whitespace-pre-wrap leading-relaxed">{viewBriefModal.briefInfo?.services}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {viewBriefModal.addons && viewBriefModal.addons.length > 0 && (
                                        <div className="bg-brand-50 rounded-2xl p-6 border border-brand-200">
                                            <h4 className="font-black text-brand-900 mb-4">🛒 שדרוגים שנרכשו:</h4>
                                            <div className="flex flex-wrap gap-3">
                                                {viewBriefModal.addons.map(a => (
                                                    <span key={a.id} className="bg-white text-brand-700 border border-brand-200 px-4 py-2 rounded-xl text-sm font-bold shadow-sm">➕ {a.title} (₪{a.price})</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);

            if (isLoadingDb) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
                    <div className="w-16 h-16 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin mb-4"></div>
                    <div className="text-center font-bold text-gray-500 tracking-wider uppercase text-sm">מתחבר לשרתי ORIZISWEB...</div>
                </div>
            );
            
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-gray-50">
                    <header className="md:hidden bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                        <h1 className="text-2xl font-black text-gray-900 tracking-tighter">ORIZIS<span className="text-brand-600">WEB</span></h1>
                        <button onClick={logout} className="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-200 transition-colors">התנתק</button>
                    </header>

                    <aside className="w-72 bg-brand-950 text-white hidden md:flex flex-col shadow-2xl z-20 relative shrink-0">
                        <div className="p-8 border-b border-gray-800/50">
                            <h1 className="text-3xl font-black tracking-tighter text-white">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="text-[10px] text-gray-500 mt-2 font-bold tracking-widest uppercase">By Orizis Technology</div>
                        </div>
                        <div className="flex-1 p-6"></div>
                        <div className="p-6 border-t border-gray-800/50 bg-gray-900/50">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 rounded-full bg-brand-600 flex items-center justify-center font-black text-xl border-2 border-brand-400 shadow-lg uppercase">
                                    {currentUser.name ? currentUser.name.charAt(0) : 'U'}
                                </div>
                                <div>
                                    <div className="text-sm font-black text-gray-100">{currentUser.name || currentUser.email}</div>
                                    <div className="text-xs text-brand-400 font-bold mt-1 bg-brand-900/50 px-2.5 py-0.5 rounded-md inline-block border border-brand-800/50">
                                        {currentUser.role === 'manager' ? 'הנהלה' : currentUser.role === 'client' ? 'לקוח הסטודיו' : 'צוות פיתוח'}
                                    </div>
                                </div>
                            </div>
                            <button onClick={logout} className="w-full bg-gray-800 text-gray-300 font-bold text-sm py-3 rounded-xl hover:bg-red-900 hover:text-red-200 border border-gray-700 transition-colors shadow-sm">יציאה מהמערכת</button>
                        </div>
                    </aside>
                    
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto relative h-[calc(100vh-73px)] md:h-screen">
                        <div className="max-w-6xl mx-auto pb-20">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
