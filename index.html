<body class="text-gray-900 selection:bg-brand-100 selection:text-brand-600">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Card = ({ children, className = '', noPadding = false }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-gray-200 transition-shadow hover:shadow-md ${noPadding ? '' : 'p-6 md:p-8'} ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 active:scale-[0.98]";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-600/20 focus:ring-brand-500/30",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200/50",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/20 focus:ring-emerald-500/30",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-100/50",
                outline: "bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-100",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-md shadow-amber-500/20"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'gray', className='' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700 border-gray-200',
                blue: 'bg-blue-50 text-brand-600 border-blue-200',
                green: 'bg-emerald-50 text-emerald-600 border-emerald-200',
                yellow: 'bg-amber-50 text-amber-600 border-amber-200',
                red: 'bg-red-50 text-red-600 border-red-200',
                purple: 'bg-purple-50 text-purple-600 border-purple-200'
            };
            return (
                <span className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border ${colors[color]} ${className}`}>
                    {children}
                </span>
            );
        };

        const formatDuration = (totalSeconds, forcePositive = false) => {
            if (!totalSeconds) return "00:00:00";
            const absSeconds = Math.abs(totalSeconds);
            const h = Math.floor(absSeconds / 3600);
            const m = Math.floor((absSeconds % 3600) / 60);
            const s = Math.floor(absSeconds % 60);
            const formatted = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (!forcePositive && totalSeconds < 0) return "-" + formatted;
            return formatted;
        };

        const defaultAgreementText = `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ ח.פ 516977758 הפועלת באמצעות מותג ORIZISWEB שתיקרא להלן החברה לבין הלקוח המזמין את השירותים דרך פורטל הלקוחות הדיגיטלי שייקרא להלן הלקוח.\n\n1. מהות ההתקשרות ותכולת העבודה\nהחברה תספק ללקוח שירותי פיתוח ועיצוב אתר אינטרנט בהתאם למידע שסופק. כל בקשה לפיתוח החורגת ממה שסוכם תתומחר בנפרד ותדרוש אישור ותשלום נוסף.\n\n2. התחייבויות הלקוח\nהלקוח מתחייב להעביר לחברה את כל החומרים הנדרשים במועד מילוי טופס האפיון. עיכוב במסירת חומרים יגרור עיכוב בלוחות הזמנים.\n\n3. לוחות זמנים ומסירת הפרויקט\nהחברה תחל בפיתוח האתר מיד עם קבלת כל חומרי האפיון. זמן האספקה המשוער הוא עד 14 ימי עסקים אלא אם נרכש שירות אקספרס (מוחרג שבתות וחגים).\n\n4. סבבי תיקונים\nהלקוח זכאי ל-5 סבבי תיקונים במסגרת האפיון המקורי.\n\n5. תשלומים ותוספות\nהתשלום בגין הפיתוח מתבצע מראש. הלקוח רשאי להוסיף פיצ'רים לאתר דרך החנות שיחויבו בנפרד.\n\n6. אחריות וביטולים\nניתנת תקופת אחריות של 30 ימים לתיקון באגים. במקרה של ביטול עסקה לאחר תחילת הפיתוח, יגרור הדבר חיוב יחסי בגין העבודה שבוצעה.`;

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: '' });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            else auth.signOut();
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                        setIsLoadingDb(false);
                    }
                });

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (!data.agreementText) {
                            db.collection('settings').doc('general').update({ agreementText: defaultAgreementText });
                            data.agreementText = defaultAgreementText;
                        }
                        
                        // עדכון רשימת החנות והזמנים אוטומטית אם חסר
                        if (!data.upsells || data.upsells.length < 10) {
                            const initialUpsells = [
                                { id: '1', title: 'כפתור וואטסאפ צף', price: 100, icon: '💬', isPremium: false, desc: 'חיבור מהיר לוואטסאפ של העסק.', timeMinutes: 10 },
                                { id: '2', title: 'הטמעת מפת הגעה', price: 100, icon: '🗺️', isPremium: false, desc: 'הטמעת מפת גוגל באתר.', timeMinutes: 10 },
                                { id: '3', title: 'תוסף נגישות לאתר', price: 100, icon: '♿', isPremium: false, desc: 'הנגשת האתר כחוק לפי התקן.', timeMinutes: 5 },
                                { id: '4', title: 'חיבור גוגל אנליטיקס', price: 100, icon: '📊', isPremium: false, desc: 'סטטיסטיקות ונתוני גלישה.', timeMinutes: 15 },
                                { id: '5', title: 'חיבור פיקסל שיווקי', price: 100, icon: '🎯', isPremium: false, desc: 'קריטי לקמפיינים בפייסבוק ואינסטגרם.', timeMinutes: 10 },
                                { id: '6', title: 'תקנון ותנאי שימוש', price: 100, icon: '⚖️', isPremium: false, desc: 'הטמעת עמוד משפטי בסיסי (תבנית).', timeMinutes: 15 },
                                { id: '7', title: 'חיבור דומיין אישי', price: 0, icon: '🌐', isPremium: false, desc: 'חיבור לכתובת שרכשת.', timeMinutes: 15 },
                                { id: '8', title: 'שילוב 5 תמונות אווירה', price: 0, icon: '📸', isPremium: false, desc: 'בחירת תמונות ממאגרים מקצועיים.', timeMinutes: 10 },
                                { id: '9', title: 'עיצוב לוגו AI בסיסי', price: 0, icon: '🎨', isPremium: false, desc: 'יצירת לוגו מהיר בטכנולוגיית בינה מלאכותית.', timeMinutes: 15 },
                                { id: '10', title: 'פופ-אפ כרטיס גירוד', price: 1000, icon: '🎟️', isPremium: true, desc: 'משחק אינטראקטיבי להשארת לידים וחלוקת קופונים ללקוחות.', timeMinutes: 45 },
                                { id: '11', title: 'גלגל המזל (רולטה)', price: 1200, icon: '🎡', isPremium: true, desc: 'פופ-אפ שקופץ לגולש ומעודד אותו להשאיר פרטים כדי לזכות בהנחה.', timeMinutes: 60 },
                                { id: '12', title: 'מערכת CRM בסיסית', price: 3000, icon: '💼', isPremium: true, desc: 'פאנל פנימי לניהול הלידים והלקוחות של העסק שלך.', timeMinutes: 180 },
                                { id: '13', title: 'מערכת קביעת תורים', price: 1500, icon: '📅', isPremium: true, desc: 'סנכרון יומן גוגל וקביעת פגישות אוטומטית.', timeMinutes: 90 },
                                { id: '14', title: 'צ\'אטבוט AI חכם', price: 2000, icon: '🤖', isPremium: true, desc: 'נציג וירטואלי שעונה לשאלות גולשים 24/7.', timeMinutes: 120 },
                                { id: '15', title: 'מסירת אקספרס (קדימות)', price: 500, icon: '⚡', isPremium: true, desc: 'הקפצה לראש התור (לא כולל שבתות/חגים, בכפוף לחומרים).', timeMinutes: 0 }
                            ];
                            db.collection('settings').doc('general').update({ upsells: initialUpsells });
                            data.upsells = initialUpsells;
                        }

                        setSystemSettings(data);
                    } else {
                        db.collection('settings').doc('general').set({
                            upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: defaultAgreementText
                        });
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => await db.collection('projects').doc(projectId).update(updates);
            
            const deleteProject = async (projectId) => {
                if(window.confirm("אזהרה: האם למחוק פרויקט זה לחלוטין? פעולה זו תאפס את ההכנסה שלו בלוח הפיננסי.")) {
                    await db.collection('projects').doc(projectId).delete();
                }
            };

            const updateSettings = async (updates) => await db.collection('settings').doc('general').update(updates);
            const updateUser = async (userId, updates) => await db.collection('users').doc(userId).update(updates);

            const deleteUser = async (userId) => {
                if(window.confirm("אזהרה: מחיקת המשתמש תמחק אוטומטית גם את הפרויקטים המשויכים אליו כדי לאפס את הדוח הפיננסי! להמשיך?")) {
                    const userProjects = projects.filter(p => p.clientId === userId);
                    for (const p of userProjects) { await db.collection('projects').doc(p.id).delete(); }
                    await db.collection('users').doc(userId).delete();
                }
            };

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); 
                setLoading(true);
                try { await auth.signInWithEmailAndPassword(email, password); } 
                catch (err) { setError("פרטי ההתחברות שגויים. נא לוודא אימייל וסיסמה או לפנות למנהל המערכת."); } 
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-200">
                    <Card className="w-full max-w-md p-10 relative shadow-2xl bg-white border-white/50 glass-panel fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter text-gray-900">
                                ORIZIS<span className="text-brand-600">WEB</span>
                            </h1>
                            <p className="text-gray-500 font-medium mt-2 tracking-widest text-xs uppercase">Enterprise Access</p>
                        </div>
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 font-bold text-center">{error}</div>}
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">אימייל גישה</label><input type="email" placeholder="name@domain.com" onChange={e => setEmail(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label><input type="password" placeholder="••••••••" onChange={e => setPassword(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required /></div>
                            <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-4 shadow-xl shadow-brand-500/20">{loading ? 'מאמת נתונים...' : 'כניסה מאובטחת למערכת'}</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const initCanvas = () => {
                    const parent = canvas.parentElement;
                    canvas.width = parent.clientWidth;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = '#0f172a';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                };
                initCanvas();
                window.addEventListener('resize', initCanvas);
                return () => window.removeEventListener('resize', initCanvas);
            }, []);

            const getCoordinates = (event) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const evt = event.nativeEvent || event;
                if (evt.touches && evt.touches.length > 0) return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            };

            const startDrawing = (event) => { const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true); };
            const draw = (event) => { if (!isDrawing) return; const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
            const stopDrawing = () => { if (isDrawing) { setIsDrawing(false); onSave(canvasRef.current.toDataURL('image/png')); } };
            const clearPad = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); onSave(null); };

            return (
                <div className="border-2 border-gray-300 rounded-xl overflow-hidden bg-white shadow-inner mb-6">
                    <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 text-sm font-bold text-gray-700 flex justify-between items-center">
                        <span>✍️ צייר את חתימתך כאן (עכבר / אצבע):</span>
                        <button type="button" onClick={clearPad} className="text-red-500 hover:text-red-700 text-xs font-bold bg-white px-3 py-1 rounded-lg shadow-sm border border-red-100 transition-colors">נקה חתימה</button>
                    </div>
                    <canvas ref={canvasRef} className="w-full touch-none cursor-crosshair bg-white" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            
            const [onboardingData, setOnboardingData] = useState({ officialName: '', idNumber: '', address: '', termsAccepted: false, signatureData: null });
            const [showContractModal, setShowContractModal] = useState(false);
            const [briefData, setBriefData] = useState({ businessName: '', phone: '', businessType: '', colors: '', audience: '', services: '', uniqueSellingPoint: '', callToAction: '' });
            
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return (
                <div className="text-center p-12 bg-white rounded-3xl shadow-sm border border-gray-200 mt-10">
                    <div className="text-4xl mb-4">👋</div>
                    <h2 className="text-2xl font-black text-gray-900 mb-2">ברוך הבא לאזור האישי</h2>
                    <p className="text-gray-500">טרם הוקצה עבורך פרויקט במערכת. אנא פנה לתמיכה במידה ושילמת.</p>
                </div>
            );

            const handleOnboardingSubmit = (e) => {
                e.preventDefault();
                if(!onboardingData.termsAccepted) return alert("חובה לאשר את תנאי ההתקשרות בתיבת הסימון.");
                if(!onboardingData.signatureData) return alert("חובה לחתום את חתימתך בחלונית הציור.");
                updateProject(project.id, { status: 'paid_waiting_for_brief', clientOfficialDetails: { ...onboardingData, signedAt: new Date().toLocaleString('he-IL') } });
            };

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { status: 'brief_submitted', briefInfo: briefData });
            };

            const purchaseUpsell = (upsell) => {
                if (!window.confirm(`לאשר הוספת "${upsell.title}" בעלות ₪${upsell.price}?`)) return;
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, { addons: [...currentAddons, upsell], paymentAmount: (project.paymentAmount || 0) + upsell.price });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    
                    {/* Welcome & Progress */}
                    <div className="bg-brand-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">

                const updatedUpsells = [...systemSettings.upsells];
                if (isNew) {
                    updatedUpsells.push({ ...newUpsell, id: Date.now().toString(), price: Number(newUpsell.price), timeMinutes: Number(newUpsell.timeMinutes) });
                } else {
                    const index = updatedUpsells.findIndex(u => u.id === editingUpsell.id);
                    if(index > -1) updatedUpsells[index] = { ...editingUpsell, price: Number(editingUpsell.price), timeMinutes: Number(editingUpsell.timeMinutes) };
                }
                updateSettings({ upsells: updatedUpsells });
                setEditingUpsell(null);
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="flex gap-3 overflow-x-auto pb-2 border-b border-gray-200 scrollbar-hide">
                        <button onClick={()=>setActiveTab('projects')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='projects'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>ניהול אופרציה</button>
                        <button onClick={()=>setActiveTab('users')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='users'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>משתמשים וצוות</button>
                        <button onClick={()=>setActiveTab('settings')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='settings'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>הגדרות וחנות</button>
                    </div>

                    {/* ניהול אופרציה */}
                    {activeTab === 'projects' && (
                        <Card noPadding className="flex flex-col shadow-sm">
                            <div className="p-6 bg-white border-b"><h2 className="text-2xl font-black">לוח בקרת ייצור ואישורים</h2></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-gray-50 text-gray-500 border-b"><tr><th className="px-6 py-4 font-bold">לקוח וסטטוס</th><th className="px-6 py-4 font-bold">פעולות ומדדי איכות</th><th className="px-6 py-4 font-bold">שיוך מפורש לצוות</th></tr></thead>
                                    <tbody className="divide-y divide-gray-100 bg-white">
                                        {activeProjects.map(p => (
                                            <tr key={p.id} className="hover:bg-brand-50/30">
                                                <td className="px-6 py-6 align-top">
                                                    <div className="font-black text-lg mb-2">{p.clientOfficialDetails?.officialName || p.customerName}</div>
                                                    <Badge color={p.status === 'onboarding' ? 'gray' : p.status === 'qa_review' ? 'green' : 'blue'}>{p.status.replace(/_/g, ' ')}</Badge>
                                                    {/* מדד איכות סמוי למנהל */}
                                                    {p.revisionCount > 0 && <div className="mt-2 text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded inline-block">סבבי תיקונים QA: {p.revisionCount}</div>}
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    <button onClick={() => setViewBriefModal(p)} className="text-brand-700 bg-brand-50 hover:bg-brand-100 border border-brand-200 px-4 py-2 rounded-xl font-bold text-xs shadow-sm mb-2 block">📋 צפה בתיק ומעקב</button>
                                                    {p.status === 'qa_review' && (
                                                        <button onClick={() => updateProject(p.id, {status: 'in_progress', revisionCount: (p.revisionCount||0)+1})} className="text-amber-700 bg-amber-50 border border-amber-200 px-4 py-2 rounded-xl font-bold text-xs shadow-sm">חזור לתיקונים (קנס זמן)</button>
                                                    )}
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    {/* שיוך מפורש עם כפתור אישור */}
                                                    <div className="flex flex-col gap-2 mb-4">
                                                        <select className="border rounded-lg p-2 text-xs bg-white" onChange={(e) => setPendingAssignments({...pendingAssignments, [p.id]: e.target.value})} value={pendingAssignments[p.id] || p.freelancerId || ""}>
                                                            <option value="" disabled>בחר פרילנסר...</option>
                                                            {freelancers.map(fl => <option key={fl.uid} value={fl.uid}>{fl.name}</option>)}
                                                        </select>
                                                        <button 
                                                            onClick={() => { updateProject(p.id, { freelancerId: pendingAssignments[p.id] }); alert('הלקוח שויך בהצלחה לפרילנסר'); }} 
                                                            disabled={!pendingAssignments[p.id] || pendingAssignments[p.id] === p.freelancerId}
                                                            className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold py-2 rounded-lg disabled:opacity-50 disabled:bg-gray-300">
                                                            ✓ אשר שיוך צוות
                                                        </button>
                                                    </div>
                                                    <button onClick={() => deleteProject(p.id)} className="text-red-500 hover:bg-red-50 text-xs font-bold px-3 py-1.5 rounded border border-red-200">🗑️ מחק פרויקט מהדוח</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {/* Users (Manager) */}
                    {activeTab === 'users' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <Card><h3 className="text-xl font-black mb-4">הקמת משתמש (לקוח/צוות)</h3>
                                <form onSubmit={handleCreateUser} className="space-y-4">
                                    <input type="text" placeholder="שם" required value={newUser.name} onChange={e=>setNewUser({...newUser, name: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="email" placeholder="אימייל" required dir="ltr" value={newUser.email} onChange={e=>setNewUser({...newUser, email: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="text" placeholder="סיסמה" required dir="ltr" value={newUser.password} onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-3 border rounded-xl font-bold">
                                        <option value="client">לקוח (פותח תיק אוטומטית)</option>
                                        <option value="freelancer">פרילנסר (0% עמלה בסיס)</option>
                                        <option value="manager">מנהל</option>
                                    </select>
                                    <Button type="submit" className="w-full">צור והוסף</Button>
                                </form>
                            </Card>
                            <Card noPadding><div className="p-6 border-b"><h3 className="text-xl font-black">ניהול משתמשים (ומחיקת התיק שלהם)</h3></div>
                                <div className="p-0 max-h-96 overflow-y-auto">
                                    <table className="w-full text-right text-sm">
                                        <tbody>
                                            {usersList.map(u => (
                                                <tr key={u.uid} className="border-b">
                                                    <td className="p-4 font-bold">{u.name}</td>
                                                    <td className="p-4"><Badge>{u.role}</Badge></td>
                                                    <td className="p-4">{u.uid !== currentUser.uid && <button onClick={() => deleteUser(u.uid)} className="text-red-500 text-xs font-bold">מחק (מאפס דוח)</button>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* Settings & Store */}
                    {activeTab === 'settings' && (
                        <div className="space-y-8">
                            <Card className="border-t-4 border-t-purple-500">
                                <h3 className="text-xl font-black mb-2">⚖️ עריכת חוזה / הסכם התקשרות אחיד</h3>
                                <p className="text-sm text-gray-500 mb-4">טקסט זה יוצג ללקוח בחלון החתימה.</p>
                                <textarea rows="10" value={agreementInput} onChange={(e) => setAgreementInput(e.target.value)} className="w-full p-4 border rounded-xl bg-gray-50 text-sm font-medium outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                                <Button onClick={() => { updateSettings({ agreementText: agreementInput }); alert('נשמר'); }} className="mt-4 bg-purple-600 hover:bg-purple-700">שמור חוזה</Button>
                            </Card>

                            <Card noPadding className="border-t-4 border-t-brand-500">
                                <div className="p-6 bg-gray-50 border-b"><h3 className="text-xl font-black">🛒 ניהול מוצרי חנות ותקציב זמן</h3></div>
                                <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="bg-white p-5 rounded-2xl border shadow-sm space-y-4">
                                        <h4 className="font-bold border-b pb-2">{editingUpsell ? 'עריכת מוצר' : '➕ הוספת מוצר'}</h4>
                                        <div><label className="text-xs font-bold text-gray-500">שם</label><input type="text" value={editingUpsell ? editingUpsell.title : newUpsell.title} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, title: e.target.value}) : setNewUpsell({...newUpsell, title: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                        <div className="flex gap-2">
                                            <div className="flex-1"><label className="text-xs font-bold text-gray-500">מחיר (₪)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.price : newUpsell.price} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, price: e.target.value}) : setNewUpsell({...newUpsell, price: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                            <div className="flex-1"><label className="text-xs font-bold text-gray-500">זמן (דקות)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.timeMinutes : newUpsell.timeMinutes} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, timeMinutes: e.target.value}) : setNewUpsell({...newUpsell, timeMinutes: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                            <div className="w-12"><label className="text-xs font-bold text-gray-500">אמוג'י</label><input type="text" value={editingUpsell ? editingUpsell.icon : newUpsell.icon} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, icon: e.target.value}) : setNewUpsell({...newUpsell, icon: e.target.value})} className="w-full p-2 border rounded text-sm text-center" /></div>
                                        </div>
                                        <div><label className="text-xs font-bold text-gray-500">תיאור</label><textarea rows="2" value={editingUpsell ? editingUpsell.desc : newUpsell.desc} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, desc: e.target.value}) : setNewUpsell({...newUpsell, desc: e.target.value})} className="w-full p-2 border rounded text-sm"></textarea></div>
                                        <label className="flex items-center gap-2 text-sm font-bold"><input type="checkbox" checked={editingUpsell ? editingUpsell.isPremium : newUpsell.isPremium} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isPremium: e.target.checked}) : setNewUpsell({...newUpsell, isPremium: e.target.checked})} className="w-4 h-4" /> מוצר פרימיום (זהב)</label>
                                        <Button onClick={() => handleSaveUpsell(!editingUpsell)} className="w-full">{editingUpsell ? 'שמור שינויים' : 'הוסף לחנות'}</Button>
                                    </div>
                                    <div className="lg:col-span-2 space-y-3 max-h-[600px] overflow-y-auto">
                                        {systemSettings.upsells.map(u => (
                                            <div key={u.id} className="flex justify-between p-4 rounded-xl border bg-white shadow-sm">
                                                <div>
                                                    <div className="font-black">{u.icon} {u.title} <span className="text-brand-600 bg-brand-50 px-2 rounded ml-2">₪{u.price}</span><span className="text-purple-600 bg-purple-50 px-2 rounded">+ {u.timeMinutes} דק' עבודה</span></div>
                                                    <div className="text-xs text-gray-500 mt-1">{u.desc}</div>
                                                </div>
                                                <button onClick={() => setEditingUpsell(u)} className="text-xs font-bold bg-gray-100 px-3 py-1 rounded">✏ ערוך</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* View Client File Modal */}
                    {viewBriefModal && (
                        <div className="fixed inset-0 bg-gray-950/50 flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
                                <div className="flex justify-between items-center p-6 bg-gray-50 border-b"><h3 className="font-black text-2xl">📋 תיק לקוח</h3><button onClick={() => setViewBriefModal(null)} className="px-5 py-2.5 bg-gray-200 rounded-xl font-bold">סגור</button></div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="bg-gray-50 p-4 rounded-xl border flex flex-col sm:flex-row justify-between text-xs font-bold text-gray-400 gap-2">
                                        <div className={viewBriefModal.status !== 'onboarding' ? 'text-emerald-600' : 'text-brand-600'}>1. חוזה ופרטים {viewBriefModal.status !== 'onboarding' && '✓'}</div>
                                        <div className={['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='paid_waiting_for_brief'?'text-brand-600':''}>2. אפיון {['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                        <div className={['qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='in_progress'?'text-brand-600':''}>3. פיתוח {['qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                    </div>
                                    {viewBriefModal.clientOfficialDetails ? (
                                        <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
                                            <div className="font-black text-emerald-900">אושר חוזה: <span dir="ltr">{viewBriefModal.clientOfficialDetails.signedAt}</span></div>
                                            <div className="text-sm mt-3 grid grid-cols-2 gap-3 text-emerald-800">
                                                <div className="bg-white/50 p-2 rounded border"><strong>שם לחשבונית:</strong> {viewBriefModal.clientOfficialDetails.officialName}</div>
                                                <div className="bg-white/50 p-2 rounded border"><strong>ח.פ/ת.ז:</strong> {viewBriefModal.clientOfficialDetails.idNumber}</div>
                                            </div>
                                            {viewBriefModal.clientOfficialDetails.signatureData && (
                                                <div className="mt-5 border-t border-emerald-200 pt-5"><strong className="block text-emerald-900 mb-2">חתימה:</strong><img src={viewBriefModal.clientOfficialDetails.signatureData} alt="חתימה" className="h-24 object-contain bg-white rounded border p-2" /></div>
                                            )}
                                        </div>
                                    ) : <div className="p-6 bg-gray-50 rounded-xl text-center font-bold text-gray-500">⏳ הלקוח טרם חתם.</div>}
                                    {viewBriefModal.briefInfo && (
                                        <div className="bg-gray-50 p-4 rounded-xl text-sm space-y-2"><h4 className="font-black border-b pb-2 mb-2">אפיון:</h4>
                                            <p><strong>קהל:</strong> {viewBriefModal.briefInfo.audience}</p>
                                            <p><strong>פעולה:</strong> {viewBriefModal.briefInfo.callToAction}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);
            if (isLoadingDb) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full"></div></div>;
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-gray-50">
                    <header className="md:hidden bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                        <h1 className="text-2xl font-black text-gray-900">ORIZIS<span className="text-brand-600">WEB</span></h1>
                        <button onClick={logout} className="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-lg">התנתק</button>
                    </header>
                    <aside className="w-72 bg-brand-950 text-white hidden md:flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-8 border-b border-gray-800/50"><h1 className="text-3xl font-black text-white">ORIZIS<span className="text-brand-500">WEB</span></h1></div>
                        <div className="flex-1 p-6"></div>
                        <div className="p-6 border-t border-gray-800/50 bg-gray-900/50">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 rounded-full bg-brand-600 flex items-center justify-center font-black text-xl uppercase">{currentUser.name ? currentUser.name.charAt(0) : 'U'}</div>
                                <div><div className="text-sm font-black">{currentUser.name || currentUser.email}</div><div className="text-xs text-brand-400 font-bold mt-1 bg-brand-900/50 px-2.5 py-0.5 rounded-md inline-block">{currentUser.role === 'manager' ? 'הנהלה' : currentUser.role === 'client' ? 'לקוח הסטודיו' : 'צוות פיתוח'}</div></div>
                            </div>
                            <button onClick={logout} className="w-full bg-gray-800 text-gray-300 font-bold text-sm py-3 rounded-xl hover:bg-red-900 hover:text-red-200">יציאה מהמערכת</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto h-[calc(100vh-73px)] md:h-screen">
                        <div className="max-w-6xl mx-auto pb-20">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
