    <!-- React, ReactDOM, Babel -->

<body class="text-gray-900 selection:bg-brand-100 selection:text-brand-600">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Card = ({ children, className = '', noPadding = false }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-gray-200 transition-shadow hover:shadow-md ${noPadding ? '' : 'p-6 md:p-8'} ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 active:scale-[0.98]";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-600/20 focus:ring-brand-500/30",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200/50",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/20 focus:ring-emerald-500/30",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-100/50",
                outline: "bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-100",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-md shadow-amber-500/20"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'gray', className='' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700 border-gray-200',
                blue: 'bg-blue-50 text-brand-600 border-blue-200',
                green: 'bg-emerald-50 text-emerald-600 border-emerald-200',
                yellow: 'bg-amber-50 text-amber-600 border-amber-200',
                red: 'bg-red-50 text-red-600 border-red-200',
                purple: 'bg-purple-50 text-purple-600 border-purple-200'
            };
            return (
                <span className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border ${colors[color]} ${className}`}>
                    {children}
                </span>
            );
        };

        const formatDuration = (totalSeconds) => {
            if (!totalSeconds) return "00:00:00";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const defaultAgreementText = `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ ח.פ 516977758 הפועלת באמצעות מותג ORIZISWEB שתיקרא להלן החברה לבין הלקוח המזמין את השירותים דרך פורטל הלקוחות הדיגיטלי שייקרא להלן הלקוח.\n\n1. מהות ההתקשרות ותכולת העבודה\nהחברה תספק ללקוח שירותי פיתוח ועיצוב אתר אינטרנט בהתאם למידע שסופק. כל בקשה לפיתוח החורגת ממה שסוכם תתומחר בנפרד ותדרוש אישור ותשלום נוסף.\n\n2. התחייבויות הלקוח\nהלקוח מתחייב להעביר לחברה את כל החומרים הנדרשים במועד מילוי טופס האפיון. עיכוב במסירת חומרים יגרור עיכוב בלוחות הזמנים.\n\n3. לוחות זמנים ומסירת הפרויקט\nהחברה תחל בפיתוח האתר מיד עם קבלת כל חומרי האפיון. זמן האספקה המשוער הוא עד 14 ימי עסקים אלא אם נרכש שירות אקספרס (מוחרג שבתות וחגים).\n\n4. סבבי תיקונים\nהלקוח זכאי ל-2 סבבי תיקונים במסגרת האפיון המקורי.\n\n5. תשלומים ותוספות\nהתשלום בגין הפיתוח מתבצע מראש. הלקוח רשאי להוסיף פיצ'רים לאתר דרך החנות שיחויבו בנפרד.\n\n6. אחריות וביטולים\nניתנת תקופת אחריות של 30 ימים לתיקון באגים. במקרה של ביטול עסקה לאחר תחילת הפיתוח, יגרור הדבר חיוב יחסי בגין העבודה שבוצעה.`;

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: '' });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            else auth.signOut();
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                        setIsLoadingDb(false);
                    }
                });

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (!data.agreementText) {
                            db.collection('settings').doc('general').update({ agreementText: defaultAgreementText });
                            data.agreementText = defaultAgreementText;
                        }
                        
                        // מוצרי ברירת מחדל אם החנות ריקה
                        if (!data.upsells || data.upsells.length === 0) {
                            const initialUpsells = [
                                { id: '1', title: 'כפתור וואטסאפ צף', price: 100, icon: '💬', isPremium: false, desc: 'חיבור מהיר לוואטסאפ של העסק.' },
                                { id: '2', title: 'הטמעת מפת הגעה', price: 100, icon: '🗺️', isPremium: false, desc: 'הטמעת מפת גוגל באתר.' },
                                { id: '3', title: 'תוסף נגישות לאתר', price: 150, icon: '♿', isPremium: false, desc: 'הנגשת האתר כחוק.' },
                                { id: '4', title: 'חיבור דומיין אישי', price: 0, icon: '🌐', isPremium: false, desc: 'חיבור לכתובת שרכשת.' },
                                { id: '5', title: 'פופ-אפ כרטיס גירוד', price: 1000, icon: '🎟️', isPremium: true, desc: 'משחק אינטראקטיבי להשארת לידים וחלוקת קופונים ללקוחות. ממיר בטירוף!' },
                                { id: '6', title: 'גלגל המזל (רולטה)', price: 1200, icon: '🎡', isPremium: true, desc: 'פופ-אפ גלגל מזל שקופץ לגולש ומעודד אותו להשאיר פרטים כדי לזכות בהנחה.' },
                                { id: '7', title: 'מסירת אקספרס (עד 48 שעות)', price: 500, icon: '⚡', isPremium: true, desc: 'הקפצת האתר לראש התור (לא כולל שבתות וחגים, וכפוף למסירת כל החומרים).' },
                                { id: '8', title: 'שילוב 5 תמונות אווירה', price: 0, icon: '📸', isPremium: false, desc: 'בחירת תמונות ממאגרים מקצועיים.' }
                            ];
                            db.collection('settings').doc('general').update({ upsells: initialUpsells });
                            data.upsells = initialUpsells;
                        }

                        setSystemSettings(data);
                    } else {
                        db.collection('settings').doc('general').set({
                            upsells: [],
                            expenses: { marketing: 0, office: 0, software: 0 },
                            agreementText: defaultAgreementText
                        });
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => await db.collection('projects').doc(projectId).update(updates);
            
            const deleteProject = async (projectId) => {
                if(window.confirm("אזהרה: האם למחוק פרויקט זה לחלוטין? פעולה זו תאפס את ההכנסה שלו בלוח הפיננסי.")) {
                    await db.collection('projects').doc(projectId).delete();
                }
            };

            const updateSettings = async (updates) => await db.collection('settings').doc('general').update(updates);
            const updateUser = async (userId, updates) => await db.collection('users').doc(userId).update(updates);

            const deleteUser = async (userId) => {
                if(window.confirm("אזהרה: מחיקת המשתמש תחסום את גישתו למערכת ותמחק אוטומטית גם את הפרויקטים המשויכים אליו! להמשיך?")) {
                    // מחיקה חכמה - גם המשתמש וגם הפרויקטים שלו
                    const userProjects = projects.filter(p => p.clientId === userId);
                    for (const p of userProjects) {
                        await db.collection('projects').doc(p.id).delete();
                    }
                    await db.collection('users').doc(userId).delete();
                }
            };

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); 
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { 
                    setError("פרטי ההתחברות שגויים. נא לוודא אימייל וסיסמה או לפנות למנהל המערכת."); 
                } finally { 
                    setLoading(false); 
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-200">
                    <Card className="w-full max-w-md p-10 relative shadow-2xl bg-white border-white/50 glass-panel fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter text-gray-900">
                                ORIZIS<span className="text-brand-600">WEB</span>
                            </h1>
                            <p className="text-gray-500 font-medium mt-2 tracking-widest text-xs uppercase">Enterprise Access</p>
                        </div>
                        
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 font-bold text-center">{error}</div>}

                        <form onSubmit={handleAuth} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">אימייל גישה</label>
                                <input type="email" placeholder="name@domain.com" onChange={e => setEmail(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label>
                                <input type="password" placeholder="••••••••" onChange={e => setPassword(e.target.value)} className="w-full p-3.5 border border-gray-300 rounded-xl bg-gray-50 text-gray-900 focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all text-left font-sans" dir="ltr" required />
                            </div>
                            
                            <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-4 shadow-xl shadow-brand-500/20">
                                {loading ? 'מאמת נתונים...' : 'כניסה מאובטחת למערכת'}
                            </Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const initCanvas = () => {
                    const parent = canvas.parentElement;
                    canvas.width = parent.clientWidth;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = '#0f172a'; // צבע הדיו - כחול כהה/שחור
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                };
                initCanvas();
                window.addEventListener('resize', initCanvas);
                return () => window.removeEventListener('resize', initCanvas);
            }, []);

            const getCoordinates = (event) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const evt = event.nativeEvent || event;
                if (evt.touches && evt.touches.length > 0) {
                    return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
                }
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            };

            const startDrawing = (event) => {
                const { x, y } = getCoordinates(event);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (event) => {
                if (!isDrawing) return;
                const { x, y } = getCoordinates(event);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if (isDrawing) {
                    setIsDrawing(false);
                    onSave(canvasRef.current.toDataURL('image/png'));
                }
            };

            const clearPad = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                onSave(null);
            };

            return (
                <div className="border-2 border-gray-300 rounded-xl overflow-hidden bg-white shadow-inner mb-6">
                    <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 text-sm font-bold text-gray-700 flex justify-between items-center">
                        <span>✍️ צייר את חתימתך כאן (עכבר / אצבע):</span>
                        <button type="button" onClick={clearPad} className="text-red-500 hover:text-red-700 text-xs font-bold bg-white px-3 py-1 rounded-lg shadow-sm border border-red-100 transition-colors">נקה חתימה</button>
                    </div>
                    <canvas
                        ref={canvasRef}
                        className="w-full touch-none cursor-crosshair bg-white"
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseOut={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchMove={draw}
                        onTouchEnd={stopDrawing}
                    />
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            
            const [onboardingData, setOnboardingData] = useState({ officialName: '', idNumber: '', address: '', termsAccepted: false, signatureData: null });
            const [showContractModal, setShowContractModal] = useState(false);
            const [briefData, setBriefData] = useState({ 
                businessName: '', phone: '', businessType: '', colors: '', competitor: '', 
                audience: '', services: '', uniqueSellingPoint: '', callToAction: ''
            });
            
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return (
                <div className="text-center p-12 bg-white rounded-3xl shadow-sm border border-gray-200 mt-10">
                    <div className="text-4xl mb-4">👋</div>
                    <h2 className="text-2xl font-black text-gray-900 mb-2">ברוך הבא לאזור האישי</h2>
                    <p className="text-gray-500">טרם הוקצה עבורך פרויקט במערכת. אנא פנה לתמיכה במידה ושילמת.</p>
                </div>
            );

            const handleOnboardingSubmit = (e) => {
                e.preventDefault();
                if(!onboardingData.termsAccepted) {
                    alert("חובה לאשר את תנאי ההתקשרות בתיבת הסימון כדי להתקדם.");
                    return;
                }
                if(!onboardingData.signatureData) {
                    alert("חובה לחתום את חתימתך בחלונית החתימה הדיגיטלית למעלה.");
                    return;
                }
                updateProject(project.id, { 
                    status: 'paid_waiting_for_brief', 
                    clientOfficialDetails: { ...onboardingData, signedAt: new Date().toLocaleString('he-IL') } 
                });
            };

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { 
                    status: 'brief_submitted', 
                    briefInfo: briefData 
                });
            };

            const purchaseUpsell = (upsell) => {
                if (!window.confirm(`האם לאשר הוספת "${upsell.title}" בעלות של ₪${upsell.price}? הפריט יתווסף להזמנה.`)) return;
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, {
                    addons: [...currentAddons, upsell],
                    paymentAmount: (project.paymentAmount || 0) + upsell.price
                });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    
                    {/* Welcome Header & Progress */}
                    <div className="bg-brand-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brand-600 rounded-full blur-3xl opacity-20 -mr-20 -mt-20 pointer-events-none"></div>
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-black">שלום, {currentUser.name}!</h2>
                                <Badge color="blue">פורטל הלקוחות של ORIZISWEB</Badge>
                            </div>
                            <p className="text-gray-300 font-medium max-w-xl">
                                ברוך הבא למערכת הניהול שלך. כאן תוכל לאפיין את האתר, לעקוב אחרי הפיתוח ולהוסיף שדרוגים.
                            </p>
                            
                            {/* 4-Step Progress Indicator */}

                                        </div>
                                    )}
                                    
                                    {isEarlyStage ? (
                                        <div className="mt-6 pt-6 border-t border-gray-100">
                                            <div className="bg-blue-50 border border-blue-200 p-6 rounded-2xl">
                                                <h4 className="font-black text-blue-900 mb-2 flex items-center gap-2">📞 שלב מכירה ואפיון טלפוני</h4>
                                                <p className="text-sm text-blue-800 mb-4">צור קשר עם הלקוח ומלא יחד איתו את טופס האפיון כדי להתחיל לעבוד.</p>
                                                <Button onClick={() => setSalesBriefModal(project)} className="w-full py-4 text-base">📝 פתח טופס אפיון ומכירה</Button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="mt-6 pt-6 border-t border-gray-100 flex flex-col gap-4">
                                            <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                                                <div>
                                                    <div className="font-black text-gray-900">הצעות מחיר ושדרוגים מיוחדים</div>
                                                    <div className="text-xs text-gray-500 font-medium">רוצה לתת ללקוח הנחה על מוצר בחנות? בקש אישור מנהל.</div>
                                                </div>
                                                <Button onClick={() => setAddonModal(project)} variant="outline" className="text-xs py-2">בקש אישור חריג להנחה</Button>
                                            </div>
                                            
                                            <div className="flex gap-4">
                                                <Button onClick={() => toggleTimer(project)} variant={project.isTimerRunning ? 'outline' : 'primary'} className="flex-1 py-4 text-base">
                                                    {project.isTimerRunning ? '⏸ השהה טיימר' : '▶️ התחל לפתח'}
                                                </Button>
                                                <Button onClick={() => updateProject(project.id, { status: 'qa_review' })} variant="success" className="flex-1 py-4 text-base" disabled={project.isTimerRunning}>
                                                    🚀 הגש ל-QA
                                                </Button>
                                            </div>
                                        </div>
                                    )}
                                </Card>
                            )
                        })}
                        {myProjects.length === 0 && <div className="text-center p-10 text-gray-400 font-bold bg-white rounded-2xl shadow-sm">אין משימות פעילות.</div>}
                    </div>

                    {/* Sales Brief Modal */}
                    {salesBriefModal && (
                        <div className="fixed inset-0 bg-gray-950/80 backdrop-blur-md flex items-center justify-center z-50 p-4 fade-in overflow-y-auto">
                            <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden my-8">
                                <div className="flex justify-between items-center p-6 bg-blue-600">
                                    <h3 className="font-black text-white">📝 אפיון טלפוני (נציג)</h3>
                                    <button onClick={() => setSalesBriefModal(null)} className="text-white font-bold">✕</button>
                                </div>
                                <div className="p-6 max-h-[75vh] overflow-y-auto">
                                    <form onSubmit={(e) => { e.preventDefault(); updateProject(salesBriefModal.id, { status: 'in_progress', briefInfo: briefData }); setSalesBriefModal(null); }} className="space-y-4">
                                        <input type="text" placeholder="שם העסק" required onChange={e=>setBriefData({...briefData, businessName: e.target.value})} className="w-full p-3 border rounded-xl" />
                                        <input type="tel" placeholder="טלפון לקוחות" required onChange={e=>setBriefData({...briefData, phone: e.target.value})} className="w-full p-3 border rounded-xl" />
                                        <input type="text" placeholder="תחום עיסוק" required onChange={e=>setBriefData({...briefData, businessType: e.target.value})} className="w-full p-3 border rounded-xl" />
                                        <select required onChange={e=>setBriefData({...briefData, callToAction: e.target.value})} className="w-full p-3 border rounded-xl">
                                            <option value="" disabled selected>הנעה לפעולה...</option>
                                            <option value="טלפון">טלפון</option>
                                            <option value="וואטסאפ">וואטסאפ</option>
                                            <option value="טופס לידים">טופס לידים</option>
                                        </select>
                                        <Button type="submit" className="w-full py-4 text-lg">שמור אפיון והתחל עבודה</Button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Addon Discount Request Modal */}
                    {addonModal && (
                        <div className="fixed inset-0 bg-gray-950/80 backdrop-blur-md flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
                                <div className="flex justify-between items-center p-6 bg-amber-500">
                                    <h3 className="font-black text-white">בקשת אישור הנחה / חריג</h3>
                                    <button onClick={() => setAddonModal(null)} className="text-white font-bold">✕</button>
                                </div>
                                <div className="p-6">
                                    <form onSubmit={(e) => handleCustomAddonRequest(e, addonModal)} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">בחר מוצר מהחנות</label>
                                            <select required onChange={e => {
                                                const selectedItem = systemSettings.upsells.find(u => u.id === e.target.value);
                                                setCustomAddon({...customAddon, item: selectedItem, requestedPrice: selectedItem ? selectedItem.price : ''});
                                            }} className="w-full p-3 border border-gray-300 rounded-xl outline-none">
                                                <option value="">בחר...</option>
                                                {systemSettings.upsells.map(u => <option key={u.id} value={u.id}>{u.icon} {u.title} (רגיל: ₪{u.price})</option>)}
                                            </select>
                                        </div>
                                        {customAddon.item && (
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">מחיר מבוקש (₪)</label>
                                                <input type="number" required min="0" value={customAddon.requestedPrice} onChange={e=>setCustomAddon({...customAddon, requestedPrice: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl font-sans outline-none" />
                                                <p className="text-xs text-gray-500 mt-2">אם המחיר נמוך מהרגיל, הבקשה תשלח למנהל לאישור לפני הוספה לתיק.</p>
                                            </div>
                                        )}
                                        <Button type="submit" variant="warning" className="w-full py-4 text-lg">שגר בקשה לאישור ➔</Button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, freelancers, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, currentUser } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            const [viewBriefModal, setViewBriefModal] = useState(null);
            const [newUser, setNewUser] = useState({ email: '', password: '', name: '', role: 'client' });
            
            // עריכת חנות והסכם
            const [editingUpsell, setEditingUpsell] = useState(null);
            const [newUpsell, setNewUpsell] = useState({ id: '', title: '', price: 0, icon: '✨', isPremium: false, desc: '' });
            const [agreementInput, setAgreementInput] = useState(systemSettings.agreementText || '');

            useEffect(() => { setAgreementInput(systemSettings.agreementText); }, [systemSettings.agreementText]);

            const activeProjects = projects.filter(p => p.status !== 'completed');

            const handleCreateUser = async (e) => {
                e.preventDefault();
                try {
                    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(newUser.email, newUser.password);
                    const userData = { role: newUser.role, name: newUser.name, email: newUser.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                    // תעריף פרילנסר ועמלות על 0% כברירת מחדל לאנשי מכירות
                    if (newUser.role === 'freelancer') { userData.basePay = 1000; userData.upsellPercentage = 0; }
                    await db.collection('users').doc(cred.user.uid).set(userData);
                    if (newUser.role === 'client') await db.collection('projects').add({ customerName: newUser.name, status: 'onboarding', paymentAmount: 1500, timeSpent: 0, isTimerRunning: false, addons: [], pendingRequests: [], clientId: cred.user.uid });
                    await secondaryApp.auth().signOut();
                    alert('✅ המשתמש הוקם בהצלחה!');
                    setNewUser({ email: '', password: '', name: '', role: 'client' });
                } catch (err) { alert('❌ שגיאה: ' + err.message); }
            };

            const handleApproveRequest = (project, request, isApproved) => {
                const updatedRequests = project.pendingRequests.filter(r => r.id !== request.id);
                if (isApproved) {
                    const approvedAddon = { ...request.upsell, price: request.requestedPrice };
                    updateProject(project.id, { 
                        pendingRequests: updatedRequests,
                        addons: [...(project.addons || []), approvedAddon],
                        paymentAmount: (project.paymentAmount || 1500) + request.requestedPrice
                    });
                } else {
                    updateProject(project.id, { pendingRequests: updatedRequests });
                }
            };

            const handleSaveUpsell = (isNew) => {
                const updatedUpsells = [...systemSettings.upsells];
                if (isNew) {
                    updatedUpsells.push({ ...newUpsell, id: Date.now().toString(), price: Number(newUpsell.price) });
                    setNewUpsell({ id: '', title: '', price: 0, icon: '✨', isPremium: false, desc: '' });
                } else {
                    const index = updatedUpsells.findIndex(u => u.id === editingUpsell.id);
                    if(index > -1) updatedUpsells[index] = { ...editingUpsell, price: Number(editingUpsell.price) };
                    setEditingUpsell(null);
                }
                updateSettings({ upsells: updatedUpsells });
            };

            const handleDeleteUpsell = (id) => {
                if(window.confirm('האם למחוק מוצר זה מהחנות?')) {
                    updateSettings({ upsells: systemSettings.upsells.filter(u => u.id !== id) });
                }
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="flex gap-3 overflow-x-auto pb-2 border-b border-gray-200 scrollbar-hide">
                        <button onClick={()=>setActiveTab('projects')} className={`px-6 py-3 font-bold text-sm rounded-xl transition-all whitespace-nowrap ${activeTab==='projects'?'bg-brand-600 text-white shadow-md shadow-brand-600/20':'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>ניהול אופרציה</button>
                        <button onClick={()=>setActiveTab('users')} className={`px-6 py-3 font-bold text-sm rounded-xl transition-all whitespace-nowrap ${activeTab==='users'?'bg-brand-600 text-white shadow-md shadow-brand-600/20':'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>משתמשים וצוות</button>
                        <button onClick={()=>setActiveTab('settings')} className={`px-6 py-3 font-bold text-sm rounded-xl transition-all whitespace-nowrap ${activeTab==='settings'?'bg-brand-600 text-white shadow-md shadow-brand-600/20':'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}>הגדרות וחנות מערכת</button>
                    </div>

                    {/* --- טאב ניהול אופרציה ואישורים --- */}
                    {activeTab === 'projects' && (
                        <Card noPadding className="flex flex-col relative overflow-hidden shadow-sm">
                            <div className="p-6 md:p-8 bg-white border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <div><h2 className="text-2xl font-black text-gray-900">לוח בקרת ייצור ואישורים</h2></div>
                            </div>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-gray-50 text-gray-500 border-b border-gray-200">
                                        <tr><th className="px-6 py-4 font-bold">תיק וסטטוס</th><th className="px-6 py-4 font-bold">פעולות ואישורים</th><th className="px-6 py-4 font-bold">ניהול מחיקה ושיוך</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 bg-white">
                                        {activeProjects.map(p => (
                                            <tr key={p.id} className="hover:bg-brand-50/30">
                                                <td className="px-6 py-6 align-top">
                                                    <div className="font-black text-lg text-gray-900 mb-2">{p.clientOfficialDetails?.officialName || p.customerName}</div>
                                                    <Badge color={p.status === 'onboarding' ? 'gray' : p.status === 'qa_review' ? 'green' : 'blue'}>{p.status.replace(/_/g, ' ')}</Badge>
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    <button onClick={() => setViewBriefModal(p)} className="text-brand-700 bg-brand-50 hover:bg-brand-100 border border-brand-200 px-4 py-2 rounded-xl font-bold text-xs transition-colors shadow-sm mb-3">📋 פתח תיק לקוח ומעקב סטטוס</button>
                                                    
                                                    {/* Pending Approvals Block */}
                                                    {p.pendingRequests && p.pendingRequests.length > 0 && (
                                                        <div className="bg-amber-50 border border-amber-300 rounded-xl p-3 shadow-sm mt-2">
                                                            <div className="text-xs font-black text-amber-900 mb-2">⚠️ ממתין לאישור מנהל:</div>
                                                            {p.pendingRequests.map(req => (
                                                                <div key={req.id} className="bg-white p-2 rounded border border-amber-200 mb-2 flex flex-col gap-2">
                                                                    <span className="text-xs font-bold text-gray-800">{req.freelancerName} מבקש לתת ללקוח את '{req.upsell.title}' במחיר ₪{req.requestedPrice} (במקום ₪{req.originalPrice}).</span>
                                                                    <div className="flex gap-2">
                                                                        <Button onClick={() => handleApproveRequest(p, req, true)} variant="success" className="py-1 px-3 text-[10px]">אשר בקשה</Button>
                                                                        <Button onClick={() => handleApproveRequest(p, req, false)} variant="danger" className="py-1 px-3 text-[10px]">דחה</Button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    <select className="border border-gray-300 rounded-xl p-2.5 text-xs font-bold bg-white mb-2" onChange={(e) => updateProject(p.id, { freelancerId: e.target.value })} value={p.freelancerId || ""}>
                                                        <option value="" disabled>שייך אל: ממתין להקצאה</option>
                                                        {freelancers.map(fl => <option key={fl.uid} value={fl.uid}>{fl.name}</option>)}
                                                    </select>
                                                    <button onClick={() => deleteProject(p.id)} className="block text-red-500 hover:bg-red-50 text-xs font-bold mt-2 px-3 py-1.5 rounded border border-red-200 w-max">🗑️ מחק פרויקט</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {/* --- טאב משתמשים וצוות --- */}
                    {activeTab === 'users' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <Card className="border-t-4 border-t-brand-500">
                                <h3 className="text-xl font-black mb-4">הקמת משתמש (לקוח/צוות)</h3>
                                <form onSubmit={handleCreateUser} className="space-y-4">
                                    <input type="text" placeholder="שם מלא / שם עסק" required value={newUser.name} onChange={e=>setNewUser({...newUser, name: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="email" placeholder="אימייל כניסה" required dir="ltr" value={newUser.email} onChange={e=>setNewUser({...newUser, email: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="text" placeholder="סיסמה זמנית" required dir="ltr" value={newUser.password} onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-3 border rounded-xl font-bold">
                                        <option value="client">לקוח (פותח תיק פרויקט אוטומטית)</option>
                                        <option value="freelancer">פרילנסר (צוות ביצוע)</option>
                                        <option value="manager">מנהל מערכת</option>
                                    </select>
                                    <Button type="submit" className="w-full">צור והוסף למערכת</Button>
                                </form>
                            </Card>

                            <Card noPadding className="flex flex-col">
                                <div className="p-6 border-b"><h3 className="text-xl font-black">ניהול משתמשים (מחיקה כוללת פרויקט)</h3></div>
                                <div className="p-0 overflow-y-auto max-h-96">
                                    <table className="w-full text-right text-sm">
                                        <tbody>
                                            {usersList.map(u => (
                                                <tr key={u.uid} className="border-b">
                                                    <td className="p-4 font-bold">{u.name}</td>
                                                    <td className="p-4"><Badge>{u.role}</Badge></td>
                                                    <td className="p-4">
                                                        {u.uid !== currentUser.uid && <button onClick={() => deleteUser(u.uid)} className="text-red-500 bg-red-50 px-3 py-1 rounded text-xs font-bold hover:bg-red-100">מחק</button>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* --- טאב הגדרות מערכת וחנות --- */}
                    {activeTab === 'settings' && (
                        <div className="space-y-8 fade-in">
                            {/* ניהול ההסכם המשפטי הגלובלי */}
                            <Card className="border-t-4 border-t-purple-500">
                                <h3 className="text-xl font-black text-gray-900 mb-2">⚖️ עריכת חוזה / הסכם התקשרות אחיד</h3>
                                <p className="text-sm text-gray-500 mb-4">טקסט זה יוצג לכל לקוח חדש במסך הראשון והוא חייב לאשר אותו כדי להתחיל בעבודה. ניתן לערוך אותו בכל עת.</p>
                                <textarea rows="10" value={agreementInput} onChange={(e) => setAgreementInput(e.target.value)} className="w-full p-4 border border-gray-300 rounded-xl bg-gray-50 text-sm font-medium leading-relaxed outline-none focus:ring-2 focus:ring-purple-500 transition-all"></textarea>
                                <Button onClick={() => { updateSettings({ agreementText: agreementInput }); alert('ההסכם עודכן בהצלחה ויחול על לקוחות חדשים.'); }} variant="primary" className="mt-4 bg-purple-600 hover:bg-purple-700">שמור ועדכן הסכם משפטי</Button>
                            </Card>

                            {/* ניהול מוצרים בחנות */}
                            <Card noPadding className="border-t-4 border-t-brand-500">
                                <div className="p-6 md:p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="text-xl font-black text-gray-900">🛒 ניהול מוצרי חנות ואפסיילים</h3>
                                </div>
                                
                                <div className="p-6 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* טופס הוספה/עריכה של מוצר */}
                                    <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                                        <h4 className="font-bold text-brand-900 mb-4 border-b pb-2">{editingUpsell ? 'עריכת מוצר קיים' : '➕ הוספת מוצר חדש לחנות'}</h4>
                                        <div className="space-y-4">
                                            <div><label className="text-xs font-bold text-gray-500">שם המוצר</label><input type="text" value={editingUpsell ? editingUpsell.title : newUpsell.title} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, title: e.target.value}) : setNewUpsell({...newUpsell, title: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm bg-gray-50" /></div>
                                            <div className="flex gap-4">
                                                <div className="flex-1"><label className="text-xs font-bold text-gray-500">מחיר (₪)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.price : newUpsell.price} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, price: e.target.value}) : setNewUpsell({...newUpsell, price: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm bg-gray-50 font-sans" /></div>
                                                <div className="w-16"><label className="text-xs font-bold text-gray-500">אמוג'י</label><input type="text" value={editingUpsell ? editingUpsell.icon : newUpsell.icon} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, icon: e.target.value}) : setNewUpsell({...newUpsell, icon: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm text-center bg-gray-50" /></div>
                                            </div>
                                            <div><label className="text-xs font-bold text-gray-500">תיאור שיווקי (מומלץ)</label><textarea rows="2" value={editingUpsell ? editingUpsell.desc : newUpsell.desc} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, desc: e.target.value}) : setNewUpsell({...newUpsell, desc: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm bg-gray-50 resize-none"></textarea></div>
                                            <label className="flex items-center gap-2 text-sm font-bold cursor-pointer">
                                                <input type="checkbox" checked={editingUpsell ? editingUpsell.isPremium : newUpsell.isPremium} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isPremium: e.target.checked}) : setNewUpsell({...newUpsell, isPremium: e.target.checked})} className="w-4 h-4 text-amber-500" /> סמן כמוצר פרימיום (זהב)
                                            </label>
                                            
                                            {editingUpsell ? (
                                                <div className="flex gap-2 pt-2">
                                                    <Button onClick={() => handleSaveUpsell(false)} variant="success" className="flex-1 py-2">שמור שינויים</Button>
                                                    <Button onClick={() => setEditingUpsell(null)} variant="outline" className="flex-1 py-2">בטל</Button>
                                                </div>
                                            ) : (
                                                <Button onClick={() => { if(newUpsell.title) handleSaveUpsell(true); else alert('יש להזין שם מוצר'); }} className="w-full py-2.5 mt-2">הוסף למדף החנות</Button>
                                            )}
                                        </div>
                                    </div>

                                    {/* רשימת המוצרים */}
                                    <div className="lg:col-span-2 space-y-3 max-h-[600px] overflow-y-auto pr-2">
                                        {systemSettings.upsells.map(u => (
                                            <div key={u.id} className={`flex items-center justify-between p-4 rounded-xl border ${u.isPremium ? 'bg-amber-50 border-amber-200' : 'bg-white border-gray-200'} shadow-sm`}>
                                                <div>
                                                    <div className="font-black text-gray-900">{u.icon} {u.title} <span className="font-sans text-brand-600 bg-brand-50 px-2 py-0.5 rounded text-sm mr-2">₪{u.price}</span></div>
                                                    <div className="text-xs text-gray-500 mt-1">{u.desc || 'ללא תיאור'}</div>
                                                </div>
                                                <div className="flex gap-2 shrink-0">
                                                    <button onClick={() => setEditingUpsell(u)} className="text-xs font-bold bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded transition">✏️ ערוך</button>
                                                    <button onClick={() => handleDeleteUpsell(u.id)} className="text-xs font-bold bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded transition">🗑️ מחק</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* Modal for View Brief (Manager) */}
                    {viewBriefModal && (
                        <div className="fixed inset-0 bg-gray-950/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden border border-gray-200">
                                <div className="flex justify-between items-center p-6 bg-gray-50 border-b shrink-0">
                                    <h3 className="font-black text-2xl">📋 תיק לקוח: {viewBriefModal.clientOfficialDetails?.officialName || viewBriefModal.customerName}</h3>
                                    <button onClick={() => setViewBriefModal(null)} className="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold">סגור</button>
                                </div>
                                <div className="p-6 md:p-8 overflow-y-auto space-y-6 flex-1">
                                    {/* ציר התקדמות למנהל */}
                                    <div className="bg-gray-50 p-4 rounded-xl border flex flex-col sm:flex-row justify-between text-xs font-bold text-gray-400 gap-2">
                                        <div className={viewBriefModal.status !== 'onboarding' ? 'text-emerald-600' : 'text-brand-600'}>1. חוזה ופרטים {viewBriefModal.status !== 'onboarding' && '✓'}</div>
                                        <div className={['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='paid_waiting_for_brief'?'text-brand-600':''}>2. אפיון {['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                        <div className={['qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='in_progress'?'text-brand-600':''}>3. פיתוח {['qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                    </div>

                                    {viewBriefModal.clientOfficialDetails ? (
                                        <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
                                            <div className="font-black text-emerald-900">אושר חוזה התקשרות בתאריך: <span dir="ltr" className="font-sans">{viewBriefModal.clientOfficialDetails.signedAt}</span></div>
                                            <div className="text-sm mt-3 grid grid-cols-1 md:grid-cols-2 gap-3 text-emerald-800">
                                                <div className="bg-white/50 p-2 rounded border border-emerald-100"><strong>שם לחשבונית:</strong> {viewBriefModal.clientOfficialDetails.officialName}</div>
                                                <div className="bg-white/50 p-2 rounded border border-emerald-100"><strong>ח.פ/ת.ז:</strong> {viewBriefModal.clientOfficialDetails.idNumber}</div>
                                                <div className="bg-white/50 p-2 rounded border border-emerald-100 md:col-span-2"><strong>כתובת מלאה:</strong> {viewBriefModal.clientOfficialDetails.address}</div>
                                            </div>
                                            
                                            {/* הצגת החתימה המצוירת למנהל */}
                                            {viewBriefModal.clientOfficialDetails.signatureData && (
                                                <div className="mt-5 border-t border-emerald-200 pt-5">
                                                    <strong className="block text-emerald-900 mb-2">חתימת הלקוח:</strong>
                                                    <div className="bg-white rounded-xl border-2 border-emerald-200 p-2 inline-block shadow-sm">
                                                        <img src={viewBriefModal.clientOfficialDetails.signatureData} alt="חתימת לקוח" className="h-24 object-contain" />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ) : <div className="p-6 bg-gray-50 rounded-xl text-center font-bold text-gray-500">⏳ הלקוח עדיין לא התחבר ולא חתם על החוזה.</div>}

                                    {viewBriefModal.briefInfo && (
                                        <div className="space-y-4">
                                            <h4 className="font-black text-lg border-b pb-2">תשובות אפיון שיווקי:</h4>
                                            <div className="text-sm space-y-3 bg-gray-50 p-4 rounded-xl">
                                                <p><strong>קהל יעד:</strong> {viewBriefModal.briefInfo.audience}</p>
                                                <p><strong>שירותים להבליט:</strong> {viewBriefModal.briefInfo.services}</p>
                                                <p><strong>טלפון לידים:</strong> {viewBriefModal.briefInfo.phone}</p>
                                                <p><strong>הנעה לפעולה:</strong> <Badge color="blue">{viewBriefModal.briefInfo.callToAction}</Badge></p>
                                            </div>
                                        </div>
                                    )}

                                    {viewBriefModal.addons && viewBriefModal.addons.length > 0 && (
                                        <div className="bg-brand-50 p-5 rounded-xl border border-brand-200">
                                            <h4 className="font-black text-brand-900 mb-2">🛒 שדרוגים בחשבונית:</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {viewBriefModal.addons.map(a => <Badge color="blue" key={a.id}>{a.title} (₪{a.price})</Badge>)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);
            if (isLoadingDb) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full"></div></div>;
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-gray-50">
                    <header className="md:hidden bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                        <h1 className="text-2xl font-black text-gray-900 tracking-tighter">ORIZIS<span className="text-brand-600">WEB</span></h1>
                        <button onClick={logout} className="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-lg">התנתק</button>
                    </header>
                    <aside className="w-72 bg-brand-950 text-white hidden md:flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-8 border-b border-gray-800/50">
                            <h1 className="text-3xl font-black text-white">ORIZIS<span className="text-brand-500">WEB</span></h1>
                        </div>
                        <div className="flex-1 p-6"></div>
                        <div className="p-6 border-t border-gray-800/50 bg-gray-900/50">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 rounded-full bg-brand-600 flex items-center justify-center font-black text-xl uppercase">{currentUser.name ? currentUser.name.charAt(0) : 'U'}</div>
                                <div>
                                    <div className="text-sm font-black">{currentUser.name || currentUser.email}</div>
                                    <div className="text-xs text-brand-400 font-bold mt-1 bg-brand-900/50 px-2.5 py-0.5 rounded-md inline-block">{currentUser.role === 'manager' ? 'הנהלה' : currentUser.role === 'client' ? 'לקוח הסטודיו' : 'צוות פיתוח'}</div>
                                </div>
                            </div>
                            <button onClick={logout} className="w-full bg-gray-800 text-gray-300 font-bold text-sm py-3 rounded-xl hover:bg-red-900 hover:text-red-200 transition-colors">יציאה מהמערכת</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto h-[calc(100vh-73px)] md:h-screen">
                        <div className="max-w-6xl mx-auto pb-20">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
