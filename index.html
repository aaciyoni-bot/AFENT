<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZIS WEB - Agency ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        canvas.signature-pad { touch-action: none; border: 2px dashed #cbd5e1; border-radius: 0.75rem; background: #f8fafc; cursor: crosshair; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        tailwind.config = {
            theme: { extend: { colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' } }, fontFamily: { sans: ['Rubik', 'sans-serif'] } } }
        };

        const Card = ({ children, className = '' }) => <div className={`bg-white rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-100 ${className}`}>{children}</div>;
        
        const Badge = ({ children, color = 'gray' }) => {
            const colors = {
                gray: 'bg-slate-100 text-slate-700 border-slate-200', blue: 'bg-brand-50 text-brand-700 border-brand-200', 
                green: 'bg-emerald-50 text-emerald-700 border-emerald-200', yellow: 'bg-amber-50 text-amber-700 border-amber-200',
                purple: 'bg-indigo-50 text-indigo-700 border-indigo-200', red: 'bg-rose-50 text-rose-700 border-rose-200'
            };
            return <span className={`px-3 py-1.5 rounded-xl text-[11px] font-bold border tracking-wide whitespace-nowrap ${colors[color] || colors.gray}`}>{children}</span>;
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const base = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/30",
                danger: "bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200",
                outline: "bg-white border-2 border-slate-200 text-slate-700 hover:border-slate-300 shadow-sm"
            };
            return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 fade-in">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-8 text-center shadow-2xl border border-slate-100">
                        <div className="w-20 h-20 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center mx-auto mb-5 text-4xl shadow-inner">🔔</div>
                        <h3 className="text-2xl font-black text-slate-900 mb-3">הודעת מערכת</h3>
                        <p className="text-slate-600 mb-8 font-medium leading-relaxed">{message}</p>
                        <Button onClick={onClose} className="w-full py-3.5 text-base">הבנתי, תודה</Button>
                    </div>
                </div>
            );
        };

        const DetailsModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 fade-in">
                    <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden shadow-2xl border border-slate-100">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h3 className="text-2xl font-black text-slate-900">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-3xl font-bold leading-none">&times;</button>
                        </div>
                        <div className="p-8 overflow-y-auto custom-scrollbar flex-1 bg-white">
                            {children}
                        </div>
                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                            <Button onClick={onClose} variant="secondary">סגור חלון</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke();
            };

            const endDrawing = () => setIsDrawing(false);
            const clearPad = () => { const canvas = canvasRef.current; canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); };
            const savePad = () => { if (onSave) onSave(canvasRef.current.toDataURL()); };

            useEffect(() => {
                const canvas = canvasRef.current;
                canvas.width = canvas.offsetWidth; canvas.height = 150;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
            }, []);

            return (
                <div className="space-y-3">
                    <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={endDrawing} onMouseLeave={endDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={endDrawing} className="signature-pad w-full" />
                    <div className="flex gap-2 justify-end">
                        <Button variant="outline" onClick={clearPad} className="text-xs py-1.5">נקה חתימה</Button>
                        <Button variant="success" onClick={savePad} className="text-xs py-1.5">אשר חתימה</Button>
                    </div>
                </div>
            );
        };

        const AppContext = createContext();

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ לבין נותן השירותים.\n\n1. פועל כקבלן עצמאי.\n2. התחייבות לעבודה עם ציוד אישי (מחשב) ורישיון AI פעיל (כגון ChatGPT).\n3. כל הלקוחות והסוכנים שייכים למערכת ולחברה בלבד.\n4. החברה תספק עבודה. בונוס יזמות 5% יוענק לפרילנסר שהביא לקוח.\n5. קנס על הפרת סודיות: 50,000 ש"ח.`,
            clientAgreementText: `הסכם פיתוח ושירותי אינטרנט - אוריזיס\n\n1. החברה תספק את השירותים כפי שהוגדרו באפיון.\n2. פיתוח יתחיל לאחר תשלום מלא.\n3. זכויות היוצרים עוברות ללקוח בגמר חשבון.`,
            announcement: `ברוכים הבאים למערכת החדשה של אוריזיס!`,
            prices: {
                hostingVIP: 150,
                seoPackage: 800,
                maintenance: 250
            }
        };

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('orizis_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [systemSettings, setSystemSettings] = useState(initialSettings);
            const [isLoading, setIsLoading] = useState(true);

            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            useEffect(() => {
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    const users = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(users);
                    if (currentUser && currentUser.uid !== 'admin_master') {
                        const updatedMe = users.find(u => u.uid === currentUser.uid);
                        if (updatedMe) { setCurrentUser(updatedMe); localStorage.setItem('orizis_user', JSON.stringify(updatedMe)); }
                    }
                }, err => console.error("Users sync error:", err));

                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, err => console.error("Projects sync error:", err));

                const unsubSettings = db.collection('system').doc('settings').onSnapshot(doc => {
                    if (doc.exists) { 
                        // Merge with initialSettings to ensure new fields like 'prices' exist even for old documents
                        setSystemSettings({ ...initialSettings, ...doc.data(), prices: { ...initialSettings.prices, ...(doc.data().prices || {}) } }); 
                    } 
                    else { db.collection('system').doc('settings').set(initialSettings); }
                    setIsLoading(false);
                }, err => { console.error("Settings error:", err); setIsLoading(false); });

                return () => { unsubUsers(); unsubProjects(); unsubSettings(); };
            }, []);

            const login = (email, password) => {
                const inputEmail = String(email).toLowerCase().trim();
                const inputPassword = String(password).trim();
                
                // Master Key Definition - Always bypasses everything
                if (inputEmail === 'aaci.yoni@gmail.com' && inputPassword === '123') {
                    const masterAdmin = { uid: 'admin_master', role: 'manager', name: 'יוני (מנהל ראשי)', email: 'aaci.yoni@gmail.com' };
                    setCurrentUser(masterAdmin); localStorage.setItem('orizis_user', JSON.stringify(masterAdmin)); return; 
                }

                const user = usersList.find(u => String(u.email).toLowerCase().trim() === inputEmail && String(u.password).trim() === inputPassword);
                if (user) { setCurrentUser(user); localStorage.setItem('orizis_user', JSON.stringify(user)); } 
                else { showAlert('שם משתמש או סיסמה שגויים. המשתמש לא קיים במסד הנתונים (Firestore).'); }
            };

            const logout = () => { setCurrentUser(null); localStorage.removeItem('orizis_user'); };
            const updateProject = (id, updates) => db.collection('projects').doc(id).update(updates);
            const updateUser = (uid, updates) => db.collection('users').doc(uid).update(updates);
            const updateSettings = (updates) => db.collection('system').doc('settings').update(updates);
            
            const addProject = (project) => {
                const id = `P-${Date.now().toString().slice(-4)}`;
                db.collection('projects').doc(id).set({ id, status: 'paid_waiting_for_brief', isSelfSourced: false, upsellAmount: 0, ...project });
                return id;
            };
            
            const addUser = (user) => {
                const uid = `user_${Date.now()}`;
                db.collection('users').doc(uid).set({ uid, ...user });
            };
            
            const deleteProject = (id) => { db.collection('projects').doc(id).delete(); };
            const deleteUser = (uid) => { db.collection('users').doc(uid).delete(); };

            if (isLoading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-brand-400 font-bold text-xl">מתחבר לענן...</div>;

            return (
                <AppContext.Provider value={{ currentUser, login, logout, projects, updateProject, addProject, deleteProject, usersList, updateUser, addUser, deleteUser, systemSettings, updateSettings, showAlert }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const { login } = useContext(AppContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20">
                        <div className="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500 blur-[120px]"></div>
                        <div className="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-indigo-600 blur-[150px]"></div>
                    </div>
                    
                    <Card className="w-full max-w-md p-10 glass-panel border-white/20 shadow-2xl relative z-10 fade-in rounded-3xl">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black text-slate-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-slate-500 text-sm mt-2 font-bold tracking-widest uppercase">Agency ERP</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); login(email, password); }} className="space-y-6">
                            <div>
                                <label className="block text-sm font-black text-slate-700 mb-2">אימייל התחברות</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@domain.com" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition-all font-medium text-slate-800" required dir="ltr" />
                            </div>
                            <div>
                                <label className="block text-sm font-black text-slate-700 mb-2">סיסמה</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition-all font-medium text-slate-800" required dir="ltr" />
                            </div>
                            <Button type="submit" className="w-full py-4 text-lg mt-4 shadow-xl font-black tracking-wide">התחבר למערכת</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, deleteProject, addUser, updateUser, deleteUser, systemSettings, updateSettings, showAlert, addProject } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects'); 
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'freelancer', password: '', basePercentage: 60, upsellPercentage: 40 });
            const [newProjectData, setNewProjectData] = useState({ customerName: '', customerEmail: '', paymentAmount: '' });
            const [localSettings, setLocalSettings] = useState(systemSettings);
            
            // Modal States
            const [viewProject, setViewProject] = useState(null);
            const [viewUser, setViewUser] = useState(null);

            const revenue = projects.reduce((sum, p) => sum + (Number(p.paymentAmount) || 0) + (Number(p.upsellAmount) || 0), 0);
            const activeProjects = projects.filter(p => p.status !== 'completed' && p.status !== undefined);

            const handleAddUser = (e) => {
                e.preventDefault();
                addUser({ ...newUser, basePercentage: newUser.role === 'freelancer' ? Number(newUser.basePercentage || 60) : 0, upsellPercentage: newUser.role === 'freelancer' ? Number(newUser.upsellPercentage || 40) : 0 });
                setNewUser({ name: '', email: '', role: 'freelancer', password: '', basePercentage: 60, upsellPercentage: 40 });
                showAlert("המשתמש נוצר בהצלחה ונשמר בענן!");
            };

            const handleAddProject = (e) => {
                e.preventDefault();
                const newProjectId = addProject({ customerName: newProjectData.customerName, customerEmail: newProjectData.customerEmail, paymentAmount: Number(newProjectData.paymentAmount), freelancerId: null, createdAt: Date.now(), addons: [], hasSignedAgreement: false });
                // We create a client user implicitly linked to this project
                addUser({ name: newProjectData.customerName, email: newProjectData.customerEmail, password: '123', role: 'client', projectId: newProjectId });
                setNewProjectData({ customerName: '', customerEmail: '', paymentAmount: '' });
                showAlert("לקוח ופרויקט נוצרו בהצלחה! הלקוח יכול להתחבר עם המייל שלו וסיסמה 123 כדי למלא אפיון.");
            };

            const getStatusBadge = (status) => {
                switch(status) {
                    case 'completed': return <Badge color="green">הושלם ונמסר</Badge>;
                    case 'in_progress': return <Badge color="purple">בעבודה ע"י סוכן</Badge>;
                    case 'qa_review': return <Badge color="blue">ממתין לבדיקת מנהל (QA)</Badge>;
                    case 'brief_submitted': return <Badge color="blue">אופיין ומוכן לפיתוח</Badge>;
                    case 'paid_waiting_for_brief': return <Badge color="yellow">ממתין למילוי אפיון</Badge>;
                    default: return <Badge color="gray">לא הוגדר / ממתין</Badge>;
                }
            };

            return (
                <div className="space-y-8 fade-in max-w-7xl mx-auto w-full pb-20">
                    
                    {/* View Project Details Modal */}
                    <DetailsModal isOpen={!!viewProject} onClose={() => setViewProject(null)} title={`פרופיל פרויקט: ${viewProject?.customerName}`}>
                        {viewProject && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-2 gap-4">
                                    <Card className="p-4 bg-slate-50"><div className="text-sm font-bold text-slate-500">שווי בסיס</div><div className="text-xl font-black text-brand-600">₪{viewProject.paymentAmount || 0}</div></Card>
                                    <Card className="p-4 bg-slate-50"><div className="text-sm font-bold text-slate-500">שווי אפסייל (MRR/מוצרים)</div><div className="text-xl font-black text-emerald-600">₪{viewProject.upsellAmount || 0}</div></Card>
                                    <Card className="p-4 bg-slate-50 col-span-2"><div className="text-sm font-bold text-slate-500 mb-1">סטטוס התקדמות</div><div>{getStatusBadge(viewProject.status)}</div></Card>
                                </div>
                                
                                <div>
                                    <h4 className="font-black text-lg mb-2 text-slate-800">📝 אפיון הלקוח (Brief):</h4>
                                    <div className="bg-white border border-slate-200 p-6 rounded-xl min-h-[150px] shadow-inner text-slate-700 whitespace-pre-wrap leading-relaxed font-medium">
                                        {viewProject.brief || 'הלקוח טרם הזין אפיון למערכת.'}
                                    </div>
                                </div>

                                <div className="bg-brand-50 p-6 rounded-xl border border-brand-100">
                                    <h4 className="font-black text-lg mb-3 text-brand-900">👤 שיוך סוכן מטפל:</h4>
                                    <select 
                                        className="w-full p-3.5 text-base border border-brand-300 rounded-xl outline-none font-bold cursor-pointer bg-white focus:ring-2 focus:ring-brand-500 shadow-sm"
                                        value={viewProject.freelancerId || ''}
                                        onChange={(e) => {
                                            updateProject(viewProject.id, { freelancerId: e.target.value || null });
                                            setViewProject({...viewProject, freelancerId: e.target.value || null});
                                            showAlert("שיוך הסוכן עודכן בהצלחה בענן!");
                                        }}
                                    >
                                        <option value="">-- ללא שיוך / הסר שיוך --</option>
                                        {usersList.filter(u => u.role === 'freelancer').map(u => <option key={u.uid} value={u.uid}>{u.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        )}
                    </DetailsModal>

                    {/* View User Details Modal */}
                    <DetailsModal isOpen={!!viewUser} onClose={() => setViewUser(null)} title={`תיק משתמש: ${viewUser?.name}`}>
                        {viewUser && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <div className="text-sm font-bold text-slate-500 mb-1">אימייל התחברות:</div>
                                        <div className="font-black text-lg text-slate-900">{viewUser.email}</div>
                                    </div>
                                    <Badge color={viewUser.role==='freelancer'?'blue': viewUser.role==='client'?'yellow':'purple'}>
                                        {viewUser.role === 'freelancer' ? 'סוכן פרילנסר' : viewUser.role === 'client' ? 'לקוח קצה' : 'מנהל'}
                                    </Badge>
                                </div>

                                {viewUser.role === 'freelancer' && (
                                    <div className="grid grid-cols-3 gap-4">
                                        <Card className="p-4 bg-emerald-50 border-emerald-100">
                                            <div className="text-sm font-bold text-emerald-800 mb-1">אחוז עמלה (Base)</div>
                                            <div className="text-2xl font-black text-emerald-600">{viewUser.basePercentage || 60}%</div>
                                        </Card>
                                        <Card className="p-4 bg-purple-50 border-purple-100">
                                            <div className="text-sm font-bold text-purple-800 mb-1">אחוז מכירות (Upsell)</div>
                                            <div className="text-2xl font-black text-purple-600">{viewUser.upsellPercentage || 40}%</div>
                                        </Card>

                return myProjects.reduce((sum, p) => {

                    // Base calculation with or without 5% bonus

                    if (p.isSelfSourced) basePct += 5; 
                    const baseEarned = (Number(p.paymentAmount) || 0) * (basePct / 100);
                    
                    // Upsell Calculation
                    const upsellPct = (currentUser.upsellPercentage || 40);
                    const upsellEarned = (Number(p.upsellAmount) || 0) * (upsellPct / 100);

                    return sum + baseEarned + upsellEarned;

                    )}

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <Card className="p-6 bg-brand-50 border-brand-100 shadow-sm"><div className="text-sm font-bold text-brand-800">הכנסות מפעילות אישית</div><div className="text-3xl font-black mt-2 text-brand-900">₪{calcEarnings().toLocaleString()}</div></Card>
                        <Card className="p-6 bg-indigo-50 border-indigo-100 shadow-sm"><div className="text-sm font-bold text-indigo-800">הכנסות ML (ראש צוות)</div><div className="text-3xl font-black mt-2 text-indigo-900">₪0</div><div className="text-[11px] text-indigo-500 mt-1 font-bold">150₪ בונוס על סיום משימת סוכן-משנה</div></Card>
                        <Card className="p-6 shadow-sm"><div className="text-sm font-bold text-slate-500">משימות בתור כעת</div><div className="text-3xl font-black mt-2 text-slate-900">{myProjects.filter(p=>p.status==='in_progress').length}</div></Card>
                        <Card className="p-6 shadow-sm border-b-4 border-emerald-500"><div className="text-sm font-bold text-slate-500">הושלמו ואושרו סופית</div><div className="text-3xl font-black mt-2 text-emerald-600">{myProjects.filter(p=>p.status==='completed').length}</div></Card>
                    </div>

                    <div className="flex justify-between items-center mt-10 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <h3 className="font-black text-2xl text-slate-900 flex items-center gap-3">💻 שולחן העבודה שלי</h3>
                        <div className="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-black tracking-widest font-mono shadow-inner flex items-center gap-3">
                            <span className="w-3 h-3 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(52,211,153,0.8)]"></span> שעון נוכחות / טיימר משימות פעיל
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {myProjects.map(project => (
                            <Card key={project.id} className="p-8 relative overflow-hidden border-t-8 border-t-brand-500 shadow-lg hover:shadow-xl transition-all">
                                {project.isSelfSourced && <div className="absolute top-0 right-0 bg-emerald-500 text-white text-[11px] font-black px-4 py-1.5 rounded-bl-2xl shadow-md">⭐ בונוס הבאת לקוח (+5%)</div>}
                                <div className="flex justify-between items-start mb-6 mt-2">
                                    <div><h4 className="font-black text-2xl text-slate-900 mb-1">{project.customerName}</h4><span className="text-sm text-slate-400 font-medium bg-slate-100 px-2 py-1 rounded-md">מזהה: {project.id}</span></div>
                                    <Badge color={project.status==='in_progress'?'purple':project.status==='qa_review'?'blue':project.status==='completed'?'green':'yellow'}>{project.status === 'in_progress' ? 'בעבודה כעת' : project.status === 'qa_review' ? 'בבדיקת מנהל' : project.status === 'completed' ? 'הושלם' : 'ממתין להתחלה'}</Badge>
                                </div>
                                
                                {project.status === 'in_progress' && (
                                    <div className="space-y-6">
                                        <div className="p-6 bg-slate-50 rounded-2xl border border-slate-200 shadow-inner">
                                            <h5 className="font-black text-base mb-3 text-brand-900 flex items-center gap-2">📄 אפיון לקוח לביצוע:</h5>
                                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">{project.brief || 'טרם הוזן אפיון. צור קשר עם המנהל.'}</p>
                                        </div>
                                        <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                                            <h5 className="font-black text-xs mb-4 text-slate-500 uppercase tracking-widest">צ'ק ליסט הגשה (חובה לאשר)</h5>
                                            <div className="space-y-3">
                                                <label className="flex items-center gap-3 text-sm font-bold text-slate-700 cursor-pointer bg-slate-50 p-2 rounded-lg"><input type="checkbox" className="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" /> נבדק עיצוב רספונסיבי למובייל</label>
                                                <label className="flex items-center gap-3 text-sm font-bold text-slate-700 cursor-pointer bg-slate-50 p-2 rounded-lg"><input type="checkbox" className="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" /> טפסים ושליחת ליד נבדקו תקינים</label>
                                                <label className="flex items-center gap-3 text-sm font-bold text-slate-700 cursor-pointer bg-slate-50 p-2 rounded-lg"><input type="checkbox" className="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" /> מהירות טעינה מעל 85 בבדיקת Google</label>
                                            </div>
                                        </div>
                                        <div className="flex gap-3 pt-2">
                                            <Button onClick={()=>updateProject(project.id, {status: 'qa_review'})} variant="success" className="flex-1 text-base py-4 font-black shadow-lg shadow-emerald-500/30">✔️ סימתי, הגש למנהל (QA)</Button>
                                            <Button onClick={()=>{if(window.confirm('לדווח על חוסר חומרים או בעיה טכנית למנהל?')) showAlert('הודעת חסימה נשלחה למנהל בהצלחה. הטיימר הוקפא.');}} variant="danger" className="text-base py-4 px-6 font-black bg-rose-500 text-white hover:bg-rose-600 border-none shadow-lg shadow-rose-500/30">🔴 נתקעתי</Button>
                                        </div>
                                    </div>
                                )}
                                {(project.status === 'brief_submitted' || project.status === 'paid_waiting_for_brief') && (
                                    <div className="text-center p-6 bg-slate-50 rounded-2xl border border-slate-100">
                                        <p className="text-slate-600 mb-6 text-base font-bold">{project.status === 'paid_waiting_for_brief' ? 'הלקוח עדיין לא סיים למלא את האפיון בפורטל שלו.' : 'האפיון מוכן, אתה יכול להתחיל לעבוד ולהפעיל טיימר.'}</p>
                                        <Button onClick={()=>updateProject(project.id, {status: 'in_progress'})} className="w-full py-4 text-lg font-black" disabled={project.status === 'paid_waiting_for_brief'}>
                                            התחל משימה (הפעל טיימר)
                                        </Button>
                                    </div>
                                )}
                                {project.status === 'qa_review' && (
                                    <div className="bg-blue-50 text-blue-700 p-6 rounded-2xl text-center font-black text-lg border border-blue-200 shadow-sm">הפרויקט הוגש בהצלחה - ממתין לאישור מנהל ⏳</div>
                                )}
                            </Card>
                        ))}
                        {myProjects.length === 0 && <div className="col-span-2 text-center p-16 text-slate-500 font-black bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-xl">אין לך פרויקטים פתוחים בתור כרגע, קח הפסקת קפה ☕</div>}
                    </div>
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, updateProject, updateUser, systemSettings, showAlert } = useContext(AppContext);
            const project = projects.find(p => p.id === currentUser.projectId);
            const [briefText, setBriefText] = useState(project?.brief || '');

            if (!project) return <div className="text-center p-20 font-black text-slate-400 text-2xl mt-20">פרויקט לא נמצא במערכת. אנא פנה לתמיכת הסוכנות.</div>;

            if (!currentUser.hasSignedAgreement) {
                return (
                    <div className="max-w-3xl mx-auto space-y-6 fade-in pb-10 mt-10">
                        <Card className="p-10 shadow-2xl rounded-3xl border-0">
                            <h2 className="text-4xl font-black mb-4 text-slate-900 text-center">הסכם יציאה לדרך 📝</h2>
                            <p className="text-slate-600 mb-8 font-medium text-center text-xl">כדי שנוכל להתחיל לאפיין ולפתח את האתר של <strong>{project.customerName}</strong>, אנא אשר את תנאי ההתקשרות הקצרים שלנו.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm whitespace-pre-wrap font-medium border border-slate-200 mb-8 h-64 overflow-y-auto custom-scrollbar leading-relaxed">
                                {systemSettings.clientAgreementText}
                            </div>
                            <div className="mb-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-md">
                                <label className="block text-base font-black mb-4 text-slate-800">חתימה דיגיטלית קבילה (חתום כאן באמצעות מגע או עכבר):</label>
                                <SignaturePad onSave={(sig) => {
                                    updateUser(currentUser.uid, { hasSignedAgreement: true, signature: sig, signedAt: Date.now() });
                                    showAlert("תודה רבה! ההסכם נחתם ונשמר מאובטח במערכת. אנחנו יוצאים לדרך!");
                                }} />
                            </div>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto space-y-10 fade-in pb-24 mt-6">
                    <Card className="p-12 text-center bg-white shadow-xl border-0 relative overflow-hidden rounded-3xl">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brand-50 rounded-full blur-[100px] -z-10"></div>
                        <h2 className="text-5xl font-black mb-4 text-slate-900 tracking-tight">שלום {currentUser.name}! 👋</h2>
                        <p className="text-slate-500 font-medium text-xl mb-12">ברוך הבא לאזור האישי שלך. כאן תוכל לעקוב אחר התקדמות הפרויקט שלך בשקיפות מלאה.</p>
                        
                        <div className="flex justify-center items-center space-x-4 space-x-reverse relative max-w-2xl mx-auto">
                            <div className="absolute top-1/2 left-0 w-full h-2 bg-slate-100 -z-10 -translate-y-1/2 rounded-full"></div>
                            
                            <div className="flex flex-col items-center bg-white relative z-10 px-6">
                                <div className="w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center font-black shadow-lg shadow-emerald-500/40 text-2xl">✓</div>
                                <span className="text-base mt-4 font-black text-slate-800">תשלום הוסדר</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white relative z-10 px-6">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center font-black shadow-lg text-2xl transition-all duration-500 ${project.status !== 'paid_waiting_for_brief' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : 'bg-brand-600 text-white shadow-brand-500/40 ring-8 ring-brand-50 scale-110'}`}>{project.status !== 'paid_waiting_for_brief' ? '✓' : '2'}</div>
                                <span className={`text-base mt-4 font-black ${project.status === 'paid_waiting_for_brief' ? 'text-brand-700' : 'text-slate-800'}`}>אפיון נדרש</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white relative z-10 px-6">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center font-black shadow-lg text-2xl transition-colors ${project.status === 'completed' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : project.status === 'in_progress' || project.status === 'qa_review' ? 'bg-brand-600 text-white shadow-brand-500/40 ring-8 ring-brand-50' : 'bg-slate-100 text-slate-400 border-4 border-white shadow-inner'}`}>{project.status === 'completed' ? '✓' : '3'}</div>
                                <span className={`text-base mt-4 font-black ${project.status === 'in_progress' || project.status === 'qa_review' ? 'text-brand-700' : 'text-slate-400'}`}>שלבי פיתוח</span>
                            </div>
                        </div>
                    </Card>

                    {project.status === 'paid_waiting_for_brief' && (
                        <Card className="p-10 border-t-8 border-brand-500 shadow-xl rounded-3xl">
                            <h3 className="font-black text-3xl mb-4 text-slate-900">שלב 2: שאלון אפיון יציאה לדרך</h3>
                            <p className="text-slate-600 mb-8 font-medium text-lg leading-relaxed">ספר לנו על העסק שלך. ככל שתפרט יותר (קהל יעד, צבעים, מתחרים, שירותים), כך הצוות שלנו יוכל לעצב במדויק ולקלוע לטעם שלך.</p>
                            <textarea 
                                className="w-full p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 focus:bg-white outline-none mb-8 min-h-[250px] font-medium leading-relaxed custom-scrollbar text-lg transition-all" 
                                placeholder="כתוב כאן כל מה שעולה לך לראש. מי הלקוחות שלך? מה המסר שתרצה לשדר? אילו צבעים אתה אוהב? צרף לינקים לאתרים שאהבת..." 
                                value={briefText} 
                                onChange={e=>setBriefText(e.target.value)}
                            ></textarea>
                            <Button onClick={() => {
                                if(briefText.trim().length < 20) return showAlert("אנא פרט קצת יותר בטופס כדי שנוכל לעשות עבודה מצוינת בשבילך.");
                                updateProject(project.id, { brief: briefText, status: 'brief_submitted' });
                                showAlert("האפיון נשלח בהצלחה לצוות הפיתוח! אנחנו מיד מתחילים לעבוד על האתר שלך.");
                            }} className="w-full py-5 text-xl font-black shadow-xl shadow-brand-500/30">שלח אפיון לצוות וצא לדרך 🚀</Button>
                        </Card>
                    )}

                    {(project.status === 'brief_submitted' || project.status === 'in_progress' || project.status === 'qa_review') && (
                        <Card className="p-20 text-center bg-gradient-to-b from-brand-50 to-white border-brand-100 shadow-xl rounded-3xl">
                            <div className="text-8xl mb-8 animate-bounce">🏗️</div>
                            <h3 className="font-black text-4xl text-brand-900 mb-6 tracking-tight">האתר שלך בשלבי בנייה!</h3>
                            <p className="text-slate-600 font-medium text-xl max-w-lg mx-auto leading-relaxed">הצוות המקצועי שלנו קיבל את האפיון שלך ועובד כרגע במרץ על האתר. אנו ניצור איתך קשר מיד כשהסקיצה הראשונה תהיה מוכנה לבדיקתך.</p>
                        </Card>
                    )}

                    {}
                    {project.status === 'completed' && (
                        <Card className="p-12 border-t-8 border-emerald-500 bg-white shadow-2xl rounded-3xl">
                            <div className="text-center mb-12">
                                <div className="text-8xl mb-6">🎉</div>
                                <h3 className="font-black text-5xl text-emerald-800 mb-4 tracking-tight">האתר שלך באוויר!</h3>
                                <p className="text-slate-600 font-medium text-2xl">מזל טוב! פיתוח הפרויקט הושלם ונמסר בהצלחה.</p>
                            </div>
                            
                            <div className="bg-slate-900 text-white p-12 rounded-3xl text-center shadow-2xl relative overflow-hidden">
                                <div className="absolute -top-10 -right-10 w-64 h-64 bg-brand-500 rounded-full blur-[100px] opacity-30"></div>
                                <div className="absolute -bottom-10 -left-10 w-64 h-64 bg-purple-600 rounded-full blur-[100px] opacity-30"></div>
                                <h4 className="font-black text-4xl mb-6 relative z-10">תחזוקה ואחסון פרימיום VIP</h4>
                                <p className="text-slate-300 mb-10 font-medium text-xl relative z-10 max-w-2xl mx-auto leading-relaxed">מעוניין בראש שקט לגמרי? תן לצוות שלנו לדאוג לאחסון האתר על שרתים מהירים, עדכוני אבטחה שוטפים, וגיבויים יומיים.</p>
                                <Button 
                                    onClick={() => {
                                        const currentUpsell = Number(project.upsellAmount) || 0;
                                        const price = Number(systemSettings.prices?.hostingVIP) || 150;
                                        updateProject(project.id, { upsellAmount: currentUpsell + price });
                                        showAlert("מדהים! שדרגת לאחסון VIP. צוות הסוכנות שלנו יצור איתך קשר להסדרת התשלום.");
                                    }}
                                    variant="primary" 
                                    className="mx-auto px-12 py-5 text-xl font-black relative z-10 bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 shadow-xl shadow-brand-500/50"
                                >
                                    שדרג עכשיו ל-VIP (₪{systemSettings.prices?.hostingVIP || 150} / חודש)
                                </Button>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const App = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-slate-100 overflow-hidden font-sans" dir="rtl">
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="bg-white/95 backdrop-blur-xl border-b border-slate-200 p-5 px-8 flex justify-between items-center shadow-sm z-50 sticky top-0">
                            <div className="flex items-center gap-5">
                                <h1 className="text-3xl font-black text-slate-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                                <Badge color={currentUser.role === 'manager' ? 'purple' : currentUser.role === 'freelancer' ? 'blue' : 'gray'}>
                                    {currentUser.role === 'manager' ? 'ניהול סוכנות (Admin)' : currentUser.role === 'freelancer' ? 'סביבת פרילנסר' : 'פורטל לקוחות'}
                                </Badge>
                            </div>
                            <div className="flex items-center gap-6">
                                <span className="text-sm font-black text-slate-600 hidden md:inline-block bg-slate-100 px-4 py-2 rounded-xl">מחובר כ: {currentUser.name}</span>
                                <Button onClick={logout} variant="outline" className="text-sm px-6 py-2.5 border-slate-300 text-slate-600 hover:bg-slate-100 transition-colors font-bold">התנתק מהמערכת</Button>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-10 custom-scrollbar relative">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
