    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        const firebaseConfig = {

        const Card = ({ children, className = '', noPadding = false }) => (

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-5 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 active:scale-[0.98]";

                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md shadow-emerald-500/20 focus:ring-emerald-500/30",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-100/50",
                outline: "bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-100",

        const formatDuration = (totalSeconds, forcePositive = false) => {
            if (!totalSeconds) return "00:00:00";
            const absSeconds = Math.abs(totalSeconds);
            const h = Math.floor(absSeconds / 3600);
            const m = Math.floor((absSeconds % 3600) / 60);
            const s = Math.floor(absSeconds % 60);
            const formatted = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (!forcePositive && totalSeconds < 0) return "-" + formatted;
            return formatted;
        };

        const defaultAgreementText = `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ ח.פ 516977758 הפועלת באמצעות מותג ORIZISWEB שתיקרא להלן החברה לבין הלקוח המזמין את השירותים דרך פורטל הלקוחות הדיגיטלי שייקרא להלן הלקוח.\n\n1. מהות ההתקשרות ותכולת העבודה\nהחברה תספק ללקוח שירותי פיתוח ועיצוב בהתאם למידע שסופק.\n\n2. לוחות זמנים ומסירת הפרויקט\nזמן האספקה המשוער הוא עד 14 ימי עסקים אלא אם נרכש שירות אקספרס (מוחרג שבתות וחגים).\n\n3. סבבי תיקונים\nהלקוח זכאי ל-5 סבבי תיקונים במסגרת האפיון המקורי.\n\n4. תשלומים ותוספות\nהתשלום בגין הפיתוח מתבצע מראש. שדרוגים מתוך החנות יחויבו בנפרד.\n\n5. אחריות\nניתנת תקופת אחריות של 30 ימים לתיקון באגים לאחר המסירה.`;

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: '' });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            else auth.signOut();
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                        setIsLoadingDb(false);
                    }
                });

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (!data.agreementText) data.agreementText = defaultAgreementText;
                        
                        if (!data.upsells || data.upsells.length === 0) {
                            const initialUpsells = [
                                { id: '1', title: 'כפתור וואטסאפ צף', price: 100, icon: '💬', isPremium: false, isRecurring: false, desc: 'חיבור מהיר לוואטסאפ של העסק.', timeMinutes: 10 },
                                { id: '2', title: 'הטמעת מפת הגעה', price: 100, icon: '🗺️', isPremium: false, isRecurring: false, desc: 'הטמעת מפת גוגל באתר.', timeMinutes: 10 },
                                { id: '3', title: 'תוסף נגישות לאתר', price: 150, icon: '♿', isPremium: false, isRecurring: false, desc: 'הנגשת האתר כחוק לפי התקן.', timeMinutes: 5 },
                                { id: '4', title: 'חיבור גוגל אנליטיקס', price: 150, icon: '📊', isPremium: false, isRecurring: false, desc: 'סטטיסטיקות ונתוני גלישה.', timeMinutes: 15 },
                                { id: '5', title: 'חיבור פיקסל שיווקי', price: 150, icon: '🎯', isPremium: false, isRecurring: false, desc: 'קריטי לקמפיינים בפייסבוק ואינסטגרם.', timeMinutes: 10 },
                                { id: '6', title: 'תקנון ותנאי שימוש', price: 150, icon: '⚖️', isPremium: false, isRecurring: false, desc: 'הטמעת עמוד משפטי בסיסי (תבנית).', timeMinutes: 15 },
                                { id: '7', title: 'חיבור דומיין אישי', price: 0, icon: '🌐', isPremium: false, isRecurring: false, desc: 'חיבור לכתובת שרכשת.', timeMinutes: 15 },
                                { id: '8', title: '5 תמונות אווירה', price: 0, icon: '📸', isPremium: false, isRecurring: false, desc: 'בחירת תמונות ממאגרים מקצועיים.', timeMinutes: 10 },
                                { id: '9', title: 'עיצוב לוגו AI בסיסי', price: 0, icon: '🎨', isPremium: false, isRecurring: false, desc: 'יצירת לוגו מהיר בטכנולוגיית בינה מלאכותית.', timeMinutes: 15 },
                                { id: '10', title: 'פופ-אפ כרטיס גירוד', price: 1000, icon: '🎟️', isPremium: true, isRecurring: false, desc: 'משחק אינטראקטיבי להשארת לידים וחלוקת קופונים ללקוחות.', timeMinutes: 45 },
                                { id: '11', title: 'גלגל המזל (רולטה)', price: 1200, icon: '🎡', isPremium: true, isRecurring: false, desc: 'פופ-אפ שקופץ לגולש ומעודד אותו להשאיר פרטים כדי לזכות בהנחה.', timeMinutes: 60 },
                                { id: '12', title: 'מערכת CRM בסיסית', price: 3000, icon: '💼', isPremium: true, isRecurring: false, desc: 'פאנל פנימי לניהול הלידים והלקוחות של העסק שלך.', timeMinutes: 180 },
                                { id: '13', title: 'מערכת קביעת תורים', price: 1500, icon: '📅', isPremium: true, isRecurring: false, desc: 'סנכרון יומן גוגל וקביעת פגישות אוטומטית.', timeMinutes: 90 },
                                { id: '14', title: 'צ\'אטבוט AI חכם', price: 2000, icon: '🤖', isPremium: true, isRecurring: false, desc: 'נציג וירטואלי שעונה לשאלות גולשים 24/7.', timeMinutes: 120 },
                                { id: '15', title: 'מסירת אקספרס', price: 500, icon: '⚡', isPremium: true, isRecurring: false, desc: 'הקפצה לראש התור (לא כולל שבתות/חגים).', timeMinutes: 0 },
                                { id: '16', title: 'תחזוקה ואחסון חודשי', price: 150, icon: '🛡️', isPremium: true, isRecurring: true, desc: 'אחסון מהיר, אבטחה וגיבויים יומיים.', timeMinutes: 0 }
                            ];
                            db.collection('settings').doc('general').update({ upsells: initialUpsells });
                            data.upsells = initialUpsells;
                        }

                        setSystemSettings(data);
                    } else {
                        db.collection('settings').doc('general').set({
                            upsells: [], expenses: { marketing: 0, office: 0, software: 0 }, agreementText: defaultAgreementText
                        });
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => await db.collection('projects').doc(projectId).update(updates);
            
            const deleteProject = async (projectId) => {
                await db.collection('projects').doc(projectId).delete();
            };

            const updateSettings = async (updates) => await db.collection('settings').doc('general').update(updates);
            const updateUser = async (userId, updates) => await db.collection('users').doc(userId).update(updates);

            const deleteUser = async (userId) => {
                const userProjects = projects.filter(p => p.clientId === userId);
                for (const p of userProjects) { await db.collection('projects').doc(p.id).delete(); }
                await db.collection('users').doc(userId).delete();
            };

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, deleteProject, updateSettings, updateUser, deleteUser, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); setLoading(true);
                try { await auth.signInWithEmailAndPassword(email, password); } 
                catch (err) { setError("פרטי ההתחברות שגויים. פנה למנהל."); } 
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-200">
                    <Card className="w-full max-w-md p-10 relative shadow-2xl bg-white border-white/50 glass-panel fade-in">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter text-gray-900">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-gray-500 font-medium mt-2 tracking-widest text-xs uppercase">Enterprise Access</p>
                        </div>
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl font-bold text-center">{error}</div>}
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div><label className="block text-sm font-bold mb-1">אימייל</label><input type="email" onChange={e => setEmail(e.target.value)} className="w-full p-3.5 border rounded-xl bg-gray-50" dir="ltr" required /></div>
                            <div><label className="block text-sm font-bold mb-1">סיסמה</label><input type="password" onChange={e => setPassword(e.target.value)} className="w-full p-3.5 border rounded-xl bg-gray-50" dir="ltr" required /></div>
                            <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-4 shadow-xl shadow-brand-500/20">{loading ? 'מאמת נתונים...' : 'כניסה למערכת'}</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const initCanvas = () => {
                    const parent = canvas.parentElement;
                    canvas.width = parent.clientWidth;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                };
                initCanvas();
                window.addEventListener('resize', initCanvas);
                return () => window.removeEventListener('resize', initCanvas);
            }, []);

            const getCoordinates = (event) => {
                const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect(); const evt = event.nativeEvent || event;
                if (evt.touches && evt.touches.length > 0) return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            };

            const startDrawing = (event) => { const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true); };
            const draw = (event) => { if (!isDrawing) return; const { x, y } = getCoordinates(event); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
            const stopDrawing = () => { if (isDrawing) { setIsDrawing(false); onSave(canvasRef.current.toDataURL('image/png')); } };
            const clearPad = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); onSave(null); };

            return (
                <div className="border-2 border-gray-300 rounded-xl overflow-hidden bg-white shadow-inner mb-6">
                    <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 text-sm font-bold text-gray-700 flex justify-between items-center">
                        <span>✍️ צייר את חתימתך (עכבר/אצבע):</span>
                        <button type="button" onClick={clearPad} className="text-red-500 hover:text-red-700 text-xs font-bold bg-white px-3 py-1 rounded-lg border">נקה</button>
                    </div>
                    <canvas ref={canvasRef} className="w-full touch-none cursor-crosshair bg-white" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            
            const [onboardingData, setOnboardingData] = useState({ officialName: '', idNumber: '', address: '', termsAccepted: false, signatureData: null });
            const [showContractModal, setShowContractModal] = useState(false);
            const [briefData, setBriefData] = useState({ businessName: '', phone: '', businessType: '', audience: '', services: '', callToAction: '' });
            const [checkoutModal, setCheckoutModal] = useState(false);
            
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return <div className="text-center p-12 bg-white rounded-3xl mt-10"><h2 className="text-2xl font-black mb-2">אין פרויקט פעיל</h2></div>;

            const handleOnboardingSubmit = (e) => {
                e.preventDefault();
                if(!onboardingData.termsAccepted) return alert("חובה לאשר את החוזה.");
                if(!onboardingData.signatureData) return alert("חובה לחתום בלוח הציור.");
                updateProject(project.id, { status: 'paid_waiting_for_brief', clientOfficialDetails: { ...onboardingData, signedAt: new Date().toLocaleString('he-IL') } });
            };

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { status: 'brief_submitted', briefInfo: briefData });
            };

            const purchaseUpsell = (upsell) => {
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, { addons: [...currentAddons, upsell], paymentAmount: (project.paymentAmount || 0) + upsell.price });
            };

            // Post-Launch Dashboard View
            if (project.status === 'completed') {
                return (
                    <div className="space-y-8 fade-in">
                        <div className="bg-brand-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                            <h2 className="text-3xl font-black mb-2">שלום, {currentUser.name}! 🚀</h2>
                            <p className="text-brand-200">האתר שלך באוויר! ברוך הבא ללוח הבקרה והניהול שלך.</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <Card className="bg-gradient-to-br from-emerald-50 to-emerald-100 border-emerald-200">
                                <div className="text-emerald-800 font-bold mb-1">כניסות לאתר החודש</div>
                                <div className="text-4xl font-black text-emerald-600">1,248</div>
                                <div className="text-xs text-emerald-600 mt-2">↑ 12% מחודש שעבר</div>
                            </Card>
                            <Card className="bg-gradient-to-br from-blue-50 to-blue-100 border-blue-200">
                                <div className="text-blue-800 font-bold mb-1">לידים שהושארו</div>
                                <div className="text-4xl font-black text-blue-600">42</div>
                                <div className="text-xs text-blue-600 mt-2">מעולה!</div>
                            </Card>
                            <Card className="flex flex-col justify-center items-center text-center">
                                <h3 className="font-bold mb-2">צריך עזרה או שינוי באתר?</h3>
                                <Button className="w-full" variant="outline">פתח קריאת שירות</Button>
                            </Card>
                        </div>

                        <Card className="border-t-4 border-t-purple-500">
                            <h3 className="text-xl font-black mb-4">💎 חבילות ריטיינר ותחזוקה</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {systemSettings.upsells.filter(u => u.isRecurring).map(u => (
                                    <div key={u.id} className="border border-purple-200 bg-purple-50 p-4 rounded-xl flex justify-between items-center">
                                        <div>
                                            <div className="font-bold text-purple-900">{u.title}</div>
                                            <div className="text-sm text-purple-700">{u.desc}</div>
                                        </div>
                                        <div className="text-left">
                                            <div className="font-black text-xl text-purple-700">₪{u.price}<span className="text-sm font-normal">/חודש</span></div>
                                            <button onClick={()=>setCheckoutModal(true)} className="mt-2 text-xs bg-purple-600 text-white px-3 py-1 rounded font-bold">הפעל מנוי</button>
                                        </div>

                    await db.collection('users').doc(cred.user.uid).set(userData);
                    if (newUser.role === 'client') await db.collection('projects').add({ customerName: newUser.name, status: 'onboarding', paymentAmount: 1500, timeSpent: 0, budgetSeconds: 12600, isTimerRunning: false, isBlocked: false, addons: [], clientId: cred.user.uid, revisionCount: 0 });
                    await secondaryApp.auth().signOut(); alert('✅ המשתמש נוצר בהצלחה!'); setNewUser({ email: '', password: '', name: '', role: 'client' });
                } catch (err) { alert('❌ שגיאה: ' + err.message); }
            };

            const handleSaveUpsell = (isNew) => {
                const updatedUpsells = [...systemSettings.upsells];
                if (isNew) updatedUpsells.push({ ...newUpsell, id: Date.now().toString(), price: Number(newUpsell.price), timeMinutes: Number(newUpsell.timeMinutes) });
                else { const index = updatedUpsells.findIndex(u => u.id === editingUpsell.id); if(index > -1) updatedUpsells[index] = { ...editingUpsell, price: Number(editingUpsell.price), timeMinutes: Number(editingUpsell.timeMinutes) }; }
                updateSettings({ upsells: updatedUpsells }); setEditingUpsell(null);
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="flex gap-3 overflow-x-auto pb-2 border-b border-gray-200">
                        <button onClick={()=>setActiveTab('projects')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='projects'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>ניהול אופרציה</button>
                        <button onClick={()=>setActiveTab('users')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='users'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>צוות ולקוחות</button>
                        <button onClick={()=>setActiveTab('settings')} className={`px-6 py-3 font-bold text-sm rounded-xl ${activeTab==='settings'?'bg-brand-600 text-white':'bg-white text-gray-600 border'}`}>הגדרות וחנות</button>
                    </div>

                    {activeTab === 'projects' && (
                        <Card noPadding className="flex flex-col shadow-sm">
                            <div className="p-6 bg-white border-b flex justify-between items-center"><h2 className="text-2xl font-black">לוח בקרת ייצור</h2></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-gray-50 text-gray-500 border-b"><tr><th className="px-6 py-4 font-bold">לקוח וסטטוס</th><th className="px-6 py-4 font-bold">בקרה ותיק</th><th className="px-6 py-4 font-bold">צוות</th></tr></thead>
                                    <tbody className="divide-y divide-gray-100 bg-white">
                                        {activeProjects.map(p => (
                                            <tr key={p.id} className={`hover:bg-brand-50/30 ${p.isBlocked ? 'bg-red-50' : ''}`}>
                                                <td className="px-6 py-6 align-top">
                                                    <div className="font-black text-lg mb-2">{p.clientOfficialDetails?.officialName || p.customerName}</div>
                                                    <Badge color={p.isBlocked?'red':p.status === 'onboarding' ? 'gray' : p.status === 'qa_review' ? 'green' : 'blue'}>{p.isBlocked?'🚨 חסום!':p.status.replace(/_/g, ' ')}</Badge>
                                                    {p.revisionCount > 0 && <div className="mt-2 text-xs font-bold text-red-500 bg-red-100 px-2 py-1 rounded inline-block">סבבי תיקונים: {p.revisionCount}</div>}
                                                    {p.isBlocked && <div className="mt-2 text-xs text-red-700 font-bold max-w-xs">סיבה: {p.blockReason}</div>}
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    <button onClick={() => setViewBriefModal(p)} className="text-brand-700 bg-brand-50 hover:bg-brand-100 border px-4 py-2 rounded-xl font-bold text-xs shadow-sm block w-full text-center">📋 צפה בתיק אפיון וחוזה</button>
                                                    {p.isBlocked && <button onClick={() => updateProject(p.id, {isBlocked: false, blockReason: ''})} className="mt-2 text-emerald-700 bg-emerald-50 border border-emerald-200 px-4 py-2 rounded-xl font-bold text-xs shadow-sm block w-full text-center">🔓 שחרר חסימה לפרילנסר</button>}
                                                </td>
                                                <td className="px-6 py-6 align-top">
                                                    <select className="border rounded-lg p-2 text-xs bg-white w-full mb-2" onChange={(e) => { 
                                                        if (e.target.value === "none") {
                                                            updateProject(p.id, {freelancerId: null}); 
                                                            alert('השיוך הוסר בהצלחה!');
                                                        } else {
                                                            updateProject(p.id, {freelancerId: e.target.value}); 
                                                            alert('שויך בהצלחה!');
                                                        }
                                                    }} value={p.freelancerId || "none"}>
                                                        <option value="none">-- ללא שיוך / הסר --</option>
                                                        {freelancers.map(fl => <option key={fl.uid} value={fl.uid}>{fl.name}</option>)}
                                                    </select>
                                                    <button onClick={() => deleteProject(p.id)} className="text-red-500 hover:bg-red-50 text-xs font-bold px-3 py-1.5 rounded border border-red-200 w-full">🗑️ מחק לאיפוס דוח</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {activeTab === 'users' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <Card><h3 className="text-xl font-black mb-4">הקמת משתמש חדש</h3>
                                <form onSubmit={handleCreateUser} className="space-y-4">
                                    <input type="text" placeholder="שם" required onChange={e=>setNewUser({...newUser, name: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="email" placeholder="אימייל" required dir="ltr" onChange={e=>setNewUser({...newUser, email: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <input type="text" placeholder="סיסמה (6 תווים לפחות)" required dir="ltr" onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-3 border rounded-xl" />
                                    <select onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-3 border rounded-xl font-bold">
                                        <option value="client">לקוח (יפתח לו פרויקט אוטומטית)</option>
                                        <option value="freelancer">פרילנסר צוות פיתוח</option>
                                        <option value="manager">מנהל מערכת</option>
                                    </select>
                                    <Button type="submit" className="w-full">צור משתמש</Button>
                                </form>
                            </Card>
                            <Card noPadding><div className="p-6 border-b"><h3 className="text-xl font-black">רשימת משתמשים</h3></div>
                                <div className="max-h-96 overflow-y-auto">
                                    <table className="w-full text-right text-sm">
                                        <tbody>
                                            {usersList.map(u => (
                                                <tr key={u.uid} className="border-b">
                                                    <td className="p-4 font-bold">{u.name}</td><td className="p-4"><Badge>{u.role}</Badge></td>
                                                    <td className="p-4">{u.role !== 'manager' && <button onClick={() => deleteUser(u.uid)} className="text-red-500 text-xs font-bold">מחק הכל</button>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="space-y-8">
                            <Card className="border-t-4 border-t-purple-500">
                                <h3 className="text-xl font-black mb-2">⚖️ חוזה התקשרות (יופיע ללקוח)</h3>
                                <textarea rows="8" value={agreementInput} onChange={(e) => setAgreementInput(e.target.value)} className="w-full p-4 border rounded-xl bg-gray-50 text-sm"></textarea>
                                <Button onClick={() => { updateSettings({ agreementText: agreementInput }); alert('נשמר'); }} className="mt-4 bg-purple-600 hover:bg-purple-700">שמור חוזה ללקוחות הבאים</Button>
                            </Card>

                            <Card noPadding className="border-t-4 border-t-brand-500">
                                <div className="p-6 bg-gray-50 border-b"><h3 className="text-xl font-black">🛒 ניהול מוצרי חנות ותקציב זמן</h3></div>
                                <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="bg-white p-5 rounded-2xl border shadow-sm space-y-4">
                                        <h4 className="font-bold border-b pb-2">{editingUpsell ? 'עריכת מוצר' : '➕ הוספת מוצר'}</h4>
                                        <div><label className="text-xs font-bold">שם</label><input type="text" value={editingUpsell ? editingUpsell.title : newUpsell.title} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, title: e.target.value}) : setNewUpsell({...newUpsell, title: e.target.value})} className="w-full p-2 border rounded" /></div>
                                        <div className="flex gap-2">
                                            <div className="flex-1"><label className="text-xs font-bold">מחיר (₪)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.price : newUpsell.price} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, price: e.target.value}) : setNewUpsell({...newUpsell, price: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div className="flex-1"><label className="text-xs font-bold">זמן (דקות)</label><input type="number" min="0" value={editingUpsell ? editingUpsell.timeMinutes : newUpsell.timeMinutes} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, timeMinutes: e.target.value}) : setNewUpsell({...newUpsell, timeMinutes: e.target.value})} className="w-full p-2 border rounded" /></div>
                                            <div className="w-12"><label className="text-xs font-bold">אייקון</label><input type="text" value={editingUpsell ? editingUpsell.icon : newUpsell.icon} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, icon: e.target.value}) : setNewUpsell({...newUpsell, icon: e.target.value})} className="w-full p-2 border rounded text-center" /></div>
                                        </div>
                                        <div><label className="text-xs font-bold">תיאור שיווקי</label><textarea rows="2" value={editingUpsell ? editingUpsell.desc : newUpsell.desc} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, desc: e.target.value}) : setNewUpsell({...newUpsell, desc: e.target.value})} className="w-full p-2 border rounded"></textarea></div>
                                        <div className="flex flex-col gap-2">
                                            <label className="flex items-center gap-2 text-sm font-bold"><input type="checkbox" checked={editingUpsell ? editingUpsell.isPremium : newUpsell.isPremium} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isPremium: e.target.checked}) : setNewUpsell({...newUpsell, isPremium: e.target.checked})} className="w-4 h-4" /> מוצר פרימיום (זהב)</label>
                                            <label className="flex items-center gap-2 text-sm font-bold"><input type="checkbox" checked={editingUpsell ? editingUpsell.isRecurring : newUpsell.isRecurring} onChange={e => editingUpsell ? setEditingUpsell({...editingUpsell, isRecurring: e.target.checked}) : setNewUpsell({...newUpsell, isRecurring: e.target.checked})} className="w-4 h-4" /> תשלום חודשי (ריטיינר)</label>
                                        </div>
                                        <Button onClick={() => handleSaveUpsell(!editingUpsell)} className="w-full">{editingUpsell ? 'שמור שינויים' : 'הוסף לחנות'}</Button>
                                    </div>
                                    <div className="lg:col-span-2 space-y-3 max-h-[600px] overflow-y-auto pr-2">
                                        {systemSettings.upsells.map(u => (
                                            <div key={u.id} className={`flex justify-between p-4 rounded-xl border ${u.isRecurring?'bg-purple-50 border-purple-200':u.isPremium?'bg-amber-50 border-amber-200':'bg-white'} shadow-sm`}>
                                                <div>
                                                    <div className="font-black">{u.icon} {u.title} <span className="text-brand-600 bg-brand-50 px-2 rounded ml-2">₪{u.price}{u.isRecurring?'/ח':''}</span><span className="text-purple-600 bg-purple-50 px-2 rounded">+ {u.timeMinutes} דק' עבודה</span></div>
                                                    <div className="text-xs text-gray-500 mt-1">{u.desc}</div>
                                                </div>
                                                <button onClick={() => setEditingUpsell(u)} className="text-xs font-bold bg-gray-100 px-3 py-1 rounded self-center">✏ ערוך</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}

                    {viewBriefModal && (
                        <div className="fixed inset-0 bg-gray-950/50 flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
                                <div className="flex justify-between items-center p-6 bg-gray-50 border-b"><h3 className="font-black text-2xl">📋 תיק לקוח ומעקב</h3><button onClick={() => setViewBriefModal(null)} className="px-5 py-2.5 bg-gray-200 rounded-xl font-bold">סגור</button></div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="bg-gray-50 p-4 rounded-xl border flex flex-col sm:flex-row justify-between text-xs font-bold text-gray-400 gap-2">
                                        <div className={viewBriefModal.status !== 'onboarding' ? 'text-emerald-600' : 'text-brand-600'}>1. חוזה ופרטים {viewBriefModal.status !== 'onboarding' && '✓'}</div>
                                        <div className={['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='paid_waiting_for_brief'?'text-brand-600':''}>2. אפיון {['brief_submitted','in_progress','qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                        <div className={['qa_review','completed'].includes(viewBriefModal.status) ? 'text-emerald-600' : viewBriefModal.status==='in_progress'?'text-brand-600':''}>3. פיתוח {['qa_review','completed'].includes(viewBriefModal.status) && '✓'}</div>
                                    </div>
                                    {viewBriefModal.clientOfficialDetails ? (
                                        <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
                                            <div className="font-black text-emerald-900">אושר חוזה: <span dir="ltr">{viewBriefModal.clientOfficialDetails.signedAt}</span></div>
                                            <div className="text-sm mt-3 grid grid-cols-2 gap-3 text-emerald-800">
                                                <div className="bg-white/50 p-2 rounded border"><strong>שם לחשבונית:</strong> {viewBriefModal.clientOfficialDetails.officialName}</div>
                                                <div className="bg-white/50 p-2 rounded border"><strong>ח.פ/ת.ז:</strong> {viewBriefModal.clientOfficialDetails.idNumber}</div>
                                            </div>
                                            {viewBriefModal.clientOfficialDetails.signatureData && (
                                                <div className="mt-5 border-t border-emerald-200 pt-5"><strong className="block text-emerald-900 mb-2">חתימת לקוח בחוזה:</strong><img src={viewBriefModal.clientOfficialDetails.signatureData} alt="חתימה" className="h-24 object-contain bg-white rounded border p-2" /></div>
                                            )}
                                        </div>
                                    ) : <div className="p-6 bg-gray-50 rounded-xl text-center font-bold text-gray-500">⏳ הלקוח טרם חתם.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);
            if (isLoadingDb) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin w-10 h-10 border-4 border-brand-600 border-t-transparent rounded-full"></div></div>;
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex flex-col md:flex-row min-h-screen bg-gray-50">
                    <header className="md:hidden bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                        <h1 className="text-2xl font-black text-gray-900">ORIZIS<span className="text-brand-600">WEB</span></h1>
                        <button onClick={logout} className="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-lg">התנתק</button>
                    </header>
                    <aside className="w-72 bg-brand-950 text-white hidden md:flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-8 border-b border-gray-800/50"><h1 className="text-3xl font-black text-white">ORIZIS<span className="text-brand-500">WEB</span></h1></div>
                        <div className="flex-1 p-6"></div>
                        <div className="p-6 border-t border-gray-800/50 bg-gray-900/50">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 rounded-full bg-brand-600 flex items-center justify-center font-black text-xl uppercase">{currentUser.name ? currentUser.name.charAt(0) : 'U'}</div>
                                <div><div className="text-sm font-black">{currentUser.name || currentUser.email}</div><div className="text-xs text-brand-400 font-bold mt-1 bg-brand-900/50 px-2.5 py-0.5 rounded-md inline-block">{currentUser.role === 'manager' ? 'הנהלה' : currentUser.role === 'client' ? 'לקוח הסטודיו' : 'צוות פיתוח'}</div></div>
                            </div>
                            <button onClick={logout} className="w-full bg-gray-800 text-gray-300 font-bold text-sm py-3 rounded-xl hover:bg-red-900 hover:text-red-200">יציאה מהמערכת</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto h-[calc(100vh-73px)] md:h-screen">
                        <div className="max-w-6xl mx-auto pb-20">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
