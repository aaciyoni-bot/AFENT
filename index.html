<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZIS WEB - Agency ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-analytics-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        // חיבור ה- Firebase המדויק שלך (מותאם לגרסת דפדפן)
        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const analytics = firebase.analytics();

        const Card = ({ children, className = '' }) => <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
        const Badge = ({ children, color = 'gray' }) => {
            const colors = {
                gray: 'bg-gray-100 text-gray-700', blue: 'bg-blue-50 text-blue-700 border-blue-200', 
                green: 'bg-emerald-50 text-emerald-700 border-emerald-200', yellow: 'bg-amber-50 text-amber-700 border-amber-200',
                purple: 'bg-purple-50 text-purple-700 border-purple-200', red: 'bg-red-50 text-red-700 border-red-200'
            };
            return <span className={`px-3 py-1 rounded-full text-xs font-bold border ${colors[color] || colors.gray}`}>{children}</span>;
        };
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button', title }) => {
            const base = "px-5 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-md shadow-brand-500/20",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-md shadow-emerald-500/20",
                danger: "bg-red-50 text-red-700 hover:bg-red-100",
                outline: "bg-transparent border-2 border-gray-200 text-gray-700 hover:border-gray-300"
            };
            return <button type={type} onClick={onClick} disabled={disabled} title={title} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 fade-in">
                    <div className="bg-white rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl border border-gray-100">
                        <div className="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🔔</div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">הודעת מערכת</h3>
                        <p className="text-gray-600 mb-6">{message}</p>
                        <Button onClick={onClose} className="w-full">הבנתי, תודה</Button>
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if(isDrawing) {
                    setIsDrawing(false);
                    onSave(canvasRef.current.toDataURL());
                }
            };

            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                onSave(null);
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#0284c7';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
            }, []);

            return (
                <div className="border-2 border-dashed border-gray-300 rounded-xl overflow-hidden bg-white hover:border-brand-400 transition-colors">
                    <div className="bg-gray-50 p-3 text-xs font-bold text-gray-500 border-b border-gray-200 flex justify-between items-center">
                        <span className="flex items-center gap-2">✍️ צייר חתימה כאן (עכבר או אצבע)</span>
                        <button type="button" onClick={clear} className="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded">נקה חתימה</button>
                    </div>
                    <canvas
                        ref={canvasRef}
                        width={600}
                        height={200}
                        className="w-full touch-none cursor-crosshair bg-white"
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchMove={draw}
                        onTouchEnd={stopDrawing}
                    />
                </div>
            );
        };

        const AppContext = createContext();

        tailwind.config = {
            theme: { extend: { colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' } } } }
        };

        const initialSettings = {
            freelancerAgreementText: `הסכם התקשרות לאספקת שירותי פרילנס\n\nשנערך ונחתם בין אוריזיס טכנולוגיות בע"מ (להלן "החברה") לבין נותן השירותים הנרשם למערכת (להלן "הפרילנסר").\n\n1. מהות ההתקשרות והיעדר יחסי עובד מעביד\nמוסכם במפורש כי הפרילנסר פועל כקבלן עצמאי ומספק שירותים כנגד חשבונית מס/קבלה כדין. לא מתקיימים ולא יתקיימו יחסי עובד ומעביד בין הצדדים.\n\n2. הכשרה, אספקת לקוחות וציוד עבודה\n2.1. החברה תספק לפרילנסר הכשרה מקצועית ואספקת פרויקטים.\n2.2. הפרילנסר יעבוד עם ציוד אישי (מחשב) על חשבונו. ישנה אפשרות לעבוד ממשרדי החברה בעלות מסובסדת בתיאום מראש.\n\n3. תגמול ובונוס הבאת לקוחות\nהתגמול יעמוד על אחוזים כפי שיוגדרו במערכת. לקוחות שהפרילנסר מביא בעצמו (בונוס ייזום) יזכו אותו ב-5% נוספים.\n\n4. כלים טכנולוגיים (מנוי AI)\nהפרילנסר מתחייב להחזיק ולתחזק על חשבונו הבלעדי מנוי פעיל במערכת בינה מלאכותית (כגון ChatGPT Plus) כתנאי יסוד לעבודה.\n\n5. סודיות, אי-תחרות ואי-הכפשה\nהפרילנסר מתחייב לשמור בסודיות מוחלטת כל מידע. אי-תחרות: איסור פנייה ללקוחות החברה למשך 24 חודשים מסיום ההתקשרות.\n\n6. בעלות על לקוחות ואפיליאציה\nכל הלקוחות (גם שהביא בעצמו) וכל פרילנסרים אחרים שגייס תחת רשת החברה - שייכים לחברה בלבד. בעת עזיבה, הרשת נשארת בבעלות החברה.\n\n7. קנס מוסכם\nהפרה יסודית תזכה בפיצוי מוסכם מראש בסך 50,000 ש"ח.`,
            clientAgreementText: `הסכם פיתוח, הקמה ושירותי אינטרנט\n\nהסכם זה מהווה חוזה התקשרות מחייב בין אוריזיס טכנולוגיות בע"מ לבין הלקוח המזמין.\nחתימה דיגיטלית בטופס כמוה כהסכם מחייב.\n\n1. החברה תספק שירותי פיתוח בהתאם לאפיון. חריגות יתומחרו בנפרד.\n2. הלקוח מתחייב להעביר חומרים בזמן.\n3. זכויות קניין עוברות ללקוח רק לאחר פירעון מלוא התשלום.\n4. ביטול עסקה יגרור חיוב יחסי בגין העבודה שבוצעה עד רגע הביטול כקבוע בחוק (טובין המיוצרים במיוחד).`,
            announcements: []
        };

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('orizis_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [alertState, setAlertState] = useState({ isOpen: false, message: '' });
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [systemSettings, setSystemSettings] = useState(initialSettings);
            const [isLoading, setIsLoading] = useState(true);

            const showAlert = (message) => setAlertState({ isOpen: true, message });
            const closeAlert = () => setAlertState({ isOpen: false, message: '' });

            // סנכרון חי מול שרתי Firebase
            useEffect(() => {
                // משיכת משתמשים בזמן אמת
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    if (snap.empty) {
                        // אם הענן ריק לחלוטין - נצור מנהל ראשוני
                        const admin = { uid: 'admin_1', role: 'manager', name: 'מנהל מערכת', email: 'admin@orizis.com', password: '123' };
                        db.collection('users').doc('admin_1').set(admin);
                    } else {
                        const users = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                        setUsersList(users);
                        // עדכון המשתמש המחובר למקרה שמשהו השתנה בענן (למשל תגמול אחוזים)
                        if (currentUser) {
                            const updatedMe = users.find(u => u.uid === currentUser.uid);
                            if (updatedMe) {
                                setCurrentUser(updatedMe);
                                localStorage.setItem('orizis_user', JSON.stringify(updatedMe));
                            }
                        }
                    }
                });

                // משיכת פרויקטים בזמן אמת
                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    const projs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(projs);
                });

                // משיכת הגדרות והודעות
                const unsubSettings = db.collection('system').doc('settings').onSnapshot(doc => {
                    if (doc.exists) setSystemSettings(doc.data());
                    else db.collection('system').doc('settings').set(initialSettings);
                    setIsLoading(false);
                });

                return () => { unsubUsers(); unsubProjects(); unsubSettings(); };
            }, []);

            const login = (email, password) => {
                const user = usersList.find(u => u.email === email && u.password === password);
                if (user) { 
                    setCurrentUser(user); 
                    localStorage.setItem('orizis_user', JSON.stringify(user)); 
                }
                else showAlert('שם משתמש או סיסמה שגויים');
            };
            const logout = () => { 
                setCurrentUser(null); 
                localStorage.removeItem('orizis_user'); 
            };

            // הפונקציות עכשיו כותבות ישירות לענן של גוגל במקום לזיכרון!
            const updateProject = (id, updates) => db.collection('projects').doc(id).update(updates);
            const updateUser = (uid, updates) => db.collection('users').doc(uid).update(updates);
            
            const addProject = (project) => {
                const id = `P-${Date.now().toString().slice(-4)}`;
                db.collection('projects').doc(id).set({ id, isSelfSourced: false, ...project });
                return id;
            };
            
            const addUser = (user) => {
                const uid = `user_${Date.now()}`;
                db.collection('users').doc(uid).set({ uid, ...user });
            };

            const saveSystemSettings = (newSettings) => {
                db.collection('system').doc('settings').set(newSettings, { merge: true });
            };

            if (isLoading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-white font-bold">מתחבר למסד הנתונים בענן...</div>;

            return (
                <AppContext.Provider value={{ currentUser, login, logout, projects, updateProject, addProject, usersList, updateUser, addUser, systemSettings, setSystemSettings: saveSystemSettings, showAlert }}>
                    {children}
                    <AlertModal isOpen={alertState.isOpen} message={alertState.message} onClose={closeAlert} />
                </AppContext.Provider>
            );
        };

        const formatDuration = (seconds, withSign = false) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${withSign && seconds > 0 ? '+' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        const LoginScreen = () => {
            const { login } = useContext(AppContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20">
                        <div className="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-500 blur-[120px]"></div>
                        <div className="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-purple-600 blur-[150px]"></div>
                    </div>
                    
                    <Card className="w-full max-w-md p-8 glass-panel border-white/20 shadow-2xl relative z-10 fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black text-gray-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                            <p className="text-gray-500 text-sm mt-1 font-medium">Agency Operating System</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); login(email, password); }} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">אימייל</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="הזן את המייל שלך" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none" required />
                            </div>
                            <Button type="submit" className="w-full py-4 text-lg mt-2">התחבר למערכת</Button>
                        </form>
                    </Card>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, usersList, updateProject, systemSettings, setSystemSettings, addUser, updateUser, showAlert, addProject } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
            const [newAnnouncement, setNewAnnouncement] = useState('');
            const [showArchive, setShowArchive] = useState(false);
            const [pendingFreelancerId, setPendingFreelancerId] = useState({}); 
            
            const [viewingSignature, setViewingSignature] = useState(null); 
            const [viewingClientSignature, setViewingClientSignature] = useState(null); 

            const [showAddProjectModal, setShowAddProjectModal] = useState(false);
            const [newProjectData, setNewProjectData] = useState({ customerName: '', customerEmail: '', paymentAmount: '' });

            const revenue = projects.reduce((sum, p) => sum + p.paymentAmount + (p.addons || []).reduce((a,b)=>a+(b.price||0),0), 0);
            
            let freelancerCosts = 0;
            projects.forEach(p => {
                if(p.freelancerId) {
                    const fl = usersList.find(u => u.uid === p.freelancerId);
                    if(fl) {
                        const bonusPct = p.isSelfSourced ? 5 : 0;
                        const baseCost = p.paymentAmount * (((fl.basePercentage || 60) + bonusPct) / 100);
                        const upsellCost = (p.addons || []).reduce((a,b)=>a+(b.price||0),0) * ((fl.upsellPercentage || 0) / 100);
                        freelancerCosts += (baseCost + upsellCost);
                        if(fl.teamLeaderId) freelancerCosts += 150; // עמלת ראש צוות
                    }
                }
            });

            const handleAddUser = (e) => {
                e.preventDefault();
                addUser({ 
                    ...newUser, 
                    basePercentage: newUser.role === 'freelancer' ? Number(newUser.basePercentage || 60) : 0,
                    upsellPercentage: newUser.role === 'freelancer' ? Number(newUser.upsellPercentage || 0) : 0 
                });
                setNewUser({ name: '', email: '', role: 'client', password: '', basePercentage: 60, upsellPercentage: 10, teamLeaderId: '' });
                showAlert("המשתמש נוסף בהצלחה למסד הנתונים!");
            };

            const handleAddProject = (e) => {
                e.preventDefault();
                const newProjectId = addProject({
                    customerName: newProjectData.customerName,
                    customerEmail: newProjectData.customerEmail,
                    paymentAmount: Number(newProjectData.paymentAmount),
                    status: 'paid_waiting_for_brief',
                    freelancerId: null,
                    createdAt: Date.now(),
                    addons: [],
                    hasSignedAgreement: false
                });
                addUser({
                    name: newProjectData.customerName,
                    email: newProjectData.customerEmail,
                    password: '123',
                    role: 'client',
                    projectId: newProjectId
                });
                setShowAddProjectModal(false);
                setNewProjectData({ customerName: '', customerEmail: '', paymentAmount: '' });
                showAlert("הלקוח נוצר בהצלחה ונשלחו אליו פרטי התחברות למילוי אפיון!");
            };

            const addAnnouncement = () => {
                if(!newAnnouncement) return;
                setSystemSettings({...systemSettings, announcements: [{id: Date.now().toString(), text: newAnnouncement, date: new Date().toLocaleDateString('he-IL')}, ...(systemSettings.announcements || [])]});
                setNewAnnouncement('');
                showAlert("המודעה פורסמה לכל הצוות.");
            };

            const resetPassword = (email) => showAlert(`קישור לאיפוס סיסמה נשלח בהצלחה לכתובת: ${email}`);

            const filteredProjects = projects.filter(p => showArchive ? p.status === 'completed' : p.status !== 'completed');

            return (
                <div className="space-y-8 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <Card className="p-6 bg-gradient-to-br from-brand-600 to-brand-800 text-white border-none"><div className="text-brand-100 font-medium mb-1">הכנסות כוללות</div><div className="text-3xl font-black">₪{revenue.toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">עלויות צוות וסוכנים</div><div className="text-3xl font-black text-red-500">₪{freelancerCosts.toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">רווח גולמי הערכה</div><div className="text-3xl font-black text-emerald-500">₪{(revenue - freelancerCosts).toLocaleString()}</div></Card>
                        <Card className="p-6"><div className="text-gray-500 font-medium mb-1">לקוחות פעילים</div><div className="text-3xl font-black text-gray-900">{projects.filter(p=>p.status!=='completed').length}</div></Card>
                    </div>

                    <div className="flex border-b border-gray-200">
                        {['projects', 'users', 'settings'].map(tab => (

                        {showAgreementModal && (

            const allMyProjects = projects.filter(p => p.freelancerId === currentUser.uid);
            const myProjects = allMyProjects.filter(p => !['completed', 'qa_review'].includes(p.status));
            const completedProjects = allMyProjects.filter(p => p.status === 'completed');

            const myJuniors = usersList.filter(u => u.role === 'freelancer' && u.teamLeaderId === currentUser.uid);
            const completedJuniorProjects = projects.filter(p => p.status === 'completed' && myJuniors.some(j => j.uid === p.freelancerId));
            const affiliateCommissionPerSite = 150; 
            const affiliateEarnings = completedJuniorProjects.length * affiliateCommissionPerSite;

            let totalEarnings = 0;
            let totalBudgetSec = 0;
            let totalSpentSec = 0;

            completedProjects.forEach(p => {
                const bonusPct = p.isSelfSourced ? 5 : 0;
                const base = p.paymentAmount * (((currentUser.basePercentage || 60) + bonusPct) / 100);
                const upsells = (p.addons || []).reduce((sum, a) => sum + (a.price || 0), 0);
                const commission = upsells * ((currentUser.upsellPercentage || 0) / 100);
                totalEarnings += (base + commission);

                const baseTime = 12600; 
                const addonsTime = (p.addons || []).reduce((sum, a) => sum + ((a.timeMinutes || 0) * 60), 0);
                totalBudgetSec += (baseTime + addonsTime);
                totalSpentSec += (p.timeSpent || 0);
            });

            const timeDiff = totalBudgetSec - totalSpentSec;
            const isEfficient = timeDiff >= 0;
            
            const toggleTimer = (project) => {
                if(project.isBlocked) return showAlert("הפרויקט חסום! פנה למנהל לשחרור חסימה.");

            };

            const submitIssueReport = () => {
                if(!blockerInput.reason) return;
                let finalTime = blockerInput.project.timeSpent || 0;
                if(blockerInput.project.isTimerRunning) finalTime += Math.floor((Date.now() - blockerInput.project.timerStartedAt) / 1000);

                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.form} onChange={e=>setQaState({...qaState, form: e.target.checked})} /> טפסים נשלחים תקין</label>

                                            <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-brand-500" checked={qaState.speed} onChange={e=>setQaState({...qaState, speed: e.target.checked})} /> אופטימיזציה לתמונות</label>
                                        </div>
                                        <Button 
                                            onClick={() => {
                                                let finalTime = currentSpent;
                                                updateProject(project.id, { status: 'qa_review', isTimerRunning: false, timeSpent: finalTime, timerStartedAt: null });

                                        </Button>
                                    </div>
                                </Card>
                            );
                        })}
                        {myProjects.length === 0 && <div className="col-span-2 p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-100 shadow-sm">אין פרויקטים בתור העבודה כרגע.</div>}
                    </div>

                    {blockerInput.show && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-red-600 mb-2">דיווח על חסימה/עיכוב</h3>
                                <p className="text-sm text-gray-600 mb-4">הטיימר ייעצר מיד והפרויקט יעבור לטיפול מנהל.</p>
                                <textarea className="w-full p-3 border rounded-xl mb-4" rows="3" placeholder="מה תוקע אותך? (למשל: חסר לוגו, אין גישה לשרת...)" value={blockerInput.reason} onChange={e=>setBlockerInput({...blockerInput, reason: e.target.value})}></textarea>
                                <div className="flex gap-2">
                                    <Button onClick={submitIssueReport} variant="danger" className="flex-1">עצור טיימר ודווח</Button>
                                    <Button onClick={()=>setBlockerInput({show: false, project: null, reason: ''})} variant="secondary">ביטול</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, updateProject, systemSettings, showAlert } = useContext(AppContext);
            const project = projects.find(p => p.id === currentUser.projectId);
            const [briefData, setBriefData] = useState({ businessName: '', audience: '', callToAction: '' });
            
            const [clientSignature, setClientSignature] = useState(null);
            const [termsAccepted, setTermsAccepted] = useState(false);

            if (!project) return <div className="text-center p-10 text-gray-500 font-bold">לא נמצא פרויקט. פנה לתמיכה.</div>;

            const isPostLaunch = project.status === 'completed';

            if (isPostLaunch) {
                return (
                    <div className="space-y-8 fade-in">

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <Card className="p-6 text-center"><div className="text-gray-500 font-bold mb-2">כניסות החודש (הערכה)</div><div className="text-4xl font-black text-brand-600">1,248</div></Card>
                            <Card className="p-6 text-center"><div className="text-gray-500 font-bold mb-2">לידים שנאספו</div><div className="text-4xl font-black text-emerald-600">42</div></Card>
                            <Card className="p-6 bg-brand-50 border-brand-200">
                                <h3 className="font-black text-brand-900 mb-2">תוכנית שותפים (Referral)</h3>

                                <div className="bg-white p-2 rounded border border-brand-200 text-center font-mono text-xs text-gray-500 select-all">orizis.com/ref/{currentUser.uid}</div>
                            </Card>

                        <Card className="p-6">
                            <h3 className="font-bold text-gray-900 mb-4 text-xl">ניהול ריטיינר ותחזוקה (MRR)</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="border border-gray-200 rounded-xl p-5 hover:border-brand-500 transition-colors">
                                    <div className="font-black text-lg mb-1">חבילת Basic</div>
                                    <div className="text-gray-500 text-sm mb-4">אחסון מאובטח, תעודת SSL וגיבוי שבועי.</div>
                                    <div className="text-2xl font-black text-brand-600 mb-4">₪150 <span className="text-sm text-gray-500 font-medium">/ חודש</span></div>
                                    <Button className="w-full text-sm">הזן אשראי לתשלום חודשי</Button>
                                </div>
                                <div className="border-2 border-brand-500 bg-brand-50 rounded-xl p-5 relative overflow-hidden">
                                    <div className="absolute top-3 left-3 bg-brand-500 text-white text-[10px] font-bold px-2 py-1 rounded">מומלץ</div>
                                    <div className="font-black text-lg mb-1">חבילת VIP</div>
                                    <div className="text-gray-500 text-sm mb-4">הכל כולל עדכוני תוכן (עד שעה בחודש).</div>

                                    <Button className="w-full text-sm">בחר בחבילת VIP</Button>

            }

            return (
                <div className="max-w-2xl mx-auto space-y-8 fade-in">
                    <Card className="text-center p-8">

                            }} className="space-y-5">
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">שם העסק / המותג</label><input type="text" required className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.businessName} onChange={e=>setBriefData({...briefData, businessName: e.target.value})} /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">מי קהל היעד שלך?</label><input type="text" required className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.audience} onChange={e=>setBriefData({...briefData, audience: e.target.value})} /></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-1">מה הפעולה המרכזית שתרצה שגולש יעשה?</label><input type="text" required placeholder="למשל: השארת פרטים, רכישה..." className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl" value={briefData.callToAction} onChange={e=>setBriefData({...briefData, callToAction: e.target.value})} /></div>
                                
                                <div className="mt-6 pt-6 border-t border-gray-200">
                                    <h4 className="font-bold text-gray-900 mb-3 text-sm">אישור הסכם פיתוח ושירותים</h4>
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 text-xs text-gray-600 h-32 overflow-y-auto mb-4 custom-scrollbar whitespace-pre-wrap">
                                        {systemSettings.clientAgreementText}
                                    </div>
                                    <SignaturePad onSave={(data) => setClientSignature(data)} />
                                    
                                    <label className="flex items-start gap-3 p-4 bg-emerald-50 border border-emerald-200 rounded-xl cursor-pointer mt-4 hover:bg-emerald-100 transition-colors">
                                        <input type="checkbox" onChange={e => setTermsAccepted(e.target.checked)} required className="mt-1 w-5 h-5 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500" />
                                        <span className="text-sm font-bold text-emerald-900">קראתי, אישרתי ואני חותם על הסכם הפיתוח המצורף לעיל. ידוע לי כי עם לחיצה על כפתור השליחה, העבודה יוצאת לדרך באופן מחייב.</span>
                                    </label>
                                </div>

                                <Button type="submit" className="w-full py-4 text-lg mt-4 shadow-lg shadow-brand-500/30">חתום, שלח אפיון והתחל פיתוח</Button>
                            </form>
                        </Card>
                    )}

                    {['brief_submitted', 'in_progress', 'qa_review'].includes(project.status) && (
                        <Card className="bg-brand-50 border-brand-200 p-8 text-center">
                            <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">👨‍💻</div>
                            <h3 className="text-xl font-black text-brand-900 mb-2">הצוות שלנו עובד על האתר שלך!</h3>
                            <p className="text-brand-700 font-medium">קיבלנו את החומרים והפיתוח יצא לדרך. נעדכן אותך ברגע שיהיה מוכן לבדיקה.</p>
                        </Card>
                    )}
                </div>
            );
        };

        const App = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden">
                    <aside className="w-64 bg-slate-900 text-white flex flex-col hidden md:flex border-l border-slate-800 z-20">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-2xl font-black tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="text-xs text-slate-400 mt-1 font-medium tracking-widest uppercase">Agency ERP</div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <a href="#" className="flex items-center gap-3 px-4 py-3 bg-brand-600/10 text-brand-400 rounded-xl font-bold transition-colors"><span className="text-xl">📊</span> דשבורד ראשי</a>
                        </nav>
                        <div className="p-4 border-t border-slate-800 bg-slate-950/50">
                            <div className="flex items-center gap-3 mb-4 px-2">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center font-black text-lg shadow-lg">{currentUser.name.charAt(0)}</div>
                                <div>
                                    <div className="text-sm font-bold text-white">{currentUser.name}</div>
                                    <div className="text-xs text-slate-400 font-medium">{currentUser.role === 'manager' ? 'מנהל מערכת' : currentUser.role === 'freelancer' ? 'צוות פיתוח' : 'לקוח VIP'}</div>
                                </div>
                            </div>
                            <Button onClick={logout} variant="outline" className="w-full border-slate-700 text-slate-300 hover:bg-slate-800 hover:text-white text-xs py-2">התנתק מהמערכת</Button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white/80 backdrop-blur-md border-b border-gray-200 p-4 lg:p-6 flex justify-between items-center z-10 sticky top-0">
                            <div>
                                <h1 className="text-2xl font-black text-gray-900">
                                    {currentUser.role === 'manager' ? 'ניהול סוכנות (Admin)' : currentUser.role === 'freelancer' ? 'סביבת עבודה' : 'פורטל לקוח'}
                                </h1>
                                <p className="text-sm text-gray-500 font-medium mt-1">
                                    {new Date().toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </p>
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar relative">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
