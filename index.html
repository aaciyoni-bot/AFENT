    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        const GEMINI_API_KEY = "AQ.Ab8RN6KUs_h-e7vuWbqdoNKFQcS5h9c2fmqNucGwhUJDyBfMKg";

        const firebaseConfig = {

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (

                                <div className="text-6xl mb-4">🚨</div>
                                <h1 className="text-2xl font-black text-slate-800 mb-2">שגיאת מערכת נתפסה</h1>
                                <p className="text-slate-600 mb-6">נתון חסר או שבור מנע את קריסת המערכת.</p>
                                <button onClick={() => window.location.reload()} className="bg-brand-500 text-white px-6 py-3 rounded-xl font-bold w-full">רענן עמוד</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 p-6 ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = "button" }) => {
            const base = "px-4 py-2 font-bold rounded-xl transition-all duration-200 focus:outline-none flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-500 text-white hover:bg-brand-600 shadow-lg shadow-brand-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/30",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-lg shadow-rose-500/30",
                warning: "bg-amber-500 text-white hover:bg-amber-600 shadow-lg shadow-amber-500/30"
            };
            return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>{children}</button>;
        };

        const AlertModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "אישור", type = "info" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
                        <div className={`text-5xl mb-4 text-center ${type === 'danger' ? 'text-rose-500' : type === 'warning' ? 'text-amber-500' : 'text-brand-500'}`}>
                            {type === 'danger' ? '⚠️' : type === 'warning' ? '🤔' : '✨'}
                        </div>
                        <h3 className="text-2xl font-black text-center text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-center mb-8 font-medium">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {onCancel && <Button variant="secondary" onClick={onCancel} className="w-full">ביטול</Button>}
                            <Button variant={type === 'danger' ? 'danger' : 'primary'} onClick={onConfirm} className="w-full">{confirmText}</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const SignatureCanvas = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a';
            }, []);

            const startDrawing = (e) => { setIsDrawing(true); draw(e); };
            const endDrawing = () => { setIsDrawing(false); canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            const clear = () => canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-4 bg-slate-50">
                    <canvas 
                        ref={canvasRef} width={400} height={200} 
                        className="w-full bg-white rounded-xl cursor-crosshair touch-none border border-slate-200"
                        onMouseDown={startDrawing} onMouseUp={endDrawing} onMouseMove={draw} onMouseLeave={endDrawing}
                        onTouchStart={startDrawing} onTouchEnd={endDrawing} onTouchMove={draw}
                    />
                    <div className="flex gap-3 mt-4">
                        <Button variant="secondary" onClick={clear} className="flex-1">נקה</Button>
                        <Button variant="success" onClick={() => onSave(canvasRef.current.toDataURL())} className="flex-1">אשר חתימה</Button>
                    </div>
                </div>
            );
        };

        const AppCore = () => {
            const [users, setUsers] = useState([]);
            const [projects, setProjects] = useState([]);
            const [storeItems, setStoreItems] = useState([]);
            
            const [currentUser, setCurrentUser] = useState(null);
            const [impersonatingAdmin, setImpersonatingAdmin] = useState(null); 
            
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [alertData, setAlertData] = useState({ isOpen: false });

            // DB Fetching
            useEffect(() => {
                if(!db) return;
                
                const unsubUsers = db.collection('users').onSnapshot(snap => {
                    const fetchedUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setUsers(fetchedUsers);
                }, err => console.error("Users error:", err));

                const unsubProjects = db.collection('projects').onSnapshot(snap => {
                    setProjects(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, err => console.error("Projects error:", err));

                const unsubStore = db.collection('store').onSnapshot(snap => {
                    setStoreItems(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, err => console.error("Store error:", err));

                return () => { unsubUsers(); unsubProjects(); unsubStore(); };
            }, []);

            const showAlert = (message, title = "הודעה", type = "info", onConfirmAction = null) => {
                setAlertData({ 
                    isOpen: true, title, message, type, 
                    onConfirm: () => {
                        if (onConfirmAction) onConfirmAction();
                        setAlertData({ isOpen: false });
                    },
                    onCancel: onConfirmAction ? () => setAlertData({ isOpen: false }) : null,
                    confirmText: onConfirmAction ? "אישור וביצוע" : "הבנתי"
                });
            };

            const handleLoginSubmit = async (e) => {
                e.preventDefault();
                let user = users.find(u => u?.email?.toLowerCase() === loginEmail.trim().toLowerCase() && u?.password === loginPassword);
                
                // Auto-Heal & Create Admin if first time login
                if (!user && loginEmail === 'aaci.yoni@gmail.com' && loginPassword === '6962697') {
                    const existingCorruptedAdmin = users.find(u => u?.email?.toLowerCase() === loginEmail.trim().toLowerCase());
                    if (existingCorruptedAdmin) {
                        await db.collection('users').doc(existingCorruptedAdmin.id).set({ role: 'admin' }, { merge: true });
                        user = { ...existingCorruptedAdmin, role: 'admin' };
                    } else {
                        const newAdmin = { id: 'admin_1', role: 'admin', name: 'יוני (מנהל ראשי)', email: loginEmail, password: loginPassword };
                        await db.collection('users').doc('admin_1').set(newAdmin);
                        user = newAdmin;
                    }
                }

                if (user) {
                    if (user.email === 'aaci.yoni@gmail.com') user.role = 'admin'; // Hard override for safety
                    setCurrentUser(user);
                    setLoginEmail(''); setLoginPassword('');
                } else {
                    showAlert("אימייל או סיסמה שגויים. נסה שוב.", "שגיאת התחברות", "danger");
                }
            };

            const logout = () => {
                if (impersonatingAdmin) {
                    setCurrentUser(impersonatingAdmin);
                    setImpersonatingAdmin(null);
                } else {
                    setCurrentUser(null);
                }
            };

            const impersonateUser = (userId) => {
                const userToView = users.find(u => u?.id === userId);
                if(userToView) {
                    setImpersonatingAdmin(currentUser);
                    setCurrentUser(userToView);
                }
            };

            // Global DB Actions
            const updateUser = async (id, data) => { if(db) await db.collection('users').doc(id).set(data, {merge: true}); };
            const updateProject = async (id, data) => { if(db) await db.collection('projects').doc(id).set(data, {merge: true}); };
            
            const createProjectAndClient = async (clientData, assignedFreelancerId) => {
                const clientId = 'client_' + Date.now();
                const newClient = { id: clientId, role: 'client', ...clientData };
                
                const newProject = { 
                    id: 'proj_' + Date.now(), 
                    clientId, 
                    freelancerId: assignedFreelancerId, 
                    status: 'waiting_for_brief',
                    paymentAmount: 0, 
                    brief: '', 
                    createdAt: Date.now(),
                    chatHistory: [{ role: 'model', text: 'שלום! אני יונתן, מנהל הפרויקטים החכם של אוריזיס. אני כאן כדי שנאפיין יחד את החזון שלך לאתר המושלם. ספר לי בכמה מילים - מה העסק שלך עושה ומי קהל היעד?' }]
                };

                if(db) {
                    await db.collection('users').doc(clientId).set(newClient);
                    await db.collection('projects').doc(newProject.id).set(newProject);
                }
            };

            const deleteItem = async (collection, id) => {
                if(db) await db.collection(collection).doc(id).delete();
            };

            const createFreelancer = async (data) => {
                const fId = 'free_' + Date.now();
                if(db) await db.collection('users').doc(fId).set({ id: fId, role: 'freelancer', hasSignedAgreement: false, ...data });
            };

            const createStoreItem = async (data) => {
                const sId = 'item_' + Date.now();
                if(db) await db.collection('store').doc(sId).set({ id: sId, ...data });
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900 p-4">
                        <Card className="w-full max-w-md p-8 shadow-2xl relative overflow-hidden fade-in border-none">
                            <h1 className="text-4xl font-black text-center text-white mb-2 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <p className="text-center text-slate-400 mb-8 font-medium">התחברות למערכת ה-ERP</p>
                            
                            <form onSubmit={handleLoginSubmit} className="space-y-4">
                                <div>
                                    <label className="text-sm font-bold text-slate-300 block mb-1">כתובת אימייל</label>
                                    <input 
                                        type="email" required value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} 
                                        className="w-full p-3 bg-slate-700 text-white border border-slate-600 rounded-xl outline-none focus:border-brand-500 transition-colors text-left" dir="ltr"
                                        placeholder="your@email.com"
                                    />
                                </div>
                                <div>
                                    <label className="text-sm font-bold text-slate-300 block mb-1">סיסמה</label>
                                    <input 
                                        type="password" required value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)}

                                        placeholder="••••••••"
                                    />
                                </div>
                                <Button type="submit" className="w-full py-4 text-lg mt-2">היכנס למערכת</Button>
                            </form>
                        </Card>
                        <AlertModal {...alertData} />
                    </div>
                );

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-20 md:pb-0">
                    <AlertModal {...alertData} />
                    
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 glass-panel">
                        {impersonatingAdmin && (
                            <div className="bg-purple-600 text-white text-center py-2 px-4 font-bold text-sm flex justify-between items-center shadow-inner">
                                <span>👁️ מצב צפייה: אתה רואה את המסך של {currentUser?.name}</span>
                                <Button onClick={logout} variant="secondary" className="text-xs py-1 px-3 hover:bg-white text-slate-800">חזור למנהל</Button>
                            </div>
                        )}
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">ORIZIS<span className="text-brand-500">WEB</span></h1>
                            <div className="flex items-center gap-4">
                                <div className="text-left hidden sm:block">
                                    <div className="font-bold text-slate-700">{currentUser?.name}</div>
                                    <div className="text-xs text-brand-600 font-medium uppercase">{currentUser?.role}</div>
                                </div>
                                <Button onClick={logout} variant="secondary" className="!p-2 rounded-full"><span className="text-xl">🚪</span></Button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        {currentUser?.role === 'admin' && <AdminDashboard users={users} projects={projects} storeItems={storeItems} createProjectAndClient={createProjectAndClient} createFreelancer={createFreelancer} createStoreItem={createStoreItem} updateProject={updateProject} deleteItem={deleteItem} showAlert={showAlert} impersonateUser={impersonateUser} />}
                        
                        {currentUser?.role === 'freelancer' && <FreelancerDashboard user={currentUser} users={users} projects={projects} updateUser={updateUser} updateProject={updateProject} createProjectAndClient={createProjectAndClient} showAlert={showAlert} impersonateUser={impersonateUser} />}
                        
                        {currentUser?.role === 'client' && <ClientPortal user={currentUser} projects={projects} storeItems={storeItems} updateProject={updateProject} />}
                    </main>
                </div>
            );
        };

        const AdminDashboard = ({ users, projects, storeItems, createProjectAndClient, createFreelancer, createStoreItem, updateProject, deleteItem, showAlert, impersonateUser }) => {
            const [activeTab, setActiveTab] = useState('projects');
            
            // Forms State
            const [newClient, setNewClient] = useState({ name: '', email: '', password: '', freelancerId: '' });
            const [newFreelancer, setNewFreelancer] = useState({ name: '', email: '', password: '', phone: '' });
            const [newStoreItem, setNewStoreItem] = useState({ name: '', price: '', description: '', isMRR: false });

            const clients = users.filter(u => u?.role === 'client');
            const freelancers = users.filter(u => u?.role === 'freelancer');
            const totalRevenue = projects.reduce((sum, p) => sum + (Number(p?.paymentAmount) || 0), 0);

            const handleCreateClient = () => {
                if(!newClient.name || !newClient.email || !newClient.password || !newClient.freelancerId) return showAlert("מלא את כל שדות הלקוח ושייך פרילנסר.", "שגיאה", "danger");
                createProjectAndClient(newClient, newClient.freelancerId);
                setNewClient({ name: '', email: '', password: '', freelancerId: '' });
                showAlert("הלקוח הוקם ונשלח לאפיון.", "הצלחה", "success");
            };

            const handleCreateFreelancer = () => {
                if(!newFreelancer.name || !newFreelancer.email || !newFreelancer.password) return showAlert("מלא שם, אימייל וסיסמה.", "שגיאה", "danger");
                createFreelancer(newFreelancer);
                setNewFreelancer({ name: '', email: '', password: '', phone: '' });
                showAlert("פרילנסר נוסף לצוות.", "הצלחה", "success");
            };

            const handleCreateStoreItem = () => {
                if(!newStoreItem.name || !newStoreItem.price) return showAlert("מלא שם ומחיר למוצר.", "שגיאה", "danger");
                createStoreItem({...newStoreItem, price: Number(newStoreItem.price)});
                setNewStoreItem({ name: '', price: '', description: '', isMRR: false });
                showAlert("מוצר התווסף לחנות.", "הצלחה", "success");
            };

            return (
                <div className="space-y-8 fade-in">
                    <Card className="bg-gradient-to-br from-brand-600 to-brand-900 text-white border-none shadow-xl">
                        <div className="flex justify-between items-center">
                            <div>
                                <h3 className="text-brand-100 font-medium mb-1">הכנסות מערכת כוללות</h3>
                                <div className="text-5xl font-black">₪{totalRevenue.toLocaleString()}</div>
                            </div>
                            <div className="text-6xl opacity-50">📈</div>
                        </div>
                    </Card>

                    {/* Tabs Navigation */}
                    <div className="flex border-b border-slate-200 gap-6">
                        <button onClick={() => setActiveTab('projects')} className={`pb-3 text-lg transition-colors ${activeTab === 'projects' ? 'tab-active' : 'tab-inactive'}`}>📋 פרויקטים ולקוחות</button>
                        <button onClick={() => setActiveTab('freelancers')} className={`pb-3 text-lg transition-colors ${activeTab === 'freelancers' ? 'tab-active' : 'tab-inactive'}`}>👥 צוות פרילנסרים</button>
                        <button onClick={() => setActiveTab('store')} className={`pb-3 text-lg transition-colors ${activeTab === 'store' ? 'tab-active' : 'tab-inactive'}`}>🛍️ חנות ושדרוגים</button>
                    </div>

                    {/* TAB 1: Projects */}
                    {activeTab === 'projects' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                            <div className="lg:col-span-2 space-y-6">
                                <Card>
                                    <h2 className="text-xl font-black text-slate-800 mb-6">טבלת פרויקטים מרכזית</h2>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-right">
                                            <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                                                <tr><th className="py-4 px-4">לקוח</th><th className="py-4 px-4">סטטוס</th><th className="py-4 px-4">בעלות (פרילנסר)</th><th className="py-4 px-4">פעולות</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {projects.map(p => {
                                                    const client = clients.find(c => c?.id === p?.clientId);
                                                    return (
                                                        <tr key={p.id} className="hover:bg-slate-50">
                                                            <td className="py-4 px-4 font-bold text-slate-800">{client?.name || 'לקוח נמחק'}</td>
                                                            <td className="py-4 px-4">
                                                                {p.status === 'waiting_for_brief' && <span className="text-brand-600 bg-brand-50 px-2 py-1 rounded font-bold">🤖 מאפיין AI</span>}
                                                                {p.status === 'waiting_for_quote' && <span className="text-amber-600 bg-amber-50 px-2 py-1 rounded font-bold">⚠️ ממתין לתמחור</span>}
                                                                {p.status === 'waiting_for_payment' && <span className="text-blue-600 bg-blue-50 px-2 py-1 rounded font-bold">💳 מחכה לתשלום</span>}
                                                                {p.status === 'in_progress' && <span className="text-emerald-600 bg-emerald-50 px-2 py-1 rounded font-bold">🚀 בפיתוח</span>}
                                                                {p.status === 'qa_review' && <span className="text-purple-600 bg-purple-50 px-2 py-1 rounded font-bold">🔍 בבקרת איכות</span>}
                                                            </td>
                                                            <td className="py-4 px-4">
                                                                <select value={p.freelancerId || ''} onChange={(e) => updateProject(p.id, {freelancerId: e.target.value})} className="p-2 bg-white border border-slate-300 rounded-lg outline-none focus:border-brand-500">
                                                                    <option value="">בחר...</option>
                                                                    {freelancers.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                                                </select>
                                                            </td>
                                                            <td className="py-4 px-4 flex gap-2">
                                                                {client && <Button onClick={() => impersonateUser(client.id)} variant="secondary" className="!px-3 !py-1 text-xs">צפה</Button>}

            const chatEndRef = useRef(null);

            const messages = project?.chatHistory || [];
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            if (!project) return <div className="text-center p-12 text-slate-500 font-medium bg-white rounded-xl shadow-sm border border-slate-200 max-w-lg mx-auto mt-10">המערכת מכינה את סביבת העבודה שלך...</div>;

            const handleSendChat = async () => {
                if (!chatInput.trim() || isTyping) return;
                
                const newMessages = [...messages, { role: 'user', text: chatInput }];
                updateProject(project.id, { chatHistory: newMessages });
                setChatInput(''); setIsTyping(true);

                const sysPrompt = `אתה יונתן, מנהל פרויקטים סופר-מקצועי בחברת ORIZISWEB. שאל את הלקוח שאלות קצרות על האתר שהוא רוצה. אסור לך לתת מחירים! כשיש לך מספיק מידע, תגיד שהעברת לצוות הפיתוח ותוסיף בסוף את המילה [סיכום_אפיון].`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            contents: newMessages.map(m => ({ role: m.role, parts: [{ text: m.text }] }))
                        })
                    });
                    const data = await response.json();
                    let aiText = data.candidates[0].content.parts[0].text;
                    const isFinished = aiText.includes('[סיכום_אפיון]');
                    aiText = aiText.replace('[סיכום_אפיון]', '').trim();
                    
                    const finalMessages = [...newMessages, { role: 'model', text: aiText }];
                    updateProject(project.id, { chatHistory: finalMessages });
                    
                    if (isFinished) {
                        const briefTranscript = finalMessages.map(m => `${m.role === 'user' ? 'לקוח' : 'יונתן'}: ${m.text}`).join('\n\n');
                        setTimeout(() => updateProject(project.id, { brief: briefTranscript, status: 'waiting_for_quote' }), 3000);
                    }
                } catch (err) {
                    updateProject(project.id, { chatHistory: [...newMessages, { role: 'model', text: 'שגיאת רשת. נסה שוב.' }] });
                } finally { setIsTyping(false); }

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in pb-20">

                            </div>
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-5 bg-slate-50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                                        <div className={`max-w-[85%] md:max-w-[70%] p-4 rounded-2xl text-sm font-medium ${m.role === 'user' ? 'bg-brand-500 text-white rounded-br-sm' : 'bg-white border border-slate-200 rounded-bl-sm text-slate-700 whitespace-pre-wrap leading-relaxed'}`}>{m.text}</div>

                            </div>

                    {/* Stage 3: Agreement & Payment */}
                    {project.status === 'waiting_for_payment' && (
                        <Card className="p-6 md:p-10 border-t-4 border-t-brand-500 shadow-2xl rounded-3xl">
                            <h2 className="text-3xl font-black text-slate-800 mb-3">אישור הצעת מחיר והסכם</h2>
                            <div className="bg-gradient-to-r from-slate-50 to-white border border-slate-200 p-8 rounded-2xl mb-8 flex justify-between items-center shadow-sm">
                                <h3 className="font-black text-slate-800 text-xl">סך הכל לפיתוח והקמה:</h3>
                                <div className="text-4xl md:text-5xl font-black text-brand-600 bg-brand-50 px-6 py-4 rounded-xl border border-brand-100">₪{project.paymentAmount?.toLocaleString()}</div>

                                    <p><strong>1. מהות העבודה:</strong> פיתוח אתר לפי האפיון שסוכם. זמן אספקה משוער: עד 14 ימי עסקים מתחילת העבודה.</p>

                                    <p><strong>3. ביטול עסקה:</strong> מאחר והמוצר מיוצר במיוחד עבור הלקוח, ביטול לאחר חתימה יגרור חיוב יחסי בגין העבודה.</p>

                    {(project.status === 'in_progress' || project.status === 'completed' || project.status === 'qa_review') && (
                        <div className="space-y-8">
                            <Card className="text-center py-16 bg-gradient-to-b from-emerald-50 to-white border border-emerald-100 shadow-lg rounded-3xl">
                                <div className="text-6xl mb-6">🚀</div>
                                <h2 className="text-3xl font-black text-emerald-900 mb-2">האתר שלך בפיתוח!</h2>
                                <p className="text-emerald-800 font-medium">הצוות שלנו עובד על הפרויקט שלך ברגעים אלו.</p>
                            </Card>

                            <Card>
                                <h2 className="text-2xl font-black text-slate-800 mb-6">🛍️ חנות שדרוגים ותחזוקה</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {storeItems.map(item => (
                                        <div key={item.id} className="border border-slate-200 p-6 rounded-2xl flex flex-col justify-between bg-white hover:shadow-lg transition-shadow">
                                            <div className="mb-4">
                                                <h4 className="font-black text-slate-800 text-lg mb-1">{item.name}</h4>
                                                {item.isMRR && <span className="text-xs bg-brand-100 text-brand-700 font-bold px-2 py-1 rounded">מנוי חודשי</span>}
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-2xl font-black text-slate-800">₪{item.price}</span>
                                                <Button variant="primary">רכוש שדרוג</Button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AppCore /></ErrorBoundary>);
    </script>
</body>
</html>
