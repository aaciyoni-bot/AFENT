        const SignaturePad = ({ onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke();
            };

            const endDrawing = () => setIsDrawing(false);
            const clearPad = () => { const canvas = canvasRef.current; canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); };
            const savePad = () => { if (onSave) onSave(canvasRef.current.toDataURL()); };

            useEffect(() => {
                const canvas = canvasRef.current;
                canvas.width = canvas.offsetWidth; canvas.height = 150;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
            }, []);

            return (
                <div className="space-y-3">
                    <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={endDrawing} onMouseLeave={endDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={endDrawing} className="signature-pad w-full" />
                    <div className="flex gap-2 justify-end">
                        <Button variant="outline" onClick={clearPad} className="text-xs py-1.5">נקה חתימה</Button>
                        <Button variant="success" onClick={savePad} className="text-xs py-1.5">אשר חתימה</Button>
                    </div>
                </div>
            );
        };

                                    className="w-full p-4 border border-slate-300 rounded-xl bg-white font-medium text-sm min-h-[150px] focus:ring-2 focus:ring-brand-500 outline-none custom-scrollbar"
                                    value={localBrief}
                                    onChange={(e) => setLocalBrief(e.target.value)}
                                    placeholder="הקלד כאן את דרישות הלקוח, עיצוב, מטרות..."
                                />
                                <div className="flex justify-end mt-2"><Button onClick={handleSaveBrief} variant="outline" className="text-xs py-1.5 border-brand-300 text-brand-700 bg-brand-50 hover:bg-brand-100">💾 שמור אפיון משיחה</Button></div>
                            </div>
                            
                            <div className="flex gap-3 pt-2">
                                <Button onClick={()=>updateProject(project.id, {status: 'qa_review'})} variant="success" className="flex-1 text-base py-4 font-black shadow-lg shadow-emerald-500/30">✔️ הגש למנהל (QA)</Button>
                                <Button onClick={()=>{if(window.confirm('לדווח על תקיעה?')) showAlert('דווח. הטיימר הוקפא.');}} variant="danger" className="text-base py-4 px-6 font-black bg-rose-500 text-white hover:bg-rose-600 border-none shadow-lg shadow-rose-500/30">🔴 נתקעתי</Button>
                            </div>
                        </div>
                    )}
                    {(project.status === 'brief_submitted' || project.status === 'paid_waiting_for_brief') && (
                        <div className="text-center p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            <p className="text-slate-600 mb-6 text-base font-bold">הלקוח נוצר והמשימה בתור שלך. לחץ התחל כדי להפעיל טיימר ולקרוא את האפיון.</p>
                            <Button onClick={()=>updateProject(project.id, {status: 'in_progress'})} className="w-full py-4 text-lg font-black shadow-lg shadow-brand-500/40">התחל משימה (הפעל טיימר)</Button>
                        </div>
                    )}
                    {project.status === 'qa_review' && <div className="bg-blue-50 text-blue-700 p-6 rounded-2xl text-center font-black text-lg border border-blue-200">הוגש ל-QA - ממתין למנהל ⏳</div>}
                </Card>
            );
        };

        const FreelancerDashboard = () => {
            const { currentUser, projects, updateProject, updateUser, systemSettings, showAlert } = useContext(AppContext);
            const myProjects = projects.filter(p => p.freelancerId === currentUser.uid);
            
            if (!currentUser.hasSignedAgreement) {
                return (
                    <div className="max-w-3xl mx-auto space-y-6 fade-in pb-10">
                        <Card className="p-10 border-t-8 border-brand-500 shadow-2xl">
                            <h2 className="text-3xl font-black mb-4 text-brand-900">ברוך הבא לצוות אוריזיס! 🚀</h2>
                            <p className="text-slate-600 mb-8 font-medium text-lg">חובה לקרוא ולאשר את הסכם ההתקשרות הכולל תנאי שימוש בציוד אישי ו-AI.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm whitespace-pre-wrap font-medium border border-slate-200 mb-8 h-80 overflow-y-auto custom-scrollbar leading-relaxed">{systemSettings.freelancerAgreementText}</div>
                            <div className="mb-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <label className="block text-base font-black mb-4 text-slate-800">חתימה דיגיטלית (צייר עם האצבע/עכבר):</label>
                                <SignaturePad onSave={(sig) => { updateUser(currentUser.uid, { hasSignedAgreement: true, signature: sig, signedAt: Date.now() }); showAlert("החוזה נחתם! סביבת העבודה נפתחה."); }} />
                            </div>
                        </Card>
                    </div>
                );
            }

            const calcEarnings = () => {
                return myProjects.reduce((sum, p) => {
                    if (p.status !== 'completed') return sum;
                    let basePct = (currentUser.basePercentage || 60);
                    if (p.isSelfSourced) basePct += 5; 
                    const baseEarned = (Number(p.paymentAmount) || 0) * (basePct / 100);
                    const upsellPct = (currentUser.upsellPercentage || 40);
                    const upsellEarned = (Number(p.upsellAmount) || 0) * (upsellPct / 100);
                    return sum + baseEarned + upsellEarned;
                }, 0);
            };

            return (
                <div className="space-y-8 fade-in max-w-7xl mx-auto w-full pb-20">
                    {systemSettings.announcement && (
                        <div className="bg-gradient-to-r from-brand-600 to-brand-800 text-white p-6 rounded-3xl shadow-xl flex items-center gap-6"><span className="text-5xl animate-bounce">📢</span><div><h4 className="font-black text-sm text-brand-200 uppercase tracking-widest mb-2">הודעת הנהלה</h4><p className="font-bold text-xl leading-tight">{systemSettings.announcement}</p></div></div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="p-6 bg-brand-50 border-brand-100"><div className="text-sm font-bold text-brand-800 uppercase tracking-wider">סך רווחים (כולל בונוס ואפסייל)</div><div className="text-4xl font-black mt-2 text-brand-900">₪{calcEarnings().toLocaleString()}</div></Card>
                        <Card className="p-6 shadow-sm"><div className="text-sm font-bold text-slate-500 uppercase tracking-wider">משימות בתור כעת</div><div className="text-4xl font-black mt-2 text-slate-900">{myProjects.filter(p=>p.status==='in_progress').length}</div></Card>
                        <Card className="p-6 shadow-sm border-b-4 border-emerald-500"><div className="text-sm font-bold text-slate-500 uppercase tracking-wider">הושלמו ואושרו סופית</div><div className="text-4xl font-black mt-2 text-emerald-600">{myProjects.filter(p=>p.status==='completed').length}</div></Card>
                    </div>

                    <div className="flex justify-between items-center mt-10 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <h3 className="font-black text-2xl text-slate-900 flex items-center gap-3">💻 פרויקטים לניהול ופיתוח</h3>
                        <div className="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-black tracking-widest font-mono shadow-inner flex items-center gap-3"><span className="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span> שעון נוכחות / טיימר פעיל</div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {myProjects.map(project => <FreelancerProjectCard key={project.id} project={project} currentUser={currentUser} updateProject={updateProject} showAlert={showAlert} />)}
                        {myProjects.length === 0 && <div className="col-span-2 text-center p-16 text-slate-500 font-black bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-xl">אין לך פרויקטים משויכים כרגע.</div>}
                    </div>
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, updateProject, updateUser, systemSettings, showAlert } = useContext(AppContext);
            const project = projects.find(p => p.id === currentUser.projectId);
            const [briefText, setBriefText] = useState(project?.brief || '');
            const [paymentModalData, setPaymentModalData] = useState({ isOpen: false, amount: 0, reason: '' });

            if (!project) return <div className="text-center p-20 font-black text-slate-400 text-2xl mt-20">פרויקט לא נמצא במערכת.</div>;

            if (!currentUser.hasSignedAgreement) {
                return (
                    <div className="max-w-3xl mx-auto space-y-6 fade-in pb-10 mt-10">
                        <Card className="p-10 shadow-2xl rounded-3xl border-0">
                            <h2 className="text-4xl font-black mb-4 text-slate-900 text-center">הסכם יציאה לדרך 📝</h2>
                            <p className="text-slate-600 mb-8 font-medium text-center text-xl">אשר את תנאי ההתקשרות כדי שנוכל לצאת לדרך עם האתר של <strong>{project.customerName}</strong>.</p>
                            <div className="bg-slate-50 p-6 rounded-2xl text-sm whitespace-pre-wrap font-medium border border-slate-200 mb-8 h-64 overflow-y-auto custom-scrollbar">{systemSettings.clientAgreementText}</div>
                            <div className="mb-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-md">
                                <label className="block text-base font-black mb-4 text-slate-800">חתימה דיגיטלית (צייר באמצעות מגע או עכבר):</label>
                                <SignaturePad onSave={(sig) => { updateUser(currentUser.uid, { hasSignedAgreement: true, signature: sig, signedAt: Date.now() }); showAlert("ההסכם נחתם! אנחנו יוצאים לדרך!"); }} />
                            </div>
                        </Card>
                    </div>
                );
            }

            const handleCheckoutSuccess = () => {
                // In a real app, integrate API here.
                const currentUpsell = Number(project.upsellAmount) || 0;
                updateProject(project.id, { upsellAmount: currentUpsell + paymentModalData.amount });
                setPaymentModalData({ isOpen: false, amount: 0, reason: '' });
                showAlert("מדהים! התשלום התקבל (או נשלח לאישור בהעברה בנקאית). השדרוג נוסף בהצלחה למערכת.");
            };

            return (
                <div className="max-w-4xl mx-auto space-y-10 fade-in pb-24 mt-6">
                    <PaymentModal isOpen={paymentModalData.isOpen} onClose={() => setPaymentModalData({ isOpen: false, amount: 0, reason: '' })} amount={paymentModalData.amount} onConfirm={handleCheckoutSuccess} />

                    <Card className="p-12 text-center bg-white shadow-xl border-0 relative overflow-hidden rounded-3xl">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brand-50 rounded-full blur-[100px] -z-10"></div>
                        <h2 className="text-5xl font-black mb-4 text-slate-900 tracking-tight">שלום {currentUser.name}! 👋</h2>
                        <p className="text-slate-500 font-medium text-xl mb-12">ברוך הבא לאזור האישי שלך. כאן תוכל לעקוב אחר התקדמות הפרויקט שלך בשקיפות מלאה.</p>
                        
                        <div className="flex justify-center items-center space-x-4 space-x-reverse relative max-w-2xl mx-auto">
                            <div className="absolute top-1/2 left-0 w-full h-2 bg-slate-100 -z-10 -translate-y-1/2 rounded-full"></div>
                            <div className="flex flex-col items-center bg-white relative z-10 px-6"><div className="w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center font-black shadow-lg shadow-emerald-500/40 text-2xl">✓</div><span className="text-base mt-4 font-black text-slate-800">פרויקט הוקם</span></div>
                            <div className="flex flex-col items-center bg-white relative z-10 px-6"><div className={`w-16 h-16 rounded-full flex items-center justify-center font-black shadow-lg text-2xl transition-all duration-500 ${project.status !== 'paid_waiting_for_brief' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : 'bg-brand-600 text-white shadow-brand-500/40 ring-8 ring-brand-50 scale-110'}`}>{project.status !== 'paid_waiting_for_brief' ? '✓' : '2'}</div><span className={`text-base mt-4 font-black ${project.status === 'paid_waiting_for_brief' ? 'text-brand-700' : 'text-slate-800'}`}>אפיון נדרש</span></div>
                            <div className="flex flex-col items-center bg-white relative z-10 px-6"><div className={`w-16 h-16 rounded-full flex items-center justify-center font-black shadow-lg text-2xl transition-colors ${project.status === 'completed' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : project.status === 'in_progress' || project.status === 'qa_review' ? 'bg-brand-600 text-white shadow-brand-500/40 ring-8 ring-brand-50' : 'bg-slate-100 text-slate-400 border-4 border-white shadow-inner'}`}>{project.status === 'completed' ? '✓' : '3'}</div><span className={`text-base mt-4 font-black ${project.status === 'in_progress' || project.status === 'qa_review' ? 'text-brand-700' : 'text-slate-400'}`}>בפיתוח</span></div>
                        </div>
                    </Card>

                    {project.status === 'paid_waiting_for_brief' && (
                        <Card className="p-10 border-t-8 border-brand-500 shadow-xl rounded-3xl">
                            <h3 className="font-black text-3xl mb-4 text-slate-900">שאלון אפיון יציאה לדרך</h3>
                            <p className="text-slate-600 mb-8 font-medium text-lg leading-relaxed">פרט כמה שיותר על העסק שלך. צוות המכירות והפיתוח שלנו יראה את כל מה שתכתוב כדי לקלוע לטעם שלך.</p>
                            <textarea 
                                className="w-full p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-brand-100 focus:border-brand-500 focus:bg-white outline-none mb-8 min-h-[250px] font-medium leading-relaxed custom-scrollbar text-lg" 
                                placeholder="מי הלקוחות שלך? מה המסר שתרצה לשדר? אילו צבעים אתה אוהב?..." 
                                value={briefText} onChange={e=>setBriefText(e.target.value)}
                            />
                            <Button onClick={() => { if(briefText.trim().length < 10) return showAlert("אנא פרט קצת יותר."); updateProject(project.id, { brief: briefText, status: 'brief_submitted' }); showAlert("האפיון נשלח לצוות הפיתוח/מכירות שלנו!"); }} className="w-full py-5 text-xl font-black shadow-xl shadow-brand-500/30">שלח אפיון וצא לדרך 🚀</Button>
                        </Card>
                    )}

                    {(project.status === 'brief_submitted' || project.status === 'in_progress' || project.status === 'qa_review') && (
                        <Card className="p-20 text-center bg-gradient-to-b from-brand-50 to-white border-brand-100 shadow-xl rounded-3xl">
                            <div className="text-8xl mb-8 animate-bounce">🏗️</div>
                            <h3 className="font-black text-4xl text-brand-900 mb-6 tracking-tight">האתר שלך בשלבי בנייה!</h3>
                            <p className="text-slate-600 font-medium text-xl max-w-lg mx-auto leading-relaxed">הצוות המקצועי שלנו קיבל את האפיון ועובד עליו כרגע.</p>
                        </Card>
                    )}

                    {project.status === 'completed' && (
                        <Card className="p-12 border-t-8 border-emerald-500 bg-white shadow-2xl rounded-3xl">
                            <div className="text-center mb-12"><div className="text-8xl mb-6">🎉</div><h3 className="font-black text-5xl text-emerald-800 mb-4 tracking-tight">האתר שלך באוויר!</h3><p className="text-slate-600 font-medium text-2xl">מזל טוב! פיתוח הפרויקט הושלם ונמסר.</p></div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                <div className="bg-slate-900 text-white p-8 rounded-3xl text-center shadow-xl relative overflow-hidden">
                                    <h4 className="font-black text-2xl mb-4">תחזוקה ואחסון VIP</h4>
                                    <p className="text-slate-300 mb-8 font-medium">שרתים מהירים, עדכוני אבטחה, וגיבויים.</p>
                                    <Button onClick={() => setPaymentModalData({ isOpen: true, amount: systemSettings.prices?.hostingVIP || 150, reason: 'hostingVIP' })} className="w-full py-4 text-lg font-black bg-gradient-to-r from-brand-500 to-brand-600 border-none shadow-lg shadow-brand-500/40">רכוש אחסון (₪{systemSettings.prices?.hostingVIP || 150})</Button>
                                </div>
                                <div className="bg-white border-2 border-slate-200 text-slate-800 p-8 rounded-3xl text-center shadow-xl">
                                    <h4 className="font-black text-2xl mb-4">חבילת קידום אורגני (SEO)</h4>
                                    <p className="text-slate-500 mb-8 font-medium">הביאו תנועה ולקוחות חדשים מגוגל.</p>
                                    <Button onClick={() => setPaymentModalData({ isOpen: true, amount: systemSettings.prices?.seoPackage || 800, reason: 'seoPackage' })} variant="outline" className="w-full py-4 text-lg font-black border-2 border-brand-500 text-brand-600 hover:bg-brand-50">רכוש חבילת קידום (₪{systemSettings.prices?.seoPackage || 800})</Button>
                                </div>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const App = () => {
            const { currentUser, logout } = useContext(AppContext);
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-slate-100 overflow-hidden font-sans" dir="rtl">
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="bg-white/95 backdrop-blur-xl border-b border-slate-200 p-5 px-8 flex justify-between items-center shadow-sm z-50 sticky top-0">
                            <div className="flex items-center gap-5">
                                <h1 className="text-3xl font-black text-slate-900 tracking-tight">ORIZIS<span className="text-brand-600">WEB</span></h1>
                                <Badge color={currentUser.role === 'manager' ? 'purple' : currentUser.role === 'freelancer' ? 'blue' : 'gray'}>
                                    {currentUser.role === 'manager' ? 'ניהול סוכנות (Admin)' : currentUser.role === 'freelancer' ? 'סביבת פרילנסר' : 'פורטל לקוחות'}
                                </Badge>
                            </div>
                            <div className="flex items-center gap-6">
                                <span className="text-sm font-black text-slate-600 bg-slate-100 px-4 py-2 rounded-xl">מחובר כ: {currentUser.name}</span>
                                <Button onClick={logout} variant="outline" className="text-sm px-6 py-2.5 font-bold">התנתק</Button>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            {currentUser.role === 'manager' && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
