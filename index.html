        const SignatureCanvas = ({ onSave, disabled = false }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if(disabled) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a';
            }, [disabled]);

            const startDrawing = (e) => { if(disabled) return; setIsDrawing(true); draw(e); };
            const endDrawing = () => { if(disabled) return; setIsDrawing(false); canvasRef.current.getContext('2d').beginPath(); };
            const draw = (e) => {
                if (!isDrawing || disabled) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            const clear = () => { if(disabled) return; canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); };

            return (
                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-4 bg-slate-50">
                    <canvas 
                        ref={canvasRef} width={400} height={200} 
                        className={`w-full bg-white rounded-xl touch-none border border-slate-200 ${disabled ? 'cursor-not-allowed opacity-60' : 'cursor-crosshair'}`}
                        onMouseDown={startDrawing} onMouseUp={endDrawing} onMouseMove={draw} onMouseLeave={endDrawing}
                        onTouchStart={startDrawing} onTouchEnd={endDrawing} onTouchMove={draw}
                    />
                    <div className="flex gap-3 mt-4">
                        <Button variant="secondary" onClick={clear} disabled={disabled} className="flex-1">נקה</Button>
                        <Button variant="success" onClick={() => onSave(canvasRef.current.toDataURL())} disabled={disabled} className="flex-1">אשר חתימה</Button>
                    </div>
                </div>
            );
        };

                    'completed': { color: 'text-blue-500', icon: '🔵', text: 'הושלם' },

                };

            return (

                                            </div>
                                        </div>
                                    )}

                                    {p.brief && (
                                        <div className="mt-6 bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                            <h4 className="font-black text-slate-800 mb-3">📝 אפיון ה-AI שנאסף מהלקוח</h4>
                                            <textarea disabled={isReadOnly} className="w-full p-4 bg-white border border-slate-200 rounded-xl min-h-[150px] text-sm outline-none disabled:opacity-75 disabled:bg-slate-50" defaultValue={p.brief} onBlur={(e) => updateProject(p.id, {brief: e.target.value})} />
                                        </div>
                                    )}
                                </Card>
                            );
                        })
                    )}
                </div>
            );
        };

        const ClientPortal = ({ user, projects, storeItems, settings, updateProject, isReadOnly }) => {
            const project = projects.find(p => p?.clientId === user?.id);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const messages = project?.chatHistory || [];
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            if (!project) return <div className="text-center p-12 text-slate-500 font-medium bg-white rounded-xl shadow-sm border border-slate-200 max-w-lg mx-auto mt-10">המערכת מכינה את סביבת העבודה שלך...</div>;

            const handleSendChat = async () => {
                if (isReadOnly) return; // Block sending if admin is viewing
                if (!chatInput.trim() || isTyping) return;
                
                const newMessages = [...messages, { role: 'user', text: chatInput }];
                updateProject(project.id, { chatHistory: newMessages });
                setChatInput(''); setIsTyping(true);

                const sysPrompt = `אתה יונתן, מנהל פרויקטים סופר-מקצועי בחברת ORIZISWEB. שאל את הלקוח שאלות קצרות על האתר שהוא רוצה. אסור לך לתת מחירים! כשיש לך מספיק מידע (4-5 שאלות), תגיד שהעברת לצוות הפיתוח ותוסיף בסוף ההודעה שלך את המילה המדויקת: [סיכום_אפיון].`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            contents: newMessages.map(m => ({ role: m.role, parts: [{ text: m.text }] }))
                        })
                    });
                    
                    if(!response.ok) throw new Error("API Error");

                    const data = await response.json();
                    let aiText = data.candidates[0].content.parts[0].text;
                    const isFinished = aiText.includes('[סיכום_אפיון]');
                    aiText = aiText.replace('[סיכום_אפיון]', '').trim();
                    
                    const finalMessages = [...newMessages, { role: 'model', text: aiText }];
                    updateProject(project.id, { chatHistory: finalMessages });
                    
                    if (isFinished) {
                        const briefTranscript = finalMessages.map(m => `${m.role === 'user' ? 'לקוח' : 'יונתן'}: ${m.text}`).join('\n\n');
                        setTimeout(() => updateProject(project.id, { brief: briefTranscript, status: 'waiting_for_quote' }), 3000);
                    }
                } catch (err) {
                    console.error("Chat error:", err);
                    updateProject(project.id, { chatHistory: [...newMessages, { role: 'model', text: 'מצטער, הייתה שגיאה בתקשורת. אנא נסה שוב.' }] });
                } finally { setIsTyping(false); }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in pb-20">
                    
                    {project.status === 'waiting_for_brief' && (
                        <Card className="shadow-2xl border-t-4 border-t-brand-500 p-0 overflow-hidden flex flex-col h-[600px] max-h-[80vh]">
                            <div className="bg-brand-50 p-4 border-b border-brand-100 flex items-center gap-3">
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white text-2xl">🤖</div>
                                <div><h3 className="font-black text-slate-800 text-xl">יונתן מ-ORIZIS</h3><p className="text-sm text-brand-600 font-bold">אפיון פרויקט חכם</p></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-5 bg-slate-50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                                        <div className={`max-w-[85%] md:max-w-[70%] p-4 rounded-2xl text-sm font-medium ${m.role === 'user' ? 'bg-brand-500 text-white rounded-br-xl rounded-tl-xl' : 'bg-white border border-slate-200 rounded-bl-xl rounded-tr-xl text-slate-700 whitespace-pre-wrap leading-relaxed shadow-sm'}`}>{m.text}</div>
                                    </div>
                                ))}
                                {isTyping && <div className="text-slate-400 p-4 font-bold text-sm animate-pulse">מקליד...</div>}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="p-4 bg-white border-t border-slate-200 flex gap-3">
                                <input disabled={isReadOnly} type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendChat()} placeholder={isReadOnly ? "מצב צפייה - לא ניתן להקליד" : "הקלד תשובה..."} className="flex-1 p-3 bg-slate-100 border border-slate-200 rounded-xl outline-none focus:bg-white focus:border-brand-500 disabled:opacity-60" />
                                <Button disabled={isReadOnly} onClick={handleSendChat} className="px-8 shadow-md">שלח</Button>
                            </div>
                        </Card>
                    )}

                    {project.status === 'waiting_for_quote' && (
                        <Card className="text-center py-24 bg-gradient-to-b from-amber-50 to-white border border-amber-100 shadow-xl rounded-3xl">
                            <div className="text-7xl mb-8 animate-pulse-slow">⏳</div>
                            <h2 className="text-3xl font-black text-amber-900 mb-4">האפיון בבדיקת הצוות</h2>
                            <p className="text-amber-800 font-medium">אנו בונים לך כעת הצעת מחיר מדויקת לפי האפיון שסיכמנו.</p>
                        </Card>
                    )}

                    {project.status === 'waiting_for_payment' && (
                        <Card className="p-6 md:p-10 border-t-4 border-t-brand-500 shadow-2xl rounded-3xl">
                            <h2 className="text-3xl font-black text-slate-800 mb-3">אישור הצעת מחיר והסכם</h2>
                            <div className="bg-gradient-to-r from-slate-50 to-white border border-slate-200 p-8 rounded-2xl mb-8 flex justify-between items-center shadow-sm">
                                <h3 className="font-black text-slate-800 text-xl">סך הכל לפיתוח והקמה:</h3>
                                <div className="text-4xl md:text-5xl font-black text-brand-600 bg-brand-50 px-6 py-4 rounded-xl border border-brand-100">₪{Number(project.paymentAmount).toLocaleString()}</div>
                            </div>
                            
                            <div className="mb-8">
                                <h4 className="font-black text-slate-800 mb-4 text-xl">הסכם התקשרות</h4>
                                <div className="h-48 overflow-y-auto bg-slate-50 border border-slate-200 rounded-xl p-6 text-sm text-slate-700 mb-6 whitespace-pre-wrap leading-relaxed">
                                    {settings.clientAgreement}
                                </div>
                                <SignatureCanvas disabled={isReadOnly} onSave={(sig) => updateProject(project.id, {status: 'in_progress', clientSignature: sig})} />
                            </div>
                        </Card>
                    )}

                    {(['in_progress', 'qa_review', 'completed', 'stuck'].includes(project.status)) && (
                        <div className="space-y-8">
                            <Card className={`text-center py-16 bg-gradient-to-b border shadow-lg rounded-3xl ${project.status === 'completed' ? 'from-blue-50 border-blue-100' : 'from-emerald-50 border-emerald-100'}`}>
                                <div className="text-6xl mb-6">{project.status === 'completed' ? '🎉' : '🚀'}</div>
                                <h2 className="text-3xl font-black mb-2 text-slate-900">
                                    {project.status === 'completed' ? 'האתר שלך באוויר!' : 'האתר שלך בפיתוח!'}
                                </h2>
                                <p className="font-medium text-slate-600">
                                    {project.status === 'qa_review' ? 'האתר סיים פיתוח ועובר כעת סדרת בדיקות איכות קפדניות (QA).' : 
                                     project.status === 'stuck' ? 'ישנו עיכוב קל בפיתוח, מנהל הפרויקט יעודכן בהקדם.' :
                                     project.status === 'in_progress' ? 'הצוות שלנו עובד על הפרויקט שלך ברגעים אלו.' : 
                                     'הפרויקט הושלם בהצלחה.'}
                                </p>
                            </Card>

                            <Card>
                                <h2 className="text-2xl font-black text-slate-800 mb-6">🛍️ חנות שדרוגים ותחזוקה</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {storeItems.length === 0 ? <p className="text-slate-500 col-span-2">החנות ריקה כרגע.</p> : storeItems.map(item => (
                                        <div key={item.id} className="border border-slate-200 p-6 rounded-2xl flex flex-col justify-between bg-white hover:shadow-lg transition-shadow">
                                            <div className="mb-4">
                                                <h4 className="font-black text-slate-800 text-lg mb-1">{item.name}</h4>
                                                {item.isMRR && <span className="text-xs bg-brand-100 text-brand-700 font-bold px-2 py-1 rounded">מנוי חודשי</span>}
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-2xl font-black text-slate-800">₪{item.price}</span>
                                                <Button disabled={isReadOnly} variant="primary">רכוש שדרוג</Button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><AppCore /></ErrorBoundary>);
    </script>
</body>
</html>
