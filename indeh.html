<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIZISWEB - ERP System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 selection:bg-blue-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // יצירת מופע משני של פיירבייס - מאפשר למנהל ליצור משתמשים חדשים בלי להתנתק מהחשבון שלו!
        const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white p-6 rounded-2xl shadow-sm border border-gray-100 ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-4 py-2 text-sm font-bold rounded-xl transition-all focus:outline-none disabled:opacity-50 flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-sm",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm",
                danger: "bg-red-50 text-red-600 hover:bg-red-100"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const formatDuration = (totalSeconds) => {
            if (!totalSeconds) return "00:00:00";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [usersList, setUsersList] = useState([]); // כל המשתמשים
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 } });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) {
                                setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            } else {
                                auth.signOut();
                            }
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                    }
                });

                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        setSystemSettings(doc.data());
                    } else {
                        const defaultSettings = {
                            upsells: [
                                { id: 'branding', title: 'מיתוג בסיסי: לוגו וקאבר', price: 500 },
                                { id: 'whatsapp', title: 'חיבור מהיר לוואטסאפ', price: 200 },
                                { id: 'gmb', title: 'רישום בעסק בגוגל מפות', price: 300 },
                                { id: 'express', title: 'מסירת אקספרס (עד 48 שעות)', price: 500 }
                            ],
                            expenses: { marketing: 250000, office: 360000, software: 50000 }
                        };
                        db.collection('settings').doc('general').set(defaultSettings);
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    if (snapshot.empty && projects.length === 0) {
                        // Seed logic removed to keep DB clean for real usage
                    }
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
                    const allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setUsersList(allUsers);
                    setFreelancers(allUsers.filter(u => u.role === 'freelancer'));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeUsers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => {
                await db.collection('projects').doc(projectId).update(updates);
            };

            const updateSettings = async (updates) => {
                await db.collection('settings').doc('general').update(updates);
            }
            
            const updateUser = async (userId, updates) => {
                await db.collection('users').doc(userId).update(updates);
            }

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, usersList, systemSettings, updateProject, updateSettings, updateUser, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [role, setRole] = useState('manager'); // ברירת מחדל ליצירת היוזר הראשון שלך
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); setLoading(true);
                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        // פתח סתרים ליצירת היוזר ה*ראשון* במערכת (המנהל)
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await db.collection('users').doc(cred.user.uid).set({ 
                            role, 
                            name: name || email.split('@')[0],
                            basePay: role === 'freelancer' ? 1000 : null,
                            upsellPercentage: role === 'freelancer' ? 30 : null,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (err) { 
                    setError("שגיאה: פרטי התחברות שגויים או שהמשתמש כבר קיים."); 
                    console.error(err);
                } finally { 
                    setLoading(false); 
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#0a0f1c]" style={{backgroundImage: "radial-gradient(circle at 50% -20%, #1e293b, #0f172a)"}}>
                    <Card className="w-full max-w-md text-center p-10 relative shadow-2xl bg-gray-900 border-gray-800 text-white">
                        <div className="mb-8">
                            <h1 className="text-4xl font-black tracking-tight">ORIZIS<span className="text-blue-500">WEB</span></h1>
                            <p className="text-gray-400 font-medium mt-2 tracking-wide text-xs uppercase">Enterprise ERP • System Login</p>
                        </div>
                        
                        {error && <div className="mb-4 p-3 bg-red-900/50 text-red-400 text-sm rounded-lg border border-red-800/50 font-medium">{error}</div>}

                        <form onSubmit={handleAuth} className="space-y-5 text-right">
                            {!isLogin && (
                                <div className="p-4 bg-yellow-900/20 border border-yellow-700/50 rounded-xl mb-4">
                                    <p className="text-xs text-yellow-500 font-bold mb-3">⚠️ כלי מפתחים ליצירת מנהל ראשוני בלבד!</p>
                                    <div><label className="block text-sm font-bold text-gray-300 mb-1">שם מלא</label>
                                    <input type="text" onChange={e => setName(e.target.value)} className="w-full p-3 border border-gray-700 rounded-xl bg-gray-800 text-white focus:ring-2 focus:ring-blue-500 outline-none" required={!isLogin} /></div>
                                    <div className="mt-3"><label className="block text-sm font-bold text-gray-300 mb-1">הרשאת מערכת</label>
                                    <select value={role} onChange={e => setRole(e.target.value)} className="w-full p-3 border border-gray-700 rounded-xl bg-gray-800 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="manager">מנהל מערכת (בעלים)</option>
                                    </select></div>
                                </div>
                            )}
                            <div><label className="block text-sm font-bold text-gray-300 mb-1">שם משתמש (אימייל)</label>
                            <input type="email" placeholder="name@orizis.com" onChange={e => setEmail(e.target.value)} className="w-full p-3 border border-gray-700 rounded-xl bg-gray-800 text-white focus:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-left" dir="ltr" required /></div>
                            
                            <div><label className="block text-sm font-bold text-gray-300 mb-1">סיסמה סודית</label>
                            <input type="password" placeholder="••••••••" onChange={e => setPassword(e.target.value)} className="w-full p-3 border border-gray-700 rounded-xl bg-gray-800 text-white focus:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-left" dir="ltr" required minLength="6" /></div>
                            
                            <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-2 shadow-blue-500/20 shadow-lg">
                                {loading ? 'מאמת נתונים...' : (isLogin ? 'התחברות למערכת' : 'הקם מנהל ראשון')}
                            </Button>
                        </form>

                        <div className="mt-8 border-t border-gray-800 pt-6">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-gray-600 hover:text-gray-400 font-medium text-xs transition-colors">
                                {isLogin ? 'הקמת מנהל ראשוני (פעם אחת בלבד)' : 'חזור למסך התחברות'}
                            </button>
                        </div>
                    </Card>
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            const [briefData, setBriefData] = useState({ businessType: '', colors: '', competitor: '', about: '' });
            const project = projects.find(p => p.clientId === currentUser.uid);

            if (!project) return <div className="text-center p-10 font-bold text-xl text-gray-500">טרם הוזן עבורך פרויקט במערכת.</div>;

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { status: 'brief_submitted', briefInfo: briefData });
            };

            const purchaseUpsell = (upsell) => {
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, {
                    addons: [...currentAddons, upsell],
                    paymentAmount: project.paymentAmount + upsell.price
                });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 fade-in">
                    <Card className="bg-gradient-to-br from-[#0a0f1c] to-[#1e293b] text-white p-8 shadow-2xl border-none">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-3xl font-black">שלום, {currentUser.name}!</h2>
                            <div className="text-sm font-bold bg-blue-600/30 text-blue-300 px-4 py-2 rounded-full border border-blue-500/30">פורטל לקוחות ORIZISWEB</div>
                        </div>
                        <p className="text-gray-400">הפרויקט שלך: <span className="text-white font-bold">{project.customerName}</span></p>
                        
                        <div className="mt-8 flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                            <div className={`font-bold flex items-center gap-2 ${project.status === 'paid_waiting_for_brief' ? 'text-white' : 'text-emerald-400'}`}>
                                <span className="bg-white/10 w-8 h-8 flex items-center justify-center rounded-full text-sm">1</span> טופס אפיון
                            </div>
                            <div className={`font-bold flex items-center gap-2 ${['brief_submitted', 'in_progress'].includes(project.status) ? 'text-white' : project.status === 'qa_review' || project.status === 'completed' ? 'text-emerald-400' : 'text-white/30'}`}>
                                <span className="bg-white/10 w-8 h-8 flex items-center justify-center rounded-full text-sm">2</span> בנייה ופיתוח
                            </div>
                            <div className={`font-bold flex items-center gap-2 ${project.status === 'qa_review' ? 'text-white' : project.status === 'completed' ? 'text-emerald-400' : 'text-white/30'}`}>
                                <span className="bg-white/10 w-8 h-8 flex items-center justify-center rounded-full text-sm">3</span> אישור ומסירה
                            </div>
                        </div>
                    </Card>

                    {project.status === 'paid_waiting_for_brief' && (
                        <Card className="border-t-4 border-t-blue-500 shadow-lg">
                            <h3 className="text-2xl font-black mb-1">טופס הזמנה ואפיון דיגיטלי</h3>
                            <p className="text-gray-500 mb-6">מלא את הפרטים הבאים בצורה המדויקת ביותר כדי שהצוות יתחיל לעבוד.</p>
                            <form onSubmit={handleBriefSubmit} className="space-y-5">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div><label className="block text-sm font-bold mb-2">תחום העסק במדויק</label>
                                    <input type="text" placeholder="למשל: יועץ משכנתאות בצפון" required onChange={e=>setBriefData({...briefData, businessType: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                    <div><label className="block text-sm font-bold mb-2">צבעי המותג הרצויים</label>
                                    <input type="text" placeholder="למשל: כחול כהה וזהב" required onChange={e=>setBriefData({...briefData, colors: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                </div>
                                <div><label className="block text-sm font-bold mb-2">לינק לאתר מתחרה שאהבת (השראה לעיצוב)</label>
                                <input type="url" placeholder="https://..." dir="ltr" onChange={e=>setBriefData({...briefData, competitor: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-left" /></div>
                                <div><label className="block text-sm font-bold mb-2">אודות העסק (הטקסט שיופיע באתר עצמו)</label>
                                <textarea required rows="5" placeholder="ספר לנו על העסק, מתי הוקם, מה השירותים, למה לבחור בך..." onChange={e=>setBriefData({...briefData, about: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea></div>
                                <Button type="submit" className="w-full py-4 text-lg">שגר נתונים והעבר למחלקת פיתוח 🚀</Button>
                            </form>
                        </Card>
                    )}

                    {(project.status === 'brief_submitted' || project.status === 'in_progress') && (
                        <div className="space-y-6 fade-in">
                            <div className="bg-blue-50 border border-blue-200 p-6 rounded-2xl flex items-start md:items-center gap-4 shadow-sm">
                                <div className="text-4xl">⚙️</div>
                                <div>
                                    <h4 className="font-black text-blue-900 text-lg">האתר שלך בתהליך בנייה!</h4>
                                    <p className="text-sm text-blue-800 mt-1">הצוות שלנו קיבל את החומרים ועובד על האתר. בינתיים, תוכל לשדרג את האתר שלך ולהוסיף לו כלים חכמים מתוך החנות שלנו.</p>
                                </div>
                            </div>

                            <h3 className="text-2xl font-black pt-4">חנות שדרוגים לאתר (Upsells)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {systemSettings.upsells.map((upsell, idx) => {
                                    const isBought = (project.addons || []).find(a => a.id === upsell.id);
                                    return (
                                        <div key={idx} className={`border p-6 rounded-2xl transition-all ${isBought ? 'bg-gray-50 border-emerald-200 opacity-80' : 'bg-white border-gray-200 shadow-sm hover:border-blue-300 hover:shadow-md'}`}>
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="text-xl font-black text-gray-900">{upsell.title}</div>
                                                <div className="text-lg font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">₪{upsell.price}</div>
                                            </div>
                                            <Button onClick={() => purchaseUpsell(upsell)} disabled={isBought} variant={isBought ? 'secondary' : 'primary'} className="w-full py-3">
                                                {isBought ? '✓ שדרוג זה נרכש ונוסף לאתר' : '+ הוסף שדרוג לאתר שלי'}
                                            </Button>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {project.status === 'qa_review' && (
                        <Card className="border-4 border-emerald-400 bg-emerald-50 text-center py-12 shadow-xl fade-in">
                            <h3 className="text-3xl font-black text-emerald-900 mb-4">האתר שלך מוכן לבדיקה! 🎉</h3>
                            <p className="text-emerald-800 mb-8 font-medium">צוות הפיתוח סיים את העבודה וממתין לאישור הסופי שלך.</p>
                            
                            {project.links && project.links.liveUrl && (
                                <div className="mb-10">
                                    <a href={project.links.liveUrl} target="_blank" className="inline-block px-8 py-4 bg-gray-900 text-white rounded-xl font-bold shadow-xl hover:scale-105 transition-transform text-lg border border-gray-700">
                                        🌍 לחץ כאן לצפייה באתר החדש שלך
                                    </a>
                                </div>
                            )}

                            <div className="flex flex-col sm:flex-row gap-4 justify-center px-4">
                                <Button onClick={() => updateProject(project.id, { status: 'completed' })} variant="success" className="py-4 px-8 text-lg w-full sm:w-auto shadow-emerald-500/30 shadow-lg">
                                    ✓ הכל נראה מעולה, אני מאשר!
                                </Button>
                                <Button onClick={() => updateProject(project.id, { status: 'in_progress' })} variant="secondary" className="py-4 px-8 text-lg w-full sm:w-auto border-2 border-gray-300 bg-white">
                                    ✎ יש לי הערות / בקשת תיקון
                                </Button>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const FreelancerDashboard = () => {
            const { projects, currentUser, updateProject } = useContext(AppContext);
            const [now, setNow] = useState(Date.now());
            const [linksInput, setLinksInput] = useState({});

            useEffect(() => {
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, []);

            const myProjects = projects.filter(p => p.freelancerId === currentUser.uid);
            
            const calculateEarnings = () => {
                let total = 0;
                let projectsDone = 0;
                const basePay = currentUser.basePay || 1000;
                const upsellCutPct = (currentUser.upsellPercentage || 30) / 100;

                myProjects.filter(p => ['completed', 'qa_review'].includes(p.status)).forEach(p => {
                    total += basePay; 
                    projectsDone++;
                    if(p.addons) p.addons.forEach(a => total += (a.price * upsellCutPct));
                    if(p.timeSpent > 0 && p.timeSpent < 12600) total += 50; // Speed bonus
                });
                return { total: Math.floor(total), projectsDone };
            };

            const stats = calculateEarnings();

            const toggleTimer = (project) => {
                if (project.isTimerRunning) {
                    const elapsed = Math.floor((now - project.timerStartedAt) / 1000);
                    updateProject(project.id, { isTimerRunning: false, timeSpent: (project.timeSpent || 0) + elapsed, timerStartedAt: null });
                } else {
                    updateProject(project.id, { isTimerRunning: true, timerStartedAt: Date.now() });
                }
            };

            const submitForQA = (project) => {
                const links = linksInput[project.id];
                if(!links?.liveUrl || !links?.repoUrl || !links?.codeBackup) {
                    alert("חובה להזין את כל הלינקים וגיבוי קוד מלא לפני הגשה!");
                    return;
                }
                if (project.isTimerRunning) toggleTimer(project);
                updateProject(project.id, { 
                    status: 'qa_review', 
                    links: { liveUrl: links.liveUrl, repoUrl: links.repoUrl }, 
                    codeBackup: links.codeBackup 
                });
            };

            return (
                <div className="space-y-8 fade-in">
                    <div className="bg-gradient-to-r from-gray-900 to-gray-800 rounded-3xl p-8 text-white shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6 border border-gray-700">
                        <div>
                            <h2 className="text-gray-400 font-bold mb-1 text-sm tracking-widest uppercase">הארנק הדיגיטלי שלי</h2>
                            <div className="text-5xl font-black text-emerald-400">₪{stats.total.toLocaleString()}</div>
                            <div className="text-xs text-gray-500 mt-2">תעריף בסיס: ₪{currentUser.basePay||1000} | עמלת שדרוגים: {currentUser.upsellPercentage||30}%</div>
                        </div>
                        <div className="flex gap-4">

            const { projects, usersList, freelancers, systemSettings, updateProject, updateSettings, updateUser, currentUser } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            const [viewCodeModal, setViewCodeModal] = useState(null);
            
            // משתני State ליצירת משתמש חדש
            const [newUser, setNewUser] = useState({ email: '', password: '', name: '', role: 'client' });
            const [userCreationStatus, setUserCreationStatus] = useState('');

            const isManager = currentUser.role === 'manager';
            const activeProjects = projects.filter(p => p.status !== 'completed');
            
            const totalRevenue = projects.reduce((sum, p) => sum + (p.paymentAmount || 1500), 0);
            const totalCosts = projects.reduce((sum, p) => {
                if(!p.freelancerId) return sum;
                const fl = freelancers.find(f => f.uid === p.freelancerId) || {};
                const basePay = fl.basePay || 1000;
                const upsellCutPct = (fl.upsellPercentage || 30) / 100;
                
                let cost = basePay;
                if(p.addons) p.addons.forEach(a => cost += (a.price * upsellCutPct));
                if(p.timeSpent > 0 && p.timeSpent < 12600) cost += 50; 
                return sum + cost;
            }, 0);
            
            const fixedCosts = Object.values(systemSettings.expenses || {}).reduce((a,b)=>a+Number(b), 0);

            const autoAssign = (projectId) => {
                if(freelancers.length === 0) return;
                const workload = freelancers.map(fl => ({ ...fl, activeCount: projects.filter(p => p.freelancerId === fl.uid && ['in_progress', 'brief_submitted'].includes(p.status)).length }));
                workload.sort((a, b) => a.activeCount - b.activeCount);
                updateProject(projectId, { freelancerId: workload[0].uid, freelancerName: workload[0].name, status: 'in_progress' });
            };

                e.preventDefault();
                setUserCreationStatus('יוצר משתמש בענן...');

                    // יוצר משתמש באפליקציה המשנית כדי שהמנהל לא ינותק מהמערכת
                    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(newUser.email, newUser.password);
                    
                    const userData = {
                        role: newUser.role,
                        name: newUser.name,
                        email: newUser.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    // הגדרות תעריף ברירת מחדל לפרילנסר חדש
                    if (newUser.role === 'freelancer') {
                        userData.basePay = 1000;
                        userData.upsellPercentage = 30;
                    }

                    await db.collection('users').doc(cred.user.uid).set(userData);
                    
                    // יצירת פרויקט אוטומטי אם יצרנו לקוח
                    if (newUser.role === 'client') {
                        const newProj = await db.collection('projects').add({
                            customerName: newUser.name,
                            status: 'paid_waiting_for_brief',
                            paymentAmount: 1500,
                            timeSpent: 0, isTimerRunning: false, addons: [],
                            clientId: cred.user.uid
                        });
                    }
                    
                    await secondaryApp.auth().signOut();
                    setUserCreationStatus('✅ המשתמש נוצר בהצלחה! שלח לו את המייל והסיסמה.');
                    setNewUser({ email: '', password: '', name: '', role: 'client' }); // איפוס טופס
                    
                    setTimeout(() => setUserCreationStatus(''), 4000);
                } catch (err) {
                    console.error(err);
                    setUserCreationStatus('❌ שגיאה ביצירת משתמש: ' + err.message);

                                                        {formatDuration(currentTotal)}
                                                    </div>

                                                <td className="px-6 py-5 space-y-2">
                                                    {p.links?.liveUrl ? (
                                                        <div className="flex flex-col gap-2 text-sm font-medium">
                                                            <a href={p.links.liveUrl} target="_blank" className="text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-blue-50 px-2 py-1 rounded w-max">🌍 אתר חי</a>
                                                            {p.links.repoUrl && <a href={p.links.repoUrl} target="_blank" className="text-gray-600 hover:text-gray-800 flex items-center gap-1 bg-gray-50 px-2 py-1 rounded w-max">💻 גיטהאב</a>}
                                                        </div>
                                                    ) : <span className="text-gray-400 text-xs font-bold bg-gray-50 border border-gray-200 px-2 py-1 rounded">טרם הוגשו תוצרים</span>}
                                                    
                                                    {p.codeBackup && (
                                                        <button onClick={() => setViewCodeModal(p)} className="block mt-3 text-xs bg-gray-900 text-white px-3 py-1.5 rounded-lg hover:bg-gray-800 transition font-bold shadow-sm">
                                                            📄 צפה בגיבוי קוד
                                                        </button>
                                                    )}
                                                </td>
                                                <td className="px-6 py-5">
                                                    {p.status === 'brief_submitted' ? (
                                                        <div className="flex flex-col gap-2">
                                                            <select className="border border-gray-300 rounded-xl p-2 text-sm font-bold focus:border-blue-500 outline-none bg-gray-50" onChange={(e) => updateProject(p.id, { freelancerId: e.target.value, status: 'in_progress'})} defaultValue="">
                                                                <option value="" disabled>בחר פרילנסר...</option>
                                                                {freelancers.map(fl => <option key={fl.uid} value={fl.uid}>{fl.name} ({projects.filter(proj=>proj.freelancerId===fl.uid && proj.status==='in_progress').length} פעילים)</option>)}
                                                            </select>
                                                            <Button onClick={() => autoAssign(p.id)} className="py-1.5 text-xs w-full bg-indigo-600">🤖 שיוך אוטומטי</Button>
                                                        </div>
                                                    ) : (
                                                        <span className="font-bold text-gray-700 bg-gray-100 border border-gray-200 px-3 py-1.5 rounded-lg">{p.freelancerId ? (freelancers.find(f=>f.uid===p.freelancerId)?.name || 'צוות') : 'ממתין'}</span>
                                                    )}
                                                </td>
                                            </tr>
                                        )})}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {activeTab === 'settings' && isManager && (
                        <Card>
                            <h3 className="text-xl font-black mb-6 border-b pb-4">ניהול חנות שדרוגים ללקוח (Upsells)</h3>
                            <div className="space-y-4">
                                {systemSettings.upsells.map((u, i) => (
                                    <div key={i} className="flex justify-between items-center p-4 border border-gray-200 rounded-2xl bg-white shadow-sm">
                                        <div className="font-black text-gray-900">{u.title} <span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-sm mr-2">₪{u.price}</span></div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    )}

                    {viewCodeModal && (
                        <div className="fixed inset-0 bg-gray-900/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-[#0d1117] rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden border border-gray-700">
                                <div className="flex justify-between items-center p-5 bg-gray-800 border-b border-gray-700">
                                    <h3 className="font-black text-lg text-white flex items-center gap-2">📄 גיבוי קוד מקור <span className="bg-blue-600 px-2 py-0.5 rounded text-sm">{viewCodeModal.customerName}</span></h3>
                                    <button onClick={() => setViewCodeModal(null)} className="text-gray-400 hover:text-red-400 font-bold px-4 py-2 bg-gray-900 rounded-lg">✕ סגור</button>

            return (

                    <aside className="w-72 bg-[#0a0f1c] text-white flex flex-col hidden md:flex shadow-2xl z-20 relative">
                        <div className="p-8 border-b border-gray-800/50">

                        <div className="flex-1 p-6"></div>

                                <div>
                                    <div className="text-sm font-black text-gray-100">{currentUser.name || currentUser.email}</div>
                                    <div className="text-xs text-blue-400 font-bold mt-1 bg-blue-900/30 px-2 py-0.5 rounded inline-block">
                                        {currentUser.role === 'manager' ? 'הנהלה' : currentUser.role === 'secretary' ? 'אופרציה' : currentUser.role === 'client' ? 'לקוח' : 'צוות פיתוח'}
                                    </div>
                                </div>
                            </div>
                            <Button onClick={logout} variant="secondary" className="w-full bg-gray-800 text-gray-300 hover:bg-red-900 hover:text-red-200 border-gray-700">התנתק מהמערכת</Button>
                        </div>
                    </aside>
                    <main className="flex-1 p-8 md:p-10 overflow-y-auto h-screen relative">
                        <div className="max-w-6xl mx-auto pb-20">
                            {(currentUser.role === 'manager' || currentUser.role === 'secretary') && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
