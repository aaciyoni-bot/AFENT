<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency OS - ERP System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 selection:bg-blue-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAOIAfm8XfFegf9RaA0HyHpUuVTWDTXXuE",
            authDomain: "afent-8d50d.firebaseapp.com",
            projectId: "afent-8d50d",
            storageBucket: "afent-8d50d.firebasestorage.app",
            messagingSenderId: "458196058965",
            appId: "1:458196058965:web:bd4466b89c554b806b25dc",
            measurementId: "G-X41B2CNGNN"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white p-6 rounded-2xl shadow-sm border border-gray-100 ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, type = 'button' }) => {
            const baseStyle = "px-4 py-2 text-sm font-semibold rounded-xl transition-all focus:outline-none disabled:opacity-50 flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-sm",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
                success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm",
                danger: "bg-red-50 text-red-600 hover:bg-red-100"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const formatDuration = (totalSeconds) => {
            if (!totalSeconds) return "00:00:00";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [currentUser, setCurrentUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [freelancers, setFreelancers] = useState([]);
            const [systemSettings, setSystemSettings] = useState({ upsells: [], expenses: { marketing: 0, office: 0, software: 0 } });
            const [isLoadingDb, setIsLoadingDb] = useState(true);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) {
                                setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
                            }
                        } catch (err) { console.error("Auth error:", err); }
                    } else {
                        setCurrentUser(null);
                    }
                });

                // Load System Settings
                const unsubscribeSettings = db.collection('settings').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        setSystemSettings(doc.data());
                    } else {
                        // Default settings if empty
                        const defaultSettings = {
                            upsells: [
                                { id: 'branding', title: 'מיתוג בסיסי: לוגו וקאבר', price: 500, flCut: 150, icon: '🎨' },
                                { id: 'whatsapp', title: 'חיבור מהיר לוואטסאפ', price: 200, flCut: 50, icon: '💬' }
                            ],
                            expenses: { marketing: 250000, office: 360000, software: 50000 }
                        };
                        db.collection('settings').doc('general').set(defaultSettings);
                    }
                });

                const unsubscribeProjects = db.collection('projects').onSnapshot((snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoadingDb(false);
                });

                const unsubscribeFreelancers = db.collection('users').where('role', '==', 'freelancer').onSnapshot(snapshot => {
                    setFreelancers(snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() })));
                });

                return () => { unsubscribeAuth(); unsubscribeProjects(); unsubscribeFreelancers(); unsubscribeSettings(); };
            }, []);

            const updateProject = async (projectId, updates) => {
                await db.collection('projects').doc(projectId).update(updates);
            };

            const updateSettings = async (updates) => {
                await db.collection('settings').doc('general').update(updates);
            }

            const logout = () => auth.signOut();

            return (
                <AppContext.Provider value={{ currentUser, logout, projects, freelancers, systemSettings, updateProject, updateSettings, isLoadingDb }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const LoginScreen = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [role, setRole] = useState('freelancer');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(''); setLoading(true);
                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await db.collection('users').doc(cred.user.uid).set({ role, name: name || email.split('@')[0] });
                        
                        if (role === 'client') {
                            const newProj = await db.collection('projects').add({
                                customerName: name || email.split('@')[0],
                                status: 'paid_waiting_for_brief',
                                paymentAmount: 1500,
                                timeSpent: 0, isTimerRunning: false, addons: [],
                                links: { liveUrl: '', repoUrl: '' }
                            });
                            await db.collection('users').doc(cred.user.uid).update({ projectId: newProj.id });
                        }
                    }
                } catch (err) { setError("שגיאה: " + err.message); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                    <Card className="w-full max-w-md text-center p-8 relative">
                        <h1 className="text-4xl font-black text-gray-900 mb-2">AGENCY<span className="text-blue-600">OS</span></h1>
                        <p className="text-gray-500 font-medium mb-6">מערכת ERP וניהול משאבים</p>
                        
                        {error && <div className="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">{error}</div>}

                        <form onSubmit={handleAuth} className="space-y-4 text-right">
                            {!isLogin && (
                                <>
                                    <div><label className="block text-sm font-bold text-gray-700 mb-1">שם מלא</label>
                                    <input type="text" onChange={e => setName(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50" required={!isLogin} /></div>
                                    <div><label className="block text-sm font-bold text-gray-700 mb-1">תפקיד</label>
                                    <select value={role} onChange={e => setRole(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50">
                                        <option value="freelancer">צוות ביצוע (פרילנסר)</option>
                                        <option value="secretary">מזכירה / תפעול (אופרציה)</option>
                                        <option value="manager">מנהל מערכת (בעלים)</option>
                                        <option value="client">לקוח</option>
                                    </select></div>
                                </>
                            )}
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">אימייל</label>
                            <input type="email" onChange={e => setEmail(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50" required /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">סיסמה</label>
                            <input type="password" onChange={e => setPassword(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50" required minLength="6" /></div>
                            
                            <Button type="submit" disabled={loading} className="w-full py-3.5 mt-4">{loading ? 'טוען...' : (isLogin ? 'התחבר' : 'הרשמה')}</Button>
                        </form>
                        <button onClick={() => setIsLogin(!isLogin)} className="mt-6 text-blue-600 hover:underline font-medium text-sm">
                            {isLogin ? 'עדיין לא רשום? צור משתמש עכשיו' : 'כבר רשום? חזור להתחברות'}
                        </button>
                    </Card>
                </div>
            );
        };

        const ClientPortal = () => {
            const { currentUser, projects, systemSettings, updateProject } = useContext(AppContext);
            const [briefData, setBriefData] = useState({ businessType: '', colors: '', competitor: '', about: '' });
            const project = projects.find(p => p.id === currentUser.projectId);

            if (!project) return <div className="text-center p-10 font-bold">לא נמצא פרויקט.</div>;

            const handleBriefSubmit = (e) => {
                e.preventDefault();
                updateProject(project.id, { status: 'brief_submitted', briefInfo: briefData });
            };

            const purchaseUpsell = (upsell) => {
                const currentAddons = project.addons || [];
                if (currentAddons.find(a => a.id === upsell.id)) return;
                updateProject(project.id, {
                    addons: [...currentAddons, upsell],
                    paymentAmount: project.paymentAmount + upsell.price
                });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8">
                    <Card className="bg-gradient-to-br from-blue-900 to-indigo-900 text-white p-8">
                        <h2 className="text-3xl font-bold mb-2">שלום, {currentUser.name}!</h2>
                        <div className="mt-8 flex justify-between items-center bg-white/10 p-4 rounded-xl">
                            <div className={`font-bold ${project.status === 'paid_waiting_for_brief' ? 'text-blue-300' : 'text-green-400'}`}>1. אפיון</div>
                            <div className={`font-bold ${['brief_submitted', 'in_progress'].includes(project.status) ? 'text-blue-300' : project.status === 'qa_review' || project.status === 'completed' ? 'text-green-400' : 'text-gray-400'}`}>2. בנייה</div>
                            <div className={`font-bold ${project.status === 'qa_review' ? 'text-blue-300' : project.status === 'completed' ? 'text-green-400' : 'text-gray-400'}`}>3. מסירה</div>
                        </div>
                    </Card>

                    {project.status === 'paid_waiting_for_brief' && (
                        <Card>
                            <h3 className="text-2xl font-bold mb-6">טופס אפיון (בריף) דיגיטלי</h3>
                            <form onSubmit={handleBriefSubmit} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-sm font-bold mb-1">תחום</label><input type="text" required onChange={e=>setBriefData({...briefData, businessType: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50" /></div>
                                    <div><label className="block text-sm font-bold mb-1">צבעים</label><input type="text" required onChange={e=>setBriefData({...briefData, colors: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50" /></div>
                                </div>
                                <div><label className="block text-sm font-bold mb-1">אודות העסק</label><textarea required rows="4" onChange={e=>setBriefData({...briefData, about: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50"></textarea></div>
                                <Button type="submit" className="w-full py-4 text-lg">שגר לצוות הפיתוח 🚀</Button>
                            </form>
                        </Card>
                    )}

                    {(project.status === 'brief_submitted' || project.status === 'in_progress') && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold">חנות השדרוגים שלנו (בקליק)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {systemSettings.upsells.map(upsell => {
                                    const isBought = (project.addons || []).find(a => a.id === upsell.id);
                                    return (
                                        <div key={upsell.id} className={`border p-5 rounded-2xl ${isBought ? 'bg-gray-50 border-green-200' : 'bg-white'}`}>
                                            <div className="flex justify-between items-start mb-3">
                                                <div className="text-3xl">{upsell.icon}</div>
                                                <div className="text-lg font-bold text-blue-600">₪{upsell.price}</div>
                                            </div>
                                            <h4 className="font-bold mb-2">{upsell.title}</h4>
                                            <Button onClick={() => purchaseUpsell(upsell)} disabled={isBought} variant={isBought ? 'secondary' : 'primary'} className="w-full">
                                                {isBought ? 'נרכש ✓' : 'הוסף לאתר שלי'}
                                            </Button>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {project.status === 'qa_review' && (
                        <Card className="border-2 border-yellow-400 bg-yellow-50 text-center py-10">
                            <h3 className="text-3xl font-bold text-yellow-900 mb-4">האתר שלך מוכן לבדיקה! 🎉</h3>
                            
                            {project.links && (
                                <div className="mb-6 flex justify-center gap-4">
                                    <a href={project.links.liveUrl} target="_blank" className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700">🌍 צפה באתר החי</a>
                                </div>
                            )}

                            <div className="flex space-x-4 space-x-reverse justify-center">
                                <Button onClick={() => updateProject(project.id, { status: 'completed' })} variant="success">✓ אשר אתר סופית</Button>
                                <Button onClick={() => updateProject(project.id, { status: 'in_progress' })} variant="danger">✎ בקש תיקונים מהמתכנת</Button>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        const FreelancerDashboard = () => {
            const { projects, currentUser, updateProject } = useContext(AppContext);
            const [now, setNow] = useState(Date.now());
            const [linksInput, setLinksInput] = useState({}); // { projectId: { liveUrl: '', repoUrl: '' } }

            useEffect(() => {
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, []);

            const myProjects = projects.filter(p => p.freelancerId === currentUser.uid);
            
            const calculateEarnings = () => {
                let total = 0;
                myProjects.filter(p => ['completed', 'qa_review'].includes(p.status)).forEach(p => {
                    total += 1000;
                    if(p.addons) p.addons.forEach(a => total += a.flCut);
                    if(p.timeSpent > 0 && p.timeSpent < 12600) total += 50; 
                });
                return total;
            };

            const toggleTimer = (project) => {
                if (project.isTimerRunning) {
                    const elapsed = Math.floor((now - project.timerStartedAt) / 1000);
                    updateProject(project.id, { isTimerRunning: false, timeSpent: (project.timeSpent || 0) + elapsed, timerStartedAt: null });
                } else {
                    updateProject(project.id, { isTimerRunning: true, timerStartedAt: Date.now() });
                }
            };

            const submitForQA = (project) => {
                const links = linksInput[project.id];
                if(!links?.liveUrl) {
                    alert("חובה להזין לינק לאתר החי לפני שליחה ל-QA!"); // Only exception for validation
                    return;
                }
                if (project.isTimerRunning) toggleTimer(project);
                updateProject(project.id, { status: 'qa_review', links: links });
            };

            return (
                <div className="space-y-8">
                    <div className="bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl p-8 text-white flex justify-between items-center">
                        <div>
                            <h2 className="text-emerald-100 font-medium mb-1">הארנק שלי (החודש)</h2>
                            <div className="text-5xl font-black">₪{calculateEarnings().toLocaleString()}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-6">
                        {myProjects.filter(p => p.status === 'in_progress' || p.status === 'brief_submitted').map(project => {
                            let currentTotal = project.timeSpent || 0;
                            if (project.isTimerRunning && project.timerStartedAt) currentTotal += Math.floor((now - project.timerStartedAt) / 1000);
                            
                            return (
                                <Card key={project.id} className={`border-r-4 ${project.isTimerRunning ? 'border-r-blue-500' : 'border-r-gray-300'}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="text-xl font-bold">{project.customerName}</h3>
                                            {project.addons && project.addons.length > 0 && (
                                                <div className="mt-2 flex gap-2">
                                                    {project.addons.map(a => <span key={a.id} className="text-xs bg-purple-100 text-purple-800 px-2 py-1 rounded-full font-bold">+{a.title} (+₪{a.flCut})</span>)}
                                                </div>
                                            )}
                                        </div>
                                        <div className="text-3xl font-mono font-bold bg-gray-100 px-4 py-2 rounded-lg">{formatDuration(currentTotal)}</div>
                                    </div>
                                    
                                    <div className="mt-4 bg-gray-50 p-4 rounded-xl space-y-3">
                                        <h4 className="font-bold text-sm text-gray-700">לינקים למסירה (חובה למלא לפני QA)</h4>
                                        <input type="url" placeholder="לינק לאתר חי (למשל Vercel/Netlify)" 
                                            onChange={(e) => setLinksInput({...linksInput, [project.id]: {...linksInput[project.id], liveUrl: e.target.value}})}
                                            className="w-full p-2 border rounded text-left text-sm" dir="ltr" />
                                        <input type="url" placeholder="לינק למאגר הקוד (GitHub)" 
                                            onChange={(e) => setLinksInput({...linksInput, [project.id]: {...linksInput[project.id], repoUrl: e.target.value}})}
                                            className="w-full p-2 border rounded text-left text-sm" dir="ltr" />
                                    </div>

                                    <div className="flex space-x-3 space-x-reverse mt-6">
                                        <Button onClick={() => toggleTimer(project)} variant={project.isTimerRunning ? 'secondary' : 'primary'} className="flex-1">
                                            {project.isTimerRunning ? '⏸ השהה טיימר' : '▶️ התחל עבודה'}
                                        </Button>
                                        <Button onClick={() => submitForQA(project)} variant="success" className="flex-1">🚀 הגש לבקרת איכות</Button>
                                    </div>
                                </Card>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { projects, freelancers, systemSettings, updateProject, updateSettings, currentUser } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('projects');
            
            const isManager = currentUser.role === 'manager';
            const activeProjects = projects.filter(p => p.status !== 'completed');
            
            // Financials
            const totalRevenue = projects.reduce((sum, p) => sum + (p.paymentAmount || 1500), 0);
            const totalCosts = projects.reduce((sum, p) => {
                let cost = p.freelancerId ? 1000 : 0;
                if(p.addons) p.addons.forEach(a => cost += a.flCut);
                if(p.timeSpent > 0 && p.timeSpent < 12600) cost += 50; 
                return sum + cost;
            }, 0);
            const fixedCosts = Object.values(systemSettings.expenses || {}).reduce((a,b)=>a+Number(b), 0);
            const profit = totalRevenue - totalCosts - (fixedCosts / 12); // P&L monthly approx

            const autoAssign = (projectId) => {
                if(freelancers.length === 0) return;
                const workload = freelancers.map(fl => ({ ...fl, activeCount: projects.filter(p => p.freelancerId === fl.uid && ['in_progress', 'brief_submitted'].includes(p.status)).length }));
                workload.sort((a, b) => a.activeCount - b.activeCount);
                updateProject(projectId, { freelancerId: workload[0].uid, freelancerName: workload[0].name, status: 'in_progress' });
            };

            const saveSettings = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                updateSettings({
                    expenses: { marketing: formData.get('marketing'), office: formData.get('office'), software: formData.get('software') }
                });
            }

            return (
                <div className="space-y-6">
                    <div className="flex border-b border-gray-200 mb-6">
                        <button onClick={()=>setActiveTab('projects')} className={`px-4 py-3 ${activeTab==='projects'?'tab-active':'text-gray-500'}`}>ניהול פרויקטים</button>
                        {isManager && <button onClick={()=>setActiveTab('finance')} className={`px-4 py-3 ${activeTab==='finance'?'tab-active':'text-gray-500'}`}>דוח פיננסי</button>}
                        {isManager && <button onClick={()=>setActiveTab('settings')} className={`px-4 py-3 ${activeTab==='settings'?'tab-active':'text-gray-500'}`}>הגדרות מערכת</button>}
                    </div>

                    {activeTab === 'finance' && isManager && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                            <Card className="bg-gray-900 text-white"><h3 className="text-gray-400 text-sm mb-1">הכנסות</h3><p className="text-4xl font-bold">₪{totalRevenue.toLocaleString()}</p></Card>
                            <Card><h3 className="text-gray-500 text-sm mb-1">עלויות פרילנסרים</h3><p className="text-3xl font-bold text-red-600">₪{totalCosts.toLocaleString()}</p></Card>
                            <Card className="border-t-4 border-t-green-500"><h3 className="text-gray-500 text-sm mb-1">רווח גולמי (לפני קבועות)</h3><p className="text-3xl font-bold text-green-600">₪{(totalRevenue - totalCosts).toLocaleString()}</p></Card>
                        </div>
                    )}

                    {activeTab === 'projects' && (
                        <Card>
                            <h2 className="text-xl font-bold mb-4">תור משימות ומעקב ({activeProjects.length} פעילים)</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-gray-50 text-gray-500 border-b">
                                        <tr>
                                            <th className="px-4 py-3">לקוח</th>
                                            <th className="px-4 py-3">סטטוס</th>
                                            <th className="px-4 py-3">לינקים לביקורת</th>
                                            <th className="px-4 py-3">אחראי ביצוע</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {activeProjects.map(p => (
                                            <tr key={p.id} className="hover:bg-gray-50">
                                                <td className="px-4 py-4 font-bold">{p.customerName}</td>
                                                <td className="px-4 py-4"><span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold">{p.status.replace(/_/g, ' ')}</span></td>
                                                <td className="px-4 py-4">
                                                    {p.links?.liveUrl ? (
                                                        <div className="flex gap-2">
                                                            <a href={p.links.liveUrl} target="_blank" className="text-blue-600 hover:underline">🌐 אתר חי</a>
                                                            {p.links.repoUrl && <a href={p.links.repoUrl} target="_blank" className="text-gray-600 hover:underline">💻 קוד</a>}
                                                        </div>
                                                    ) : <span className="text-gray-400 text-xs">טרם הוגש</span>}
                                                </td>
                                                <td className="px-4 py-4">
                                                    {p.status === 'brief_submitted' ? (
                                                        <div className="flex gap-2">
                                                            <select className="border rounded p-1 text-xs" onChange={(e) => updateProject(p.id, { freelancerId: e.target.value, status: 'in_progress'})} defaultValue="">
                                                                <option value="" disabled>שייך פרילנסר...</option>
                                                                {freelancers.map(fl => <option key={fl.uid} value={fl.uid}>{fl.name}</option>)}
                                                            </select>
                                                            <Button onClick={() => autoAssign(p.id)} className="py-1 px-2 text-xs">🤖 אוטומטי</Button>
                                                        </div>
                                                    ) : (
                                                        <span className="font-medium text-gray-700">{p.freelancerId ? 'בביצוע' : 'ממתין'}</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    )}

                    {activeTab === 'settings' && isManager && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <Card>
                                <h3 className="text-lg font-bold mb-4">ניהול הוצאות קבועות (שנתי)</h3>
                                <form onSubmit={saveSettings} className="space-y-4">
                                    <div><label className="block text-sm font-bold mb-1">תקציב שיווק ומדיה (₪)</label>
                                    <input name="marketing" defaultValue={systemSettings.expenses?.marketing} type="number" className="w-full p-2 border rounded bg-gray-50" /></div>
                                    <div><label className="block text-sm font-bold mb-1">שכירות משרד ותפעול (₪)</label>
                                    <input name="office" defaultValue={systemSettings.expenses?.office} type="number" className="w-full p-2 border rounded bg-gray-50" /></div>
                                    <div><label className="block text-sm font-bold mb-1">רישיונות תוכנה ושרתים (₪)</label>
                                    <input name="software" defaultValue={systemSettings.expenses?.software} type="number" className="w-full p-2 border rounded bg-gray-50" /></div>
                                    <Button type="submit">שמור נתוני תקציב</Button>
                                </form>
                            </Card>
                            <Card>
                                <h3 className="text-lg font-bold mb-4">מוצרי מדף (Upsells) קיימים בחנות</h3>
                                <div className="space-y-3">
                                    {systemSettings.upsells.map((u, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 border rounded bg-gray-50">
                                            <div>
                                                <div className="font-bold">{u.title} {u.icon}</div>
                                                <div className="text-xs text-gray-500">מחיר ללקוח: ₪{u.price} | נתח פרילנסר: ₪{u.flCut}</div>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="text-sm text-blue-600 mt-2 cursor-pointer font-bold">+ הוספת מוצר למערכת תתאפשר בעדכון הבא</div>
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardLayout = () => {
            const { currentUser, logout, isLoadingDb } = useContext(AppContext);

            if (isLoadingDb) return <div className="min-h-screen flex items-center justify-center font-bold text-gray-500">טוען נתוני ענן...</div>;
            if (!currentUser) return <LoginScreen />;

            return (
                <div className="flex min-h-screen bg-gray-50">
                    <aside className="w-64 bg-gray-900 text-white flex flex-col hidden md:flex shadow-xl z-10">
                        <div className="p-6 border-b border-gray-800"><h1 className="text-2xl font-black">AGENCY<span className="text-blue-500">OS</span></h1></div>
                        <div className="flex-1 p-4"></div>
                        <div className="p-4 border-t border-gray-800 bg-gray-900/50">
                            <div className="text-sm font-bold mb-1">{currentUser.name}</div>
                            <div className="text-xs text-gray-400 mb-4 bg-gray-800 px-2 py-1 rounded inline-block">
                                {currentUser.role === 'manager' ? 'מנהל ראשי' : currentUser.role === 'secretary' ? 'אופרציה ומזכירות' : currentUser.role === 'client' ? 'לקוח' : 'צוות ביצוע'}
                            </div>
                            <Button onClick={logout} variant="secondary" className="w-full bg-gray-800 text-gray-300 hover:bg-red-600 hover:text-white border-none py-2 text-xs">התנתק</Button>
                        </div>
                    </aside>
                    <main className="flex-1 p-8 overflow-y-auto">
                        <div className="max-w-6xl mx-auto">
                            {(currentUser.role === 'manager' || currentUser.role === 'secretary') && <AdminDashboard />}
                            {currentUser.role === 'freelancer' && <FreelancerDashboard />}
                            {currentUser.role === 'client' && <ClientPortal />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => <AppProvider><DashboardLayout /></AppProvider>;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
